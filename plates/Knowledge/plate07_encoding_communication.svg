<svg viewBox="0 0 480 680" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  text{font-family:Georgia,serif;fill:#000;}
  .T{font-size:12px;font-weight:bold;letter-spacing:2px;}
  .S{font-size:7px;letter-spacing:1.5px;}
  .H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
  .L{font-size:7px;}
  .Ls{font-size:6px;}
  .Lx{font-size:5.5px;}
  .M{font-size:6px;letter-spacing:1px;}
  .F{font-size:7px;font-style:italic;}
  .Fb{font-size:7.5px;font-weight:bold;}
</style></defs>
<rect x="6" y="6" width="468" height="668" rx="4" fill="none" stroke="#000" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" rx="2" fill="none" stroke="#000" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">PLATE 07  ·  ENCODING &amp; COMMUNICATION</text>
<line x1="18" y1="39" x2="462" y2="39" stroke="#000" stroke-width="0.75"/>
<text x="240" y="50" text-anchor="middle" class="S">any information can be encoded in two symbols  ·  present and absent  ·  one and zero</text>
<line x1="18" y1="56" x2="462" y2="56" stroke="#000" stroke-width="0.5"/>
<text x="240" y="67" text-anchor="middle" class="H">— · —  THE ENCODING STACK  — · —</text>
<line x1="22" y1="71" x2="458" y2="71" stroke="#000" stroke-width="0.3"/>
<text x="240" y="80" text-anchor="middle" class="Lx">every message travels through layers  ·  each layer converts the one above it</text>
<rect x="49" y="86" width="88" height="24" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="93" y="96" text-anchor="middle" class="Ls">CONCEPT</text>
<text x="93" y="105" text-anchor="middle" class="Lx">the idea in the mind</text>
<line x1="138" y1="98" x2="142" y2="98" stroke="#000" stroke-width="0.8"/><polygon points="142,96 146,98 142,100" fill="#000"/>
<rect x="147" y="86" width="88" height="24" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="191" y="96" text-anchor="middle" class="Ls">SOUND</text>
<text x="191" y="105" text-anchor="middle" class="Lx">vibration in air</text>
<line x1="236" y1="98" x2="240" y2="98" stroke="#000" stroke-width="0.8"/><polygon points="240,96 244,98 240,100" fill="#000"/>
<rect x="245" y="86" width="88" height="24" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="289" y="96" text-anchor="middle" class="Ls">SYMBOL</text>
<text x="289" y="105" text-anchor="middle" class="Lx">mark on a surface</text>
<line x1="334" y1="98" x2="338" y2="98" stroke="#000" stroke-width="0.8"/><polygon points="338,96 342,98 338,100" fill="#000"/>
<rect x="343" y="86" width="88" height="24" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="387" y="96" text-anchor="middle" class="Ls">SIGNAL</text>
<text x="387" y="105" text-anchor="middle" class="Lx">on / off  ·  light / dark  ·  sound / silence</text>
<text x="93" y="122" text-anchor="middle" class="Lx">"water"</text>
<text x="191" y="122" text-anchor="middle" class="Lx">"ma-yim"</text>
<text x="289" y="122" text-anchor="middle" class="Lx">𐤌𐤉𐤌  /  מים</text>
<text x="387" y="122" text-anchor="middle" class="Lx">·· --- ·· (Morse)</text>
<line x1="22" y1="130" x2="458" y2="130" stroke="#000" stroke-width="0.3"/>
<rect x="22" y="133" width="436" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="240" y="142" text-anchor="middle" class="Lx">KEY INSIGHT: the same concept can exist at any layer independently  ·  each layer is a different encoding of the same meaning</text>
<text x="240" y="151" text-anchor="middle" class="Lx">a finder who understands this stack can move between layers  ·  and decode any encoding system they encounter</text>
<line x1="22" y1="158" x2="458" y2="158" stroke="#000" stroke-width="0.5"/>
<text x="240" y="168" text-anchor="middle" class="H">— · —  THE TWO-SYMBOL PRINCIPLE  ·  ONE FORCE IN THREE FORMS  — · —</text>
<line x1="22" y1="172" x2="458" y2="172" stroke="#000" stroke-width="0.3"/>
<text x="96" y="183" text-anchor="middle" class="Ls">MAYAN DOT-BAR</text>
<text x="96" y="192" text-anchor="middle" class="Lx">● dot = 1</text>
<text x="96" y="200" text-anchor="middle" class="Lx">━ bar = 5</text>
<text x="241" y="183" text-anchor="middle" class="Ls">MORSE CODE</text>
<text x="241" y="192" text-anchor="middle" class="Lx">· dot = short</text>
<text x="241" y="200" text-anchor="middle" class="Lx">— dash = long</text>
<text x="386" y="183" text-anchor="middle" class="Ls">BINARY</text>
<text x="386" y="192" text-anchor="middle" class="Lx">1 = on / present</text>
<text x="386" y="200" text-anchor="middle" class="Lx">0 = off / absent</text>
<line x1="22" y1="204" x2="458" y2="204" stroke="#000" stroke-width="0.3"/>
<text x="96" y="215" text-anchor="middle" class="Lx">3  =</text>
<circle cx="86" cy="222" r="3.5" fill="#000" stroke="#000" stroke-width="0.9"/>
<circle cx="96" cy="222" r="3.5" fill="#000" stroke="#000" stroke-width="0.9"/>
<circle cx="106" cy="222" r="3.5" fill="#000" stroke="#000" stroke-width="0.9"/>
<text x="241" y="215" text-anchor="middle" class="Lx">S  =  · · ·</text>
<circle cx="231" cy="222" r="2.5" fill="#000" stroke="#000" stroke-width="0.9"/>
<circle cx="241" cy="222" r="2.5" fill="#000" stroke="#000" stroke-width="0.9"/>
<circle cx="251" cy="222" r="2.5" fill="#000" stroke="#000" stroke-width="0.9"/>
<text x="386" y="215" text-anchor="middle" class="Lx">3  =  0 1 1</text>
<text x="386" y="224" text-anchor="middle" class="Lx">S  =  0 1 1 (3 pulses)</text>
<line x1="22" y1="232" x2="458" y2="232" stroke="#000" stroke-width="0.3"/>
<text x="240" y="239" text-anchor="middle" class="Lx">all three are the same idea: count using two symbols  ·  position and repetition carry the meaning</text>
<line x1="22" y1="243" x2="458" y2="243" stroke="#000" stroke-width="0.5"/>
<text x="240" y="253" text-anchor="middle" class="H">— · —  MORSE CODE  ·  SURVIVAL SIGNALING PROTOCOL  — · —</text>
<line x1="22" y1="257" x2="458" y2="257" stroke="#000" stroke-width="0.3"/>
<text x="240" y="265" text-anchor="middle" class="Lx">produce with: flashlight  ·  mirror  ·  fire  ·  horn  ·  two rocks  ·  smoke  ·  anything on/off</text>
<rect x="22" y="269" width="436" height="30" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="240" y="280" text-anchor="middle" class="Ls">S O S  =  · · ·   — — —   · · ·   (universal distress signal)</text>
<text x="240" y="292" text-anchor="middle" class="Lx">3 short  ·  3 long  ·  3 short  ·  pause  ·  repeat</text>
<circle cx="80" cy="307" r="3.5" fill="#000" stroke="#000" stroke-width="1.0"/>
<circle cx="90" cy="307" r="3.5" fill="#000" stroke="#000" stroke-width="1.0"/>
<circle cx="100" cy="307" r="3.5" fill="#000" stroke="#000" stroke-width="1.0"/>
<rect x="122" y="304" width="14" height="6" fill="#000"/>
<rect x="140" y="304" width="14" height="6" fill="#000"/>
<rect x="158" y="304" width="14" height="6" fill="#000"/>
<circle cx="186" cy="307" r="3.5" fill="#000" stroke="#000" stroke-width="1.0"/>
<circle cx="196" cy="307" r="3.5" fill="#000" stroke="#000" stroke-width="1.0"/>
<circle cx="206" cy="307" r="3.5" fill="#000" stroke="#000" stroke-width="1.0"/>
<text x="240" y="320" text-anchor="middle" class="Lx">short = dot  ·  long (3x short) = dash  ·  gap between letters = 3 dots  ·  gap between words = 7 dots</text>
<line x1="22" y1="325" x2="458" y2="325" stroke="#000" stroke-width="0.3"/>
<text x="240" y="332" text-anchor="middle" class="Ls">SURVIVAL VOCABULARY</text>
<text x="78" y="341" text-anchor="middle" class="Ls">HELP</text>
<text x="78" y="349" text-anchor="middle" class="Lx">···· · ·-·· ·--·</text>
<text x="187" y="341" text-anchor="middle" class="Ls">WATER</text>
<text x="187" y="349" text-anchor="middle" class="Lx">·-- ·- - · ·-·</text>
<text x="296" y="341" text-anchor="middle" class="Ls">FIRE</text>
<text x="296" y="349" text-anchor="middle" class="Lx">··-· ·· ·-· ·</text>
<text x="405" y="341" text-anchor="middle" class="Ls">DANGER</text>
<text x="405" y="349" text-anchor="middle" class="Lx">-·· ·- -·· ··· · ·-·</text>
<text x="78" y="359" text-anchor="middle" class="Ls">YES</text>
<text x="78" y="367" text-anchor="middle" class="Lx">-·-- · ···</text>
<text x="187" y="359" text-anchor="middle" class="Ls">NO</text>
<text x="187" y="367" text-anchor="middle" class="Lx">-· ---</text>
<text x="296" y="359" text-anchor="middle" class="Ls">COME</text>
<text x="296" y="367" text-anchor="middle" class="Lx">-·-· --- -- ·</text>
<text x="405" y="359" text-anchor="middle" class="Ls">STOP</text>
<text x="405" y="367" text-anchor="middle" class="Lx">··· - --- ·--·</text>
<line x1="22" y1="380" x2="458" y2="380" stroke="#000" stroke-width="0.5"/>
<text x="240" y="390" text-anchor="middle" class="H">— · —  HOW THESE PLATES USE THE ENCODING STACK  — · —</text>
<line x1="22" y1="394" x2="458" y2="394" stroke="#000" stroke-width="0.3"/>
<rect x="55" y="400" width="110" height="55" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="110" y="410" text-anchor="middle" class="Lx">PLATE 1</text>
<text x="110" y="419" text-anchor="middle" class="Ls">ROSETTA INDEX</text>
<text x="110" y="429" text-anchor="middle" class="Lx">concept layer</text>
<text x="110" y="438" text-anchor="middle" class="Lx">pictographs = direct</text>
<text x="110" y="447" text-anchor="middle" class="Lx">ideas as pictures</text>
<line x1="166" y1="427" x2="180" y2="427" stroke="#000" stroke-width="0.8"/><polygon points="180,425 184,427 180,429" fill="#000"/>
<rect x="185" y="400" width="110" height="55" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="240" y="410" text-anchor="middle" class="Lx">PLATE 09A</text>
<text x="240" y="419" text-anchor="middle" class="Ls">BIBLICAL HEBREW</text>
<text x="240" y="429" text-anchor="middle" class="Lx">symbol layer</text>
<text x="240" y="438" text-anchor="middle" class="Lx">letters = sounds</text>
<text x="240" y="447" text-anchor="middle" class="Lx">script = encoding</text>
<line x1="296" y1="427" x2="310" y2="427" stroke="#000" stroke-width="0.8"/><polygon points="310,425 314,427 310,429" fill="#000"/>
<rect x="315" y="400" width="110" height="55" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="370" y="410" text-anchor="middle" class="Lx">AUDIO DISC</text>
<text x="370" y="419" text-anchor="middle" class="Ls">THE VOICE</text>
<text x="370" y="429" text-anchor="middle" class="Lx">signal layer</text>
<text x="370" y="438" text-anchor="middle" class="Lx">groove = wave</text>
<text x="370" y="447" text-anchor="middle" class="Lx">physical encoding</text>
<text x="110" y="465" text-anchor="middle" class="Lx">no shared language</text>
<text x="240" y="465" text-anchor="middle" class="Lx">shared script</text>
<text x="370" y="465" text-anchor="middle" class="Lx">shared sound</text>
<line x1="22" y1="475" x2="458" y2="475" stroke="#000" stroke-width="0.3"/>
<text x="240" y="483" text-anchor="middle" class="Lx">a finder who understands the encoding stack can read at whichever layer survives</text>
<text x="240" y="491" text-anchor="middle" class="Lx">even if the language is lost  ·  the pictures remain  ·  even if the script is lost  ·  the sounds remain</text>
<line x1="22" y1="496" x2="458" y2="496" stroke="#000" stroke-width="0.5"/>
<text x="240" y="506" text-anchor="middle" class="H">— · —  THE UNIVERSAL BRIDGE  ·  NUMBERS CONNECT ALL SYSTEMS  — · —</text>
<line x1="22" y1="510" x2="458" y2="510" stroke="#000" stroke-width="0.3"/>
<text x="24" y="520" text-anchor="start" class="Lx">#</text>
<text x="70" y="520" text-anchor="middle" class="Lx">MAYAN</text>
<text x="145" y="520" text-anchor="middle" class="Lx">ARABIC</text>
<text x="220" y="520" text-anchor="middle" class="Lx">GEMATRIA</text>
<text x="310" y="520" text-anchor="middle" class="Lx">MORSE</text>
<text x="420" y="520" text-anchor="middle" class="Lx">BINARY</text>
<text x="24" y="544" text-anchor="start" class="Lx">1</text>
<circle cx="60" cy="541" r="2.5" fill="#000" stroke="#000" stroke-width="0.7"/>
<text x="145" y="544" text-anchor="middle" class="Lx">1</text>
<text x="220" y="544" text-anchor="middle" class="Lx">א = 1</text>
<text x="310" y="544" text-anchor="middle" class="Lx">·————</text>
<text x="420" y="544" text-anchor="middle" class="Lx">0001</text>
<text x="24" y="558" text-anchor="start" class="Lx">2</text>
<circle cx="60" cy="555" r="2.5" fill="#000" stroke="#000" stroke-width="0.7"/>
<circle cx="67" cy="555" r="2.5" fill="#000" stroke="#000" stroke-width="0.7"/>
<text x="145" y="558" text-anchor="middle" class="Lx">2</text>
<text x="220" y="558" text-anchor="middle" class="Lx">ב = 2</text>
<text x="310" y="558" text-anchor="middle" class="Lx">··———</text>
<text x="420" y="558" text-anchor="middle" class="Lx">0010</text>
<text x="24" y="572" text-anchor="start" class="Lx">3</text>
<circle cx="60" cy="569" r="2.5" fill="#000" stroke="#000" stroke-width="0.7"/>
<circle cx="67" cy="569" r="2.5" fill="#000" stroke="#000" stroke-width="0.7"/>
<circle cx="74" cy="569" r="2.5" fill="#000" stroke="#000" stroke-width="0.7"/>
<text x="145" y="572" text-anchor="middle" class="Lx">3</text>
<text x="220" y="572" text-anchor="middle" class="Lx">ג = 3</text>
<text x="310" y="572" text-anchor="middle" class="Lx">···——</text>
<text x="420" y="572" text-anchor="middle" class="Lx">0011</text>
<text x="24" y="586" text-anchor="start" class="Lx">4</text>
<circle cx="60" cy="583" r="2.5" fill="#000" stroke="#000" stroke-width="0.7"/>
<circle cx="67" cy="583" r="2.5" fill="#000" stroke="#000" stroke-width="0.7"/>
<circle cx="74" cy="583" r="2.5" fill="#000" stroke="#000" stroke-width="0.7"/>
<circle cx="81" cy="583" r="2.5" fill="#000" stroke="#000" stroke-width="0.7"/>
<text x="145" y="586" text-anchor="middle" class="Lx">4</text>
<text x="220" y="586" text-anchor="middle" class="Lx">ד = 4</text>
<text x="310" y="586" text-anchor="middle" class="Lx">····—</text>
<text x="420" y="586" text-anchor="middle" class="Lx">0100</text>
<text x="24" y="600" text-anchor="start" class="Lx">5</text>
<rect x="52" y="595" width="16" height="4" fill="#000"/>
<text x="145" y="600" text-anchor="middle" class="Lx">5</text>
<text x="220" y="600" text-anchor="middle" class="Lx">ה = 5</text>
<text x="310" y="600" text-anchor="middle" class="Lx">·····</text>
<text x="420" y="600" text-anchor="middle" class="Lx">0101</text>
<text x="240" y="604" text-anchor="middle" class="Lx">the number is the same concept in every encoding  ·  numbers are the universal bridge</text>
<line x1="22" y1="558" x2="458" y2="558" stroke="#000" stroke-width="0.5"/>
<text x="240" y="568" text-anchor="middle" class="H">— · —  READING DIRECTION GUIDE  ·  FOR ALL PLATES IN THIS SERIES  — · —</text>
<line x1="22" y1="572" x2="458" y2="572" stroke="#000" stroke-width="0.3"/>
<text x="67" y="584" text-anchor="middle" class="Lx">ENGLISH / LATIN</text>
<text x="67" y="593" text-anchor="middle" class="Lx">left → right</text>
<text x="67" y="602" text-anchor="middle" class="L">→</text>
<text x="154" y="584" text-anchor="middle" class="Lx">HEBREW / ARABIC</text>
<text x="154" y="593" text-anchor="middle" class="Lx">right → left</text>
<text x="154" y="602" text-anchor="middle" class="L">←</text>
<text x="241" y="584" text-anchor="middle" class="Lx">CHINESE / JAPANESE</text>
<text x="241" y="593" text-anchor="middle" class="Lx">top → bottom</text>
<text x="241" y="602" text-anchor="middle" class="L">↓</text>
<text x="328" y="584" text-anchor="middle" class="Lx">MAYAN NUMBERS</text>
<text x="328" y="593" text-anchor="middle" class="Lx">top → bottom (bars first)</text>
<text x="328" y="602" text-anchor="middle" class="L">↓</text>
<text x="415" y="584" text-anchor="middle" class="Lx">MORSE CODE</text>
<text x="415" y="593" text-anchor="middle" class="Lx">left → right in time</text>
<text x="415" y="602" text-anchor="middle" class="L">→</text>
<line x1="22" y1="610" x2="458" y2="610" stroke="#000" stroke-width="0.5"/>
<line x1="18" y1="615" x2="462" y2="615" stroke="#000" stroke-width="0.5"/>
<text x="240" y="624" text-anchor="middle" class="M">REMEMBER FORWARD · THE PATIENT MESSAGE · CC BY-SA 4.0 · rememberforward.org</text>
<line x1="18" y1="630" x2="462" y2="630" stroke="#000" stroke-width="1"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>