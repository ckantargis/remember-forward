<!-- Left -->
<text x="140" y="452" font-family="Georgia,serif" font-size="7.5" text-anchor="middle" fill="black">JUDAISM</text>
<line x1="155" y1="450" x2="200" y2="450" stroke="black" stroke-width="0.5"/>
<!-- Top left -->
<text x="160" y="412" font-family="Georgia,serif" font-size="7.5" text-anchor="middle" fill="black">JAINISM</text>
<line x1="172" y1="413" x2="202" y2="423" stroke="black" stroke-width="0.5"/>
<line x1="18" y1="518" x2="462" y2="518" stroke="black" stroke-width="0.5"/>
<text x="240" y="530" font-family="Georgia,serif" font-size="9.5" font-weight="bold" text-anchor="middle" fill="black" letter-spacing="3">SECTION 3 — NON-NEGOTIABLE RIGHTS</text>
<line x1="18" y1="535" x2="462" y2="535" stroke="black" stroke-width="0.5"/>
<text x="240" y="542" font-family="Georgia,serif" font-size="8" text-anchor="middle" fill="black" letter-spacing="0.5">No emergency, majority, or leader may override these. Write them down. Defend them always.</text>
<text x="28" y="556" font-family="Georgia,serif" font-size="7.5" fill="black">• Freedom of speech &amp; press — bad governance requires silence to survive</text>
<text x="28" y="568" font-family="Georgia,serif" font-size="7.5" fill="black">• Freedom of assembly — you cannot resist tyranny if you cannot meet</text>
<text x="28" y="580" font-family="Georgia,serif" font-size="7.5" fill="black">• Equal treatment under law — unequal law is formalized power, not justice</text>
<text x="28" y="592" font-family="Georgia,serif" font-size="7.5" fill="black">• Presumption of innocence — guilt must be proved, not assumed</text>
<text x="28" y="604" font-family="Georgia,serif" font-size="7.5" fill="black">• Prohibition of torture — every institution that adopted it was corrupted by it</text>
<line x1="18" y1="612" x2="462" y2="612" stroke="black" stroke-width="0.5"/>
