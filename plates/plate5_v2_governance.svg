<!-- Top right -->
<text x="320" y="412" font-family="Georgia,serif" font-size="7.5" text-anchor="middle" fill="black">BUDDHISM</text>
<line x1="308" y1="413" x2="278" y2="423" stroke="black" stroke-width="0.5"/>
