<text x="240" y="34" font-family="Georgia,serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="black" letter-spacing="3">PLATE 5 OF [N] — GOVERNANCE &amp; ETHICS</text>
<line x1="18" y1="40" x2="462" y2="40" stroke="black" stroke-width="1"/>
<text x="240" y="52" font-family="Georgia,serif" font-size="7.5" text-anchor="middle" fill="black" letter-spacing="1.5">TIER 4 — HOW POWER CORRUPTS · THE GOLDEN RULE · RIGHTS THAT CANNOT BE TAKEN</text>
<line x1="18" y1="57" x2="462" y2="57" stroke="black" stroke-width="0.5"/>
<!-- CONTENT -->
<text x="240" y="70" font-family="Georgia,serif" font-size="9.5" font-weight="bold" text-anchor="middle" fill="black" letter-spacing="3">SECTION 1 — THE CORRUPTION SEQUENCE</text>
<line x1="18" y1="75" x2="462" y2="75" stroke="black" stroke-width="0.5"/>

<text x="240" y="82" font-family="Georgia,serif" font-size="8" text-anchor="middle" fill="black" letter-spacing="0.5">Every governance system that has failed followed this sequence. Recognize it. Interrupt it before Stage 3.</text>
<!-- Corruption sequence flow -->
<rect x="68" y="88" width="344" height="26" rx="3" fill="none" stroke="black" stroke-width="1.25"/>
<text x="240" y="101" font-family="Georgia,serif" font-size="8" font-weight="bold" text-anchor="middle" fill="black">1. CRISIS LEGITIMACY</text>
<text x="240" y="111" font-family="Georgia,serif" font-size="7" text-anchor="middle" fill="black" font-style="italic">leader solves crisis · community grants broad powers</text>
<line x1="240" y1="114" x2="240" y2="122" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
<rect x="68" y="122" width="344" height="26" rx="3" fill="none" stroke="black" stroke-width="1.25"/>
<text x="240" y="135" font-family="Georgia,serif" font-size="8" font-weight="bold" text-anchor="middle" fill="black">2. NORMALIZATION</text>
<text x="240" y="145" font-family="Georgia,serif" font-size="7" text-anchor="middle" fill="black" font-style="italic">broad powers outlast the crisis · "still needed for security"</text>
<line x1="240" y1="148" x2="240" y2="156" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
<rect x="68" y="156" width="344" height="28" rx="3" fill="none" stroke="black" stroke-width="2"/>
<text x="240" y="169" font-family="Georgia,serif" font-size="8" font-weight="bold" text-anchor="middle" fill="black">3. INSTITUTIONAL CAPTURE ← ACT HERE</text>
<text x="240" y="180" font-family="Georgia,serif" font-size="7" text-anchor="middle" fill="black" font-style="italic">loyalists fill courts · media · military · independent oversight fails</text>
<line x1="240" y1="184" x2="240" y2="192" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
<rect x="68" y="192" width="344" height="26" rx="3" fill="none" stroke="black" stroke-width="1.25"/>
<text x="240" y="205" font-family="Georgia,serif" font-size="8" font-weight="bold" text-anchor="middle" fill="black">4. INFORMATION CONTROL</text>
<text x="240" y="215" font-family="Georgia,serif" font-size="7" text-anchor="middle" fill="black" font-style="italic">history rewritten · critics silenced · one permitted narrative</text>
<line x1="240" y1="218" x2="240" y2="226" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
<rect x="68" y="226" width="344" height="26" rx="3" fill="none" stroke="black" stroke-width="1.25"/>
<text x="240" y="239" font-family="Georgia,serif" font-size="8" font-weight="bold" text-anchor="middle" fill="black">5. WEALTH CONCENTRATION</text>
<text x="240" y="249" font-family="Georgia,serif" font-size="7" text-anchor="middle" fill="black" font-style="italic">allies prosper · majority conditions deteriorate</text>
<line x1="240" y1="252" x2="240" y2="260" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
<rect x="68" y="260" width="344" height="26" rx="3" fill="none" stroke="black" stroke-width="1.25"/>
<text x="240" y="273" font-family="Georgia,serif" font-size="8" font-weight="bold" text-anchor="middle" fill="black">6. EXTERNAL ENEMY</text>
<text x="240" y="283" font-family="Georgia,serif" font-size="7" text-anchor="middle" fill="black" font-style="italic">scapegoat identified · war or persecution follows</text>
<line x1="240" y1="286" x2="240" y2="294" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
<rect x="68" y="294" width="344" height="26" rx="3" fill="none" stroke="black" stroke-width="2"/>
<text x="240" y="307" font-family="Georgia,serif" font-size="8" font-weight="bold" text-anchor="middle" fill="black">7. COLLAPSE OR REVOLUTION</text>
<text x="240" y="317" font-family="Georgia,serif" font-size="7" text-anchor="middle" fill="black" font-style="italic">often replaced by the same pattern · teach this · break the cycle</text>
<line x1="18" y1="328" x2="462" y2="328" stroke="black" stroke-width="0.5"/>
<text x="240" y="338" font-family="Georgia,serif" font-size="8" text-anchor="middle" fill="black" letter-spacing="0.5">BUILD THESE: term limits · independent courts · free press · wealth limits · citizens' referendum</text>
<line x1="18" y1="346" x2="462" y2="346" stroke="black" stroke-width="0.5"/>
<text x="240" y="358" font-family="Georgia,serif" font-size="9.5" font-weight="bold" text-anchor="middle" fill="black" letter-spacing="3">SECTION 2 — THE GOLDEN RULE</text>
<line x1="18" y1="363" x2="462" y2="363" stroke="black" stroke-width="0.5"/>
<text x="240" y="370" font-family="Georgia,serif" font-size="8" text-anchor="middle" fill="black" letter-spacing="0.5">Found independently in every major tradition. Convergence is the signal.</text>
<!-- Golden rule radial diagram -->
<circle cx="240" cy="450" r="40" fill="none" stroke="black" stroke-width="1.5"/>
<text x="240" y="446" font-family="Georgia,serif" font-size="8.5" text-anchor="middle" fill="black" font-style="italic">treat others</text>
<text x="240" y="458" font-family="Georgia,serif" font-size="8.5" text-anchor="middle" fill="black" font-style="italic">as yourself</text>
<!-- Top -->
<text x="240" y="397" font-family="Georgia,serif" font-size="7.5" text-anchor="middle" fill="black">CONFUCIUS ~500 BCE</text>
