<line x1="22" y1="397" x2="458" y2="397" stroke="#000" stroke-width="0.5"/>
<text x="240" y="403" text-anchor="middle" class="H">— · —  SCRIPT ORIGINS  ·  PALM LEAF TRADITION  — · —</text>
<line x1="22" y1="407" x2="458" y2="407" stroke="#000" stroke-width="0.3"/>
<rect x="22" y="411" width="436" height="50" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="240" y="422" text-anchor="middle" class="Ls">ஃ  Aytham  ·  the special character  ·  neither vowel nor consonant</text>
<text x="240" y="432" text-anchor="middle" class="Lx">used in classical Tamil  ·  marks aspirate before stops  ·  rare in modern use</text>
<text x="240" y="443" text-anchor="middle" class="Lx">PALM LEAF ORIGIN: letters are rounded because scribes carved on palm leaves</text>
<text x="240" y="453" text-anchor="middle" class="Lx">straight lines would split the leaf  ·  curves did not  ·  the script shape encodes its own history</text>
