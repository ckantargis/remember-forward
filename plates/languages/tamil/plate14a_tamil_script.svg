<text x="240" y="32" text-anchor="middle" class="T">PLATE 14A  ·  TAMIL  ·  SCRIPT</text>
<line x1="18" y1="39" x2="462" y2="39" stroke="#000" stroke-width="0.75"/>
<text x="240" y="50" text-anchor="middle" class="S">தமிழ் · 2,000 years unbroken · Dravidian · abugida · left to right · 12 vowels · 18 consonants</text>
<line x1="18" y1="56" x2="462" y2="56" stroke="#000" stroke-width="0.5"/>
<text x="240" y="67" text-anchor="middle" class="H">— · —  TAMIL  ·  THE LANGUAGE THAT NEVER BROKE  — · —</text>
<line x1="22" y1="71" x2="458" y2="71" stroke="#000" stroke-width="0.3"/>
<text x="240" y="79" text-anchor="middle" class="Lx">Tamil is the oldest living classical language with unbroken literary tradition</text>
<text x="240" y="88" text-anchor="middle" class="Lx">2,000+ years of literature  ·  UNESCO classical language  ·  75 million speakers</text>
<text x="240" y="97" text-anchor="middle" class="Lx">Dravidian family  ·  entirely independent of Indo-European and Semitic language families</text>
<text x="240" y="106" text-anchor="middle" class="Lx">soul letters (vowels) + body letters (consonants) = living letters (compound syllables)</text>
<line x1="22" y1="111" x2="458" y2="111" stroke="#000" stroke-width="0.5"/>
<text x="240" y="117" text-anchor="middle" class="H">— · —  THE 12 VOWELS  ·  UYIR EZHUTTU  ·  SOUL LETTERS  — · —</text>
<line x1="22" y1="121" x2="458" y2="121" stroke="#000" stroke-width="0.3"/>
<text x="240" y="129" text-anchor="middle" class="Lx">5 short  ·  5 long  ·  2 diphthongs  ·  vowel length changes meaning</text>
