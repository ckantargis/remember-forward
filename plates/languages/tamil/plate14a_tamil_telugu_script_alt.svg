<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">TAMIL</text>
<text x="240" y="40" text-anchor="middle" class="S">TAMIL SCRIPT</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">TAMIL SCRIPT — AN ABUGIDA</text>
<text x="240" y="68" text-anchor="middle" class="L">Derived from Brahmi via Tamil-Brahmi (3rd c. BCE)</text>
<text x="240" y="79" text-anchor="middle" class="L">Oldest literary tradition in India: 2000+ years continuous</text>
<text x="240" y="90" text-anchor="middle" class="L">18 consonants + 12 vowels = 247 total characters (with combinations)</text>
<line x1="20" y1="98" x2="460" y2="98" stroke="#555" stroke-width="0.5"/>
<text x="240" y="106" text-anchor="middle" class="H">TAMIL CONSONANTS</text>
<text x="240" y="117" text-anchor="middle" class="L">க k  ங ng  ச c  ஞ ny  ட T  ண N  த t  ந n  ப p  ம m</text>
<text x="240" y="128" text-anchor="middle" class="L">ய y  ர r  ல l  வ v  ழ zh  ள L  ற rr  ன n (alveolar)</text>
<text x="240" y="139" text-anchor="middle" class="Ls">No aspiration contrast: single series of stops</text>
<text x="240" y="150" text-anchor="middle" class="L">zh /ʒ/ retroflex approximant: unique to Tamil-Malayalam</text>
<text x="240" y="161" text-anchor="middle" class="L">L /ɭ/ retroflex lateral: distinct from l</text>
<line x1="20" y1="169" x2="460" y2="169" stroke="#555" stroke-width="0.5"/>
<text x="240" y="177" text-anchor="middle" class="H">TAMIL VOWELS</text>
<text x="240" y="188" text-anchor="middle" class="L">அ a  ஆ ā  இ i  ஈ ī  உ u  ஊ ū  எ e  ஏ ē  ஐ ai  ஒ o  ஓ ō  ஔ au</text>
<text x="240" y="199" text-anchor="middle" class="Ls">Vowel sign (matra) written around consonant base</text>
<line x1="20" y1="207" x2="460" y2="207" stroke="#555" stroke-width="0.5"/>
<text x="240" y="215" text-anchor="middle" class="H">SAMPLE TEXT</text>
<text x="240" y="227" text-anchor="middle" class="L">வாழ்க  — Vaazha "May you prosper" (greeting)</text>
<text x="240" y="238" text-anchor="middle" class="L">தமிழ்  — Tamil "Tamil language"</text>
<line x1="20" y1="246" x2="460" y2="246" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="253" width="460" height="13" fill="#111"/>
<text x="240" y="262.5" text-anchor="middle" class="Hb">TELUGU  ·  తెలుగు  ·  SECONDARY LANGUAGE</text>
<text x="240" y="278" text-anchor="middle" class="H">TELUGU SCRIPT</text>
<text x="240" y="289" text-anchor="middle" class="Ls">Also from Brahmi; shares Kadamba/Vengi calligraphic tradition</text>
<text x="240" y="300" text-anchor="middle" class="Ls">Telugu script: rounded forms with consistent circular elements</text>
<text x="240" y="311" text-anchor="middle" class="L">~52 letters including Sanskrit-borrowed aspirates and sibilants</text>
<line x1="20" y1="319" x2="460" y2="319" stroke="#555" stroke-width="0.5"/>
<text x="240" y="327" text-anchor="middle" class="H">TELUGU CONSONANTS</text>
<text x="240" y="338" text-anchor="middle" class="L">క k  ఖ kh  గ g  ఘ gh  ఙ ng</text>
<text x="240" y="349" text-anchor="middle" class="L">చ c  ఛ ch  జ j  ఝ jh  ఞ ny</text>
<text x="240" y="360" text-anchor="middle" class="L">Telugu has ASPIRATED stops (Tamil does NOT!)</text>
<text x="240" y="371" text-anchor="middle" class="Ls">Telugu: borrowed Sanskrit aspirate set kh gh chh jh etc.</text>
<line x1="20" y1="379" x2="460" y2="379" stroke="#555" stroke-width="0.5"/>
<text x="240" y="387" text-anchor="middle" class="H">SCRIPT DIVERGENCE</text>
<text x="240" y="398" text-anchor="middle" class="L">Tamil: no aspirates in native words  •  Telugu: has aspirates</text>
<text x="240" y="409" text-anchor="middle" class="L">Tamil: 18 consonants  •  Telugu: ~36 consonants (with aspirates)</text>
<text x="240" y="420" text-anchor="middle" class="L">Both: abugida structure  •  both: Brahmi ancestry</text>
<text x="240" y="431" text-anchor="middle" class="Ls">Both: rounded letterforms from palm-leaf scribing tradition</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 14a ALT  ·  TAMIL / TELUGU  ·  SCRIPT</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
