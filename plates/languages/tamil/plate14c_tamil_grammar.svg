<rect x="12" y="12" width="456" height="656" rx="2" fill="none" stroke="#000" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">PLATE 14C  ·  TAMIL  ·  GRAMMAR AND VOCABULARY</text>
<line x1="18" y1="39" x2="462" y2="39" stroke="#000" stroke-width="0.75"/>
<text x="240" y="50" text-anchor="middle" class="S">SOV order · agglutinative · case system · verb structure · Tolkappiyam · core vocabulary</text>
<line x1="18" y1="56" x2="462" y2="56" stroke="#000" stroke-width="0.5"/>
<text x="240" y="67" text-anchor="middle" class="H">— · —  TAMIL GRAMMAR  ·  SOV ORDER  ·  AGGLUTINATIVE  — · —</text>
<line x1="22" y1="71" x2="458" y2="71" stroke="#000" stroke-width="0.3"/>
<text x="240" y="79" text-anchor="middle" class="Lx">Tamil places the verb at the END of the sentence  ·  opposite of Arabic and English</text>
<rect x="22" y="83" width="130" height="24" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="87" y="95" text-anchor="middle" class="Ls">SUBJECT</text>
<text x="87" y="104" text-anchor="middle" class="Lx">the actor</text>
<line x1="154" y1="95" x2="177" y2="95" stroke="#000" stroke-width="0.7"/><polygon points="177,93 182,95 177,97" fill="#000"/>
<rect x="184" y="83" width="130" height="24" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="249" y="95" text-anchor="middle" class="Ls">OBJECT</text>
<text x="249" y="104" text-anchor="middle" class="Lx">what is acted on</text>
<line x1="316" y1="95" x2="339" y2="95" stroke="#000" stroke-width="0.7"/><polygon points="339,93 344,95 339,97" fill="#000"/>
<rect x="346" y="83" width="112" height="24" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="402" y="95" text-anchor="middle" class="Ls">VERB</text>
<text x="402" y="104" text-anchor="middle" class="Lx">the action</text>
<text x="240" y="115" text-anchor="middle" class="Ltm">அவன் தண்ணீர் குடிக்கிறான்  ·  avan tannir kutikkiran  ·  he water drinks</text>
<line x1="22" y1="122" x2="458" y2="122" stroke="#000" stroke-width="0.5"/>
<text x="240" y="128" text-anchor="middle" class="H">— · —  AGGLUTINATION  ·  MEANING BUILT BY ADDING SUFFIXES  — · —</text>
<line x1="22" y1="132" x2="458" y2="132" stroke="#000" stroke-width="0.3"/>
<text x="240" y="140" text-anchor="middle" class="Lx">Tamil is highly agglutinative  ·  one word can express what English takes a sentence to say</text>
<rect x="22" y="144" width="108" height="36" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="76" y="156" text-anchor="middle" class="Lts">கடல்</text>
<text x="76" y="165" text-anchor="middle" class="Lx">katal</text>
<text x="76" y="174" text-anchor="middle" class="Lx">sea</text>
<rect x="132" y="144" width="108" height="36" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="186" y="156" text-anchor="middle" class="Lts">கடலில்</text>
<text x="186" y="165" text-anchor="middle" class="Lx">katali-l</text>
<text x="186" y="174" text-anchor="middle" class="Lx">in the sea</text>
<text x="186" y="178" text-anchor="middle" class="Lx"></text>
<rect x="242" y="144" width="108" height="36" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="296" y="156" text-anchor="middle" class="Lts">கடலிலிருந்து</text>
<text x="296" y="165" text-anchor="middle" class="Lx">katal-il-iruntu</text>
<text x="296" y="174" text-anchor="middle" class="Lx">from inside the sea</text>
<text x="296" y="178" text-anchor="middle" class="Lx"></text>
<text x="296" y="178" text-anchor="middle" class="Lx"></text>
<rect x="352" y="144" width="108" height="36" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="406" y="156" text-anchor="middle" class="Lts">கடலிலிருந்துவருகிறேன்</text>
<text x="406" y="165" text-anchor="middle" class="Lx">katal-il-iruntu-varukiren</text>
<text x="406" y="174" text-anchor="middle" class="Lx">I am coming from inside the sea</text>
<text x="406" y="178" text-anchor="middle" class="Lx"></text>
<text x="406" y="178" text-anchor="middle" class="Lx"></text>
<text x="406" y="178" text-anchor="middle" class="Lx"></text>
<line x1="22" y1="185" x2="458" y2="185" stroke="#000" stroke-width="0.5"/>
<text x="240" y="191" text-anchor="middle" class="H">— · —  THE CASE SYSTEM  ·  SUFFIXES REPLACE PREPOSITIONS  — · —</text>
<line x1="22" y1="195" x2="458" y2="195" stroke="#000" stroke-width="0.3"/>
<text x="240" y="203" text-anchor="middle" class="Lx">Tamil uses case suffixes where English uses prepositions  ·  8 main cases</text>
<rect x="22" y="207" width="104" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="74" y="216" text-anchor="middle" class="Lx">Nominative</text>
<text x="74" y="224" text-anchor="middle" class="Lx">-அ/ஆன் = subject</text>
<rect x="130" y="207" width="104" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="182" y="216" text-anchor="middle" class="Lx">Accusative</text>
<text x="182" y="224" text-anchor="middle" class="Lx">-ஐ = direct object</text>
<rect x="238" y="207" width="104" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="290" y="216" text-anchor="middle" class="Lx">Dative</text>
<text x="290" y="224" text-anchor="middle" class="Lx">-க்கு = to/for</text>
<rect x="346" y="207" width="104" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="398" y="216" text-anchor="middle" class="Lx">Sociative</text>
<text x="398" y="224" text-anchor="middle" class="Lx">-ொடு = with</text>
<rect x="22" y="232" width="104" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="74" y="241" text-anchor="middle" class="Lx">Instrumental</text>
<text x="74" y="249" text-anchor="middle" class="Lx">-ஆல் = by means of</text>
<rect x="130" y="232" width="104" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="182" y="241" text-anchor="middle" class="Lx">Ablative</text>
<text x="182" y="249" text-anchor="middle" class="Lx">-இலிருந்து = from</text>
<rect x="238" y="232" width="104" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="290" y="241" text-anchor="middle" class="Lx">Locative</text>
<text x="290" y="249" text-anchor="middle" class="Lx">-இல் = in/at</text>
<rect x="346" y="232" width="104" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="398" y="241" text-anchor="middle" class="Lx">Vocative</text>
<text x="398" y="249" text-anchor="middle" class="Lx">-இரோ/ஆய் = O! (address)</text>
<line x1="22" y1="260" x2="458" y2="260" stroke="#000" stroke-width="0.5"/>
<text x="240" y="266" text-anchor="middle" class="H">— · —  VERB STRUCTURE  ·  ROOT + TENSE + PERSON  — · —</text>
<line x1="22" y1="270" x2="458" y2="270" stroke="#000" stroke-width="0.3"/>
<text x="240" y="278" text-anchor="middle" class="Lx">Tamil verb: ROOT + tense marker + person/number/gender suffix</text>
<text x="240" y="287" text-anchor="middle" class="Ltm">root குடி- (kudi = drink)  ·  present: குடிக்கிறேன்  (kudi-kk-iren = I drink)</text>
<text x="240" y="297" text-anchor="middle" class="Ltm">past: குடித்தேன் (kudi-tt-en = I drank)  ·  future: குடிப்பேன் (kudi-pp-en = I will drink)</text>
<line x1="22" y1="305" x2="458" y2="305" stroke="#000" stroke-width="0.5"/>
<text x="240" y="311" text-anchor="middle" class="H">— · —  CORE VOCABULARY  ·  30 ESSENTIAL WORDS  — · —</text>
