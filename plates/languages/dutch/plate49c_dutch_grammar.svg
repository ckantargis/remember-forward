<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >DUTCH</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — V2 (VERB SECOND) —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Dutch is V2: the finite verb always occupies the second position in a main clause.</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >Ik lees het boek. I read the book. (standard SVO)</text>
<text x="240" y="102" text-anchor="middle" class="Ls" >Gisteren las ik het boek. Yesterday read I the book. (V2: verb stays 2nd)</text>
<line x1="20" y1="110" x2="460" y2="110" stroke="black" stroke-width="0.3"/>
<text x="240" y="119" text-anchor="middle" class="H" >— NOUN GENDER — DE / HET —</text>
<text x="240" y="129" text-anchor="middle" class="Ls" >Dutch has 2 grammatical genders: common (de) and neuter (het).</text>
<text x="240" y="139" text-anchor="middle" class="Ls" >de words: de man (man), de vrouw (woman), de tafel (table).</text>
<text x="240" y="149" text-anchor="middle" class="Ls" >het words: het kind (child), het huis (house), het water (water).</text>
<text x="240" y="159" text-anchor="middle" class="Ls" >Gender must be learned for each noun. Affects adjective endings and pronouns.</text>
<line x1="20" y1="167" x2="460" y2="167" stroke="black" stroke-width="0.3"/>
<text x="240" y="176" text-anchor="middle" class="H" >— VERB CONJUGATION —</text>
<text x="240" y="186" text-anchor="middle" class="Ls" >Weak (regular) verbs: werken (to work): ik werk, jij werkt, hij werkt, wij werken.</text>
<text x="240" y="196" text-anchor="middle" class="Ls" >Strong (irregular): rijden (ride): ik rijd, reed, gereden. schrijven: schrijf, schreef, geschreven.</text>
<text x="240" y="206" text-anchor="middle" class="Ls" >Perfect tense: hebben/zijn + past participle: ik heb gewerkt / ik ben gegaan.</text>
<line x1="20" y1="214" x2="460" y2="214" stroke="black" stroke-width="0.3"/>
<text x="240" y="223" text-anchor="middle" class="H" >— SEPARABLE VERBS —</text>
<text x="240" y="233" text-anchor="middle" class="Ls" >Dutch has many separable verbs: prefix separates in main clause.</text>
<text x="240" y="243" text-anchor="middle" class="Ls" >opbellen (call up): Ik bel hem op. I call him up. (op goes to end)</text>
<text x="240" y="253" text-anchor="middle" class="Ls" >aanzetten (turn on): Hij zet de radio aan. He turns the radio on.</text>
<line x1="20" y1="261" x2="460" y2="261" stroke="black" stroke-width="0.3"/>
<text x="240" y="270" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
<text x="50" y="280" text-anchor="middle" class="Ls" >hallo / goedendag</text>
<text x="175" y="280" text-anchor="middle" class="Lx" >hello</text>
<text x="50" y="290" text-anchor="middle" class="Ls" >dank u / bedankt</text>
<text x="175" y="290" text-anchor="middle" class="Lx" >thank you</text>
<text x="50" y="300" text-anchor="middle" class="Ls" >ja</text>
<text x="175" y="300" text-anchor="middle" class="Lx" >yes</text>
<text x="50" y="310" text-anchor="middle" class="Ls" >nee</text>
<text x="175" y="310" text-anchor="middle" class="Lx" >no</text>
<text x="50" y="320" text-anchor="middle" class="Ls" >sorry / pardon</text>
<text x="175" y="320" text-anchor="middle" class="Lx" >excuse me</text>
<text x="50" y="330" text-anchor="middle" class="Ls" >hoe gaat het?</text>
<text x="175" y="330" text-anchor="middle" class="Lx" >how are you?</text>
<text x="50" y="340" text-anchor="middle" class="Ls" >goed, dank u</text>
<text x="175" y="340" text-anchor="middle" class="Lx" >fine, thank you</text>
<text x="50" y="350" text-anchor="middle" class="Ls" >ik hou van jou</text>
<text x="175" y="350" text-anchor="middle" class="Lx" >I love you</text>
<text x="50" y="360" text-anchor="middle" class="Ls" >water</text>
<text x="175" y="360" text-anchor="middle" class="Lx" >water</text>
<text x="50" y="370" text-anchor="middle" class="Ls" >vuur</text>
<text x="175" y="370" text-anchor="middle" class="Lx" >fire</text>
<text x="50" y="380" text-anchor="middle" class="Ls" >aarde</text>
<text x="175" y="380" text-anchor="middle" class="Lx" >earth</text>
<text x="50" y="390" text-anchor="middle" class="Ls" >persoon / mens</text>
<text x="175" y="390" text-anchor="middle" class="Lx" >person</text>
<text x="285" y="280" text-anchor="middle" class="Ls" >tijd</text>
<text x="410" y="280" text-anchor="middle" class="Lx" >time</text>
<text x="285" y="290" text-anchor="middle" class="Ls" >maan</text>
<text x="410" y="290" text-anchor="middle" class="Lx" >moon</text>
<text x="285" y="300" text-anchor="middle" class="Ls" >ster</text>
<text x="410" y="300" text-anchor="middle" class="Lx" >star</text>
<text x="285" y="310" text-anchor="middle" class="Ls" >hart</text>
<text x="410" y="310" text-anchor="middle" class="Lx" >heart</text>
<text x="285" y="320" text-anchor="middle" class="Ls" >liefde</text>
<text x="410" y="320" text-anchor="middle" class="Lx" >love</text>
<text x="285" y="330" text-anchor="middle" class="Ls" >vrijheid</text>
<text x="410" y="330" text-anchor="middle" class="Lx" >freedom</text>
<text x="285" y="340" text-anchor="middle" class="Ls" >herinnering</text>
<text x="410" y="340" text-anchor="middle" class="Lx" >memory</text>
<text x="285" y="350" text-anchor="middle" class="Ls" >toekomst</text>
<text x="410" y="350" text-anchor="middle" class="Lx" >future</text>
<text x="285" y="360" text-anchor="middle" class="Ls" >wereld</text>
<text x="410" y="360" text-anchor="middle" class="Lx" >world</text>
<text x="285" y="370" text-anchor="middle" class="Ls" >leven</text>
<text x="410" y="370" text-anchor="middle" class="Lx" >life</text>
<line x1="20" y1="395" x2="460" y2="395" stroke="black" stroke-width="0.3"/>
<text x="240" y="404" text-anchor="middle" class="H" >— DUTCH IN SURINAME AND BEYOND —</text>
<text x="240" y="414" text-anchor="middle" class="Ls" >Dutch is official in Netherlands, Belgium (Flanders), Suriname, Aruba, Curaçao, Bonaire.</text>
<text x="240" y="424" text-anchor="middle" class="Ls" >Suriname: Dutch co-official with Sranan Tongo (an English creole) and ~20 others.</text>
<text x="240" y="434" text-anchor="middle" class="Ls" >Afrikaans (South Africa): descended from 17th-century Dutch settlers; ~7 million speakers.</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
