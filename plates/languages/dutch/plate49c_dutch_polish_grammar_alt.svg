<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 49C · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— DUTCH — SVO · TWO GENDERS · V2 RULE —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Word order: SVO. V2 rule: verb always second when clause begins with non-subject.</text>
<text x="240" y="82" text-anchor="middle" class="Lx">"Ik ga morgen" (I go tomorrow) → "Morgen ga ik" (Tomorrow go I). Verb stays 2nd.</text>
<text x="240" y="91" text-anchor="middle" class="Lx">Two grammatical genders: de (common, m+f merged) and het (neuter). ~3/4 nouns take de.</text>
<line x1="20" y1="99" x2="460" y2="99" stroke="black" stroke-width="0.3"/>
<text x="240" y="107" text-anchor="middle" class="H">— DUTCH VERB — SCHRIJVEN "TO WRITE" —</text>
<text x="150" y="116" text-anchor="middle" class="Ls">ik schrijf</text>
<text x="340" y="116" text-anchor="middle" class="Lx">I write</text>
<text x="150" y="126" text-anchor="middle" class="Ls">jij schrijft</text>
<text x="340" y="126" text-anchor="middle" class="Lx">you write</text>
<text x="150" y="136" text-anchor="middle" class="Ls">hij/zij schrijft</text>
<text x="340" y="136" text-anchor="middle" class="Lx">he/she writes</text>
<text x="150" y="146" text-anchor="middle" class="Ls">wij schrijven</text>
<text x="340" y="146" text-anchor="middle" class="Lx">we write</text>
<text x="150" y="156" text-anchor="middle" class="Ls">jullie schrijven</text>
<text x="340" y="156" text-anchor="middle" class="Lx">you (pl) write</text>
<text x="150" y="166" text-anchor="middle" class="Ls">zij schrijven</text>
<text x="340" y="166" text-anchor="middle" class="Lx">they write</text>
<line x1="20" y1="181" x2="460" y2="181" stroke="black" stroke-width="0.3"/>
