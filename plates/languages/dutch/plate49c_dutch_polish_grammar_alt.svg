<text x="240" y="325" text-anchor="middle" class="Hb" fill="white">POLISH (JĘZYK POLSKI) · GRAMMAR · VOCABULARY</text>
<line x1="20" y1="329" x2="460" y2="329" stroke="black" stroke-width="0.3"/>
<text x="240" y="344" text-anchor="middle" class="Ls">Polish is highly inflected: 7 cases, 3 genders, 2 numbers. Word order is flexible because case marks roles.</text>
<text x="240" y="353" text-anchor="middle" class="Lx">"Pies gryzie kota" = "Kotę gryzie pies" = "The dog bites the cat." — same meaning, different emphasis.</text>
<line x1="20" y1="360" x2="460" y2="360" stroke="black" stroke-width="0.3"/>
<text x="240" y="368" text-anchor="middle" class="H">— POLISH NOUN CASES — 7 CASES —</text>
<text x="60" y="377" text-anchor="start" class="Lx">Nominative (who/what)</text>
<text x="250" y="377" text-anchor="middle" class="Ls">człowiek</text>
<text x="400" y="377" text-anchor="start" class="Lx">the person (subject)</text>
<text x="60" y="387" text-anchor="start" class="Lx">Genitive (of/from)</text>
<text x="250" y="387" text-anchor="middle" class="Ls">człowieka</text>
<text x="400" y="387" text-anchor="start" class="Lx">of the person</text>
<text x="60" y="397" text-anchor="start" class="Lx">Dative (to/for)</text>
<text x="250" y="397" text-anchor="middle" class="Ls">człowiekowi</text>
<text x="400" y="397" text-anchor="start" class="Lx">to the person</text>
<text x="60" y="407" text-anchor="start" class="Lx">Accusative (direct obj.)</text>
<text x="250" y="407" text-anchor="middle" class="Ls">człowieka</text>
<text x="400" y="407" text-anchor="start" class="Lx">the person (object)</text>
<text x="60" y="417" text-anchor="start" class="Lx">Instrumental (by/with)</text>
<text x="250" y="417" text-anchor="middle" class="Ls">człowiekiem</text>
<text x="400" y="417" text-anchor="start" class="Lx">by/with the person</text>
<text x="60" y="427" text-anchor="start" class="Lx">Locative (in/on/about)</text>
<text x="250" y="427" text-anchor="middle" class="Ls">człowieku</text>
<text x="400" y="427" text-anchor="start" class="Lx">about/in the person</text>
<text x="60" y="437" text-anchor="start" class="Lx">Vocative (address)</text>
<text x="250" y="437" text-anchor="middle" class="Ls">człowieku!</text>
<text x="400" y="437" text-anchor="start" class="Lx">O person! (calling)</text>
