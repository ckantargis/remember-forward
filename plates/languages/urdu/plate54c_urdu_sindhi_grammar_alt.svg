<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">URDU</text>
<text x="240" y="40" text-anchor="middle" class="S">GRAMMAR &amp; HONORIFICS</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">URDU WORD ORDER: SOV</text>
<text x="240" y="68" text-anchor="middle" class="L">Main aap ko pyaar karta hoon. "I you to love do am."</text>
<text x="240" y="79" text-anchor="middle" class="Ls">"I love you." (SOV with postpositions)</text>
<text x="240" y="90" text-anchor="middle" class="L">Postpositions follow nouns: ghar mein "house in" = "in the house"</text>
<line x1="20" y1="98" x2="460" y2="98" stroke="#555" stroke-width="0.5"/>
<text x="240" y="106" text-anchor="middle" class="H">THREE-LEVEL HONORIFIC SYSTEM</text>
<text x="240" y="117" text-anchor="middle" class="L">Aap: most formal/respectful "you" (verb in plural)</text>
<text x="240" y="128" text-anchor="middle" class="L">Tum: familiar "you" (informal but not intimate)</text>
<text x="240" y="139" text-anchor="middle" class="L">Tu: intimate "you" (close friends, children, prayer to God)</text>
<text x="240" y="150" text-anchor="middle" class="Ls">Verb forms, pronouns, honorifics all shift at each level</text>
<line x1="20" y1="158" x2="460" y2="158" stroke="#555" stroke-width="0.5"/>
<text x="240" y="166" text-anchor="middle" class="H">URDU GENDER &amp; AGREEMENT</text>
<text x="240" y="177" text-anchor="middle" class="L">Two genders: masculine / feminine</text>
<text x="240" y="188" text-anchor="middle" class="L">Verbs, adjectives, postpositions all agree with gender</text>
<text x="240" y="199" text-anchor="middle" class="L">larki (girl, FEM) • larka (boy, MASC)</text>
<text x="240" y="210" text-anchor="middle" class="Ls">larki gayi (girl went-FEM) • larka gaya (boy went-MASC)</text>
<line x1="20" y1="218" x2="460" y2="218" stroke="#555" stroke-width="0.5"/>
<text x="240" y="226" text-anchor="middle" class="H">ERGATIVE IN PAST TENSE</text>
<text x="240" y="237" text-anchor="middle" class="L">Past transitive: agent takes -ne; verb agrees with object</text>
<text x="240" y="248" text-anchor="middle" class="L">Main-ne kitaab parhi. "I-ERG book read-FEM." (book is feminine)</text>
<text x="240" y="259" text-anchor="middle" class="Ls">Split ergativity: present = nominative; past = ergative</text>
<line x1="20" y1="267" x2="460" y2="267" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="274" width="460" height="13" fill="#111"/>
<text x="240" y="283.5" text-anchor="middle" class="Hb">SINDHI GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="299" text-anchor="middle" class="H">SINDHI CASE SYSTEM</text>
<text x="240" y="310" text-anchor="middle" class="L">Four cases: nominative • oblique • ablative • vocative</text>
<text x="240" y="321" text-anchor="middle" class="Ls">Agglutinative postpositions attach to oblique stem</text>
<text x="240" y="332" text-anchor="middle" class="L">Three genders: masculine / feminine / neuter (unlike Urdu 2!)</text>
<line x1="20" y1="340" x2="460" y2="340" stroke="#555" stroke-width="0.5"/>
<text x="240" y="348" text-anchor="middle" class="H">SINDHI VERB SYSTEM</text>
<text x="240" y="359" text-anchor="middle" class="L">SOV same as Urdu; postpositions same pattern</text>
<text x="240" y="370" text-anchor="middle" class="L">Sindhi also split ergative (past transitive uses oblique agent)</text>
<text x="240" y="381" text-anchor="middle" class="Ls">Causative: -aayanu suffix  •  Passive: periphrastic construction</text>
<line x1="20" y1="389" x2="460" y2="389" stroke="#555" stroke-width="0.5"/>
<text x="240" y="397" text-anchor="middle" class="H">GRAMMATICAL PARALLELS</text>
<text x="240" y="408" text-anchor="middle" class="L">Both: SOV  •  postpositions  •  split ergativity</text>
<text x="240" y="419" text-anchor="middle" class="L">Both: verb agrees with gender  •  honorific pronouns</text>
<text x="240" y="430" text-anchor="middle" class="Ls">Urdu: 2 genders  •  Sindhi: 3 genders (preserves Sanskrit neuter)</text>
<text x="240" y="441" text-anchor="middle" class="Ls">Both: descended from Sanskrit via Apabhramsha prakrits</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 54c ALT  ·  URDU / SINDHI  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
