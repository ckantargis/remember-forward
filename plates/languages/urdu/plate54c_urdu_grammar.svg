<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680">
<rect x="8" y="8" width="464" height="664" rx="10" ry="10" fill="none" stroke="#1a1a2e" stroke-width="2"/>
<rect x="14" y="14" width="452" height="652" rx="8" ry="8" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
<style>
text { font-family: "Noto Nastaliq Urdu", "Noto Sans Arabic", serif; }
.T { font-size: 13px; fill: #1a1a2e; }
.H { font-size: 11px; fill: #5a4a6b; font-style: italic; }
.L { font-size: 12px; fill: #1a1a2e; }
.S { font-size: 15px; fill: #1a1a2e; font-weight: bold; }
.X { font-size: 11px; fill: #3a3a5c; }
.F { font-size: 9px; fill: #7a7a9a; }
</style>
<text x="240" y="45" text-anchor="middle" class="S" >URDU  GRAMMAR</text>
<text x="240" y="65" text-anchor="middle" class="T" >قواعد  (Qawāʿid)</text>
<line x1="20" y1="78" x2="460" y2="78" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="95" text-anchor="middle" class="H" >— Word Order  SOV —</text>
<text x="240" y="112" text-anchor="middle" class="L" >میں پانی پیتا ہوں</text>
<text x="240" y="128" text-anchor="middle" class="X" >maĩ pānī pītā hūṃ — "I drink water"</text>
<line x1="20" y1="141" x2="460" y2="141" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="157" text-anchor="middle" class="H" >— Postpositions —</text>
<text x="65" y="174" text-anchor="middle" class="L" >کا/کی/کے</text>
<text x="145" y="174" text-anchor="middle" class="X" >kā/kī/ke</text>
<text x="295" y="174" text-anchor="start" class="X" >of (genitive; agrees with possessed)</text>
<text x="65" y="191" text-anchor="middle" class="L" >کو</text>
<text x="145" y="191" text-anchor="middle" class="X" >ko</text>
<text x="295" y="191" text-anchor="start" class="X" >to, DATIVE / marks definite object</text>
<text x="65" y="208" text-anchor="middle" class="L" >سے</text>
<text x="145" y="208" text-anchor="middle" class="X" >se</text>
<text x="295" y="208" text-anchor="start" class="X" >from, with, ABLATIVE/INSTRUMENTAL</text>
<text x="65" y="225" text-anchor="middle" class="L" >میں</text>
<text x="145" y="225" text-anchor="middle" class="X" >mẽ</text>
<text x="295" y="225" text-anchor="start" class="X" >in, LOCATIVE</text>
<text x="65" y="242" text-anchor="middle" class="L" >پر</text>
<text x="145" y="242" text-anchor="middle" class="X" >par</text>
<text x="295" y="242" text-anchor="start" class="X" >on, at</text>
<text x="65" y="259" text-anchor="middle" class="L" >کے لیے</text>
<text x="145" y="259" text-anchor="middle" class="X" >ke lie</text>
<text x="295" y="259" text-anchor="start" class="X" >for, PURPOSE</text>
<text x="65" y="276" text-anchor="middle" class="L" >کے ساتھ</text>
<text x="145" y="276" text-anchor="middle" class="X" >ke sāth</text>
<text x="295" y="276" text-anchor="start" class="X" >with, COMITATIVE</text>
<line x1="20" y1="298" x2="460" y2="298" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="314" text-anchor="middle" class="H" >— Verb System —</text>
<text x="240" y="331" text-anchor="middle" class="X" >Verbs inflect for gender, number, tense, aspect</text>
<text x="240" y="347" text-anchor="middle" class="L" >لڪھنا  likhna = to write</text>
<text x="240" y="364" text-anchor="middle" class="L" >میں لکھتا/لکھتی ہوں</text>
<text x="240" y="378" text-anchor="middle" class="X" >I write (m./f.)</text>
<text x="240" y="396" text-anchor="middle" class="L" >میں نے لکھا</text>
<text x="240" y="410" text-anchor="middle" class="X" >maĩ ne likhā — I wrote (perfective)</text>
<line x1="20" y1="432" x2="460" y2="432" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="448" text-anchor="middle" class="H" >— Core Vocabulary —</text>
<text x="50" y="465" text-anchor="middle" class="L" >پانی</text>
<text x="120" y="465" text-anchor="middle" class="X" >pānī</text>
<text x="190" y="465" text-anchor="middle" class="X" >water</text>
<text x="280" y="465" text-anchor="middle" class="L" >روٹی</text>
<text x="360" y="465" text-anchor="middle" class="X" >roṭī</text>
<text x="430" y="465" text-anchor="middle" class="X" >bread</text>
<text x="50" y="483" text-anchor="middle" class="L" >گھر</text>
<text x="120" y="483" text-anchor="middle" class="X" >ghar</text>
<text x="190" y="483" text-anchor="middle" class="X" >house</text>
<text x="280" y="483" text-anchor="middle" class="L" >ماں</text>
<text x="360" y="483" text-anchor="middle" class="X" >māṃ</text>
<text x="430" y="483" text-anchor="middle" class="X" >mother</text>
<text x="50" y="501" text-anchor="middle" class="L" >دوست</text>
<text x="120" y="501" text-anchor="middle" class="X" >dost</text>
<text x="190" y="501" text-anchor="middle" class="X" >friend</text>
<text x="280" y="501" text-anchor="middle" class="L" >ہاں</text>
<text x="360" y="501" text-anchor="middle" class="X" >hāṃ</text>
<text x="430" y="501" text-anchor="middle" class="X" >yes</text>
<text x="50" y="519" text-anchor="middle" class="L" >نہیں</text>
<text x="120" y="519" text-anchor="middle" class="X" >nahīṃ</text>
<text x="190" y="519" text-anchor="middle" class="X" >no</text>
<text x="280" y="519" text-anchor="middle" class="L" >نام</text>
<text x="360" y="519" text-anchor="middle" class="X" >nām</text>
<text x="430" y="519" text-anchor="middle" class="X" >name</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="625" text-anchor="middle" class="F" >PLATE 54C  ·  URDU</text>
<text x="240" y="640" text-anchor="middle" class="F" >Grammar · Postpositions · Verbs</text>
<text x="240" y="655" text-anchor="middle" class="F" >REMEMBER FORWARD</text>
</svg>
