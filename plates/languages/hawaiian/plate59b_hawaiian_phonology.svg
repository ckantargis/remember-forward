<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680">
<rect x="8" y="8" width="464" height="664" rx="10" ry="10" fill="none" stroke="#1a1a2e" stroke-width="2"/>
<rect x="14" y="14" width="452" height="652" rx="8" ry="8" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
<style>
text { font-family: "Noto Sans", "Georgia", serif; }
.T { font-size: 13px; fill: #1a1a2e; }
.H { font-size: 11px; fill: #5a4a6b; font-style: italic; }
.L { font-size: 12px; fill: #1a1a2e; }
.S { font-size: 15px; fill: #1a1a2e; font-weight: bold; }
.X { font-size: 11px; fill: #3a3a5c; }
.F { font-size: 9px; fill: #7a7a9a; }
</style>
<text x="240" y="45" text-anchor="middle" class="S" >HAWAIIAN  PHONOLOGY</text>
<text x="240" y="65" text-anchor="middle" class="T" >Ka Leo Hawaiʻi</text>
<line x1="20" y1="78" x2="460" y2="78" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="95" text-anchor="middle" class="H" >— Consonants —</text>
<text x="30" y="112" text-anchor="start" class="L" >p</text>
<text x="80" y="112" text-anchor="start" class="X" >/p/</text>
<text x="165" y="112" text-anchor="start" class="X" >bilabial stop — unaspirated</text>
<text x="30" y="130" text-anchor="start" class="L" >k</text>
<text x="80" y="130" text-anchor="start" class="X" >/k/</text>
<text x="165" y="130" text-anchor="start" class="X" >velar stop — may be [t] before i</text>
<text x="30" y="148" text-anchor="start" class="L" >h</text>
<text x="80" y="148" text-anchor="start" class="X" >/h/</text>
<text x="165" y="148" text-anchor="start" class="X" >glottal fricative</text>
<text x="30" y="166" text-anchor="start" class="L" >l</text>
<text x="80" y="166" text-anchor="start" class="X" >/l/</text>
<text x="165" y="166" text-anchor="start" class="X" >lateral approximant</text>
<text x="30" y="184" text-anchor="start" class="L" >m</text>
<text x="80" y="184" text-anchor="start" class="X" >/m/</text>
<text x="165" y="184" text-anchor="start" class="X" >bilabial nasal</text>
<text x="30" y="202" text-anchor="start" class="L" >n</text>
<text x="80" y="202" text-anchor="start" class="X" >/n/</text>
<text x="165" y="202" text-anchor="start" class="X" >alveolar nasal</text>
<text x="30" y="220" text-anchor="start" class="L" >w</text>
<text x="80" y="220" text-anchor="start" class="X" >/v/ or /w/</text>
<text x="165" y="220" text-anchor="start" class="X" >labiodental or bilabial after e/i: /v/</text>
<text x="30" y="238" text-anchor="start" class="L" >ʻ</text>
<text x="80" y="238" text-anchor="start" class="X" >/ˀ/</text>
<text x="165" y="238" text-anchor="start" class="X" >glottal stop — full consonant</text>
<line x1="20" y1="264" x2="460" y2="264" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="280" text-anchor="middle" class="H" >— Vowels —</text>
<text x="80" y="297" text-anchor="middle" class="L" >a /a/</text>
<text x="290" y="297" text-anchor="start" class="X" >low central, like "father"</text>
<text x="80" y="314" text-anchor="middle" class="L" >e /e/</text>
<text x="290" y="314" text-anchor="start" class="X" >mid front, like "bet"</text>
<text x="80" y="331" text-anchor="middle" class="L" >i /i/</text>
<text x="290" y="331" text-anchor="start" class="X" >high front, like "see"</text>
<text x="80" y="348" text-anchor="middle" class="L" >o /o/</text>
<text x="290" y="348" text-anchor="start" class="X" >mid back, like "so"</text>
<text x="80" y="365" text-anchor="middle" class="L" >u /u/</text>
<text x="290" y="365" text-anchor="start" class="X" >high back, like "boot"</text>
<line x1="20" y1="386" x2="460" y2="386" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="402" text-anchor="middle" class="H" >— Diphthongs —</text>
<text x="240" y="419" text-anchor="middle" class="L" >ai  ae  ao  au  ei  eu  oi  ou  iu  ui</text>
<text x="240" y="437" text-anchor="middle" class="X" >Diphthongs treated as single syllable nuclei</text>
<line x1="20" y1="451" x2="460" y2="451" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="467" text-anchor="middle" class="H" >— Stress —</text>
<text x="240" y="484" text-anchor="middle" class="X" >Stress falls on penultimate (second-to-last) mora</text>
<text x="240" y="500" text-anchor="middle" class="X" >Long vowels count as two morae</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="625" text-anchor="middle" class="F" >PLATE 59B  ·  HAWAIIAN</text>
<text x="240" y="640" text-anchor="middle" class="F" >Phonology · Minimal Consonants</text>
<text x="240" y="655" text-anchor="middle" class="F" >REMEMBER FORWARD</text>
</svg>
