<text x="240" y="346" text-anchor="middle" class="Ls">Greek: flexible word order (SVO default). Inflected: nouns/verbs carry case and person markers.</text>
<text x="240" y="355" text-anchor="middle" class="Lx">3 genders (M/F/N), 4 cases (nominative, genitive, accusative, vocative in Modern; 5 in Ancient).</text>
