<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 13C · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— ARABIC — VSO · TRILATERAL ROOTS · DUAL NUMBER —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Word order: Verb-Subject-Object. "Kataba l-waladu r-risālata" = Wrote the-boy the-letter.</text>
<text x="240" y="82" text-anchor="middle" class="Lx">Trilateral root: k-t-b = writing. كتب kataba (he wrote) · كتاب kitāb (book) · مكتب maktab (office).</text>
<text x="240" y="91" text-anchor="middle" class="Lx">Three numbers: singular, dual (two), plural. Dual suffix: -āni (nom.) / -ayni (acc./gen.).</text>
<line x1="20" y1="99" x2="460" y2="99" stroke="black" stroke-width="0.3"/>
