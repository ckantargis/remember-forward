<text x="240" y="236" text-anchor="middle" class="H">— HARAKAT — OPTIONAL VOWEL MARKS —</text>
<text x="240" y="246" text-anchor="middle" class="Ls">Fatḥa (َ) = /a/ · Kasra (ُ) = /i/ · Ẍamma (ُ) = /u/ · Sukun = no vowel</text>
<text x="240" y="255" text-anchor="middle" class="Lx">Long vowels: ا Alif = /ā/ · ي Ya = /ī/ · و Waw = /ū/. Script reads right to left.</text>
<text x="240" y="264" text-anchor="middle" class="Lx">The Quran preserves Classical Arabic exactly as recited in 650 CE — the standard reference for script.</text>
<line x1="20" y1="276" x2="460" y2="276" stroke="black" stroke-width="1.5"/>
<rect x="20" y="279" width="440" height="14" fill="black"/>
<text x="240" y="289" text-anchor="middle" class="Hb" fill="white">GREEK (ELLINIKΑ) · SCRIPT · 24-LETTER ALPHABET</text>
<line x1="20" y1="293" x2="460" y2="293" stroke="black" stroke-width="0.3"/>
<text x="240" y="308" text-anchor="middle" class="Ls">Greek alphabet: 24 letters, left-to-right. Ancestor of Latin, Cyrillic, and Coptic scripts.</text>
<text x="240" y="317" text-anchor="middle" class="Lx">Adopted from Phoenician ~800 BCE. Greeks added vowel letters — world’s first complete vowel alphabet.</text>
<line x1="20" y1="324" x2="460" y2="324" stroke="black" stroke-width="0.3"/>
