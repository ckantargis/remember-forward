<text x="240" y="30" text-anchor="middle" class="T">ARABIC + GREEK — SCRIPT · WRITING SYSTEMS</text>
<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 13A · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— ARABIC — ABJAD · 28 LETTERS · RIGHT TO LEFT —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Consonant-only script. Vowels marked optionally with harakat (diacritics). 4 positional forms per letter.</text>
<text x="240" y="82" text-anchor="middle" class="Lx">Cursive: letters join. 22 letters connect on both sides; 6 connect only on right (break word).</text>
<line x1="20" y1="89" x2="460" y2="89" stroke="black" stroke-width="0.3"/>
