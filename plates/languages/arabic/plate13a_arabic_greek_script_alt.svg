<line x1="20" y1="492" x2="460" y2="492" stroke="black" stroke-width="0.3"/>
<text x="240" y="500" text-anchor="middle" class="H">— SCRIPT BRIDGE — ARABIC AND GREEK ROOTS IN SCIENCE —</text>
<text x="240" y="510" text-anchor="middle" class="Lx">Algebra: from Arabic al-jabr (الجبر) — Greek: αλγεβρα. Arabic transmitted Greek mathematics to Europe.</text>
<text x="240" y="519" text-anchor="middle" class="Lx">Algorithm: from al-Khwārizmī (Arabic mathematician) — Greek αριθμός = arithmetic/number.</text>
<text x="240" y="528" text-anchor="middle" class="Lx">Chemistry: from Arabic al-kīmyā’ — originally from Greek khēmeīa (pouring, fusion).</text>
<text x="240" y="537" text-anchor="middle" class="Lx">Both scripts shaped science: Greek gave the framework; Arabic preserved and extended it.</text>
