<text x="365" y="285" text-anchor="middle" class="Lx">Waw</text>
<text x="365" y="293" text-anchor="middle" class="Lx">/w/ū/</text>
<text x="427" y="275" text-anchor="middle" class="La">ي</text>
<text x="427" y="285" text-anchor="middle" class="Lx">Ya</text>
<text x="427" y="293" text-anchor="middle" class="Lx">/y/ī/</text>
<line x1="22" y1="308" x2="458" y2="308" stroke="#000" stroke-width="0.5"/>
<text x="240" y="314" text-anchor="middle" class="H">— · —  FOUR POSITIONAL FORMS  ·  SAME LETTER  ·  DIFFERENT SHAPE  — · —</text>
<line x1="22" y1="318" x2="458" y2="318" stroke="#000" stroke-width="0.3"/>
<text x="240" y="326" text-anchor="middle" class="Lx">letters change shape depending on position in word  ·  software handles this automatically</text>
<rect x="22" y="330" width="136" height="64" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="90" y="340" text-anchor="middle" class="Ls">Ba /b/</text>
<text x="47" y="355" text-anchor="middle" class="Lam">ب</text>
<text x="47" y="364" text-anchor="middle" class="Lx">isolated</text>
<text x="74" y="355" text-anchor="middle" class="Lam">بـ</text>
<text x="74" y="364" text-anchor="middle" class="Lx">initial</text>
<text x="101" y="355" text-anchor="middle" class="Lam">ـبـ</text>
<text x="101" y="364" text-anchor="middle" class="Lx">medial</text>
<text x="128" y="355" text-anchor="middle" class="Lam">ـب</text>
<text x="128" y="364" text-anchor="middle" class="Lx">final</text>
<rect x="162" y="330" width="136" height="64" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="230" y="340" text-anchor="middle" class="Ls">Ain /ˁ/</text>
<text x="187" y="355" text-anchor="middle" class="Lam">ع</text>
<text x="187" y="364" text-anchor="middle" class="Lx">isolated</text>
<text x="214" y="355" text-anchor="middle" class="Lam">عـ</text>
<text x="214" y="364" text-anchor="middle" class="Lx">initial</text>
<text x="241" y="355" text-anchor="middle" class="Lam">ـعـ</text>
<text x="241" y="364" text-anchor="middle" class="Lx">medial</text>
<text x="268" y="355" text-anchor="middle" class="Lam">ـع</text>
<text x="268" y="364" text-anchor="middle" class="Lx">final</text>
<rect x="302" y="330" width="136" height="64" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="370" y="340" text-anchor="middle" class="Ls">Ha /h/</text>
<text x="327" y="355" text-anchor="middle" class="Lam">ه</text>
<text x="327" y="364" text-anchor="middle" class="Lx">isolated</text>
<text x="354" y="355" text-anchor="middle" class="Lam">هـ</text>
<text x="354" y="364" text-anchor="middle" class="Lx">initial</text>
<text x="381" y="355" text-anchor="middle" class="Lam">ـهـ</text>
