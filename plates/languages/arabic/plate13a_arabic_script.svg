<text x="408" y="355" text-anchor="middle" class="Lam">ـه</text>
<text x="408" y="364" text-anchor="middle" class="Lx">final</text>
<text x="240" y="398" text-anchor="middle" class="Lx">SIX NON-CONNECTORS: ا د ذ ر ز و  ·  these do not connect to the following letter</text>
<line x1="22" y1="404" x2="458" y2="404" stroke="#000" stroke-width="0.5"/>
<text x="240" y="410" text-anchor="middle" class="H">— · —  VOWEL MARKS  ·  HARAKAT  ·  ADDED IN QURAN AND TEACHING TEXTS  — · —</text>
<line x1="22" y1="414" x2="458" y2="414" stroke="#000" stroke-width="0.3"/>
<text x="240" y="422" text-anchor="middle" class="Lx">Arabic is an abjad  ·  only consonants written normally  ·  vowels omitted in everyday text</text>
<text x="240" y="431" text-anchor="middle" class="Lx">Quran, children's books, and learner texts add vowel marks (harakat) for precision</text>
<rect x="22" y="435" width="100" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="40" y="449" text-anchor="middle" class="La">بَ</text>
<text x="77" y="445" text-anchor="middle" class="Lx">fatha /a/</text>
<text x="77" y="454" text-anchor="middle" class="Lx">short a  ·  mark above</text>
<rect x="127" y="435" width="100" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="145" y="449" text-anchor="middle" class="La">بُ</text>
<text x="182" y="445" text-anchor="middle" class="Lx">damma /u/</text>
<text x="182" y="454" text-anchor="middle" class="Lx">short u  ·  mark above</text>
<rect x="232" y="435" width="100" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="250" y="449" text-anchor="middle" class="La">بِ</text>
<text x="287" y="445" text-anchor="middle" class="Lx">kasra /i/</text>
<text x="287" y="454" text-anchor="middle" class="Lx">short i  ·  mark below</text>
<rect x="337" y="435" width="100" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="355" y="449" text-anchor="middle" class="La">با</text>
<text x="392" y="445" text-anchor="middle" class="Lx">alif madd /a:/</text>
<text x="392" y="454" text-anchor="middle" class="Lx">long a  ·  alif follows</text>
<rect x="22" y="467" width="100" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="40" y="481" text-anchor="middle" class="La">بو</text>
<text x="77" y="477" text-anchor="middle" class="Lx">waw madd /u:/</text>
<text x="77" y="486" text-anchor="middle" class="Lx">long u  ·  waw follows</text>
<rect x="127" y="467" width="100" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="145" y="481" text-anchor="middle" class="La">بي</text>
<text x="182" y="477" text-anchor="middle" class="Lx">ya madd /i:/</text>
<text x="182" y="486" text-anchor="middle" class="Lx">long i  ·  ya follows</text>
<rect x="232" y="467" width="100" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="250" y="481" text-anchor="middle" class="La">بْ</text>
<text x="287" y="477" text-anchor="middle" class="Lx">sukun (none)</text>
<text x="287" y="486" text-anchor="middle" class="Lx">no vowel  ·  closed syl.</text>
<rect x="337" y="467" width="100" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="355" y="481" text-anchor="middle" class="La">بّ</text>
<text x="392" y="477" text-anchor="middle" class="Lx">shadda geminate</text>
<text x="392" y="486" text-anchor="middle" class="Lx">doubled consonant</text>
<line x1="18" y1="615" x2="462" y2="615" stroke="#000" stroke-width="0.5"/>
<text x="240" y="624" text-anchor="middle" class="M">REMEMBER FORWARD · THE PATIENT MESSAGE · CC BY-SA 4.0 · rememberforward.org</text>
<line x1="18" y1="630" x2="462" y2="630" stroke="#000" stroke-width="1"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>