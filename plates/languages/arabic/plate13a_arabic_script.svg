<text x="241" y="189" text-anchor="middle" class="Lx">Zay</text>
<text x="241" y="197" text-anchor="middle" class="Lx">/z/</text>
<text x="303" y="179" text-anchor="middle" class="La">س</text>
<text x="303" y="189" text-anchor="middle" class="Lx">Sin</text>
<text x="303" y="197" text-anchor="middle" class="Lx">/s/</text>
<text x="365" y="179" text-anchor="middle" class="La">ش</text>
<text x="365" y="189" text-anchor="middle" class="Lx">Shin</text>
<text x="365" y="197" text-anchor="middle" class="Lx">/ʃ/</text>
<text x="427" y="179" text-anchor="middle" class="La">ص</text>
<text x="427" y="189" text-anchor="middle" class="Lx">Sad</text>
<text x="427" y="197" text-anchor="middle" class="Lx">/sˤ/</text>
<text x="55" y="227" text-anchor="middle" class="La">ض</text>
<text x="55" y="237" text-anchor="middle" class="Lx">Dad</text>
<text x="55" y="245" text-anchor="middle" class="Lx">/dˤ/</text>
<text x="117" y="227" text-anchor="middle" class="La">ط</text>
<text x="117" y="237" text-anchor="middle" class="Lx">Tta</text>
<text x="117" y="245" text-anchor="middle" class="Lx">/tˤ/</text>
<text x="179" y="227" text-anchor="middle" class="La">ظ</text>
<text x="179" y="237" text-anchor="middle" class="Lx">Dha</text>
<text x="179" y="245" text-anchor="middle" class="Lx">/ðˤ/</text>
<text x="241" y="227" text-anchor="middle" class="La">ع</text>
<text x="241" y="237" text-anchor="middle" class="Lx">Ain</text>
<text x="241" y="245" text-anchor="middle" class="Lx">/ˁ/</text>
