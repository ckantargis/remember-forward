</style></defs><rect x="6" y="6" width="468" height="668" rx="4" fill="none" stroke="#000" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" rx="2" fill="none" stroke="#000" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">PLATE 13A  ·  ARABIC  ·  SCRIPT</text>
<line x1="18" y1="39" x2="462" y2="39" stroke="#000" stroke-width="0.75"/>
<text x="240" y="50" text-anchor="middle" class="S">28 letters · right to left · cursive abjad · four positional forms · dots distinguish letters</text>
<line x1="18" y1="56" x2="462" y2="56" stroke="#000" stroke-width="0.5"/>
<text x="240" y="67" text-anchor="middle" class="H">— · —  ARABIC  ·  1.9 BILLION SPEAKERS  ·  WIDEST GEOGRAPHIC SPREAD  — · —</text>
<line x1="22" y1="71" x2="458" y2="71" stroke="#000" stroke-width="0.3"/>
<text x="240" y="79" text-anchor="middle" class="Lx">Arabic is spoken from Morocco to the Persian Gulf  ·  Classical Arabic unchanged for 1,400 years</text>
<text x="240" y="88" text-anchor="middle" class="Lx">the Quran has preserved the classical form  ·  any literate Arabic speaker can read texts from 650 CE</text>
<text x="240" y="97" text-anchor="middle" class="Lx">genetically related to Hebrew  ·  many cognate roots  ·  sister language not daughter or ancestor</text>
<line x1="22" y1="102" x2="458" y2="102" stroke="#000" stroke-width="0.5"/>
<text x="240" y="108" text-anchor="middle" class="H">— · —  THE 28 LETTERS  ·  ISOLATED FORM  ·  READ RIGHT TO LEFT  — · —</text>
<line x1="22" y1="112" x2="458" y2="112" stroke="#000" stroke-width="0.3"/>
<text x="55" y="131" text-anchor="middle" class="La">ا</text>
<text x="55" y="141" text-anchor="middle" class="Lx">Alif</text>
<text x="55" y="149" text-anchor="middle" class="Lx">/-/ā/</text>
<text x="117" y="131" text-anchor="middle" class="La">ب</text>
<text x="117" y="141" text-anchor="middle" class="Lx">Ba</text>
<text x="117" y="149" text-anchor="middle" class="Lx">/b/</text>
<text x="179" y="131" text-anchor="middle" class="La">ت</text>
<text x="179" y="141" text-anchor="middle" class="Lx">Ta</text>
<text x="179" y="149" text-anchor="middle" class="Lx">/t/</text>
<text x="241" y="131" text-anchor="middle" class="La">ث</text>
<text x="241" y="141" text-anchor="middle" class="Lx">Tha</text>
<text x="241" y="149" text-anchor="middle" class="Lx">/θ/</text>
