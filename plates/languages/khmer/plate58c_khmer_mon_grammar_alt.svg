<line x1="20" y1="348" x2="460" y2="348" stroke="black" stroke-width="0.3"/>
<text x="240" y="356" text-anchor="middle" class="H">— SIDE-BY-SIDE — KHMER VS. MON (SAME FAMILY) —</text>
<text x="80" y="366" text-anchor="middle" class="Lx">CONCEPT</text>
<text x="240" y="366" text-anchor="middle" class="Lx">KHMER</text>
<text x="380" y="366" text-anchor="middle" class="Lx">MON</text>
<text x="80" y="377" text-anchor="middle" class="Lx">water</text>
<text x="240" y="377" text-anchor="middle" class="Ls">tịk (តឹក)</text>
<text x="380" y="377" text-anchor="middle" class="Ls">kruī</text>
<text x="80" y="388" text-anchor="middle" class="Lx">fire</text>
<text x="240" y="388" text-anchor="middle" class="Ls">phňlœng</text>
<text x="380" y="388" text-anchor="middle" class="Ls">me</text>
<text x="80" y="399" text-anchor="middle" class="Lx">person</text>
<text x="240" y="399" text-anchor="middle" class="Ls">mnuṣṣ</text>
<text x="380" y="399" text-anchor="middle" class="Ls">miɔ</text>
<text x="80" y="410" text-anchor="middle" class="Lx">moon</text>
<text x="240" y="410" text-anchor="middle" class="Ls">chan</text>
<text x="380" y="410" text-anchor="middle" class="Ls">klɛh</text>
<text x="80" y="421" text-anchor="middle" class="Lx">life</text>
<text x="240" y="421" text-anchor="middle" class="Ls">jīvit</text>
<text x="380" y="421" text-anchor="middle" class="Ls">āyu</text>
<line x1="20" y1="435" x2="460" y2="435" stroke="black" stroke-width="0.3"/>
<text x="240" y="443" text-anchor="middle" class="H">— GRAMMAR BRIDGE — AUSTROASIATIC COUSINS —</text>
<text x="240" y="453" text-anchor="middle" class="Ls">Khmer and Mon are the two major branches of Austroasiatic: Khmeric and Monic. Shared deep grammar.</text>
<text x="240" y="462" text-anchor="middle" class="Ls">SVO, isolating, classifier systems, no inflection — all hallmarks of Austroasiatic structure.</text>
<text x="240" y="471" text-anchor="middle" class="Lx">Mon’s historical dominance (Dvaravati, Haripunjaya kingdoms) shaped all of mainland SE Asia’s writing systems.</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
