<text x="240" y="30" text-anchor="middle" class="T">KHMER + MON — GRAMMAR · VOCABULARY</text>
<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 58C · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— KHMER GRAMMAR — SVO · ISOLATING · NO INFLECTION —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Khmer is SVO and highly isolating. Grammatical relations expressed by word order and particles.</text>
<text x="240" y="82" text-anchor="middle" class="Lx">No inflection for tense, number, gender, or case. Aspect markers placed before/after verbs.</text>
<line x1="20" y1="90" x2="460" y2="90" stroke="black" stroke-width="0.3"/>
<text x="240" y="98" text-anchor="middle" class="H">— KHMER ASPECT AND TENSE MARKERS —</text>
<text x="90" y="108" text-anchor="middle" class="Ls">បាន (baan)</text>
<text x="300" y="108" text-anchor="middle" class="Lx">completive past: ខ្ញុម baan si (ate — completed)</text>
<text x="90" y="119" text-anchor="middle" class="Ls">ន៉ង (ning)</text>
<text x="300" y="119" text-anchor="middle" class="Lx">future: ន៉ង tow (will go)</text>
<text x="90" y="130" text-anchor="middle" class="Ls">កំពុង (kampung)</text>
<text x="300" y="130" text-anchor="middle" class="Lx">progressive: am doing</text>
<text x="90" y="141" text-anchor="middle" class="Ls">បានជា (baanjaa)</text>
<text x="300" y="141" text-anchor="middle" class="Lx">already done: have already eaten</text>
<line x1="20" y1="155" x2="460" y2="155" stroke="black" stroke-width="0.3"/>
<text x="240" y="163" text-anchor="middle" class="H">— KHMER CORE VOCABULARY —</text>
<text x="55" y="173" text-anchor="middle" class="Lx">តឹក tịk</text>
<text x="123" y="173" text-anchor="middle" class="Lx">water</text>
