<text x="60" y="320" text-anchor="middle" class="Ls">patɔn</text>
<text x="118" y="320" text-anchor="middle" class="Lx">future</text>
<text x="190" y="320" text-anchor="middle" class="Ls">cetanā</text>
<text x="248" y="320" text-anchor="middle" class="Lx">freedom</text>
