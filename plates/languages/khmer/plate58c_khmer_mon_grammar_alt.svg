<text x="253" y="173" text-anchor="middle" class="Lx">fire</text>
<text x="315" y="173" text-anchor="middle" class="Lx">ត្មី tmei</text>
<text x="383" y="173" text-anchor="middle" class="Lx">earth</text>
<text x="55" y="183" text-anchor="middle" class="Lx">មនុស្ស mnuṣṣ</text>
<text x="123" y="183" text-anchor="middle" class="Lx">person</text>
<text x="185" y="183" text-anchor="middle" class="Lx">ចន្ទ្រ chan</text>
