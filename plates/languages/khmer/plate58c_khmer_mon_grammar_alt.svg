<text x="315" y="183" text-anchor="middle" class="Lx">ចង។ជាម chămjām</text>
<text x="383" y="183" text-anchor="middle" class="Lx">remember</text>
<text x="55" y="193" text-anchor="middle" class="Lx">យកកាល anakot</text>
<text x="123" y="193" text-anchor="middle" class="Lx">future</text>
<text x="185" y="193" text-anchor="middle" class="Lx">សឹរិភាព seriphiap</text>
<text x="253" y="193" text-anchor="middle" class="Lx">freedom</text>
<text x="315" y="193" text-anchor="middle" class="Lx">ចិត។ chīt</text>
<text x="383" y="193" text-anchor="middle" class="Lx">heart</text>
<text x="55" y="203" text-anchor="middle" class="Lx">សេចក។គ្នា sechăkgnā</text>
<text x="123" y="203" text-anchor="middle" class="Lx">love</text>
<text x="185" y="203" text-anchor="middle" class="Lx">ពិភពលឹក phīphɔ̄lœk</text>
<text x="253" y="203" text-anchor="middle" class="Lx">world</text>
<text x="315" y="203" text-anchor="middle" class="Lx">ជីវិត jīvit</text>
<text x="383" y="203" text-anchor="middle" class="Lx">life</text>
<line x1="20" y1="220" x2="460" y2="220" stroke="black" stroke-width="1.5"/>
<rect x="20" y="223" width="440" height="14" fill="black"/>
<text x="240" y="233" text-anchor="middle" class="Hb" fill="white">SECONDARY — MON — GRAMMAR · VOCABULARY</text>
<line x1="20" y1="237" x2="460" y2="237" stroke="black" stroke-width="0.3"/>
<text x="240" y="246" text-anchor="middle" class="H">— MON GRAMMAR — SVO · ISOLATING · CLASSIFIER SYSTEM —</text>
<text x="240" y="256" text-anchor="middle" class="Ls">Mon is SVO and isolating — same as Khmer. Both Austroasiatic languages share this structural feature.</text>
<text x="240" y="265" text-anchor="middle" class="Lx">Mon has a rich classifier system: nouns use classifiers when counted. Different for humans, animals, flat things.</text>
<text x="240" y="274" text-anchor="middle" class="Lx">No inflection for tense, number, or gender. Context, particles, and time words signal tense.</text>
<line x1="20" y1="282" x2="460" y2="282" stroke="black" stroke-width="0.3"/>
