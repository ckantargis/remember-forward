<line x1="20" y1="423" x2="460" y2="423" stroke="black" stroke-width="0.3"/>
<text x="240" y="432" text-anchor="middle" class="H" >— SUBJUNCTIVE AND FORMAL REGISTER —</text>
<text x="240" y="443" text-anchor="middle" class="L" >French subjunctive is still widely used (unlike its decline in Spanish/Italian colloquial speech).</text>
<text x="240" y="453" text-anchor="middle" class="Ls" >Required after: vouloir que, il faut que, bien que, pour que, avant que…</text>
<text x="240" y="462" text-anchor="middle" class="Ls" >Il faut que vous parliez (It is necessary that you speak) — subj. after il faut que.</text>
<text x="240" y="471" text-anchor="middle" class="Ls" >Register: tu (familiar) vs vous (formal/plural). Vous for strangers, elders, professionals.</text>
<text x="240" y="480" text-anchor="middle" class="Ls" >French has three registers: spoken colloquial, standard written, and soutenu (elevated/literary).</text>
<text x="240" y="489" text-anchor="middle" class="Ls" >Académie française guards vocabulary — resists English loans (courriel not email, logiciel not software).</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
