<text x="240" y="32" text-anchor="middle" class="T" >FRENCH — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 28C OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— SVO — OBLIGATORY SUBJECT — TWO GENDERS —</text>
<text x="240" y="79" text-anchor="middle" class="L" >French is SVO. Unlike Spanish/Italian, subject pronouns are OBLIGATORY — not null-subject.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >Two genders (M/F): le livre (M), la table (F). Gender must be memorised — not predictable.</text>
<text x="240" y="98" text-anchor="middle" class="Ls" >Articles: le/la/les (definite), un/une/des (indefinite). Articles required where English often omits them.</text>
<line x1="20" y1="106" x2="460" y2="106" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H" >— VERB CONJUGATION — parler "to speak" —</text>
<text x="105" y="125" text-anchor="middle" class="Lx" >Present</text>
<text x="355" y="125" text-anchor="middle" class="Lx" >Imparfait (past continuous)</text>
<text x="42" y="134" text-anchor="middle" class="Lx" >je</text>
<text x="108" y="134" text-anchor="middle" class="Ls" >parle</text>
<text x="198" y="134" text-anchor="middle" class="Lx" >I speak</text>
