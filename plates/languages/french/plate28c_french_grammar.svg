<text x="198" y="178" text-anchor="middle" class="Lx" >you (formal/pl)</text>
<text x="275" y="178" text-anchor="middle" class="Lx" >vous</text>
<text x="345" y="178" text-anchor="middle" class="Ls" >parliez</text>
<text x="435" y="178" text-anchor="start" class="Lx" >you</text>
<text x="42" y="189" text-anchor="middle" class="Lx" >ils/elles</text>
<text x="108" y="189" text-anchor="middle" class="Ls" >parlent</text>
<text x="198" y="189" text-anchor="middle" class="Lx" >they</text>
<text x="275" y="189" text-anchor="middle" class="Lx" >ils/elles</text>
<text x="345" y="189" text-anchor="middle" class="Ls" >parlaient</text>
<text x="435" y="189" text-anchor="start" class="Lx" >they</text>
<text x="240" y="208" text-anchor="middle" class="Ls" >Passé composé (perfect): avoir/être + past participle — j'ai parlé (I spoke/have spoken)</text>
<text x="240" y="217" text-anchor="middle" class="Ls" >être verbs (motion/state change): je suis allé(e) (I went) — participle agrees with subject gender.</text>
<line x1="20" y1="225" x2="460" y2="225" stroke="black" stroke-width="0.3"/>
<text x="240" y="234" text-anchor="middle" class="H" >— NEGATION AND QUESTION FORMATION —</text>
<text x="240" y="245" text-anchor="middle" class="Ls" >Negation: ne…pas wraps the verb: Je ne parle pas (I do not speak). Spoken French often drops ne: je parle pas.</text>
<text x="240" y="254" text-anchor="middle" class="Ls" >Other negatives: ne…jamais (never), ne…rien (nothing), ne…plus (no more), ne…personne (no one).</text>
<text x="240" y="263" text-anchor="middle" class="Ls" >Questions: inversion (Parlez-vous?), est-ce que (Est-ce que vous parlez?), or intonation (Vous parlez?).</text>
<line x1="20" y1="271" x2="460" y2="271" stroke="black" stroke-width="0.3"/>
