<text x="240" y="30" text-anchor="middle" class="T">FRENCH + ITALIAN — GRAMMAR · VOCABULARY</text>
<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 28C · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— FRENCH GRAMMAR — SVO · OBLIGATORY SUBJECT —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">French is SVO. Subject pronouns are obligatory — unlike Italian (pro-drop). Two genders: M/F.</text>
<text x="240" y="82" text-anchor="middle" class="Lx">Articles required: le/la/les (def.), un/une/des (indef.). Gender not predictable — must be memorized.</text>
<line x1="20" y1="90" x2="460" y2="90" stroke="black" stroke-width="0.3"/>
<text x="240" y="98" text-anchor="middle" class="H">— FRENCH VERB CONJUGATION — parler —</text>
<text x="70" y="108" text-anchor="middle" class="Ls">je  parle</text>
<text x="275" y="108" text-anchor="middle" class="Ls">tu  parles</text>
<text x="70" y="118" text-anchor="middle" class="Ls">il/elle  parle</text>
<text x="275" y="118" text-anchor="middle" class="Ls">nous  parlons</text>
<text x="70" y="128" text-anchor="middle" class="Ls">vous  parlez</text>
<text x="275" y="128" text-anchor="middle" class="Ls">ils/elles  parlent</text>
<text x="240" y="140" text-anchor="middle" class="Lx">Passé composé: j’ai parlé (I spoke). Être verbs: je suis allé(e) (I went).</text>
<text x="240" y="149" text-anchor="middle" class="Lx">Negation: ne…pas: Je ne parle pas. Spoken: je parle pas (ne dropped in colloquial).</text>
<line x1="20" y1="157" x2="460" y2="157" stroke="black" stroke-width="0.3"/>
<text x="240" y="165" text-anchor="middle" class="H">— FRENCH CORE VOCABULARY —</text>
