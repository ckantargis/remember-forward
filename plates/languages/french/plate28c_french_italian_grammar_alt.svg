<text x="240" y="235" text-anchor="middle" class="Hb" fill="white">SECONDARY — ITALIAN (ITALIANO) — GRAMMAR · VOCABULARY</text>
<line x1="20" y1="239" x2="460" y2="239" stroke="black" stroke-width="0.3"/>
<text x="240" y="248" text-anchor="middle" class="H">— ITALIAN GRAMMAR — SVO · PRO-DROP —</text>
<text x="240" y="258" text-anchor="middle" class="Ls">Italian is SVO and pro-drop — subject pronouns can be omitted: parla = (he/she/it) speaks.</text>
<text x="240" y="267" text-anchor="middle" class="Lx">Two genders (M/F): il libro (M), la tavola (F). Agreement: adjectives match noun gender + number.</text>
<text x="240" y="276" text-anchor="middle" class="Lx">Articles: il/la/i/le (def.), un/una (indef.). Plural: -o → -i (M), -a → -e (F): libro → libri.</text>
<line x1="20" y1="284" x2="460" y2="284" stroke="black" stroke-width="0.3"/>
<text x="240" y="292" text-anchor="middle" class="H">— ITALIAN VERB CONJUGATION — parlare —</text>
<text x="70" y="302" text-anchor="middle" class="Ls">io  parlo</text>
<text x="275" y="302" text-anchor="middle" class="Ls">tu  parli</text>
<text x="70" y="312" text-anchor="middle" class="Ls">lui/lei  parla</text>
<text x="275" y="312" text-anchor="middle" class="Ls">noi  parliamo</text>
<text x="70" y="322" text-anchor="middle" class="Ls">voi  parlate</text>
<text x="275" y="322" text-anchor="middle" class="Ls">loro  parlano</text>
<text x="240" y="334" text-anchor="middle" class="Lx">Passato prossimo: ho parlato (I spoke). Imperfetto: parlavo (I was speaking/used to speak).</text>
<text x="240" y="343" text-anchor="middle" class="Lx">Negation: non before verb: Non parlo italiano. Question: intonation only (Parli italiano?).</text>
<line x1="20" y1="351" x2="460" y2="351" stroke="black" stroke-width="0.3"/>
