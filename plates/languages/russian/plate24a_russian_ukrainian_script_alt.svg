<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">RUSSIAN</text>
<text x="240" y="40" text-anchor="middle" class="S">CYRILLIC SCRIPT</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">RUSSIAN CYRILLIC ALPHABET (33 LETTERS)</text>
<text x="240" y="68" text-anchor="middle" class="Ls">Developed from Greek uncials; missionary Cyril (863 CE)</text>
<text x="240" y="79" text-anchor="middle" class="L">А Б В Г Д Е Ё Ж З И Й К Л М Н О П</text>
<text x="240" y="90" text-anchor="middle" class="L">Р С Т У Ф Х Ц Ч Ш Щ Ъ Ы Ь Э Ю Я</text>
<text x="240" y="101" text-anchor="middle" class="Ls">Hard sign Ъ: separates prefix from vowel (obъявление)</text>
<text x="240" y="112" text-anchor="middle" class="Ls">Soft sign Ь: palatalizes preceding consonant</text>
<text x="240" y="123" text-anchor="middle" class="Ls">Ы: unique vowel /ɨ/ — no equivalent in most languages</text>
<line x1="20" y1="131" x2="460" y2="131" stroke="#555" stroke-width="0.5"/>
<text x="240" y="139" text-anchor="middle" class="H">PALATAL CONSONANTS</text>
<text x="240" y="150" text-anchor="middle" class="L">Every Russian consonant has a hard/soft (palatalized) pair:</text>
<text x="240" y="161" text-anchor="middle" class="L">/n/ vs. /nʲ/ (soft) • /t/ vs. /tʲ/ • /l/ vs. /lʲ/</text>
<text x="240" y="172" text-anchor="middle" class="Ls">Soft sign ь after consonant signals palatalization</text>
<text x="240" y="183" text-anchor="middle" class="Ls">brat (брат "brother") vs. bratʼ (брать "to take") — different words!</text>
<line x1="20" y1="191" x2="460" y2="191" stroke="#555" stroke-width="0.5"/>
<text x="240" y="199" text-anchor="middle" class="H">STRESS &amp; VOWEL REDUCTION</text>
<text x="240" y="210" text-anchor="middle" class="L">Stress is unpredictable — must be memorized per word</text>
<text x="240" y="221" text-anchor="middle" class="L">Unstressed /o/ → /ɐ/ (schwa): gorod /ɡórət/ "city"</text>
<text x="240" y="232" text-anchor="middle" class="Ls">Unstressed /a/ → /ə/: moloko /məlɐˈko/ "milk"</text>
<line x1="20" y1="240" x2="460" y2="240" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="247" width="460" height="13" fill="#111"/>
<text x="240" y="256.5" text-anchor="middle" class="Hb">UKRAINIAN  ·  УКРАЇНСЬКА  ·  SECONDARY LANGUAGE</text>
<text x="240" y="272" text-anchor="middle" class="H">UKRAINIAN CYRILLIC (33 LETTERS + 1 EXTRA)</text>
<text x="240" y="283" text-anchor="middle" class="Ls">Ukrainian uses the same Cyrillic base but with key differences:</text>
<text x="240" y="294" text-anchor="middle" class="L">І (и) • Ї (йи) • Є (йе) — letters absent in Russian</text>
<text x="240" y="305" text-anchor="middle" class="L">Ґ (Hh) — Ukrainian G letter (pronounced /h/, not /ɡ/)</text>
<text x="240" y="316" text-anchor="middle" class="Ls">Russian Г = /ɡ/ (voiced velar) • Ukrainian г = /ʁ/ (uvular fricative)</text>
<line x1="20" y1="324" x2="460" y2="324" stroke="#555" stroke-width="0.5"/>
<text x="240" y="332" text-anchor="middle" class="H">THE /H/ vs. /G/ DISTINCTION</text>
<text x="240" y="343" text-anchor="middle" class="Ls">Ukrainian uses /ɦ/ (voiced glottal fricative) where Russian uses /ɡ/</text>
<text x="240" y="354" text-anchor="middle" class="Ls">Russian город /ɡórət/ • Ukrainian місто /ˈmʲisto/ "city"</text>
<text x="240" y="365" text-anchor="middle" class="Ls">Ukrainian гарно /ˈɦarno/ "fine" — /ɦ/ not /ɡ/</text>
<line x1="20" y1="373" x2="460" y2="373" stroke="#555" stroke-width="0.5"/>
<text x="240" y="381" text-anchor="middle" class="H">DISTINCTIVE UKRAINIAN LETTERS IN USE</text>
<text x="240" y="392" text-anchor="middle" class="L">І in: ріка "river" • сімʼя "family" • історія "history"</text>
<text x="240" y="403" text-anchor="middle" class="L">Ї in: їжак "hedgehog" • європейський "European"</text>
<text x="240" y="414" text-anchor="middle" class="Ls">Ukrainian apostrophe: mʼясо "meat" • pʼять "five"</text>
<line x1="20" y1="422" x2="460" y2="422" stroke="#555" stroke-width="0.5"/>
<text x="240" y="430" text-anchor="middle" class="H">SHARED SLAVIC HERITAGE</text>
<text x="240" y="441" text-anchor="middle" class="Ls">Both derived from Old Church Slavonic Cyrillic (c. 900 CE)</text>
<text x="240" y="452" text-anchor="middle" class="Ls">Diverged as Russian/Ukrainian literary standards separated</text>
<text x="240" y="463" text-anchor="middle" class="Ls">Mutual intelligibility ~60% (higher than English/German)</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 24a ALT  ·  RUSSIAN / UKRAINIAN  ·  SCRIPT</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
