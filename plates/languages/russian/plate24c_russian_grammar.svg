<text x="240" y="32" text-anchor="middle" class="T" >RUSSIAN — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 24C OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— INFLECTED LANGUAGE — 6 CASES, 3 GENDERS —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Russian is highly inflected. Nouns decline for: CASE (6) × NUMBER (sg/pl) × GENDER (M/F/N).</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >Word order is flexible (SVO preferred, but any order is grammatically possible for emphasis).</text>
<text x="60" y="100" text-anchor="middle" class="Lx" >Case</text>
<text x="115" y="100" text-anchor="middle" class="Lx" >Abbr</text>
<text x="185" y="100" text-anchor="middle" class="Lx" >Function</text>
<text x="310" y="100" text-anchor="middle" class="Lx" >Example</text>
<text x="415" y="100" text-anchor="middle" class="Lx" >Gloss</text>
<text x="60" y="109" text-anchor="middle" class="Lx" >Nominative</text>
<text x="115" y="109" text-anchor="middle" class="Lx" >НОМ</text>
<text x="185" y="109" text-anchor="middle" class="Lx" >Subject</text>
<text x="310" y="109" text-anchor="middle" class="Lrs" >Кот спит.</text>
<text x="415" y="109" text-anchor="middle" class="Lx" >The cat sleeps.</text>
<text x="60" y="120" text-anchor="middle" class="Lx" >Genitive</text>
<text x="115" y="120" text-anchor="middle" class="Lx" >РОД</text>
<text x="185" y="120" text-anchor="middle" class="Lx" >Possession / absence</text>
<text x="310" y="120" text-anchor="middle" class="Lrs" >нет кота</text>
<text x="415" y="120" text-anchor="middle" class="Lx" >there is no cat</text>
<text x="60" y="131" text-anchor="middle" class="Lx" >Dative</text>
<text x="115" y="131" text-anchor="middle" class="Lx" >ДАТ</text>
<text x="185" y="131" text-anchor="middle" class="Lx" >Indirect object</text>
<text x="310" y="131" text-anchor="middle" class="Lrs" >дал коту</text>
<text x="415" y="131" text-anchor="middle" class="Lx" >gave to the cat</text>
<text x="60" y="142" text-anchor="middle" class="Lx" >Accusative</text>
<text x="115" y="142" text-anchor="middle" class="Lx" >ВИН</text>
<text x="185" y="142" text-anchor="middle" class="Lx" >Direct object</text>
<text x="310" y="142" text-anchor="middle" class="Lrs" >вижу кота</text>
<text x="415" y="142" text-anchor="middle" class="Lx" >I see the cat</text>
<text x="60" y="153" text-anchor="middle" class="Lx" >Instrumental</text>
<text x="115" y="153" text-anchor="middle" class="Lx" >ТВО</text>
<text x="185" y="153" text-anchor="middle" class="Lx" >By/with/as</text>
<text x="310" y="153" text-anchor="middle" class="Lrs" >с котом</text>
<text x="415" y="153" text-anchor="middle" class="Lx" >with the cat</text>
<text x="60" y="164" text-anchor="middle" class="Lx" >Prepositional</text>
<text x="115" y="164" text-anchor="middle" class="Lx" >ПРЕ</text>
<text x="185" y="164" text-anchor="middle" class="Lx" >Location (after prep)</text>
<text x="310" y="164" text-anchor="middle" class="Lrs" >о коте</text>
<text x="415" y="164" text-anchor="middle" class="Lx" >about the cat</text>
<line x1="20" y1="177" x2="460" y2="177" stroke="black" stroke-width="0.3"/>
<text x="240" y="186" text-anchor="middle" class="H" >— NOUN DECLENSION — кот "cat" (masculine) —</text>
<text x="100" y="196" text-anchor="middle" class="Lx" >Singular</text>
<text x="320" y="196" text-anchor="middle" class="Lx" >Plural</text>
