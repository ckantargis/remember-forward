<line x1="20" y1="524" x2="460" y2="524" stroke="black" stroke-width="0.3"/>
<text x="240" y="533" text-anchor="middle" class="H" >— NO ARTICLES — VERBAL ASPECT INSTEAD —</text>
<text x="240" y="544" text-anchor="middle" class="L" >Russian has NO definite or indefinite articles. Context and word order convey specificity.</text>
<text x="240" y="554" text-anchor="middle" class="Ls" >The distinction between "a book" and "the book" is handled by context, demonstratives (эта книга), or order.</text>
<text x="240" y="563" text-anchor="middle" class="Ls" >Instead, Russian grammaticalizes ASPECT — a distinction absent from English but pervasive in Russian:</text>
<text x="240" y="572" text-anchor="middle" class="Ls" >читать (chitat') = to be reading / read habitually · прочитать (prochitat') = to read (and finish)</text>
<text x="240" y="581" text-anchor="middle" class="Ls" >The perfective prefix changes meaning: написать "write completely", выпить "drink up", уйти "leave (and go)"</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M" >SERIES 24 · RUSSIAN · PLATE C · GRAMMAR · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
