<text x="240" y="270" text-anchor="middle" class="H" >— VERB CONJUGATION — говорить "to speak" (2nd conjugation) —</text>
<text x="100" y="280" text-anchor="middle" class="Lx" >Present</text>
<text x="360" y="280" text-anchor="middle" class="Lx" >Past (agrees with subject gender)</text>
<text x="45" y="289" text-anchor="middle" class="Lrs" >я</text>
<text x="130" y="289" text-anchor="middle" class="Lrs" >говорю</text>
<text x="210" y="289" text-anchor="middle" class="Lx" >I speak</text>
<text x="45" y="299" text-anchor="middle" class="Lrs" >ты</text>
<text x="130" y="299" text-anchor="middle" class="Lrs" >говоришь</text>
<text x="210" y="299" text-anchor="middle" class="Lx" >you speak</text>
