<text x="130" y="329" text-anchor="middle" class="Lrs" >говорите</text>
<text x="210" y="329" text-anchor="middle" class="Lx" >you (pl/formal) speak</text>
<text x="45" y="339" text-anchor="middle" class="Lrs" >они</text>
<text x="130" y="339" text-anchor="middle" class="Lrs" >говорят</text>
<text x="210" y="339" text-anchor="middle" class="Lx" >they speak</text>
<text x="300" y="289" text-anchor="middle" class="Lx" >М sg</text>
<text x="380" y="289" text-anchor="middle" class="Lrs" >говорил</text>
<text x="450" y="289" text-anchor="start" class="Lx" >he spoke</text>
<text x="300" y="299" text-anchor="middle" class="Lx" >Ж sg</text>
<text x="380" y="299" text-anchor="middle" class="Lrs" >говорила</text>
<text x="450" y="299" text-anchor="start" class="Lx" >she spoke</text>
<text x="300" y="309" text-anchor="middle" class="Lx" >Ср sg</text>
<text x="380" y="309" text-anchor="middle" class="Lrs" >говорило</text>
<text x="450" y="309" text-anchor="start" class="Lx" >it spoke</text>
<text x="300" y="319" text-anchor="middle" class="Lx" >Мн pl</text>
<text x="380" y="319" text-anchor="middle" class="Lrs" >говорили</text>
<text x="450" y="319" text-anchor="start" class="Lx" >they spoke</text>
<text x="240" y="353" text-anchor="middle" class="Ls" >Aspect: Russian verbs have PERFECTIVE (completed) and IMPERFECTIVE (ongoing) pairs:</text>
<text x="240" y="362" text-anchor="middle" class="Lx" >писать (pisat') IMPF "to write (repeatedly)" vs написать (napisat') PERF "to write (once, completely)"</text>
<line x1="20" y1="370" x2="460" y2="370" stroke="black" stroke-width="0.3"/>
