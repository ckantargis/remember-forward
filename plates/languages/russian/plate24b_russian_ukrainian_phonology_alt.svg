<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">RUSSIAN</text>
<text x="240" y="40" text-anchor="middle" class="S">PHONOLOGY</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">CONSONANT SYSTEM (36 PHONEMES)</text>
<text x="240" y="68" text-anchor="middle" class="L">Voiced/voiceless pairs: p/b  t/d  k/g  f/v  s/z  sh/zh</text>
<text x="240" y="79" text-anchor="middle" class="L">Each paired with palatalized counterpart: pʲ/bʲ  tʲ/dʲ etc.</text>
<text x="240" y="90" text-anchor="middle" class="Ls">Retroflex: no retroflexes (unlike Indo-Iranian neighbors)</text>
<text x="240" y="101" text-anchor="middle" class="L">Affricates: /ts/ (ц) and /tʃ/ (ч)</text>
<line x1="20" y1="109" x2="460" y2="109" stroke="#555" stroke-width="0.5"/>
<text x="240" y="117" text-anchor="middle" class="H">VOWEL REDUCTION</text>
<text x="240" y="128" text-anchor="middle" class="L">Six vowels when stressed: a e i o u y</text>
<text x="240" y="139" text-anchor="middle" class="L">Unstressed /o/ → /ɐ/ (schwa) or /ʌ/ after hard consonants</text>
<text x="240" y="150" text-anchor="middle" class="L">Unstressed /e/ → /ɪ/ after soft consonants</text>
<text x="240" y="161" text-anchor="middle" class="Ls">Written vowels do NOT predict pronunciation — must learn stress</text>
<line x1="20" y1="169" x2="460" y2="169" stroke="#555" stroke-width="0.5"/>
<text x="240" y="177" text-anchor="middle" class="H">CONSONANT CLUSTERS</text>
<text x="240" y="188" text-anchor="middle" class="L">Russian tolerates long consonant clusters:</text>
<text x="240" y="199" text-anchor="middle" class="L">vzglyad /vzglʲat/ "glance" — 4 consonants at start</text>
<text x="240" y="210" text-anchor="middle" class="Ls">vstrecha /fˈstrʲeʷə/ "meeting"</text>
<line x1="20" y1="218" x2="460" y2="218" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="225" width="460" height="13" fill="#111"/>
<text x="240" y="234.5" text-anchor="middle" class="Hb">UKRAINIAN PHONOLOGY  ·  SECONDARY LANGUAGE</text>
<text x="240" y="250" text-anchor="middle" class="H">UKRAINIAN VOWEL SYSTEM</text>
<text x="240" y="261" text-anchor="middle" class="L">Six vowels: a e i o u i (Ukrainian і = /i/ not /ɨ/)</text>
<text x="240" y="272" text-anchor="middle" class="L">Key difference: Ukrainian has NO vowel reduction!</text>
<text x="240" y="283" text-anchor="middle" class="L">Ukrainian /o/ stays /o/ even unstressed (unlike Russian)</text>
<text x="240" y="294" text-anchor="middle" class="Ls">Ukrainian sounds "cleaner" to Russian speakers — vowels distinct</text>
<line x1="20" y1="302" x2="460" y2="302" stroke="#555" stroke-width="0.5"/>
<text x="240" y="310" text-anchor="middle" class="H">/H/ vs. /G/ — THE DEFINING DIFFERENCE</text>
<text x="240" y="321" text-anchor="middle" class="L">Russian: Г = /ɡ/ (same as English "go")</text>
<text x="240" y="332" text-anchor="middle" class="L">Ukrainian: г = /ɦ/ (voiced glottal fricative — like breathy H)</text>
<text x="240" y="343" text-anchor="middle" class="Ls">Russian град "city" /ɡrat/ • Ukrainian град /ɦrad/</text>
<text x="240" y="354" text-anchor="middle" class="Ls">Same letter, different sound — major shibboleth</text>
<line x1="20" y1="362" x2="460" y2="362" stroke="#555" stroke-width="0.5"/>
<text x="240" y="370" text-anchor="middle" class="H">OTHER UKRAINIAN SOUND FEATURES</text>
<text x="240" y="381" text-anchor="middle" class="Ls">Ukrainian /ʌ/ (like English "good") is distinct phoneme</text>
<text x="240" y="392" text-anchor="middle" class="Ls">Ukrainian /lʲ/ is softer than Russian equivalent</text>
<text x="240" y="403" text-anchor="middle" class="Ls">Ukrainian has syllabic /n̩/ in some words</text>
<text x="240" y="414" text-anchor="middle" class="Ls">Ukrainian в at word end = /w/ (not devoiced like Russian)</text>
<line x1="20" y1="422" x2="460" y2="422" stroke="#555" stroke-width="0.5"/>
<text x="240" y="430" text-anchor="middle" class="H">PHONOLOGICAL PARALLELS</text>
<text x="240" y="441" text-anchor="middle" class="L">Both: palatalized consonant pairs • Cyrillic alphabet</text>
<text x="240" y="452" text-anchor="middle" class="L">Both: 6 vowels • fixed stress (though Ukrainian less reduced)</text>
<text x="240" y="463" text-anchor="middle" class="Ls">Russian: heavy reduction • Ukrainian: faithful vowel quality</text>
<text x="240" y="474" text-anchor="middle" class="Ls">These differences made Ukrainian distinct under tsarist pressure</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 24b ALT  ·  RUSSIAN / UKRAINIAN  ·  PHONOLOGY</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
