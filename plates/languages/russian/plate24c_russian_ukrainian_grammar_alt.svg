<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">RUSSIAN</text>
<text x="240" y="40" text-anchor="middle" class="S">CASE SYSTEM &amp; GRAMMAR</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SIX CASES OF RUSSIAN</text>
<text x="240" y="68" text-anchor="middle" class="L">Nominative (subject): brat "brother"</text>
<text x="240" y="79" text-anchor="middle" class="L">Genitive (possession/absence): brata "of brother; no brother"</text>
<text x="240" y="90" text-anchor="middle" class="L">Dative (indirect object): bratu "to/for brother"</text>
<text x="240" y="101" text-anchor="middle" class="L">Accusative (direct object): brata "brother" (animate)</text>
<text x="240" y="112" text-anchor="middle" class="L">Instrumental (means/companion): bratom "with/by brother"</text>
<text x="240" y="123" text-anchor="middle" class="L">Prepositional (location, after prep): brate "about brother"</text>
<line x1="20" y1="131" x2="460" y2="131" stroke="#555" stroke-width="0.5"/>
<text x="240" y="139" text-anchor="middle" class="H">GRAMMATICAL GENDER (3)</text>
<text x="240" y="150" text-anchor="middle" class="L">Masculine: brat "brother" • stol "table" • dom "house"</text>
<text x="240" y="161" text-anchor="middle" class="L">Feminine: sestra "sister" • kniga "book" • nochʼ "night"</text>
<text x="240" y="172" text-anchor="middle" class="L">Neuter: okno "window" • slovo "word" • imya "name"</text>
<line x1="20" y1="180" x2="460" y2="180" stroke="#555" stroke-width="0.5"/>
<text x="240" y="188" text-anchor="middle" class="H">ASPECT — PERFECTIVE vs. IMPERFECTIVE</text>
<text x="240" y="199" text-anchor="middle" class="L">Every verb has an aspectual pair:</text>
<text x="240" y="210" text-anchor="middle" class="Ls">pisatʼ (write, imperfective) • napisatʼ (write-completely, perfective)</text>
<text x="240" y="221" text-anchor="middle" class="Ls">Imperfective: ongoing, repeated, or habitual action</text>
<text x="240" y="232" text-anchor="middle" class="Ls">Perfective: completed, single, resultative action</text>
<line x1="20" y1="240" x2="460" y2="240" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="247" width="460" height="13" fill="#111"/>
<text x="240" y="256.5" text-anchor="middle" class="Hb">UKRAINIAN GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="272" text-anchor="middle" class="H">SEVEN CASES OF UKRAINIAN</text>
<text x="240" y="283" text-anchor="middle" class="L">Ukrainian adds VOCATIVE case — preserved from Proto-Slavic!</text>
<text x="240" y="294" text-anchor="middle" class="L">Nominative: brat "brother"  •  Vocative: bratu! "O brother!"</text>
<text x="240" y="305" text-anchor="middle" class="Ls">Used when directly addressing a person or personified object</text>
<text x="240" y="316" text-anchor="middle" class="Ls">Russian lost vocative (only archaic: "Gospodi!" = "O Lord!")</text>
<line x1="20" y1="324" x2="460" y2="324" stroke="#555" stroke-width="0.5"/>
<text x="240" y="332" text-anchor="middle" class="H">UKRAINIAN GENDER &amp; AGREEMENT</text>
<text x="240" y="343" text-anchor="middle" class="L">Same three genders as Russian: masculine / feminine / neuter</text>
<text x="240" y="354" text-anchor="middle" class="Ls">But some nouns differ in gender between the two languages!</text>
<text x="240" y="365" text-anchor="middle" class="Ls">Russian: stepʼ (FEM) • Ukrainian: step (MASC) "steppe"</text>
<line x1="20" y1="373" x2="460" y2="373" stroke="#555" stroke-width="0.5"/>
<text x="240" y="381" text-anchor="middle" class="H">UKRAINIAN ASPECT SYSTEM</text>
<text x="240" y="392" text-anchor="middle" class="L">Same imperfective/perfective distinction as Russian</text>
<text x="240" y="403" text-anchor="middle" class="Ls">But Ukrainian uses -uvaty suffix more broadly for imperfective</text>
<text x="240" y="414" text-anchor="middle" class="Ls">Some verbs differ: Ukr. kazaty / Rus. govoritʼ "to say"</text>
<line x1="20" y1="422" x2="460" y2="422" stroke="#555" stroke-width="0.5"/>
<text x="240" y="430" text-anchor="middle" class="H">GRAMMATICAL PARALLELS</text>
<text x="240" y="441" text-anchor="middle" class="L">Both: case-marked nouns • grammatical gender • aspect pairs</text>
<text x="240" y="452" text-anchor="middle" class="L">Both: free word order (cases convey grammatical function)</text>
<text x="240" y="463" text-anchor="middle" class="Ls">Ukrainian extra: 7th vocative case (more archaic)</text>
<text x="240" y="474" text-anchor="middle" class="Ls">Ukrainian extra: /h/ vs. Russian /g/ — structural branching point</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 24c ALT  ·  RUSSIAN / UKRAINIAN  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
