<text x="240" y="32" text-anchor="middle" class="T" >HINDI — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 25C OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— SOV LANGUAGE — POSTPOSITIONS, SPLIT ERGATIVITY —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Hindi is SOV (Subject–Object–Verb). Verb comes last. Postpositions follow their noun phrases.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >Two genders: masculine and feminine. No neuter. Adjectives agree in gender and number.</text>
<text x="240" y="98" text-anchor="middle" class="Ls" >मैं सेब खाता हूँ। (main seb khaata hun.) "I eat an apple." — SBJ OBJ VERB-M-PRES AUX</text>
<line x1="20" y1="106" x2="460" y2="106" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H" >— POSTPOSITIONS — CASE MARKERS —</text>
<text x="240" y="126" text-anchor="middle" class="Ls" >Hindi uses POSTPOSITIONS (after noun) not prepositions. They take the oblique case of the noun.</text>
<text x="90" y="135" text-anchor="middle" class="Lds" >में / mein</text>
<text x="200" y="135" text-anchor="middle" class="Lx" >in, inside</text>
<text x="370" y="135" text-anchor="middle" class="Lx" >घर में ghar mein "in the house"</text>
<text x="90" y="147" text-anchor="middle" class="Lds" >पर / par</text>
<text x="200" y="147" text-anchor="middle" class="Lx" >on, at, upon</text>
<text x="370" y="147" text-anchor="middle" class="Lx" >मेज़ पर mez par "on the table"</text>
<text x="90" y="159" text-anchor="middle" class="Lds" >को / ko</text>
<text x="200" y="159" text-anchor="middle" class="Lx" >to, for (dative/acc)</text>
<text x="370" y="159" text-anchor="middle" class="Lx" >मुझको mujhko "to me"</text>
<text x="90" y="171" text-anchor="middle" class="Lds" >का/के/की / ka</text>
<text x="200" y="171" text-anchor="middle" class="Lx" >of, possessive</text>
<text x="370" y="171" text-anchor="middle" class="Lx" >राम का घर Ram ka ghar "Ram's house"</text>
<text x="90" y="183" text-anchor="middle" class="Lds" >से / se</text>
<text x="200" y="183" text-anchor="middle" class="Lx" >from, by, with</text>
<text x="370" y="183" text-anchor="middle" class="Lx" >दिल्ली से Dilli se "from Delhi"</text>
<text x="90" y="195" text-anchor="middle" class="Lds" >के लिए / ke liye</text>
<text x="200" y="195" text-anchor="middle" class="Lx" >for (purpose)</text>
<text x="370" y="195" text-anchor="middle" class="Lx" >तुम्हारे लिए tumhare liye "for you"</text>
<text x="90" y="207" text-anchor="middle" class="Lds" >के साथ / ke saath</text>
<text x="200" y="207" text-anchor="middle" class="Lx" >with, together with</text>
<text x="370" y="207" text-anchor="middle" class="Lx" >मेरे साथ mere saath "with me"</text>
<text x="90" y="219" text-anchor="middle" class="Lds" >तक / tak</text>
<text x="200" y="219" text-anchor="middle" class="Lx" >until, up to</text>
<text x="370" y="219" text-anchor="middle" class="Lx" >कल तक kal tak "until tomorrow"</text>
<line x1="20" y1="234" x2="460" y2="234" stroke="black" stroke-width="0.3"/>
<text x="240" y="243" text-anchor="middle" class="H" >— VERB CONJUGATION — करना "to do" (karna) —</text>
<text x="240" y="253" text-anchor="middle" class="Ls" >Hindi verbs agree with subject in gender, number, and person. Auxiliary verb है/हैं added for present.</text>
<text x="35" y="263" text-anchor="middle" class="Lx" >Subj</text>
<text x="75" y="263" text-anchor="middle" class="Lx" >Translit</text>
<text x="130" y="263" text-anchor="middle" class="Lx" >Person</text>
<text x="210" y="263" text-anchor="middle" class="Lds" >Verb form</text>
<text x="315" y="263" text-anchor="middle" class="Lx" >Translit</text>
