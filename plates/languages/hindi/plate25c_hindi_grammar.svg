<text x="330" y="338" text-anchor="middle" class="Lx" >karte hain</text>
<text x="430" y="338" text-anchor="start" class="Lx" >they do (masc)</text>
<text x="240" y="352" text-anchor="middle" class="Ls" >Past: simple past uses perfective participle — मैंने किया (maine kiya) "I did"</text>
<text x="240" y="361" text-anchor="middle" class="Ls" >Ergative: in perfective past, transitive subject takes ने (ne) — split ergativity</text>
<line x1="20" y1="369" x2="460" y2="369" stroke="black" stroke-width="0.3"/>
