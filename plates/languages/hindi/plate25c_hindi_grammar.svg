<line x1="20" y1="522" x2="460" y2="522" stroke="black" stroke-width="0.3"/>
<text x="240" y="531" text-anchor="middle" class="H" >— HINDI AND URDU — ONE SPOKEN LANGUAGE, TWO SCRIPTS —</text>
<text x="240" y="542" text-anchor="middle" class="L" >Spoken Hindi and Urdu are mutually intelligible — the same colloquial language (Hindustani).</text>
<text x="240" y="552" text-anchor="middle" class="Ls" >They diverge in formal registers: Hindi draws vocabulary from Sanskrit; Urdu from Persian and Arabic.</text>
<text x="240" y="561" text-anchor="middle" class="Ls" >Hindi is written in Devanagari (left to right). Urdu is written in Nastaliq (Perso-Arabic, right to left).</text>
<text x="240" y="570" text-anchor="middle" class="Ls" >Together, Hindi and Urdu represent the 3rd most spoken language group in the world: ~700 million speakers.</text>
