<text x="210" y="327" text-anchor="middle" class="Lds" >करते हैं</text>
<text x="330" y="327" text-anchor="middle" class="Lx" >karte hain</text>
<text x="430" y="327" text-anchor="start" class="Lx" >we do (masc)</text>
