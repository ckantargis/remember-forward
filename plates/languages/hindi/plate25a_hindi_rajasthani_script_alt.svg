<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<style>
  text { font-family: Georgia, serif; }
  .T{font-size:11px;font-weight:bold;letter-spacing:1.5px}
  .S{font-size:6.5px;letter-spacing:1.5px}
  .H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px}
  .Hb{font-size:7px;font-weight:bold;letter-spacing:2px}
  .L{font-size:7px} .Ls{font-size:6px} .Lx{font-size:5.5px}
  .Ld{font-size:13px}
  .M{font-size:6px;letter-spacing:1px}
  .F{font-size:7px;font-style:italic}
  .Fb{font-size:7.5px;font-weight:bold}
</style>
<rect x="0" y="0" width="480" height="680" fill="white"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="30" text-anchor="middle" class="T">HINDI + RAJASTHANI — SCRIPT · WRITING SYSTEMS</text>
<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 25A · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— HINDI — DEVANAGARI SCRIPT · AN ABUGIDA —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Devanagari: abugida script. Each consonant carries inherent /a/ vowel. Diacritics add other vowels.</text>
<text x="240" y="82" text-anchor="middle" class="Lx">47 primary characters (14 vowels, 33 consonants). Written left to right with top “headstroke” line.</text>
<text x="240" y="91" text-anchor="middle" class="Lx">Used for Sanskrit, Hindi, Marathi, Nepali, Maithili, and other South Asian languages.</text>
<line x1="20" y1="99" x2="460" y2="99" stroke="black" stroke-width="0.3"/>
<text x="240" y="107" text-anchor="middle" class="H">— DEVANAGARI VOWELS — 14 INDEPENDENT FORMS —</text>
<text x="55" y="117" text-anchor="middle" class="Ld">अ</text>
<text x="55" y="126" text-anchor="middle" class="Lx">a</text>
<text x="160" y="117" text-anchor="middle" class="Ld">आ</text>
<text x="160" y="126" text-anchor="middle" class="Lx">ā</text>
<text x="265" y="117" text-anchor="middle" class="Ld">इ</text>
<text x="265" y="126" text-anchor="middle" class="Lx">i</text>
<text x="370" y="117" text-anchor="middle" class="Ld">ई</text>
<text x="370" y="126" text-anchor="middle" class="Lx">ī</text>
<text x="55" y="131" text-anchor="middle" class="Ld">उ</text>
<text x="55" y="140" text-anchor="middle" class="Lx">u</text>
<text x="160" y="131" text-anchor="middle" class="Ld">ऊ</text>
<text x="160" y="140" text-anchor="middle" class="Lx">ū</text>
<text x="265" y="131" text-anchor="middle" class="Ld">ऋ</text>
<text x="265" y="140" text-anchor="middle" class="Lx">r̥</text>
<text x="370" y="131" text-anchor="middle" class="Ld">ए</text>
<text x="370" y="140" text-anchor="middle" class="Lx">e</text>
<text x="55" y="145" text-anchor="middle" class="Ld">ऐ</text>
<text x="55" y="154" text-anchor="middle" class="Lx">ai</text>
<text x="160" y="145" text-anchor="middle" class="Ld">ओ</text>
<text x="160" y="154" text-anchor="middle" class="Lx">o</text>
<text x="265" y="145" text-anchor="middle" class="Ld">औ</text>
<text x="265" y="154" text-anchor="middle" class="Lx">au</text>
<text x="370" y="145" text-anchor="middle" class="Ld">ं</text>
<text x="370" y="154" text-anchor="middle" class="Lx">M (anusvara)</text>
<text x="55" y="159" text-anchor="middle" class="Ld">ः</text>
<text x="55" y="168" text-anchor="middle" class="Lx">H (visarga)</text>
<text x="160" y="159" text-anchor="middle" class="Ld">ँ</text>
<text x="160" y="168" text-anchor="middle" class="Lx">ṽ (chandrabindu)</text>
<line x1="20" y1="167" x2="460" y2="167" stroke="black" stroke-width="0.3"/>
<text x="240" y="175" text-anchor="middle" class="H">— DEVANAGARI CONSONANTS — 5 SERIES + OTHERS —</text>
<text x="240" y="185" text-anchor="middle" class="Lx">Sanskrit-derived 5×5 grid: velar/palatal/retroflex/dental/labial × vl/asp/vd/asp-vd/nasal.</text>
<text x="240" y="195" text-anchor="middle" class="Ld">क ख ग घ ङ  (ka kha ga gha ṅa — velars)</text>
<text x="240" y="206" text-anchor="middle" class="Ld">च छ ज झ ञ  (ca cha ja jha ña — palatals)</text>
<text x="240" y="217" text-anchor="middle" class="Ld">ट ठ ड ढ ण  (ṭa ṭha ḍa ḍha ṇa — retroflexes)</text>
<text x="240" y="228" text-anchor="middle" class="Ld">त थ द ध न  (ta tha da dha na — dentals)</text>
<text x="240" y="239" text-anchor="middle" class="Ld">प फ ब भ म  (pa pha ba bha ma — labials)</text>
<text x="240" y="250" text-anchor="middle" class="Ls">य र ल व श ष स ह  (ya ra la va sha ṣa sa ha)</text>
<line x1="20" y1="265" x2="460" y2="265" stroke="black" stroke-width="0.3"/>
<text x="240" y="273" text-anchor="middle" class="H">— VOWEL MATRAS — CONSONANT-ATTACHED FORMS —</text>
<text x="240" y="283" text-anchor="middle" class="Ls">When vowels follow consonants, they use matra (diacritic) forms: क + ा = का (kaa)</text>
<text x="50" y="295" text-anchor="middle" class="Ld">का</text>
<text x="50" y="305" text-anchor="middle" class="Lx">kā</text>
<text x="98" y="295" text-anchor="middle" class="Ld">कि</text>
<text x="98" y="305" text-anchor="middle" class="Lx">ki</text>
<text x="146" y="295" text-anchor="middle" class="Ld">की</text>
<text x="146" y="305" text-anchor="middle" class="Lx">kī</text>
<text x="194" y="295" text-anchor="middle" class="Ld">कु</text>
<text x="194" y="305" text-anchor="middle" class="Lx">ku</text>
<text x="242" y="295" text-anchor="middle" class="Ld">कू</text>
<text x="242" y="305" text-anchor="middle" class="Lx">kū</text>
<text x="290" y="295" text-anchor="middle" class="Ld">के</text>
<text x="290" y="305" text-anchor="middle" class="Lx">ke</text>
<text x="338" y="295" text-anchor="middle" class="Ld">कै</text>
<text x="338" y="305" text-anchor="middle" class="Lx">kai</text>
<text x="386" y="295" text-anchor="middle" class="Ld">को</text>
<text x="386" y="305" text-anchor="middle" class="Lx">ko</text>
<text x="434" y="295" text-anchor="middle" class="Ld">कौ</text>
<text x="434" y="305" text-anchor="middle" class="Lx">kau</text>
<line x1="20" y1="315" x2="460" y2="315" stroke="black" stroke-width="1.5"/>
<rect x="20" y="318" width="440" height="14" fill="black"/>
<text x="240" y="328" text-anchor="middle" class="Hb" fill="white">SECONDARY — RAJASTHANI (राजस्थानी) — SCRIPT · WRITING</text>
<line x1="20" y1="332" x2="460" y2="332" stroke="black" stroke-width="0.3"/>
<text x="240" y="341" text-anchor="middle" class="H">— RAJASTHANI — DEVANAGARI + MAHAJANI SCRIPTS —</text>
<text x="240" y="351" text-anchor="middle" class="Ls">Rajasthani is primarily written in Devanagari (same as Hindi). Fully mutually intelligible in writing.</text>
<text x="240" y="360" text-anchor="middle" class="Lx">Historical script: Mahajani — a merchant script used for trade records in Rajasthan/Marwar (now rare).</text>
<text x="240" y="369" text-anchor="middle" class="Lx">Also written in Modi script (Maharashtra/Rajasthan), Kaithi, and Arabic-derived scripts by Muslim communities.</text>
<line x1="20" y1="377" x2="460" y2="377" stroke="black" stroke-width="0.3"/>
<text x="240" y="385" text-anchor="middle" class="H">— RAJASTHANI SAMPLE — DEVANAGARI —</text>
<text x="60" y="395" text-anchor="middle" class="Ld">राजस्थान</text>
<text x="145" y="395" text-anchor="middle" class="Ls">Rajasthan</text>
<text x="340" y="395" text-anchor="middle" class="Lx">Land of Kings (rāj + sthān)</text>
<text x="60" y="405" text-anchor="middle" class="Ld">पाणी</text>
<text x="145" y="405" text-anchor="middle" class="Ls">paṇī</text>
<text x="340" y="405" text-anchor="middle" class="Lx">water (Hindi: paani)</text>
<text x="60" y="415" text-anchor="middle" class="Ld">आग</text>
<text x="145" y="415" text-anchor="middle" class="Ls">aag</text>
<text x="340" y="415" text-anchor="middle" class="Lx">fire (Hindi: aag — same)</text>
<text x="60" y="425" text-anchor="middle" class="Ld">धरती</text>
<text x="145" y="425" text-anchor="middle" class="Ls">dharati</text>
<text x="340" y="425" text-anchor="middle" class="Lx">earth (Hindi: dharti)</text>
<text x="60" y="435" text-anchor="middle" class="Ld">मानखो</text>
<text x="145" y="435" text-anchor="middle" class="Ls">mānakho</text>
<text x="340" y="435" text-anchor="middle" class="Lx">person (Hindi: insaan/ādmī)</text>
<line x1="20" y1="452" x2="460" y2="452" stroke="black" stroke-width="0.3"/>
<text x="240" y="460" text-anchor="middle" class="H">— SCRIPT BRIDGE — SHARED DEVANAGARI, DISTINCT LANGUAGE —</text>
<text x="240" y="470" text-anchor="middle" class="Ls">Both Hindi and Rajasthani use Devanagari. A Rajasthani speaker can read Hindi script and vice versa.</text>
<text x="240" y="479" text-anchor="middle" class="Lx">Distinction lies in phonology (breathy vowels, tones in Marwari dialect), vocabulary (Rajput/Persian blend).</text>
<text x="240" y="488" text-anchor="middle" class="Lx">Rajasthani has no official status in India — classified as a Hindi dialect officially, but linguists count it separately.</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M">PLATE 25A ALT · Hindi / Rajasthani · SCRIPT · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
