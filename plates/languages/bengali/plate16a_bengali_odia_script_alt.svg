<text x="240" y="30" text-anchor="middle" class="T">BENGALI + ODIA — SCRIPT · WRITING SYSTEMS</text>
<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 16A · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— BENGALI — BANGLA SCRIPT · ABUGIDA · LEFT TO RIGHT —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Bengali (Bangla) script: derived from Brahmi via Eastern Nagari. ~50 letters. Each consonant carries inherent /ɔ/ vowel.</text>
<text x="240" y="82" text-anchor="middle" class="Lx">Vowel signs (matra) modify the inherent vowel. Consonant clusters join into conjuncts.</text>
<line x1="20" y1="89" x2="460" y2="89" stroke="black" stroke-width="0.3"/>
