<text x="240" y="218" text-anchor="middle" class="H">— SCRIPT NOTES —</text>
<text x="240" y="228" text-anchor="middle" class="Ls">Script also used for Assamese and several other northeast Indian languages.</text>
<text x="240" y="237" text-anchor="middle" class="Lx">Conjuncts: ক্ষ (kṣa), জ্ঞ (jña) — joined consonants common in Sanskritic words.</text>
<text x="240" y="246" text-anchor="middle" class="Lx">~230M speakers worldwide (Bangladesh + West Bengal + diaspora). Official script of Bangladesh.</text>
<line x1="20" y1="257" x2="460" y2="257" stroke="black" stroke-width="1.5"/>
<rect x="20" y="260" width="440" height="14" fill="black"/>
<text x="240" y="270" text-anchor="middle" class="Hb" fill="white">ODIA (ଓଡ଼ିଆ) · SCRIPT · ABUGIDA · LEFT TO RIGHT</text>
<line x1="20" y1="274" x2="460" y2="274" stroke="black" stroke-width="0.3"/>
<text x="240" y="288" text-anchor="middle" class="Ls">Odia script: also Brahmi-derived, ~11th century. Distinctive rounded letter-tops (influence of palm-leaf manuscripts).</text>
<text x="240" y="297" text-anchor="middle" class="Lx">Same abugida logic as Bengali: consonant + inherent /a/ vowel, modified by matra signs.</text>
<text x="240" y="306" text-anchor="middle" class="Lx">~40M speakers in Odisha state. Classical language status in India (2014). One of 22 Scheduled Languages.</text>
<line x1="20" y1="313" x2="460" y2="313" stroke="black" stroke-width="0.3"/>
