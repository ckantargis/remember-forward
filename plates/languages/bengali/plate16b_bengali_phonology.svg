<svg viewBox="0 0 480 680" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  text{font-family:Georgia,serif;fill:#000;}
  .T{font-size:12px;font-weight:bold;letter-spacing:2px;}
  .S{font-size:7px;letter-spacing:1.5px;}
  .H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
  .L{font-size:7px;}
  .Ls{font-size:6px;}
  .Lx{font-size:5.5px;}
  .Lb{font-size:14px;}
  .Lbm{font-size:11px;}
  .Lbs{font-size:9px;}
  .M{font-size:6px;letter-spacing:1px;}
  .F{font-size:7px;font-style:italic;}
  .Fb{font-size:7.5px;font-weight:bold;}
</style></defs>
<rect x="6" y="6" width="468" height="668" rx="4" fill="none" stroke="#000" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" rx="2" fill="none" stroke="#000" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">PLATE 16B  ·  BENGALI  ·  PHONOLOGY</text>
<line x1="18" y1="39" x2="462" y2="39" stroke="#000" stroke-width="0.75"/>
<text x="240" y="50" text-anchor="middle" class="S">7 oral vowels · 4-way stop contrast · aspiration · retroflex series · no vowel length · initial stress</text>
<line x1="18" y1="56" x2="462" y2="56" stroke="#000" stroke-width="0.5"/>
<text x="240" y="67" text-anchor="middle" class="H">— · —  BENGALI  ·  SOUNDS THAT SHAPED A CIVILIZATION  — · —</text>
<line x1="22" y1="71" x2="458" y2="71" stroke="#000" stroke-width="0.3"/>
<text x="240" y="79" text-anchor="middle" class="Lx">Bengali has 7 phonemic oral vowels and ~29 consonants  ·  read left to right</text>
<text x="240" y="88" text-anchor="middle" class="Lx">key feature: 4-way stop contrast — voiceless/voiced × unaspirated/aspirated — rare among world languages</text>
<text x="240" y="97" text-anchor="middle" class="Lx">retroflex consonants: tongue tip curled back to hard palate  ·  5 retroflex sounds vs 5 dental sounds</text>
<text x="240" y="106" text-anchor="middle" class="Lx">no phonemic tone  ·  primary stress always on first syllable  ·  trochaic rhythm</text>
<line x1="22" y1="110" x2="458" y2="110" stroke="#000" stroke-width="0.5"/>
<text x="240" y="117" text-anchor="middle" class="H">— · —  VOWEL SYSTEM  ·  7 ORAL VOWELS  +  2 DIPHTHONGS  — · —</text>
<line x1="22" y1="121" x2="458" y2="121" stroke="#000" stroke-width="0.3"/>
<text x="240" y="129" text-anchor="middle" class="Lx">vowel length NOT phonemic  ·  ই/ঈ = same /i/  ·  উ/ঊ = same /u/  ·  distinction is spelling-only (Sanskrit heritage)</text>
<rect x="24" y="134" width="48" height="44" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="48" y="150" text-anchor="middle" class="Lb">অ</text>
<text x="48" y="161" text-anchor="middle" class="Lx">/ɔ/</text>
<text x="48" y="169" text-anchor="middle" class="Lx">mid-back</text>
<text x="48" y="177" text-anchor="middle" class="Lx">unrounded</text>
<rect x="72" y="134" width="48" height="44" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="96" y="150" text-anchor="middle" class="Lb">আ</text>
<text x="96" y="161" text-anchor="middle" class="Lx">/a/</text>
<text x="96" y="169" text-anchor="middle" class="Lx">open</text>
<text x="96" y="177" text-anchor="middle" class="Lx">front</text>
<rect x="120" y="134" width="48" height="44" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="144" y="150" text-anchor="middle" class="Lb">ই/ঈ</text>
<text x="144" y="161" text-anchor="middle" class="Lx">/i/</text>
<text x="144" y="169" text-anchor="middle" class="Lx">close</text>
<text x="144" y="177" text-anchor="middle" class="Lx">front</text>
<rect x="168" y="134" width="48" height="44" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="192" y="150" text-anchor="middle" class="Lb">উ/ঊ</text>
<text x="192" y="161" text-anchor="middle" class="Lx">/u/</text>
<text x="192" y="169" text-anchor="middle" class="Lx">close</text>
<text x="192" y="177" text-anchor="middle" class="Lx">back</text>
<rect x="216" y="134" width="48" height="44" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="240" y="150" text-anchor="middle" class="Lb">এ</text>
<text x="240" y="161" text-anchor="middle" class="Lx">/e/</text>
<text x="240" y="169" text-anchor="middle" class="Lx">close-mid</text>
<text x="240" y="177" text-anchor="middle" class="Lx">front</text>
<rect x="264" y="134" width="48" height="44" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="288" y="150" text-anchor="middle" class="Lb">এ</text>
<text x="288" y="161" text-anchor="middle" class="Lx">/ɛ/</text>
<text x="288" y="169" text-anchor="middle" class="Lx">open-mid</text>
<text x="288" y="177" text-anchor="middle" class="Lx">(before nasal)</text>
<rect x="312" y="134" width="48" height="44" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="336" y="150" text-anchor="middle" class="Lb">ও</text>
<text x="336" y="161" text-anchor="middle" class="Lx">/o/</text>
<text x="336" y="169" text-anchor="middle" class="Lx">close-mid</text>
<text x="336" y="177" text-anchor="middle" class="Lx">back</text>
<rect x="360" y="134" width="48" height="44" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="384" y="150" text-anchor="middle" class="Lb">ঐ</text>
<text x="384" y="161" text-anchor="middle" class="Lx">/oi̯/</text>
<text x="384" y="169" text-anchor="middle" class="Lx">diphthong</text>
<rect x="408" y="134" width="48" height="44" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="432" y="150" text-anchor="middle" class="Lb">ঔ</text>
<text x="432" y="161" text-anchor="middle" class="Lx">/ou̯/</text>
<text x="432" y="169" text-anchor="middle" class="Lx">diphthong</text>
<text x="240" y="184" text-anchor="middle" class="Lx">Note: /ɛ/ and /e/ are allophones in complementary distribution  ·  অ (inherent /ɔ/) is the most common vowel</text>
<line x1="22" y1="189" x2="458" y2="189" stroke="#000" stroke-width="0.5"/>
<text x="240" y="195" text-anchor="middle" class="H">— · —  FOUR-WAY STOP CONTRAST  ·  THE DEFINING FEATURE OF INDO-ARYAN  — · —</text>
<line x1="22" y1="199" x2="458" y2="199" stroke="#000" stroke-width="0.3"/>
<text x="240" y="206" text-anchor="middle" class="Lx">Bengali distinguishes FOUR types of stop at each place of articulation — this is extremely rare globally</text>
<text x="240" y="214" text-anchor="middle" class="Lx">voiceless unaspirated  ·  voiceless aspirated  ·  voiced unaspirated  ·  voiced aspirated</text>
<rect x="22" y="220" width="101" height="48" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="72" y="238" text-anchor="middle" class="Lb">ক</text>
<text x="72" y="249" text-anchor="middle" class="Ls">/k/</text>
<text x="72" y="257" text-anchor="middle" class="Lx">voiceless</text>
<text x="72" y="265" text-anchor="middle" class="Lx">unasp.</text>
<rect x="125" y="220" width="101" height="48" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="175" y="238" text-anchor="middle" class="Lb">খ</text>
<text x="175" y="249" text-anchor="middle" class="Ls">/kʰ/</text>
<text x="175" y="257" text-anchor="middle" class="Lx">voiceless</text>
<text x="175" y="265" text-anchor="middle" class="Lx">asp.</text>
<rect x="228" y="220" width="101" height="48" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="278" y="238" text-anchor="middle" class="Lb">গ</text>
<text x="278" y="249" text-anchor="middle" class="Ls">/ɡ/</text>
<text x="278" y="257" text-anchor="middle" class="Lx">voiced</text>
<text x="278" y="265" text-anchor="middle" class="Lx">unasp.</text>
<rect x="331" y="220" width="101" height="48" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="381" y="238" text-anchor="middle" class="Lb">ঘ</text>
<text x="381" y="249" text-anchor="middle" class="Ls">/ɡʱ/</text>
<text x="381" y="257" text-anchor="middle" class="Lx">voiced</text>
<text x="381" y="265" text-anchor="middle" class="Lx">asp.</text>
<text x="240" y="274" text-anchor="middle" class="Lx">same 4-way pattern at 5 places of articulation: velar · palatal · retroflex · dental · labial = 20 stops total</text>
<line x1="22" y1="279" x2="458" y2="279" stroke="#000" stroke-width="0.5"/>
<text x="240" y="285" text-anchor="middle" class="H">— · —  FULL STOP GRID  ·  5 PLACES × 5 MANNER ROWS  — · —</text>
<line x1="22" y1="289" x2="458" y2="289" stroke="#000" stroke-width="0.3"/>
<rect x="22" y="294" width="42" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<rect x="64" y="294" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="105" y="306" text-anchor="middle" class="Lx">VELAR</text>
<rect x="147" y="294" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="188" y="306" text-anchor="middle" class="Lx">PALATAL</text>
<rect x="230" y="294" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="271" y="306" text-anchor="middle" class="Lx">RETROFLEX</text>
<rect x="313" y="294" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="354" y="306" text-anchor="middle" class="Lx">DENTAL</text>
<rect x="396" y="294" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="437" y="306" text-anchor="middle" class="Lx">LABIAL</text>
<rect x="22" y="312" width="42" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="43" y="324" text-anchor="middle" class="Lx">vl. unasp.</text>
<rect x="64" y="312" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="105" y="324" text-anchor="middle" class="Lx">ক /k/</text>
<rect x="147" y="312" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="188" y="324" text-anchor="middle" class="Lx">চ /tʃ/</text>
<rect x="230" y="312" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="271" y="324" text-anchor="middle" class="Lx">ট /ʈ/</text>
<rect x="313" y="312" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="354" y="324" text-anchor="middle" class="Lx">ত /t̪/</text>
<rect x="396" y="312" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="437" y="324" text-anchor="middle" class="Lx">প /p/</text>
<rect x="22" y="330" width="42" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="43" y="342" text-anchor="middle" class="Lx">vl. asp.</text>
<rect x="64" y="330" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="105" y="342" text-anchor="middle" class="Lx">খ /kʰ/</text>
<rect x="147" y="330" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="188" y="342" text-anchor="middle" class="Lx">ছ /tʃʰ/</text>
<rect x="230" y="330" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="271" y="342" text-anchor="middle" class="Lx">ঠ /ʈʰ/</text>
<rect x="313" y="330" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="354" y="342" text-anchor="middle" class="Lx">থ /t̪ʰ/</text>
<rect x="396" y="330" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="437" y="342" text-anchor="middle" class="Lx">ফ /pʰ/</text>
<rect x="22" y="348" width="42" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="43" y="360" text-anchor="middle" class="Lx">vd. unasp.</text>
<rect x="64" y="348" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="105" y="360" text-anchor="middle" class="Lx">গ /ɡ/</text>
<rect x="147" y="348" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="188" y="360" text-anchor="middle" class="Lx">জ /dʒ/</text>
<rect x="230" y="348" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="271" y="360" text-anchor="middle" class="Lx">ড /ɖ/</text>
<rect x="313" y="348" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="354" y="360" text-anchor="middle" class="Lx">দ /d̪/</text>
<rect x="396" y="348" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="437" y="360" text-anchor="middle" class="Lx">ব /b/</text>
<rect x="22" y="366" width="42" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="43" y="378" text-anchor="middle" class="Lx">vd. asp.</text>
<rect x="64" y="366" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="105" y="378" text-anchor="middle" class="Lx">ঘ /ɡʱ/</text>
<rect x="147" y="366" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="188" y="378" text-anchor="middle" class="Lx">ঝ /dʒʱ/</text>
<rect x="230" y="366" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="271" y="378" text-anchor="middle" class="Lx">ঢ /ɖʱ/</text>
<rect x="313" y="366" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="354" y="378" text-anchor="middle" class="Lx">ধ /d̪ʱ/</text>
<rect x="396" y="366" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="437" y="378" text-anchor="middle" class="Lx">ভ /bʱ/</text>
<rect x="22" y="384" width="42" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="43" y="396" text-anchor="middle" class="Lx">nasal</text>
<rect x="64" y="384" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="105" y="396" text-anchor="middle" class="Lx">ঙ /ŋ/</text>
<rect x="147" y="384" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="188" y="396" text-anchor="middle" class="Lx">ঞ /n/</text>
<rect x="230" y="384" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="271" y="396" text-anchor="middle" class="Lx">ণ /n/</text>
<rect x="313" y="384" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="354" y="396" text-anchor="middle" class="Lx">ন /n/</text>
<rect x="396" y="384" width="83" height="18" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="437" y="396" text-anchor="middle" class="Lx">ম /m/</text>
<line x1="22" y1="402" x2="458" y2="402" stroke="#000" stroke-width="0.5"/>
<text x="240" y="408" text-anchor="middle" class="H">— · —  RETROFLEX VS DENTAL  ·  TONGUE POSITION CHANGES MEANING  — · —</text>
<line x1="22" y1="412" x2="458" y2="412" stroke="#000" stroke-width="0.3"/>
<text x="240" y="419" text-anchor="middle" class="Lx">retroflex: tongue tip curled back to hard palate  ·  dental: tongue tip at upper teeth</text>
<rect x="22" y="428" width="108" height="42" fill="none" stroke="#000" stroke-width="0.8"/>
<line x1="76" y1="428" x2="76" y2="470" stroke="#000" stroke-width="0.4"/>
<text x="49" y="441" text-anchor="middle" class="Lx">ট /ṭ/</text>
<text x="49" y="451" text-anchor="middle" class="Lx">retroflex stop</text>
<text x="103" y="441" text-anchor="middle" class="Lx">ত /t/</text>
<text x="103" y="451" text-anchor="middle" class="Lx">dental stop</text>
<rect x="131" y="428" width="108" height="42" fill="none" stroke="#000" stroke-width="0.8"/>
<line x1="185" y1="428" x2="185" y2="470" stroke="#000" stroke-width="0.4"/>
<text x="158" y="441" text-anchor="middle" class="Lx">ড /ḍ/</text>
<text x="158" y="451" text-anchor="middle" class="Lx">retroflex D</text>
<text x="212" y="441" text-anchor="middle" class="Lx">দ /d/</text>
<text x="212" y="451" text-anchor="middle" class="Lx">dental d</text>
<rect x="240" y="428" width="108" height="42" fill="none" stroke="#000" stroke-width="0.8"/>
<line x1="294" y1="428" x2="294" y2="470" stroke="#000" stroke-width="0.4"/>
<text x="267" y="441" text-anchor="middle" class="Lx">ণ /n/</text>
<text x="267" y="451" text-anchor="middle" class="Lx">retrofl. nasal</text>
<text x="321" y="441" text-anchor="middle" class="Lx">ন /n/</text>
<text x="321" y="451" text-anchor="middle" class="Lx">dental nasal</text>
<rect x="349" y="428" width="108" height="42" fill="none" stroke="#000" stroke-width="0.8"/>
<line x1="403" y1="428" x2="403" y2="470" stroke="#000" stroke-width="0.4"/>
<text x="376" y="441" text-anchor="middle" class="Lx">ড় /ṝ/</text>
<text x="376" y="451" text-anchor="middle" class="Lx">retrofl. flap</text>
<text x="430" y="441" text-anchor="middle" class="Lx">র /r/</text>
<text x="430" y="451" text-anchor="middle" class="Lx">dental trill</text>
<line x1="22" y1="474" x2="458" y2="474" stroke="#000" stroke-width="0.5"/>
<text x="240" y="480" text-anchor="middle" class="H">— · —  SIBILANT MERGER  ·  AND  ·  STRESS  — · —</text>
<line x1="22" y1="484" x2="458" y2="484" stroke="#000" stroke-width="0.3"/>
<text x="240" y="491" text-anchor="middle" class="Lx">শ ষ স — three sibilant letters all merge to /ʃ/ in modern spoken Bengali  ·  distinction is spelling-only</text>
<text x="240" y="499" text-anchor="middle" class="Lx">chandrabindu ঁ marks nasalization of a vowel  ·  nasalized vowels are phonemic: ও /o/ vs ওঁ /õ/</text>
<text x="240" y="507" text-anchor="middle" class="Lx">primary stress always on the FIRST syllable  ·  বাংলা = BANG-la  ·  মানুষ = MA-nush  ·  ভবিষ্যৎ = BHO-bi-shot</text>
<line x1="18" y1="615" x2="462" y2="615" stroke="#000" stroke-width="0.5"/>
<text x="240" y="624" text-anchor="middle" class="M">REMEMBER FORWARD · THE PATIENT MESSAGE · CC BY-SA 4.0 · rememberforward.org</text>
<line x1="18" y1="630" x2="462" y2="630" stroke="#000" stroke-width="1"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>