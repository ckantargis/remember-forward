<line x1="305" y1="137" x2="323" y2="137" stroke="#000" stroke-width="0.7"/>
<polygon points="323,135 328,137 323,139" fill="#000"/>
<rect x="328" y="126" width="110" height="22" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="383" y="137" text-anchor="middle" class="Ls">VERB  ·  ক্রিয়া</text>
<text x="240" y="158" text-anchor="middle" class="Lbm">আমি ভাত খাই  ·  ami bhat khai  ·  I rice eat  =  I eat rice</text>
<text x="240" y="169" text-anchor="middle" class="Lx">সে বাড়ি যায়  ·  she bari jay  ·  s/he house goes  =  s/he goes home</text>
<line x1="22" y1="175" x2="458" y2="175" stroke="#000" stroke-width="0.5"/>
<text x="240" y="181" text-anchor="middle" class="H">— · —  VERB MORPHOLOGY  ·  ROOT + ASPECT + TENSE + PERSON  — · —</text>
<line x1="22" y1="185" x2="458" y2="185" stroke="#000" stroke-width="0.3"/>
<text x="240" y="192" text-anchor="middle" class="Lx">template: VERB ROOT  +  aspect marker  +  tense marker  +  person/honor suffix</text>
<text x="240" y="200" text-anchor="middle" class="Lx">aspects: simple (no mark) · continuous -চ্ছ/-চ্ছি · perfect -য়েছ/-য়েছি</text>
<text x="22" y="207" text-anchor="start" class="Lbm">খাওয়া (kha-oẏa) = to eat  —  1st person forms:</text>
