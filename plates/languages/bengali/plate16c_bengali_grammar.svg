<text x="240" y="437" text-anchor="middle" class="H">— · —  CASE ENDINGS  ·  POSTPOSITIONS  ·  NO PREPOSITIONS IN BENGALI  — · —</text>
<line x1="22" y1="441" x2="458" y2="441" stroke="#000" stroke-width="0.3"/>
<text x="240" y="448" text-anchor="middle" class="Lx">বাড়ি-র (bari-r) = of the house  ·  আমা-কে (ama-ke) = to me  ·  ঘর-ে (ghor-e) = in the room  ·  কলম-ে (kolom-e) = by pen</text>
<text x="240" y="456" text-anchor="middle" class="Lx">genitive -এর (of/belonging to)  ·  objective -কে/-রে (to/for)  ·  locative -তে/-এ (in/at)  ·  postpositions: দ্বারা (by), জন্য (for), সাথে (with)</text>
<line x1="22" y1="466" x2="458" y2="466" stroke="#000" stroke-width="0.5"/>
<text x="240" y="472" text-anchor="middle" class="H">— · —  CORE VOCABULARY  ·  30 ESSENTIAL WORDS  — · —</text>
