<text x="240" y="32" text-anchor="middle" class="T">PLATE 16C  ·  BENGALI  ·  GRAMMAR AND VOCABULARY</text>
<line x1="18" y1="39" x2="462" y2="39" stroke="#000" stroke-width="0.75"/>
<text x="240" y="50" text-anchor="middle" class="S">SOV order · verb-final · postpositions · honorific levels · case endings · 30 core words</text>
<line x1="18" y1="56" x2="462" y2="56" stroke="#000" stroke-width="0.5"/>
<text x="240" y="67" text-anchor="middle" class="H">— · —  BENGALI GRAMMAR  ·  SOV  ·  VERB COMES LAST  — · —</text>
<line x1="22" y1="71" x2="458" y2="71" stroke="#000" stroke-width="0.3"/>
<text x="240" y="79" text-anchor="middle" class="Lx">Bengali is Subject-Object-Verb  ·  the verb always ends the clause</text>
<text x="240" y="88" text-anchor="middle" class="Lx">agglutinative: meaning built by chaining suffixes to roots  ·  highly inflected verbs</text>
<text x="240" y="97" text-anchor="middle" class="Lx">no grammatical gender for verbs  ·  postpositions (not prepositions)  ·  verb encodes person and honor</text>
<text x="240" y="106" text-anchor="middle" class="Lx">determiners -টা/-টি (singular 'the') and -গুলো (plural) follow the noun</text>
<line x1="22" y1="110" x2="458" y2="110" stroke="#000" stroke-width="0.5"/>
<text x="240" y="117" text-anchor="middle" class="H">— · —  WORD ORDER  ·  SUBJECT → OBJECT → VERB  — · —</text>
<line x1="22" y1="121" x2="458" y2="121" stroke="#000" stroke-width="0.3"/>
<rect x="22" y="126" width="130" height="22" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="87" y="137" text-anchor="middle" class="Ls">SUBJECT  ·  কর্তা</text>
