<line x1="22" y1="310" x2="458" y2="310" stroke="#000" stroke-width="0.5"/>
<text x="240" y="316" text-anchor="middle" class="H">— · —  HONORIFIC LEVELS  ·  5 FORMS  ·  VERB CONJUGATION CHANGES WITH EACH  — · —</text>
<line x1="22" y1="320" x2="458" y2="320" stroke="#000" stroke-width="0.3"/>
<text x="240" y="327" text-anchor="middle" class="Lx">Bengali has 5 distinct levels of address  ·  each changes the verb ending  ·  using wrong level is a social error</text>
