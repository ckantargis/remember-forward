<text x="240" y="262" text-anchor="middle" class="Ls">Odia is also SOV. Postpositions. Verb-final. Very similar structural grammar to Bengali.</text>
<text x="240" y="271" text-anchor="middle" class="Lx">Three grammatical numbers: singular, plural, honorific-plural. Second person honorific widespread.</text>
