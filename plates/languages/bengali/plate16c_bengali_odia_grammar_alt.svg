<text x="240" y="63" text-anchor="middle" class="H">— BENGALI — SOV · POSTPOSITIONS · ASPECT-HEAVY VERB SYSTEM —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Bengali is SOV. Postpositions follow their noun: ghor-e (house-in = in the house).</text>
<text x="240" y="82" text-anchor="middle" class="Lx">Verb agrees with person/formality, not gender. Three registers: formal, neutral, intimate.</text>
<text x="240" y="91" text-anchor="middle" class="Lx">Aspect: Bengali emphasizes perfect/imperfect aspect more than tense. "I have eaten" vs. "I am eating."</text>
<line x1="20" y1="99" x2="460" y2="99" stroke="black" stroke-width="0.3"/>
