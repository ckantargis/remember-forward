</style></defs><rect x="6" y="6" width="468" height="668" rx="4" fill="none" stroke="#000" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" rx="2" fill="none" stroke="#000" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">PLATE 15C  ·  SANSKRIT  ·  GRAMMAR AND VOCABULARY</text>
<line x1="18" y1="39" x2="462" y2="39" stroke="#000" stroke-width="0.75"/>
<text x="240" y="50" text-anchor="middle" class="S">8 cases · 3 genders · 3 numbers · verb system · compound words · Indo-European cognates</text>
<line x1="18" y1="56" x2="462" y2="56" stroke="#000" stroke-width="0.5"/>
<text x="240" y="67" text-anchor="middle" class="H">— · —  NOUN SYSTEM  ·  8 CASES  ·  3 GENDERS  ·  3 NUMBERS  — · —</text>
<line x1="22" y1="71" x2="458" y2="71" stroke="#000" stroke-width="0.3"/>
<text x="240" y="79" text-anchor="middle" class="Lx">Sanskrit nouns decline  ·  the ending carries all grammatical information</text>
<text x="240" y="88" text-anchor="middle" class="Lx">3 genders: masculine / feminine / neuter  ·  3 numbers: singular / dual / plural</text>
<rect x="22" y="92" width="108" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="76" y="101" text-anchor="middle" class="Lx">1 Nominative</text>
<text x="76" y="109" text-anchor="middle" class="Lx">subject  ·  deḥaḥ = god (subject)</text>
<rect x="133" y="92" width="108" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="187" y="101" text-anchor="middle" class="Lx">2 Accusative</text>
<text x="187" y="109" text-anchor="middle" class="Lx">direct object  ·  devam = god (object)</text>
<rect x="244" y="92" width="108" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="298" y="101" text-anchor="middle" class="Lx">3 Instrumental</text>
<text x="298" y="109" text-anchor="middle" class="Lx">by/with  ·  devena = by god</text>
<rect x="355" y="92" width="108" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="409" y="101" text-anchor="middle" class="Lx">4 Dative</text>
<text x="409" y="109" text-anchor="middle" class="Lx">for/to  ·  devāya = for god</text>
<rect x="22" y="117" width="108" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="76" y="126" text-anchor="middle" class="Lx">5 Ablative</text>
<text x="76" y="134" text-anchor="middle" class="Lx">from  ·  devāt = from god</text>
<rect x="133" y="117" width="108" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="187" y="126" text-anchor="middle" class="Lx">6 Genitive</text>
<text x="187" y="134" text-anchor="middle" class="Lx">of/belonging  ·  devasya = of god</text>
<rect x="244" y="117" width="108" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="298" y="126" text-anchor="middle" class="Lx">7 Locative</text>
<text x="298" y="134" text-anchor="middle" class="Lx">in/at  ·  deve = in god</text>
<rect x="355" y="117" width="108" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
<text x="409" y="126" text-anchor="middle" class="Lx">8 Vocative</text>
<text x="409" y="134" text-anchor="middle" class="Lx">O!/address  ·  deva! = O god!</text>
<line x1="22" y1="144" x2="458" y2="144" stroke="#000" stroke-width="0.5"/>
<text x="240" y="150" text-anchor="middle" class="H">— · —  THE VERB SYSTEM  ·  10 CLASSES  ·  ROOTS  — · —</text>
<line x1="22" y1="154" x2="458" y2="154" stroke="#000" stroke-width="0.3"/>
<text x="240" y="162" text-anchor="middle" class="Lx">Sanskrit verbs derive from roots (dhatu)  ·  root + class marker + personal ending</text>
<rect x="22" y="166" width="210" height="66" fill="none" stroke="#000" stroke-width="0.9"/>
<rect x="22" y="166" width="210" height="12" fill="none" stroke="#000" stroke-width="0.5"/>
<text x="127" y="175" text-anchor="middle" class="Lx">अस् (as) = to be  ·  present</text>
<text x="50" y="182" text-anchor="middle" class="Lds">अस्मि</text>
<text x="110" y="182" text-anchor="middle" class="Lx">asmi</text>
<text x="185" y="182" text-anchor="middle" class="Lx">I am</text>
<text x="50" y="190" text-anchor="middle" class="Lds">असि</text>
<text x="110" y="190" text-anchor="middle" class="Lx">asi</text>
<text x="185" y="190" text-anchor="middle" class="Lx">you are</text>
<text x="50" y="198" text-anchor="middle" class="Lds">अस्ति</text>
<text x="110" y="198" text-anchor="middle" class="Lx">asti</text>
<text x="185" y="198" text-anchor="middle" class="Lx">he/she/it is</text>
<text x="50" y="206" text-anchor="middle" class="Lds">स्मः</text>
<text x="110" y="206" text-anchor="middle" class="Lx">smaḥ</text>
<text x="185" y="206" text-anchor="middle" class="Lx">we are</text>
<text x="50" y="214" text-anchor="middle" class="Lds">स्थ</text>
<text x="110" y="214" text-anchor="middle" class="Lx">stha</text>
<text x="185" y="214" text-anchor="middle" class="Lx">you (pl) are</text>
<text x="50" y="222" text-anchor="middle" class="Lds">सन्ति</text>
<text x="110" y="222" text-anchor="middle" class="Lx">santi</text>
<text x="185" y="222" text-anchor="middle" class="Lx">they are</text>
<rect x="248" y="166" width="210" height="66" fill="none" stroke="#000" stroke-width="0.9"/>
<rect x="248" y="166" width="210" height="12" fill="none" stroke="#000" stroke-width="0.5"/>
<text x="353" y="175" text-anchor="middle" class="Lx">गम् (gam) = to go  ·  present</text>
<text x="275" y="182" text-anchor="middle" class="Lds">गच्छामि</text>
<text x="335" y="182" text-anchor="middle" class="Lx">gacchāmi</text>
<text x="415" y="182" text-anchor="middle" class="Lx">I go</text>
<text x="275" y="190" text-anchor="middle" class="Lds">गच्छसि</text>
<text x="335" y="190" text-anchor="middle" class="Lx">gacchasi</text>
<text x="415" y="190" text-anchor="middle" class="Lx">you go</text>
<text x="275" y="198" text-anchor="middle" class="Lds">गच्छति</text>
<text x="335" y="198" text-anchor="middle" class="Lx">gacchati</text>
<text x="415" y="198" text-anchor="middle" class="Lx">he/she goes</text>
<text x="275" y="206" text-anchor="middle" class="Lds">गच्छामः</text>
<text x="335" y="206" text-anchor="middle" class="Lx">gacchāmaḥ</text>
<text x="415" y="206" text-anchor="middle" class="Lx">we go</text>
<text x="275" y="214" text-anchor="middle" class="Lds">गच्छथ</text>
<text x="335" y="214" text-anchor="middle" class="Lx">gacchatha</text>
<text x="415" y="214" text-anchor="middle" class="Lx">you (pl) go</text>
<text x="275" y="222" text-anchor="middle" class="Lds">गच्छन्ति</text>
<text x="335" y="222" text-anchor="middle" class="Lx">gacchanti</text>
<text x="415" y="222" text-anchor="middle" class="Lx">they go</text>
<line x1="22" y1="238" x2="458" y2="238" stroke="#000" stroke-width="0.5"/>
<text x="240" y="244" text-anchor="middle" class="H">— · —  COMPOUND WORDS  ·  SAMASA  ·  THE POWER OF SANSKRIT  — · —</text>
<line x1="22" y1="248" x2="458" y2="248" stroke="#000" stroke-width="0.3"/>
<text x="240" y="256" text-anchor="middle" class="Lx">Sanskrit builds unlimited compound words  ·  one word can express a full English sentence</text>
<rect x="22" y="260" width="210" height="26" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="127" y="270" text-anchor="middle" class="Ldm">राजपुत्रः</text>
<text x="127" y="279" text-anchor="middle" class="Lx">rāja-putraḥ = king + son = prince</text>
<rect x="236" y="260" width="210" height="26" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="341" y="270" text-anchor="middle" class="Ldm">धर्मराजन्</text>
<text x="341" y="279" text-anchor="middle" class="Lx">dharma-rājan = virtue + king = righteous king</text>
<rect x="22" y="290" width="210" height="26" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="127" y="300" text-anchor="middle" class="Ldm">जगत्पिता</text>
<text x="127" y="309" text-anchor="middle" class="Lx">jagat-pitā = world + father = father of the world</text>
<rect x="236" y="290" width="210" height="26" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="341" y="300" text-anchor="middle" class="Ldm">सर्वधर्मसम्भवो</text>
<text x="341" y="309" text-anchor="middle" class="Lx">sarva-dharma-sambhavaḥ = all + virtue + arising = arising from all virtues</text>
<line x1="22" y1="326" x2="458" y2="326" stroke="#000" stroke-width="0.5"/>
<text x="240" y="332" text-anchor="middle" class="H">— · —  INDO-EUROPEAN COGNATES  ·  SAME ANCESTOR AS ENGLISH  — · —</text>
<line x1="22" y1="336" x2="458" y2="336" stroke="#000" stroke-width="0.3"/>
<text x="240" y="344" text-anchor="middle" class="Lx">Sanskrit, Greek, Latin, English, Persian share a common ancestor  ·  Proto-Indo-European</text>
<rect x="22" y="348" width="108" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="76" y="356" text-anchor="middle" class="Lds">मातृ mātṛ</text>
<text x="76" y="363" text-anchor="middle" class="Lx">mater (L)  ·  mother (E)</text>
<rect x="133" y="348" width="108" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="187" y="356" text-anchor="middle" class="Lds">पितृ pitṛ</text>
<text x="187" y="363" text-anchor="middle" class="Lx">pater (L)  ·  father (E)</text>
<rect x="244" y="348" width="108" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="298" y="356" text-anchor="middle" class="Lds">मै mā</text>
<text x="298" y="363" text-anchor="middle" class="Lx">me (L)  ·  me (E)</text>
<rect x="355" y="348" width="108" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="409" y="356" text-anchor="middle" class="Lds">त्रयस् trayas</text>
<text x="409" y="363" text-anchor="middle" class="Lx">tres (L)  ·  three (E)</text>
<rect x="22" y="376" width="108" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="76" y="384" text-anchor="middle" class="Lds">नव nava</text>
<text x="76" y="391" text-anchor="middle" class="Lx">novem (L)  ·  nine (E)</text>
<rect x="133" y="376" width="108" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="187" y="384" text-anchor="middle" class="Lds">राजन् rājan</text>
<text x="187" y="391" text-anchor="middle" class="Lx">rex (L)  ·  reign (E)</text>
<rect x="244" y="376" width="108" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="298" y="384" text-anchor="middle" class="Lds">अग्नि agni</text>
<text x="298" y="391" text-anchor="middle" class="Lx">ignis (L)  ·  ignite (E)</text>
<rect x="355" y="376" width="108" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="409" y="384" text-anchor="middle" class="Lds">नामन् nāman</text>
<text x="409" y="391" text-anchor="middle" class="Lx">nomen (L)  ·  name (E)</text>
<line x1="22" y1="410" x2="458" y2="410" stroke="#000" stroke-width="0.5"/>
<text x="240" y="416" text-anchor="middle" class="H">— · —  CORE VOCABULARY  ·  20 ESSENTIAL WORDS  — · —</text>
<line x1="22" y1="420" x2="458" y2="420" stroke="#000" stroke-width="0.3"/>
<rect x="22" y="424" width="96" height="22" fill="none" stroke="#000" stroke-width="0.6"/>
