<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SANSKRIT</text>
<text x="240" y="40" text-anchor="middle" class="S">DEVANAGARI SCRIPT</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">DEVANAGARI — "CITY OF THE GODS" SCRIPT</text>
<text x="240" y="68" text-anchor="middle" class="L">Abugida: each character = consonant + inherent /a/ vowel</text>
<text x="240" y="79" text-anchor="middle" class="L">Vowel cancellation: virama (्) silences inherent /a/</text>
<text x="240" y="90" text-anchor="middle" class="L">Consonant row: क ख ग घ ङ   (ka kha ga gha nga)</text>
<text x="240" y="101" text-anchor="middle" class="L">च छ ज झ ञ   (ca cha ja jha nya)</text>
<text x="240" y="112" text-anchor="middle" class="L">ट ठ ड ढ ण   (ta tha da dha na — retroflex)</text>
<text x="240" y="123" text-anchor="middle" class="L">त थ द ध न   (ta tha da dha na — dental)</text>
<text x="240" y="134" text-anchor="middle" class="L">प फ ब भ म   (pa pha ba bha ma)</text>
<text x="240" y="145" text-anchor="middle" class="L">य र ल व श ष स ह   (ya ra la va sha sha sa ha)</text>
<line x1="20" y1="153" x2="460" y2="153" stroke="#555" stroke-width="0.5"/>
<text x="240" y="161" text-anchor="middle" class="H">CONJUNCT CONSONANTS</text>
<text x="240" y="172" text-anchor="middle" class="L">Consonant clusters form stacked/horizontal ligatures:</text>
<text x="240" y="183" text-anchor="middle" class="L">क्ष (ksha) • ज्ञ (jnya) • त्र (tra) • श्र (shra)</text>
<text x="240" y="194" text-anchor="middle" class="Ls">Sanskrit: dharmakshetre kurukshetre... (Bhagavad Gita)</text>
<line x1="20" y1="202" x2="460" y2="202" stroke="#555" stroke-width="0.5"/>
<text x="240" y="210" text-anchor="middle" class="H">VOWELS &amp; LONG VOWELS</text>
<text x="240" y="221" text-anchor="middle" class="L">अ a  आ ā  इ i  ई ī  उ u  ऊ ū  ऋ r̥  ए e  ऐ ai  ओ o  औ au</text>
<text x="240" y="232" text-anchor="middle" class="Ls">Vowel length is phonemic: a/ā  i/ī  u/ū distinguish words</text>
<line x1="20" y1="240" x2="460" y2="240" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="247" width="460" height="13" fill="#111"/>
<text x="240" y="256.5" text-anchor="middle" class="Hb">MAITHILI  ·  मैथिली  ·  SECONDARY LANGUAGE</text>
<text x="240" y="272" text-anchor="middle" class="H">TIRHUTA (MITHILAKSHAR) SCRIPT</text>
<text x="240" y="283" text-anchor="middle" class="L">Maithili has its own script: Tirhuta (also: Mithilakshar)</text>
<text x="240" y="294" text-anchor="middle" class="Ls">Derived from ancient Brahmi; sister to Bengali and Odia scripts</text>
<text x="240" y="305" text-anchor="middle" class="Ls">Distinct from Devanagari; recognizable by curved letterforms</text>
<text x="240" y="316" text-anchor="middle" class="Ls">Also written in Devanagari (especially in Bihar, India)</text>
<line x1="20" y1="324" x2="460" y2="324" stroke="#555" stroke-width="0.5"/>
<text x="240" y="332" text-anchor="middle" class="H">TIRHUTA SAMPLE</text>
<text x="240" y="344" text-anchor="middle" class="Fb">𑒀𑒅𑒏𑒁𑒏𑒉𑒏𑒐</text>
<text x="240" y="355" text-anchor="middle" class="Ls">(Maithili in Tirhuta script — Unicode 11480-114DF)</text>
<text x="240" y="366" text-anchor="middle" class="L">In Devanagari: मैथिली (Maithili)</text>
<line x1="20" y1="374" x2="460" y2="374" stroke="#555" stroke-width="0.5"/>
<text x="240" y="382" text-anchor="middle" class="H">SCRIPT LINEAGE</text>
<text x="240" y="393" text-anchor="middle" class="Ls">Brahmi (3rd c. BCE) → Gupta → Siddham → Tirhuta</text>
<text x="240" y="404" text-anchor="middle" class="Ls">Brahmi → Devanagari path (Nagari): Sanskrit standard</text>
<text x="240" y="415" text-anchor="middle" class="L">Both scripts descend from the SAME ancient Brahmi root</text>
<line x1="20" y1="423" x2="460" y2="423" stroke="#555" stroke-width="0.5"/>
<text x="240" y="431" text-anchor="middle" class="H">SCRIPT PARALLEL: SHARED ABUGIDA STRUCTURE</text>
<text x="240" y="442" text-anchor="middle" class="Ls">Both Devanagari and Tirhuta: abugida with inherent /a/</text>
<text x="240" y="453" text-anchor="middle" class="Ls">Both: consonant + virama to suppress inherent vowel</text>
<text x="240" y="464" text-anchor="middle" class="Ls">Both: conjunct consonants for clusters</text>
<text x="240" y="475" text-anchor="middle" class="Ls">Maithili scribes used Tirhuta for Sanskrit texts too</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 15a ALT  ·  SANSKRIT / MAITHILI  ·  SCRIPT</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
