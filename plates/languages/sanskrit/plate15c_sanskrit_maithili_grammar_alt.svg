<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SANSKRIT</text>
<text x="240" y="40" text-anchor="middle" class="S">GRAMMATICAL STRUCTURE</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">EIGHT CASES OF SANSKRIT</text>
<text x="240" y="68" text-anchor="middle" class="L">Nominative (kartaa) • Accusative (karma) • Instrumental (karaa)</text>
<text x="240" y="79" text-anchor="middle" class="L">Dative (sampradaana) • Ablative (apaadaana) • Genitive (sambandha)</text>
<text x="240" y="90" text-anchor="middle" class="L">Locative (adhikarana) • Vocative (sambodhana)</text>
<text x="240" y="101" text-anchor="middle" class="L">Three numbers: singular / dual / plural</text>
<text x="240" y="112" text-anchor="middle" class="L">Three genders: masculine / feminine / neuter</text>
<line x1="20" y1="120" x2="460" y2="120" stroke="#555" stroke-width="0.5"/>
<text x="240" y="128" text-anchor="middle" class="H">VERB SYSTEM</text>
<text x="240" y="139" text-anchor="middle" class="L">10 verb classes (gaana); complex conjugation table</text>
<text x="240" y="150" text-anchor="middle" class="Ls">Three voices: active (parasmaipada) • middle (aatmanepada) • passive</text>
<text x="240" y="161" text-anchor="middle" class="L">Dual number in verbs: gacchataH "the two go"</text>
<text x="240" y="172" text-anchor="middle" class="Ls">10 tenses/moods: present, past, future, conditional, imperative...</text>
<line x1="20" y1="180" x2="460" y2="180" stroke="#555" stroke-width="0.5"/>
<text x="240" y="188" text-anchor="middle" class="H">SANDHI — PHONOLOGICAL FUSION</text>
<text x="240" y="199" text-anchor="middle" class="L">Words at boundaries merge and transform (sandhi rules):</text>
<text x="240" y="210" text-anchor="middle" class="L">na + iti → neti "not thus"</text>
<text x="240" y="221" text-anchor="middle" class="L">raamaH + aagacchati → raamaagacchati</text>
<text x="240" y="232" text-anchor="middle" class="Ls">Pānini (4th c. BCE): 3,959 rules for Sanskrit grammar (Ashtadhyayi)</text>
<line x1="20" y1="240" x2="460" y2="240" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="247" width="460" height="13" fill="#111"/>
<text x="240" y="256.5" text-anchor="middle" class="Hb">MAITHILI GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="272" text-anchor="middle" class="H">MAITHILI CASE SYSTEM</text>
<text x="240" y="283" text-anchor="middle" class="L">Postpositional system derived from Sanskrit cases:</text>
<text x="240" y="294" text-anchor="middle" class="L">Nominative: ghara "house"  •  Genitive: gharak "of the house"</text>
<text x="240" y="305" text-anchor="middle" class="L">Locative: ghara-me "in the house"  (Sanskrit locative suffix -e!)</text>
<text x="240" y="316" text-anchor="middle" class="Ls">Maithili preserves more case-like distinctions than Hindi</text>
<line x1="20" y1="324" x2="460" y2="324" stroke="#555" stroke-width="0.5"/>
<text x="240" y="332" text-anchor="middle" class="H">HONORIFIC SYSTEM — THREE LEVELS</text>
<text x="240" y="343" text-anchor="middle" class="L">Maithili marks social register in pronouns and verbs:</text>
<text x="240" y="354" text-anchor="middle" class="L">Apan/aapan: highest honorific (elders, deities)</text>
<text x="240" y="365" text-anchor="middle" class="L">Ahaa/ahan: medium honorific (respectful address)</text>
<text x="240" y="376" text-anchor="middle" class="L">Toohu/tohu: low/intimate (close friends, children)</text>
<text x="240" y="387" text-anchor="middle" class="Ls">Verb forms change completely for each level</text>
<line x1="20" y1="395" x2="460" y2="395" stroke="#555" stroke-width="0.5"/>
<text x="240" y="403" text-anchor="middle" class="H">MAITHILI VERB AGREEMENT</text>
<text x="240" y="414" text-anchor="middle" class="Ls">Verbs agree with subject in person, number, gender AND honorific</text>
<text x="240" y="425" text-anchor="middle" class="Ls">"She goes" at high register ≠ "she goes" at intimate register</text>
<text x="240" y="436" text-anchor="middle" class="Ls">Sanskrit had honorific address but Maithili systematized it</text>
<line x1="20" y1="444" x2="460" y2="444" stroke="#555" stroke-width="0.5"/>
<text x="240" y="452" text-anchor="middle" class="H">GRAMMATICAL CONTINUITY</text>
<text x="240" y="463" text-anchor="middle" class="Ls">Sanskrit → Maithili: Sanskrit 8 cases → Maithili postpositional</text>
<text x="240" y="474" text-anchor="middle" class="Ls">Sanskrit 3 genders preserved in Maithili (unlike Hindi-only 2)</text>
<text x="240" y="485" text-anchor="middle" class="Ls">Maithili verbs more conservative than Hindi in aspect marking</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 15c ALT  ·  SANSKRIT / MAITHILI  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
