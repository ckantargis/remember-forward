<line x1="22" y1="395" x2="458" y2="395" stroke="#000" stroke-width="0.5"/>
<text x="240" y="401" text-anchor="middle" class="H">— · —  CONJUNCT CONSONANTS  ·  SAMYUKTAKSARA  — · —</text>
<line x1="22" y1="405" x2="458" y2="405" stroke="#000" stroke-width="0.3"/>
<text x="240" y="413" text-anchor="middle" class="Lx">consonants combine into single ligatures when no vowel intervenes</text>
<rect x="22" y="417" width="100" height="36" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="72" y="430" text-anchor="middle" class="Ld">क्ष</text>
<text x="72" y="441" text-anchor="middle" class="Lx">k+ṣ = kṣ</text>
<text x="72" y="449" text-anchor="middle" class="Lx">field/knowledge area</text>
<rect x="128" y="417" width="100" height="36" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="178" y="430" text-anchor="middle" class="Ld">त्र</text>
<text x="178" y="441" text-anchor="middle" class="Lx">t+r = tra</text>
<text x="178" y="449" text-anchor="middle" class="Lx">suffix meaning instrument</text>
<rect x="234" y="417" width="100" height="36" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="284" y="430" text-anchor="middle" class="Ld">ज्ञ</text>
<text x="284" y="441" text-anchor="middle" class="Lx">j+ñ = jñā</text>
<text x="284" y="449" text-anchor="middle" class="Lx">wisdom/knowing</text>
<rect x="340" y="417" width="100" height="36" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="390" y="430" text-anchor="middle" class="Ld">श्र</text>
<text x="390" y="441" text-anchor="middle" class="Lx">f+r = śra</text>
<text x="390" y="449" text-anchor="middle" class="Lx">auspicious</text>
<text x="240" y="460" text-anchor="middle" class="Lx">some conjuncts are highly irregular  ·  must be memorized  ·  very common in Sanskrit texts</text>
