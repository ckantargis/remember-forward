<line x1="22" y1="330" x2="458" y2="330" stroke="#000" stroke-width="0.5"/>
<text x="240" y="336" text-anchor="middle" class="H">— · —  THE HALANT  ·  VIRAMA  ·  SUPPRESSES THE INHERENT VOWEL  — · —</text>
<line x1="22" y1="340" x2="458" y2="340" stroke="#000" stroke-width="0.3"/>
<text x="240" y="348" text-anchor="middle" class="Lx">every consonant inherently carries /a/  ·  halant (्) removes it  ·  ka = क  ·  k alone = क्</text>
<text x="240" y="357" text-anchor="middle" class="Lx">vowel diacritics (matras) change the inherent /a/ to another vowel</text>
<rect x="26" y="361" width="38" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="45" y="373" text-anchor="middle" class="Ldm">क</text>
<text x="45" y="382" text-anchor="middle" class="Lx">ka</text>
<rect x="67" y="361" width="38" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="86" y="373" text-anchor="middle" class="Ldm">का</text>
<text x="86" y="382" text-anchor="middle" class="Lx">kā</text>
<rect x="108" y="361" width="38" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="127" y="373" text-anchor="middle" class="Ldm">कि</text>
<text x="127" y="382" text-anchor="middle" class="Lx">ki</text>
<rect x="149" y="361" width="38" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="168" y="373" text-anchor="middle" class="Ldm">की</text>
<text x="168" y="382" text-anchor="middle" class="Lx">kī</text>
