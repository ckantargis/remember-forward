<text x="250" y="373" text-anchor="middle" class="Ldm">कू</text>
<text x="250" y="382" text-anchor="middle" class="Lx">kū</text>
<rect x="272" y="361" width="38" height="28" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="291" y="373" text-anchor="middle" class="Ldm">के</text>
<text x="291" y="382" text-anchor="middle" class="Lx">ke</text>
