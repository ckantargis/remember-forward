<text x="240" y="50" text-anchor="middle" class="S">संस्कृतम् · Devanagari · 48 characters · phonetically organized · left to right</text>
<line x1="18" y1="56" x2="462" y2="56" stroke="#000" stroke-width="0.5"/>
<text x="240" y="67" text-anchor="middle" class="H">— · —  SANSKRIT  ·  संस्कृतम्  ·  THE PERFECTED LANGUAGE  — · —</text>
<line x1="22" y1="71" x2="458" y2="71" stroke="#000" stroke-width="0.3"/>
<text x="240" y="79" text-anchor="middle" class="Lx">Sanskrit = samskrtam = refined/perfected  ·  Indo-European family  ·  sister to Greek, Latin, Persian</text>
<text x="240" y="88" text-anchor="middle" class="Lx">Panini's grammar (c.400 BCE) is so precise it predates modern linguistics by 2,000 years</text>
<text x="240" y="97" text-anchor="middle" class="Lx">Devanagari script = 4th most used writing system in world  ·  120+ languages  ·  ancestor of most South Asian scripts</text>
<line x1="22" y1="102" x2="458" y2="102" stroke="#000" stroke-width="0.5"/>
<text x="240" y="108" text-anchor="middle" class="H">— · —  VOWELS  ·  SVARA  ·  14 IN DEVANAGARI  — · —</text>
