<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SWAHILI</text>
<text x="240" y="40" text-anchor="middle" class="S">NOUN CLASS GRAMMAR</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SWAHILI NOUN CLASSES (15+)</text>
<text x="240" y="68" text-anchor="middle" class="L">M/WA (1/2): people • mtu/watu "person/people"</text>
<text x="240" y="79" text-anchor="middle" class="L">M/MI (3/4): plants/objects • mti/miti "tree/trees"</text>
<text x="240" y="90" text-anchor="middle" class="L">N/N (9/10): animals/borrowings • ndege/ndege "bird/birds"</text>
<text x="240" y="101" text-anchor="middle" class="L">KI/VI (7/8): things • kitu/vitu "thing/things"</text>
<text x="240" y="112" text-anchor="middle" class="L">JI/MA (5/6): fruits, augmentatives • jicho/macho "eye/eyes"</text>
<text x="240" y="123" text-anchor="middle" class="L">U/N (11/10): abstract, long things • uso "face" (no plural)</text>
<line x1="20" y1="131" x2="460" y2="131" stroke="#555" stroke-width="0.5"/>
<text x="240" y="139" text-anchor="middle" class="H">SWAHILI AGREEMENT CHAIN</text>
<text x="240" y="150" text-anchor="middle" class="L">Every modifier matches noun class prefix:</text>
<text x="240" y="161" text-anchor="middle" class="L">mtoto mmoja mzuri anakimbia</text>
<text x="240" y="172" text-anchor="middle" class="Ls">"one good child runs" — m- on all 4 words (class 1)</text>
<line x1="20" y1="180" x2="460" y2="180" stroke="#555" stroke-width="0.5"/>
<text x="240" y="188" text-anchor="middle" class="H">SWAHILI VERB TEMPLATE</text>
<text x="240" y="199" text-anchor="middle" class="L">SP-TNS-OP-ROOT-FV: ninakupenda "I love you"</text>
<text x="240" y="210" text-anchor="middle" class="L">ni-na-ku-pend-a = I-PRES-you-love-FV</text>
<text x="240" y="221" text-anchor="middle" class="Ls">wa-li-ni-ona = they-PAST-me-see = "they saw me"</text>
<line x1="20" y1="229" x2="460" y2="229" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="236" width="460" height="13" fill="#111"/>
<text x="240" y="245.5" text-anchor="middle" class="Hb">KIKUYU GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="261" text-anchor="middle" class="H">KIKUYU NOUN CLASSES (18)</text>
<text x="240" y="272" text-anchor="middle" class="L">More noun classes than Swahili (archaic Proto-Bantu preserved)</text>
<text x="240" y="283" text-anchor="middle" class="L">Class 1/2 (mũ-/a-): people • mũndũ/andũ "person/people"</text>
<text x="240" y="294" text-anchor="middle" class="L">Class 3/4 (mũ-/mī-): trees • mũtī/mītī "tree/trees"</text>
<text x="240" y="305" text-anchor="middle" class="L">Class 7/8 (kī-/īyũ-): things • kīútũ/īyũútũ "thing/things"</text>
<text x="240" y="316" text-anchor="middle" class="Ls">Abstract class (oũ-): concepts unique to Kikuyu system</text>
<line x1="20" y1="324" x2="460" y2="324" stroke="#555" stroke-width="0.5"/>
<text x="240" y="332" text-anchor="middle" class="H">KIKUYU VERB SYSTEM</text>
<text x="240" y="343" text-anchor="middle" class="L">Same SP-TNS-OP-ROOT template as Swahili</text>
<text x="240" y="354" text-anchor="middle" class="L">Tone marks tense/aspect: rising tone = perfective</text>
<text x="240" y="365" text-anchor="middle" class="Ls">Verb extensions: -ir- (applicative), -an- (reciprocal)</text>
<line x1="20" y1="373" x2="460" y2="373" stroke="#555" stroke-width="0.5"/>
<text x="240" y="381" text-anchor="middle" class="H">BANTU GRAMMAR PARALLELS</text>
<text x="240" y="392" text-anchor="middle" class="L">Both: noun class system controlling all agreement</text>
<text x="240" y="403" text-anchor="middle" class="L">Both: SP-TNS-OP-ROOT-FV verb template</text>
<text x="240" y="414" text-anchor="middle" class="L">Both: verb extensions (applicative, causative, reciprocal)</text>
<text x="240" y="425" text-anchor="middle" class="Ls">Swahili: fewer classes, simpler agreement chains</text>
<text x="240" y="436" text-anchor="middle" class="Ls">Kikuyu: more classes, tonal grammar layer on top</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 20c ALT  ·  SWAHILI / KIKUYU  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
