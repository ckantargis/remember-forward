<text x="240" y="32" text-anchor="middle" class="T" >SWAHILI — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 20C OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="67" text-anchor="middle" class="H" >— NOUN CLASS AGREEMENT SYSTEM —</text>
<text x="240" y="77" text-anchor="middle" class="L" >EVERY Swahili verb, adjective, and relative clause must AGREE with the noun class of its subject.</text>
<text x="240" y="87" text-anchor="middle" class="Ls" >The prefix changes depending on noun class, tense, and mood. The root of the verb stays fixed.</text>
<text x="240" y="96" text-anchor="middle" class="Lx" >Format: [SUBJECT PREFIX] + [TENSE MARKER] + [OBJECT PREFIX] + [VERB ROOT]</text>
<line x1="20" y1="104" x2="460" y2="104" stroke="black" stroke-width="0.3"/>
<text x="240" y="112" text-anchor="middle" class="H" >— NOUN CLASS TABLE — SUBJECT AGREEMENT —</text>
<text x="50" y="122" text-anchor="middle" class="Lx" >M/WA (1/2)</text>
<text x="115" y="122" text-anchor="middle" class="Lx" >mtu/watu</text>
<text x="165" y="122" text-anchor="middle" class="Lx" >a-/wa-</text>
<text x="285" y="122" text-anchor="middle" class="Lx" >A-na-soma / Wa-na-soma</text>
<text x="415" y="122" text-anchor="middle" class="Lx" >He reads / They read</text>
<text x="50" y="136" text-anchor="middle" class="Lx" >M/MI (3/4)</text>
<text x="115" y="136" text-anchor="middle" class="Lx" >mti/miti</text>
<text x="165" y="136" text-anchor="middle" class="Lx" >u-/i-</text>
<text x="285" y="136" text-anchor="middle" class="Lx" >U-na-anguka / I-na-anguka</text>
<text x="415" y="136" text-anchor="middle" class="Lx" >Tree falls / Trees fall</text>
<text x="50" y="150" text-anchor="middle" class="Lx" >MA (5/6)</text>
<text x="115" y="150" text-anchor="middle" class="Lx" >tunda/matunda</text>
<text x="165" y="150" text-anchor="middle" class="Lx" >li-/ya-</text>
<text x="285" y="150" text-anchor="middle" class="Lx" >Li-na-anguka / Ya-na-anguka</text>
<text x="415" y="150" text-anchor="middle" class="Lx" >Fruit falls / Fruits fall</text>
<text x="50" y="164" text-anchor="middle" class="Lx" >KI/VI (7/8)</text>
<text x="115" y="164" text-anchor="middle" class="Lx" >kitu/vitu</text>
<text x="165" y="164" text-anchor="middle" class="Lx" >ki-/vi-</text>
<text x="285" y="164" text-anchor="middle" class="Lx" >Ki-na-anguka / Vi-na-anguka</text>
<text x="415" y="164" text-anchor="middle" class="Lx" >Thing falls / Things fall</text>
<text x="50" y="178" text-anchor="middle" class="Lx" >N/N (9/10)</text>
<text x="115" y="178" text-anchor="middle" class="Lx" >nyumba/nyumba</text>
<text x="165" y="178" text-anchor="middle" class="Lx" >i-/zi-</text>
<text x="285" y="178" text-anchor="middle" class="Lx" >I-na-anguka / Zi-na-anguka</text>
<text x="415" y="178" text-anchor="middle" class="Lx" >House falls / Houses fall</text>
<text x="50" y="192" text-anchor="middle" class="Lx" >U (11)</text>
<text x="115" y="192" text-anchor="middle" class="Lx" >ukuta</text>
<text x="165" y="192" text-anchor="middle" class="Lx" >u-</text>
<text x="285" y="192" text-anchor="middle" class="Lx" >U-na-anguka</text>
<text x="415" y="192" text-anchor="middle" class="Lx" >Wall falls</text>
<text x="50" y="206" text-anchor="middle" class="Lx" >PA (16)</text>
<text x="115" y="206" text-anchor="middle" class="Lx" >mahali</text>
<text x="165" y="206" text-anchor="middle" class="Lx" >pa-</text>
<text x="285" y="206" text-anchor="middle" class="Lx" >Pa-na-kelewa</text>
<text x="415" y="206" text-anchor="middle" class="Lx" >Place is understood</text>
<line x1="20" y1="222" x2="460" y2="222" stroke="black" stroke-width="0.3"/>
<text x="240" y="230" text-anchor="middle" class="H" >— TENSE SYSTEM — TENSE MARKERS IN VERB COMPLEX —</text>
<text x="240" y="239" text-anchor="middle" class="Ls" >Tense is marked by an infix between subject prefix and verb root. Root stays constant.</text>
<text x="50" y="249" text-anchor="middle" class="Ls" >-na-</text>
<text x="120" y="249" text-anchor="middle" class="Lx" >present continuous</text>
<text x="245" y="249" text-anchor="middle" class="Lx" >A-na-soma</text>
<text x="380" y="249" text-anchor="middle" class="Lx" >He is reading</text>
<text x="50" y="262" text-anchor="middle" class="Ls" >-li-</text>
<text x="120" y="262" text-anchor="middle" class="Lx" >simple past</text>
<text x="245" y="262" text-anchor="middle" class="Lx" >A-li-soma</text>
<text x="380" y="262" text-anchor="middle" class="Lx" >He read</text>
<text x="50" y="275" text-anchor="middle" class="Ls" >-ta-</text>
<text x="120" y="275" text-anchor="middle" class="Lx" >future</text>
<text x="245" y="275" text-anchor="middle" class="Lx" >A-ta-soma</text>
<text x="380" y="275" text-anchor="middle" class="Lx" >He will read</text>
<text x="50" y="288" text-anchor="middle" class="Ls" >-me-</text>
<text x="120" y="288" text-anchor="middle" class="Lx" >perfect</text>
<text x="245" y="288" text-anchor="middle" class="Lx" >A-me-soma</text>
<text x="380" y="288" text-anchor="middle" class="Lx" >He has read</text>
<text x="50" y="301" text-anchor="middle" class="Ls" >-ku-</text>
<text x="120" y="301" text-anchor="middle" class="Lx" >past (negative/infinitive)</text>
<text x="245" y="301" text-anchor="middle" class="Lx" >A-ku-soma</text>
<text x="380" y="301" text-anchor="middle" class="Lx" >He used to read / to read</text>
<text x="50" y="314" text-anchor="middle" class="Ls" >-nge-</text>
<text x="120" y="314" text-anchor="middle" class="Lx" >conditional</text>
<text x="245" y="314" text-anchor="middle" class="Lx" >A-nge-soma</text>
<text x="380" y="314" text-anchor="middle" class="Lx" >He would read</text>
<text x="50" y="327" text-anchor="middle" class="Ls" >-ngeli-</text>
<text x="120" y="327" text-anchor="middle" class="Lx" >past conditional</text>
<text x="245" y="327" text-anchor="middle" class="Lx" >A-ngeli-soma</text>
<text x="380" y="327" text-anchor="middle" class="Lx" >He would have read</text>
<line x1="20" y1="342" x2="460" y2="342" stroke="black" stroke-width="0.3"/>
<text x="240" y="350" text-anchor="middle" class="H" >— NEGATION —</text>
<text x="240" y="360" text-anchor="middle" class="Ls" >Negation changes the subject prefix: a- (pos.) → ha- (neg.) for M/WA class:</text>
<text x="240" y="369" text-anchor="middle" class="Ls" >Anasoma (He reads) → Hasomi (He does not read) — note: negative present drops -na-, uses -i ending.</text>
<text x="240" y="378" text-anchor="middle" class="Ls" >Negative past: Hakusoma (He did not read) · Negative future: Hatasoma (He will not read)</text>
<line x1="20" y1="386" x2="460" y2="386" stroke="black" stroke-width="0.3"/>
<text x="240" y="394" text-anchor="middle" class="H" >— CORE VOCABULARY — 25 WORDS WITH NOUN CLASS —</text>
