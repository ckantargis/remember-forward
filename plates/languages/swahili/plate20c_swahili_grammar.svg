<line x1="20" y1="681" x2="460" y2="681" stroke="black" stroke-width="0.3"/>
<text x="240" y="689" text-anchor="middle" class="H" >— WORD ORDER AND ADJECTIVE AGREEMENT —</text>
<text x="240" y="699" text-anchor="middle" class="Ls" >SVO order: Mtoto anasoma kitabu. Child is-reading book. "The child is reading a book."</text>
<text x="240" y="708" text-anchor="middle" class="Ls" >Adjective follows noun and takes noun class prefix: kitabu -zuri → kitabu kizuri (a good book).</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M" >SERIES 20 · SWAHILI · PLATE C · GRAMMAR · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
