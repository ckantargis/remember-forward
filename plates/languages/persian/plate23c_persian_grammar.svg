<line x1="20" y1="483" x2="460" y2="483" stroke="black" stroke-width="0.3"/>
<text x="240" y="492" text-anchor="middle" class="H" >— PERSIAN LOANWORDS IN OTHER LANGUAGES —</text>
<text x="240" y="503" text-anchor="middle" class="L" >Persian was the language of high culture, trade, and administration across a vast region for centuries.</text>
<text x="240" y="513" text-anchor="middle" class="Ls" >English loans: check (chess piece), lemon, jasmine, paradise (Av. pairi-daeza "walled garden"), azure, caravan</text>
<text x="240" y="522" text-anchor="middle" class="Ls" >Urdu, Hindi, Turkish, Azerbaijani, Armenian, Georgian all contain large Persian vocabulary layers.</text>
<text x="240" y="531" text-anchor="middle" class="Ls" >Arabic borrowed from Persian too: shir (lion), khandaq (trench), zanjir (chain).</text>
<text x="240" y="540" text-anchor="middle" class="Ls" >Persian was the court language of the Mughal Empire (India, 1526–1858) and the Ottoman court.</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M" >SERIES 23 · PERSIAN · PLATE C · GRAMMAR · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
