<text x="240" y="32" text-anchor="middle" class="T" >PERSIAN / FARSI — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 23C OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— SOV LANGUAGE — VERB-FINAL, POSTPOSITIONS —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Persian is SOV (Subject–Object–Verb). Verb comes last. No grammatical gender. No case endings on nouns.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >man sib mikharam. (I apple buy-PRES.1SG) = "I am buying an apple."</text>
<text x="240" y="98" text-anchor="middle" class="Lx" >man = I · sib = apple · mi- = present prefix · kharam = buy-1sg</text>
<line x1="20" y1="106" x2="460" y2="106" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H" >— THE EZAFE CONSTRUCTION — NOUN CHAINS —</text>
<text x="240" y="126" text-anchor="middle" class="L" >Ezafe (-e/-ye after vowel): links noun + adjective OR noun + possessor. Written as short /e/ (often omitted in script).</text>
<text x="240" y="136" text-anchor="middle" class="Ls" >ketāb-e khub = "good book" (book-EZ good) — adjective FOLLOWS noun, joined by ezafe</text>
<text x="240" y="145" text-anchor="middle" class="Ls" >ketāb-e mān = "my book" (book-EZ I) — possessor follows, joined by ezafe</text>
<text x="240" y="154" text-anchor="middle" class="Ls" >ketāb-e khub-e mān = "my good book" — chains extend: book-EZ good-EZ my</text>
<line x1="20" y1="162" x2="460" y2="162" stroke="black" stroke-width="0.3"/>
<text x="240" y="171" text-anchor="middle" class="H" >— VERB CONJUGATION — kardan "to do/make" (present stem: kon-) —</text>
<text x="100" y="181" text-anchor="middle" class="Lx" >Present (mi- + stem + ending)</text>
<text x="360" y="181" text-anchor="middle" class="Lx" >Simple past (past stem + ending)</text>
<text x="55" y="190" text-anchor="middle" class="Lx" >1sg</text>
<text x="120" y="190" text-anchor="middle" class="Ls" >mikonam</text>
<text x="195" y="190" text-anchor="middle" class="Lx" >I do / am doing</text>
<text x="300" y="190" text-anchor="middle" class="Lx" >1sg</text>
<text x="365" y="190" text-anchor="middle" class="Ls" >kardam</text>
<text x="440" y="190" text-anchor="middle" class="Lx" >I did / made</text>
<text x="55" y="201" text-anchor="middle" class="Lx" >2sg</text>
<text x="120" y="201" text-anchor="middle" class="Ls" >mikoni</text>
<text x="195" y="201" text-anchor="middle" class="Lx" >you do</text>
<text x="300" y="201" text-anchor="middle" class="Lx" >2sg</text>
<text x="365" y="201" text-anchor="middle" class="Ls" >kardi</text>
<text x="440" y="201" text-anchor="middle" class="Lx" >you did</text>
