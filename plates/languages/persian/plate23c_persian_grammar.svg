<text x="120" y="212" text-anchor="middle" class="Ls" >mikonad</text>
<text x="195" y="212" text-anchor="middle" class="Lx" >he/she/it does</text>
<text x="300" y="212" text-anchor="middle" class="Lx" >3sg</text>
<text x="365" y="212" text-anchor="middle" class="Ls" >kard</text>
<text x="440" y="212" text-anchor="middle" class="Lx" >he/she did</text>
<text x="55" y="223" text-anchor="middle" class="Lx" >1pl</text>
<text x="120" y="223" text-anchor="middle" class="Ls" >mikonim</text>
<text x="195" y="223" text-anchor="middle" class="Lx" >we do</text>
<text x="300" y="223" text-anchor="middle" class="Lx" >1pl</text>
<text x="365" y="223" text-anchor="middle" class="Ls" >kardim</text>
<text x="440" y="223" text-anchor="middle" class="Lx" >we did</text>
<text x="55" y="234" text-anchor="middle" class="Lx" >2pl</text>
<text x="120" y="234" text-anchor="middle" class="Ls" >mikonid</text>
<text x="195" y="234" text-anchor="middle" class="Lx" >you (pl) do</text>
<text x="300" y="234" text-anchor="middle" class="Lx" >2pl</text>
<text x="365" y="234" text-anchor="middle" class="Ls" >kardid</text>
<text x="440" y="234" text-anchor="middle" class="Lx" >you (pl) did</text>
<text x="55" y="245" text-anchor="middle" class="Lx" >3pl</text>
<text x="120" y="245" text-anchor="middle" class="Ls" >mikonand</text>
<text x="195" y="245" text-anchor="middle" class="Lx" >they do</text>
<text x="300" y="245" text-anchor="middle" class="Lx" >3pl</text>
<text x="365" y="245" text-anchor="middle" class="Ls" >kardand</text>
<text x="440" y="245" text-anchor="middle" class="Lx" >they did</text>
<text x="240" y="258" text-anchor="middle" class="Ls" >Negation: na- prefix before verb: nami-konam "I do not do" · nakard "he did not do"</text>
<line x1="20" y1="266" x2="460" y2="266" stroke="black" stroke-width="0.3"/>
<text x="240" y="275" text-anchor="middle" class="H" >— KEY GRAMMATICAL FEATURES —</text>
<text x="240" y="286" text-anchor="middle" class="Ls" >ra (را): direct object marker — added to definite/specific direct objects: "I bought the apple" → sib-ra kharidam</text>
<text x="240" y="295" text-anchor="middle" class="Ls" >No articles ("a" / "the") in formal Persian; -i suffix indicates indefinite: ketab-i "a book"</text>
<text x="240" y="304" text-anchor="middle" class="Ls" >Plural: -hā suffix for all nouns: ketāb-hā "books" · ādam-hā "people"</text>
<text x="240" y="313" text-anchor="middle" class="Ls" >Relative clause: ke "that/which/who" — mārdi ke āmad "the man who came"</text>
<text x="240" y="322" text-anchor="middle" class="Ls" >Verb-object compounds: very common — del-tan-e man shodeh "I am missing you" (lit. "my heart became tight")</text>
<line x1="20" y1="330" x2="460" y2="330" stroke="black" stroke-width="0.3"/>
