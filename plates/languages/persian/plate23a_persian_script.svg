<line x1="20" y1="415" x2="460" y2="415" stroke="black" stroke-width="0.3"/>
<text x="240" y="424" text-anchor="middle" class="H" >— SCRIPT HISTORY —</text>
<text x="240" y="435" text-anchor="middle" class="Ls" >Old Persian (~600–300 BCE): cuneiform script — 36 signs, semi-syllabic, used for Achaemenid inscriptions.</text>
<text x="240" y="444" text-anchor="middle" class="Ls" >Middle Persian / Pahlavi (~3rd c. BCE – 9th c. CE): Aramaic-derived script, 20 letters (highly ambiguous).</text>
<text x="240" y="453" text-anchor="middle" class="Ls" >7th–10th c. CE: Arab conquest → Perso-Arabic script adopted. Persian adapted Arabic letters, adding 4 new ones.</text>
<text x="240" y="462" text-anchor="middle" class="Ls" >10th c.: New Persian (Dari/Farsi) written in Perso-Arabic — Rudaki, Ferdowsi write the first great Persian poetry.</text>
<text x="240" y="471" text-anchor="middle" class="Ls" >Perso-Arabic script also adopted by Urdu, Pashto, Ottoman Turkish, Uyghur, Kashmiri, and others.</text>
<text x="240" y="480" text-anchor="middle" class="Ls" >Direction: RIGHT to LEFT. Numbers written left to right within RTL text.</text>
<text x="240" y="489" text-anchor="middle" class="Ls" >Today: Farsi (Iran), Dari (Afghanistan), Tajik (uses Cyrillic in Tajikistan, Perso-Arabic elsewhere).</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M" >SERIES 23 · PERSIAN · PLATE A · SCRIPT · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
