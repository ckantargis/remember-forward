<text x="240" y="32" text-anchor="middle" class="T" >PERSIAN / FARSI — SCRIPT · WRITING SYSTEM</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 23A OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— PERSO-ARABIC SCRIPT — READ RIGHT TO LEFT —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Persian is written in a modified Arabic script (Perso-Arabic), reading RIGHT to LEFT.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >32 letters total (Arabic 28 + 4 Persian additions). Letters change form by position in word.</text>
<text x="240" y="98" text-anchor="middle" class="Ls" >Cursive by nature: letters connect to their neighbors (some letters do not connect on the left).</text>
<text x="240" y="107" text-anchor="middle" class="Ls" >Vowels: three long vowels written; three short vowels usually OMITTED in standard text (implied from context).</text>
<line x1="20" y1="115" x2="460" y2="115" stroke="black" stroke-width="0.3"/>
<text x="240" y="124" text-anchor="middle" class="H" >— THE 32 LETTERS — ISOLATED · INITIAL · MEDIAL · FINAL —</text>
<text x="240" y="134" text-anchor="middle" class="Lx" >Each letter shown in isolated form with transliteration and name. Forms vary by position.</text>
<text x="240" y="143" text-anchor="middle" class="Lx" >(Note: Persian text shown below reads right-to-left)</text>
