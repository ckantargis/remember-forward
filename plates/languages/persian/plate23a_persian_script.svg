<text x="240" y="280" text-anchor="middle" class="H" >— FOUR PERSIAN LETTERS — NOT IN ARABIC —</text>
<text x="70" y="293" text-anchor="middle" class="Lp" >پ</text>
<text x="70" y="303" text-anchor="middle" class="Ls" >pe /p/</text>
<text x="70" y="312" text-anchor="middle" class="Lx" >p sound — not in Arabic</text>
<text x="170" y="293" text-anchor="middle" class="Lp" >چ</text>
<text x="170" y="303" text-anchor="middle" class="Ls" >che /tʃ/</text>
<text x="170" y="312" text-anchor="middle" class="Lx" >ch sound — "church"</text>
<text x="270" y="293" text-anchor="middle" class="Lp" >ژ</text>
<text x="270" y="303" text-anchor="middle" class="Ls" >zhe /ʒ/</text>
<text x="270" y="312" text-anchor="middle" class="Lx" >zh sound — "measure"</text>
<text x="370" y="293" text-anchor="middle" class="Lp" >گ</text>
<text x="370" y="303" text-anchor="middle" class="Ls" >gaf /ɡ/</text>
<text x="370" y="312" text-anchor="middle" class="Lx" >g sound — hard g</text>
<line x1="20" y1="320" x2="460" y2="320" stroke="black" stroke-width="0.3"/>
<text x="240" y="329" text-anchor="middle" class="H" >— VOWELS — SHORT (USUALLY OMITTED) AND LONG —</text>
<text x="240" y="340" text-anchor="middle" class="Ls" >Short vowels: /a/ (zabar َ), /e/ (zir ِ), /o/ (pish ُ) — written only in religious texts, poetry, children's books</text>
<text x="240" y="349" text-anchor="middle" class="Ls" >Long vowels (always written): ا ā · ی ī · و ū (ū also represents /v/ and /o/ in some positions)</text>
<text x="240" y="358" text-anchor="middle" class="Ls" >hamze (ء): glottal stop — may appear on alef, vav, or ye; written اْ/ؤ/ئ</text>
<line x1="20" y1="366" x2="460" y2="366" stroke="black" stroke-width="0.3"/>
<text x="240" y="375" text-anchor="middle" class="H" >— PERSIAN / EASTERN ARABIC NUMERALS —</text>
<text x="240" y="386" text-anchor="middle" class="Ls" >Persian uses its own numeral glyphs (based on Eastern Arabic forms), not Western Arabic (0–9).</text>
