<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<style>
  text { font-family: Georgia, serif; }
  .T{font-size:11px;font-weight:bold;letter-spacing:1.5px}
  .S{font-size:6.5px;letter-spacing:1.5px}
  .H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px}
  .Hb{font-size:7px;font-weight:bold;letter-spacing:2px}
  .L{font-size:7px} .Ls{font-size:6px} .Lx{font-size:5.5px}
  .M{font-size:6px;letter-spacing:1px}
  .F{font-size:7px;font-style:italic}
  .Fb{font-size:7.5px;font-weight:bold}
</style>
<rect x="0" y="0" width="480" height="680" fill="white"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">LATIN (LATINA) / ITALIAN (ITALIANO)</text>
<text x="240" y="44" text-anchor="middle" class="S">INDO-EUROPEAN · ITALIC BRANCH · CORE VOCABULARY</text>
<line x1="20" y1="50" x2="460" y2="50" stroke="black" stroke-width="0.5"/>
<text x="240" y="60" text-anchor="middle" class="H">PLATE 22C ALT · CORE VOCABULARY</text>
<line x1="20" y1="66" x2="460" y2="66" stroke="black" stroke-width="0.3"/>
<text x="240" y="77" text-anchor="middle" class="H">— LATIN CORE VOCABULARY —</text>
<text x="100" y="88" text-anchor="middle" class="Lx">LATIN</text>
<text x="220" y="88" text-anchor="middle" class="Lx">CLASS</text>
<text x="350" y="88" text-anchor="middle" class="Lx">MEANING</text>
<line x1="20" y1="92" x2="460" y2="92" stroke="black" stroke-width="0.3"/>
<text x="100" y="101" text-anchor="middle" class="Ls">aqua, -ae (f.)</text>
<text x="220" y="101" text-anchor="middle" class="Ls">1st decl.</text>
<text x="350" y="101" text-anchor="middle" class="Ls">water</text>
<text x="100" y="111" text-anchor="middle" class="Ls">ignis, -is (m.)</text>
<text x="220" y="111" text-anchor="middle" class="Ls">3rd decl.</text>
<text x="350" y="111" text-anchor="middle" class="Ls">fire</text>
<text x="100" y="121" text-anchor="middle" class="Ls">terra, -ae (f.)</text>
<text x="220" y="121" text-anchor="middle" class="Ls">1st decl.</text>
<text x="350" y="121" text-anchor="middle" class="Ls">earth / land</text>
<text x="100" y="131" text-anchor="middle" class="Ls">vita, -ae (f.)</text>
<text x="220" y="131" text-anchor="middle" class="Ls">1st decl.</text>
<text x="350" y="131" text-anchor="middle" class="Ls">life</text>
<text x="100" y="141" text-anchor="middle" class="Ls">mors, mortis (f.)</text>
<text x="220" y="141" text-anchor="middle" class="Ls">3rd decl.</text>
<text x="350" y="141" text-anchor="middle" class="Ls">death</text>
<text x="100" y="151" text-anchor="middle" class="Ls">tempus, -oris (n.)</text>
<text x="220" y="151" text-anchor="middle" class="Ls">3rd decl.</text>
<text x="350" y="151" text-anchor="middle" class="Ls">time</text>
<text x="100" y="161" text-anchor="middle" class="Ls">homo, hominis (m.)</text>
<text x="220" y="161" text-anchor="middle" class="Ls">3rd decl.</text>
<text x="350" y="161" text-anchor="middle" class="Ls">human being</text>
<text x="100" y="171" text-anchor="middle" class="Ls">pax, pacis (f.)</text>
<text x="220" y="171" text-anchor="middle" class="Ls">3rd decl.</text>
<text x="350" y="171" text-anchor="middle" class="Ls">peace</text>
<line x1="20" y1="176" x2="460" y2="176" stroke="black" stroke-width="0.3"/>
<text x="240" y="186" text-anchor="middle" class="H">SURVIVAL PHRASES IN LATIN</text>
<text x="240" y="197" text-anchor="middle" class="Ls">Ubi est aqua? — Where is water?</text>
<text x="240" y="208" text-anchor="middle" class="Ls">Da mihi panem, quaeso. — Give me bread, please.</text>
<text x="240" y="219" text-anchor="middle" class="Ls">Non intellego. — I do not understand.</text>
<text x="240" y="230" text-anchor="middle" class="Ls">Adiuva me! — Help me! (imperative)</text>
<text x="240" y="241" text-anchor="middle" class="Ls">Vale! / Valete! — Farewell! (sg. / pl.)</text>
<text x="240" y="252" text-anchor="middle" class="Ls">Quid est nomen tibi? — What is your name? (lit. "what is the name to you?")</text>
<line x1="20" y1="258" x2="460" y2="258" stroke="black" stroke-width="0.3"/>
<text x="240" y="268" text-anchor="middle" class="H">NUMBERS 1–10</text>
<text x="240" y="279" text-anchor="middle" class="Ls">I unus · II duo · III tres · IV quattuor · V quinque</text>
<text x="240" y="290" text-anchor="middle" class="Ls">VI sex · VII septem · VIII octo · IX novem · X decem</text>
<text x="240" y="301" text-anchor="middle" class="Ls">mille (1000) · centum (100) · the root of Italian mille · cento</text>
<line x1="20" y1="307" x2="460" y2="307" stroke="black" stroke-width="0.3"/>
<text x="240" y="317" text-anchor="middle" class="H">LATIN SAYINGS STILL IN USE</text>
<text x="240" y="328" text-anchor="middle" class="Ls">Veni, vidi, vici — I came, I saw, I conquered (Caesar)</text>
<text x="240" y="339" text-anchor="middle" class="Ls">Carpe diem — Seize the day (Horace)</text>
<text x="240" y="350" text-anchor="middle" class="Ls">In hoc signo vinces — In this sign you shall conquer (Constantine)</text>
<line x1="20" y1="362" x2="460" y2="362" stroke="black" stroke-width="1.5"/>
<rect x="20" y="365" width="440" height="14" fill="black"/>
<text x="240" y="375" text-anchor="middle" class="Hb" fill="white">ITALIAN (ITALIANO) — VOCABULARY: LATIN EVOLVED</text>
<line x1="20" y1="379" x2="460" y2="379" stroke="black" stroke-width="0.3"/>
<text x="240" y="387" text-anchor="middle" class="H">— ITALIAN VOCABULARY: THE DIRECT LINE FROM LATIN —</text>
<text x="100" y="398" text-anchor="middle" class="Lx">LATIN</text>
<text x="240" y="398" text-anchor="middle" class="Lx">ITALIAN</text>
<text x="380" y="398" text-anchor="middle" class="Lx">GLOSS</text>
<line x1="20" y1="402" x2="460" y2="402" stroke="black" stroke-width="0.3"/>
<text x="100" y="411" text-anchor="middle" class="Ls">aqua</text>
<text x="240" y="411" text-anchor="middle" class="Ls">acqua</text>
<text x="380" y="411" text-anchor="middle" class="Ls">water</text>
<text x="100" y="421" text-anchor="middle" class="Ls">ignis</text>
<text x="240" y="421" text-anchor="middle" class="Ls">fuoco (&lt; focus)</text>
<text x="380" y="421" text-anchor="middle" class="Ls">fire (hearth shifted)</text>
<text x="100" y="431" text-anchor="middle" class="Ls">nox/noctis</text>
<text x="240" y="431" text-anchor="middle" class="Ls">notte</text>
<text x="380" y="431" text-anchor="middle" class="Ls">night</text>
<text x="100" y="441" text-anchor="middle" class="Ls">homo/hominis</text>
<text x="240" y="441" text-anchor="middle" class="Ls">uomo</text>
<text x="380" y="441" text-anchor="middle" class="Ls">man/person</text>
<text x="100" y="451" text-anchor="middle" class="Ls">pax/pacis</text>
<text x="240" y="451" text-anchor="middle" class="Ls">pace</text>
<text x="380" y="451" text-anchor="middle" class="Ls">peace</text>
<text x="100" y="461" text-anchor="middle" class="Ls">vita</text>
<text x="240" y="461" text-anchor="middle" class="Ls">vita</text>
<text x="380" y="461" text-anchor="middle" class="Ls">life (unchanged)</text>
<text x="100" y="471" text-anchor="middle" class="Ls">tempus</text>
<text x="240" y="471" text-anchor="middle" class="Ls">tempo</text>
<text x="380" y="471" text-anchor="middle" class="Ls">time / weather</text>
<line x1="20" y1="476" x2="460" y2="476" stroke="black" stroke-width="0.3"/>
<text x="240" y="486" text-anchor="middle" class="H">SURVIVAL PHRASES IN ITALIAN</text>
<text x="240" y="497" text-anchor="middle" class="Ls">Dove'e' l'acqua? — Where is the water?</text>
<text x="240" y="508" text-anchor="middle" class="Ls">Dammi del pane, per favore. — Give me bread, please.</text>
<text x="240" y="519" text-anchor="middle" class="Ls">Non capisco. — I do not understand.</text>
<text x="240" y="530" text-anchor="middle" class="Ls">Aiutatemi! — Help me! (formal plural)</text>
<text x="240" y="541" text-anchor="middle" class="Ls">Arrivederci! — Goodbye! (lit. "until we see each other again")</text>
<line x1="20" y1="547" x2="460" y2="547" stroke="black" stroke-width="0.3"/>
<text x="240" y="557" text-anchor="middle" class="H">NUMBERS 1–10</text>
<text x="240" y="568" text-anchor="middle" class="Ls">uno · due · tre · quattro · cinque</text>
<text x="240" y="579" text-anchor="middle" class="Ls">sei · sette · otto · nove · dieci</text>
<text x="240" y="590" text-anchor="middle" class="Ls">mille (1000) · cento (100) — direct from Latin mille · centum</text>
<line x1="20" y1="596" x2="460" y2="596" stroke="black" stroke-width="0.3"/>
<text x="240" y="606" text-anchor="middle" class="H">ITALIAN: MOST LATIN-PRESERVING ROMANCE LANGUAGE</text>
<text x="240" y="617" text-anchor="middle" class="Ls">Italian retains Latin vowel quality, geminate consonants, and -o/-a endings</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.5"/>
<text x="240" y="620" text-anchor="middle" class="M">PLATE 22C ALT · LATIN / ITALIAN · CORE VOCABULARY · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.5"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
