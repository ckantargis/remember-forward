<text x="240" y="278" text-anchor="middle" class="H" >— VERB SYSTEM — amare "to love" —</text>
<text x="240" y="288" text-anchor="middle" class="Ls" >Latin verbs conjugate for: PERSON (1/2/3) × NUMBER (sg/pl) × TENSE × MOOD × VOICE (active/passive).</text>
<text x="240" y="297" text-anchor="middle" class="Lx" >6 tenses: present, imperfect, future, perfect, pluperfect, future perfect.</text>
<text x="240" y="306" text-anchor="middle" class="Lx" >4 moods: indicative, subjunctive, imperative, infinitive.</text>
<text x="120" y="314" text-anchor="middle" class="Lx" >Present Active Indicative</text>
<text x="70" y="322" text-anchor="middle" class="Lx" >1sg</text>
