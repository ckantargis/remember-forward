<text x="240" y="549" text-anchor="middle" class="H" >— WORD ORDER AND STYLE —</text>
<text x="240" y="560" text-anchor="middle" class="L" >Latin has NO fixed word order — case endings carry meaning. Any order is grammatically valid.</text>
<text x="240" y="570" text-anchor="middle" class="Ls" >Preferred order: SOV in prose (Caesar, Cicero). Verb-final marks emphasis and closure.</text>
<text x="240" y="579" text-anchor="middle" class="Ls" >"Gallia est omnis divisa in partes tres" — Gaul as a whole is divided into three parts (Caesar, BG I.1)</text>
<text x="240" y="588" text-anchor="middle" class="Ls" >Adjectives usually follow their noun; possessives precede; emphatics can go anywhere.</text>
<text x="240" y="597" text-anchor="middle" class="Ls" >No definite or indefinite article (no "the" / "a"). Context determines specificity.</text>
<text x="240" y="606" text-anchor="middle" class="Ls" >Latin vocabulary survives in: ~60% of English vocabulary, legal/scientific/medical terms worldwide.</text>
