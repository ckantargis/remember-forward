<text x="310" y="108" text-anchor="middle" class="Lx" >Puella amat.</text>
<text x="415" y="108" text-anchor="middle" class="Lx" >The girl loves.</text>
<text x="60" y="119" text-anchor="middle" class="Lx" >Genitive</text>
