<text x="240" y="50" text-anchor="middle" class="S" >SERIES 22C OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— INFLECTED LANGUAGE — SIX NOUN CASES —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Latin is highly inflected: endings mark grammatical role, not word order. Word order is flexible.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >Nouns decline for: CASE (6) × NUMBER (singular/plural) × GENDER (M/F/N) × DECLENSION (5 patterns).</text>
<text x="60" y="99" text-anchor="middle" class="Lx" >Case</text>
<text x="115" y="99" text-anchor="middle" class="Lx" >Abbr</text>
<text x="185" y="99" text-anchor="middle" class="Lx" >Function</text>
<text x="310" y="99" text-anchor="middle" class="Lx" >Example</text>
<text x="415" y="99" text-anchor="middle" class="Lx" >Gloss</text>
<text x="60" y="108" text-anchor="middle" class="Lx" >Nominative</text>
