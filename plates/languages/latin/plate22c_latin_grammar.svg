<text x="415" y="119" text-anchor="middle" class="Lx" >love of the girl</text>
<text x="60" y="130" text-anchor="middle" class="Lx" >Dative</text>
<text x="115" y="130" text-anchor="middle" class="Lx" >DAT</text>
<text x="185" y="130" text-anchor="middle" class="Lx" >Indirect object / to</text>
<text x="310" y="130" text-anchor="middle" class="Lx" >dat puellae</text>
<text x="415" y="130" text-anchor="middle" class="Lx" >gives to the girl</text>
<text x="60" y="141" text-anchor="middle" class="Lx" >Accusative</text>
<text x="115" y="141" text-anchor="middle" class="Lx" >ACC</text>
<text x="185" y="141" text-anchor="middle" class="Lx" >Direct object</text>
<text x="310" y="141" text-anchor="middle" class="Lx" >amat puellam</text>
