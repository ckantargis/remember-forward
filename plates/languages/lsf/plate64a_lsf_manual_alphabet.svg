<text x="240" y="324" text-anchor="middle" class="H">— LSF vs ASL ALPHABET DIFFERENCES —</text>
<line x1="362" y1="320" x2="450" y2="320" stroke="#111" stroke-width="0.3"/>
<text x="36" y="332" text-anchor="start" class="Ls">H:</text>
<text x="55" y="332" text-anchor="start" class="Lx">LSF: LSF: index+middle together, palm out, sideways</text>
<text x="55" y="340" text-anchor="start" class="Lx">ASL: ASL: index+middle sideways (similar but distinct palm orientation)</text>
<text x="36" y="350" text-anchor="start" class="Ls">J:</text>
<text x="55" y="350" text-anchor="start" class="Lx">LSF: LSF: J traced with index in the air</text>
<text x="55" y="358" text-anchor="start" class="Lx">ASL: ASL: pinky up, trace J in air (both motion letters)</text>
<text x="36" y="368" text-anchor="start" class="Ls">T:</text>
<text x="55" y="368" text-anchor="start" class="Lx">LSF: LSF: index+middle V, thumb between (different)</text>
<text x="55" y="376" text-anchor="start" class="Lx">ASL: ASL: thumb between index+middle of fist</text>
<text x="36" y="386" text-anchor="start" class="Ls">X:</text>
<text x="55" y="386" text-anchor="start" class="Lx">LSF: LSF: hooked index, touch thumb</text>
<text x="55" y="394" text-anchor="start" class="Lx">ASL: ASL: hooked index (very similar)</text>
<line x1="24" y1="607" x2="456" y2="607" stroke="#111" stroke-width="0.3"/>
