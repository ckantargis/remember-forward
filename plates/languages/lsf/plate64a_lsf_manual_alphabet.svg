<rect x="6" y="6" width="468" height="668" fill="none" stroke="#111" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="#111" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">FRENCH SIGN LANGUAGE (LSF)</text>
<text x="240" y="47" text-anchor="middle" class="S">LANGUE DES SIGNES FRANÇAISE · MANUAL ALPHABET · SERIES 64A</text>
<line x1="24" y1="55" x2="456" y2="55" stroke="#111" stroke-width="0.3"/>
<text x="240" y="65" text-anchor="middle" class="Lx">LSF — Langue des Signes Française — is the sign language of France and parts of French-speaking</text>
<text x="240" y="74" text-anchor="middle" class="Lx">Europe. c. 100,000 native signers. LSF is the PARENT LANGUAGE OF ASL: in 1817, French Deaf</text>
<text x="240" y="83" text-anchor="middle" class="Lx">teacher Laurent Clerc brought LSF to the USA with Thomas Hopkins Gallaudet to found the</text>
<text x="240" y="92" text-anchor="middle" class="Lx">American School for the Deaf. ~58% of modern ASL signs are cognate with historical LSF.</text>
<line x1="24" y1="100" x2="456" y2="100" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="107" x2="118" y2="107" stroke="#111" stroke-width="0.3"/>
<text x="240" y="111" text-anchor="middle" class="H">— HISTORICAL LINEAGE —</text>
<line x1="362" y1="107" x2="450" y2="107" stroke="#111" stroke-width="0.3"/>
<rect x="36" y="118" width="404" height="52" fill="none" stroke="#555" stroke-width="0.5"/>
<text x="240" y="130" text-anchor="middle" class="H">OLD FRENCH SIGN LANGUAGE  (Paris Deaf community, 18th century)</text>
<line x1="240" y1="134" x2="240" y2="142" stroke="#555" stroke-width="0.7"/>
<line x1="120" y1="142" x2="360" y2="142" stroke="#555" stroke-width="0.7"/>
<line x1="120" y1="142" x2="120" y2="150" stroke="#555" stroke-width="0.7"/>
<line x1="360" y1="142" x2="360" y2="150" stroke="#555" stroke-width="0.7"/>
<text x="120" y="158" text-anchor="middle" class="Lx">LSF (modern, France)</text>
<text x="360" y="158" text-anchor="middle" class="Lx">ASL (USA/Canada, 1817+)</text>
<text x="240" y="180" text-anchor="middle" class="Lx">LSF and ASL diverged after 1817 and are now distinct languages (though still cognate-rich).</text>
<line x1="24" y1="190" x2="456" y2="190" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="198" x2="118" y2="198" stroke="#111" stroke-width="0.3"/>
<text x="240" y="202" text-anchor="middle" class="H">— LSF ONE-HANDED MANUAL ALPHABET —</text>
<line x1="362" y1="198" x2="450" y2="198" stroke="#111" stroke-width="0.3"/>
<text x="240" y="208" text-anchor="middle" class="Lx">LSF uses a one-handed fingerspelling alphabet. It differs from ASL in 4 letters: H, J, X, T.</text>
