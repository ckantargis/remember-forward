<text x="240" y="30" text-anchor="middle" class="T">KOREAN + ZHUANG — GRAMMAR · VOCABULARY</text>
<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 50C · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— KOREAN GRAMMAR — SOV · AGGLUTINATIVE · PARTICLES —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Korean is SOV. Particles (postpositions) attach to nouns: 이/가 (subject), 을/를 (object), 에/에서 (location).</text>
<text x="240" y="82" text-anchor="middle" class="Lx">Rich honorific system: verb endings change depending on relative social status of speaker and listener.</text>
<line x1="20" y1="90" x2="460" y2="90" stroke="black" stroke-width="0.3"/>
<text x="240" y="98" text-anchor="middle" class="H">— KOREAN PARTICLES —</text>
<text x="60" y="108" text-anchor="middle" class="Ls">이/가</text>
<text x="290" y="108" text-anchor="middle" class="Lx">subject marker: 채미가 맛있다 (food is tasty)</text>
<text x="60" y="118" text-anchor="middle" class="Ls">은/는</text>
<text x="290" y="118" text-anchor="middle" class="Lx">topic marker: 나는 학생이다 (I [topic] am a student)</text>
<text x="60" y="128" text-anchor="middle" class="Ls">을/를</text>
<text x="290" y="128" text-anchor="middle" class="Lx">object marker: 책을 읽다 (read a book)</text>
<text x="60" y="138" text-anchor="middle" class="Ls">에</text>
<text x="290" y="138" text-anchor="middle" class="Lx">location/time: 학교에 (at school), 3시에 (at 3 o’clock)</text>
<text x="60" y="148" text-anchor="middle" class="Ls">에서</text>
<text x="290" y="148" text-anchor="middle" class="Lx">action location: 하교에서 (at school, doing action)</text>
<text x="60" y="158" text-anchor="middle" class="Ls">의</text>
<text x="290" y="158" text-anchor="middle" class="Lx">genitive: 나의 쳐 (my book)</text>
<line x1="20" y1="175" x2="460" y2="175" stroke="black" stroke-width="0.3"/>
