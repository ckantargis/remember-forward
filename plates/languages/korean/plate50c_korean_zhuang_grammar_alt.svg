<text x="240" y="251" text-anchor="middle" class="Hb" fill="white">SECONDARY — ZHUANG (CUENGH) — GRAMMAR · VOCABULARY</text>
<line x1="20" y1="255" x2="460" y2="255" stroke="black" stroke-width="0.3"/>
<text x="240" y="264" text-anchor="middle" class="H">— ZHUANG GRAMMAR — SVO · ISOLATING · CLASSIFIERS —</text>
<text x="240" y="274" text-anchor="middle" class="Ls">Zhuang is SVO and isolating. Korean (SOV) and Zhuang (SVO) are typological opposites in word order.</text>
<text x="240" y="283" text-anchor="middle" class="Lx">Both: no grammatical gender. Both: aspect over tense. Zhuang: noun classifiers. Korean: postpositions.</text>
<line x1="20" y1="291" x2="460" y2="291" stroke="black" stroke-width="0.3"/>
<text x="240" y="299" text-anchor="middle" class="H">— ZHUANG CLASSIFIERS — SAMPLE —</text>
<text x="60" y="309" text-anchor="middle" class="Ls">boux</text>
<text x="300" y="309" text-anchor="middle" class="Lx">human: boux vunz (a person), boux lwgnyez (a child)</text>
<text x="60" y="319" text-anchor="middle" class="Ls">duz</text>
<text x="300" y="319" text-anchor="middle" class="Lx">animal: duz ma (a dog), duz gaeq (a chicken)</text>
<text x="60" y="329" text-anchor="middle" class="Ls">aen</text>
<text x="300" y="329" text-anchor="middle" class="Lx">round/3D: aen ndwen (the moon), aen gij (something)</text>
<text x="60" y="339" text-anchor="middle" class="Ls">mbat</text>
<text x="300" y="339" text-anchor="middle" class="Lx">flat: mbat saw (a book), mbat bohmeh (a paper)</text>
<line x1="20" y1="358" x2="460" y2="358" stroke="black" stroke-width="0.3"/>
<text x="240" y="366" text-anchor="middle" class="H">— ZHUANG CORE VOCABULARY —</text>
