<text x="122" y="406" text-anchor="middle" class="Lx">love</text>
<text x="190" y="406" text-anchor="middle" class="Ls">seiqgyaiq</text>
<text x="252" y="406" text-anchor="middle" class="Lx">world</text>
<text x="320" y="406" text-anchor="middle" class="Ls">mingh</text>
<text x="382" y="406" text-anchor="middle" class="Lx">life</text>
<line x1="20" y1="420" x2="460" y2="420" stroke="black" stroke-width="0.3"/>
<text x="240" y="428" text-anchor="middle" class="H">— GRAMMAR BRIDGE — SOV ISOLATE MEETS SVO CLASSIFIER —</text>
<text x="240" y="438" text-anchor="middle" class="Ls">Korean (SOV): nō-ga mul-eul masinda. I-SUBJ water-OBJ drink. = I drink water.</text>
<text x="240" y="447" text-anchor="middle" class="Ls">Zhuang (SVO): Gou gwn raemx. I drink water. No particles, no inflection, 6 tones carry meaning.</text>
<text x="240" y="456" text-anchor="middle" class="Lx">Korean: agglutinative (many suffixes). Zhuang: isolating (no morphological marking). Maximum contrast.</text>
