<text x="122" y="386" text-anchor="middle" class="Lx">person</text>
<text x="190" y="386" text-anchor="middle" class="Ls">ndwen</text>
<text x="252" y="386" text-anchor="middle" class="Lx">moon</text>
<text x="320" y="386" text-anchor="middle" class="Ls">naengh</text>
<text x="382" y="386" text-anchor="middle" class="Lx">remember</text>
<text x="60" y="396" text-anchor="middle" class="Ls">laeng</text>
<text x="122" y="396" text-anchor="middle" class="Lx">future/forward</text>
