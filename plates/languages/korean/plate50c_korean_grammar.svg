<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<defs><style>
text{font-family:Georgia,serif;}
.T{font-size:12px;font-weight:bold;letter-spacing:2px;}
.S{font-size:7px;letter-spacing:1.5px;}
.H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.Lk{font-size:11px;}
.Lks{font-size:8px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >KOREAN</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — SOV, AGGLUTINATIVE —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Korean is SOV. Particles follow nouns; verb always final. Very regular agglutination.</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >나는 밥을 먹는다. I rice eat. (na=I neun=TOP bap=rice eul=OBJ meoknunda=eat)</text>
<line x1="20" y1="100" x2="460" y2="100" stroke="black" stroke-width="0.3"/>
<text x="240" y="109" text-anchor="middle" class="H" >— CASE PARTICLES —</text>
<text x="80" y="119" text-anchor="middle" class="Lx" >은/는 -eun/-neun: topic marker</text>
<text x="280" y="119" text-anchor="middle" class="Lx" >이/가 -i/-ga: subject marker</text>
<text x="80" y="129" text-anchor="middle" class="Lx" >을/를 -eul/-reul: object marker</text>
<text x="280" y="129" text-anchor="middle" class="Lx" >에 -e: locative/time marker</text>
<text x="80" y="139" text-anchor="middle" class="Lx" >에서 -eseo: from/at (action)</text>
<text x="280" y="139" text-anchor="middle" class="Lx" >에게 -ege: to (person)</text>
<text x="80" y="149" text-anchor="middle" class="Lx" >으로/로 -euro/-ro: direction/means</text>
<text x="280" y="149" text-anchor="middle" class="Lx" >와/과 -wa/-gwa: and/with</text>
<line x1="20" y1="203" x2="460" y2="203" stroke="black" stroke-width="0.3"/>
<text x="240" y="212" text-anchor="middle" class="H" >— HONORIFIC SYSTEM —</text>
<text x="240" y="222" text-anchor="middle" class="Ls" >Korean has elaborate speech levels encoding social relationship:</text>
<text x="100" y="232" text-anchor="middle" class="Ls" >해요체</text>
<text x="300" y="232" text-anchor="middle" class="Lx" >Haeyoche: polite informal (먹어요 = eat [polite])</text>
<text x="100" y="243" text-anchor="middle" class="Ls" >합쇼체</text>
<text x="300" y="243" text-anchor="middle" class="Lx" >Hapssoche: formal polite (먹습니다 = eat [formal])</text>
<text x="100" y="254" text-anchor="middle" class="Ls" >해체</text>
<text x="300" y="254" text-anchor="middle" class="Lx" >Haeyche: informal casual (먹어 = eat [casual to close friend])</text>
<text x="100" y="265" text-anchor="middle" class="Ls" >해라체</text>
<text x="300" y="265" text-anchor="middle" class="Lx" >Haerache: plain (먹는다 = eat [written/narrative])</text>
<line x1="20" y1="285" x2="460" y2="285" stroke="black" stroke-width="0.3"/>
<text x="240" y="294" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
<text x="50" y="304" text-anchor="middle" class="Lks" >안녕하세요</text>
<text x="185" y="304" text-anchor="middle" class="Lx" >hello</text>
<text x="50" y="314" text-anchor="middle" class="Lks" >감사합니다</text>
<text x="185" y="314" text-anchor="middle" class="Lx" >thank you</text>
<text x="50" y="324" text-anchor="middle" class="Lks" >네</text>
<text x="185" y="324" text-anchor="middle" class="Lx" >yes</text>
<text x="50" y="334" text-anchor="middle" class="Lks" >아니요</text>
<text x="185" y="334" text-anchor="middle" class="Lx" >no</text>
<text x="50" y="344" text-anchor="middle" class="Lks" >죄송합니다</text>
<text x="185" y="344" text-anchor="middle" class="Lx" >I'm sorry</text>
<text x="50" y="354" text-anchor="middle" class="Lks" >어떻게 지내세요?</text>
<text x="185" y="354" text-anchor="middle" class="Lx" >how are you?</text>
<text x="50" y="364" text-anchor="middle" class="Lks" >잘 지내요</text>
<text x="185" y="364" text-anchor="middle" class="Lx" >I'm fine</text>
<text x="50" y="374" text-anchor="middle" class="Lks" >사랑해요</text>
<text x="185" y="374" text-anchor="middle" class="Lx" >I love you</text>
<text x="50" y="384" text-anchor="middle" class="Lks" >물</text>
<text x="185" y="384" text-anchor="middle" class="Lx" >water</text>
<text x="50" y="394" text-anchor="middle" class="Lks" >불</text>
<text x="185" y="394" text-anchor="middle" class="Lx" >fire</text>
<text x="50" y="404" text-anchor="middle" class="Lks" >땅</text>
<text x="185" y="404" text-anchor="middle" class="Lx" >earth/ground</text>
<text x="285" y="304" text-anchor="middle" class="Lks" >사람</text>
<text x="420" y="304" text-anchor="middle" class="Lx" >person</text>
<text x="285" y="314" text-anchor="middle" class="Lks" >시간</text>
<text x="420" y="314" text-anchor="middle" class="Lx" >time</text>
<text x="285" y="324" text-anchor="middle" class="Lks" >달</text>
<text x="420" y="324" text-anchor="middle" class="Lx" >moon</text>
<text x="285" y="334" text-anchor="middle" class="Lks" >별</text>
<text x="420" y="334" text-anchor="middle" class="Lx" >star</text>
<text x="285" y="344" text-anchor="middle" class="Lks" >마음</text>
<text x="420" y="344" text-anchor="middle" class="Lx" >heart/mind</text>
<text x="285" y="354" text-anchor="middle" class="Lks" >사랑</text>
<text x="420" y="354" text-anchor="middle" class="Lx" >love</text>
<text x="285" y="364" text-anchor="middle" class="Lks" >자유</text>
<text x="420" y="364" text-anchor="middle" class="Lx" >freedom</text>
<text x="285" y="374" text-anchor="middle" class="Lks" >기억</text>
<text x="420" y="374" text-anchor="middle" class="Lx" >memory</text>
<text x="285" y="384" text-anchor="middle" class="Lks" >미래</text>
<text x="420" y="384" text-anchor="middle" class="Lx" >future</text>
<text x="285" y="394" text-anchor="middle" class="Lks" >세상</text>
<text x="420" y="394" text-anchor="middle" class="Lx" >world</text>
<text x="285" y="404" text-anchor="middle" class="Lks" >생명</text>
<text x="420" y="404" text-anchor="middle" class="Lx" >life</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 50C — KOREAN: GRAMMAR — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
