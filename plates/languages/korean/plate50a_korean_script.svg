<line x1="20" y1="265" x2="460" y2="265" stroke="black" stroke-width="0.3"/>
<text x="240" y="274" text-anchor="middle" class="H" >— SYLLABLE BLOCK STRUCTURE —</text>
<text x="240" y="284" text-anchor="middle" class="Ls" >Syllables assembled in blocks: Initial consonant (onset) + vowel + optional final consonant (coda).</text>
<text x="240" y="294" text-anchor="middle" class="Ls" >Example: 한 = ㅎ + ㅡ + ㄴ (h + eu + n = han). 글 = ㄱ + ㅳ + ㄹ (g + eu + l = geul).</text>
<text x="240" y="304" text-anchor="middle" class="Ls" >Vowels written below horizontal consonants, right of vertical consonants.</text>
<line x1="20" y1="312" x2="460" y2="312" stroke="black" stroke-width="0.3"/>
<text x="240" y="321" text-anchor="middle" class="H" >— KOREAN NUMERALS — TWO SYSTEMS —</text>
<text x="240" y="331" text-anchor="middle" class="Ls" >Korean has Sino-Korean (Chinese-based) and Native Korean number systems:</text>
<text x="240" y="341" text-anchor="middle" class="Lk" >Sino: 일(一) 이(二) 삼(三) 사(四) 오(五) 육(六) 칠(七) 팔(八) 구(九) 십(十)</text>
<text x="240" y="354" text-anchor="middle" class="Lk" >Native: 하나 둘 셋 넷 다섯 여섯 일곱 여덟 아홉 열</text>
<text x="240" y="367" text-anchor="middle" class="Ls" >Sino used for dates, money, addresses; Native for counting objects, age (older style).</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 50A — KOREAN: SCRIPT — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
