<text x="50" y="176" text-anchor="middle" class="Lx" >j /tɕʰ/</text>
<text x="148" y="167" text-anchor="middle" class="Lk" >ㅉ</text>
<text x="148" y="176" text-anchor="middle" class="Lx" >jj /tɕ*/ tense</text>
<text x="246" y="167" text-anchor="middle" class="Lk" >ㅊ</text>
