<text x="240" y="32" text-anchor="middle" class="T" >KOREAN</text>
<text x="240" y="50" text-anchor="middle" class="S" >한국어 — Script: Hangeul (한글)</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— HANGEUL — THE KOREAN ALPHABET —</text>
<text x="240" y="84" text-anchor="middle" class="Ls" >Hangeul created 1443 CE by King Sejong. One of the few scripts with a known author.</text>
<text x="240" y="94" text-anchor="middle" class="Ls" >Featural alphabet: letter shapes encode phonetic features (place/manner of articulation).</text>
<text x="240" y="104" text-anchor="middle" class="Ls" >Letters combined into syllable blocks. Each block = one syllable.</text>
<line x1="20" y1="112" x2="460" y2="112" stroke="black" stroke-width="0.3"/>
<text x="240" y="121" text-anchor="middle" class="H" >— CONSONANTS (JAMO) — 19 LETTERS —</text>
