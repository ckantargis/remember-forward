<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<defs><style>
text{font-family:Georgia,serif;}
.T{font-size:12px;font-weight:bold;letter-spacing:2px;}
.S{font-size:7px;letter-spacing:1.5px;}
.H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >TURKISH</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — SOV, AGGLUTINATIVE —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Turkish is SOV and highly agglutinative. Suffixes stack in fixed order.</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >Ben pilav yiyorum. I rice eating-am. (ben=I pilav=rice yiyorum=eat-PRES-1sg)</text>
<line x1="20" y1="100" x2="460" y2="100" stroke="black" stroke-width="0.3"/>
<text x="240" y="109" text-anchor="middle" class="H" >— CASE SUFFIXES (VOWEL HARMONISED) —</text>
<text x="120" y="119" text-anchor="middle" class="Ls" >-(y)I / -(y)ı</text>
<text x="300" y="119" text-anchor="middle" class="Ls" >-i/ı: accusative (direct object)</text>
<text x="120" y="129" text-anchor="middle" class="Ls" >-A / -ı</text>
<text x="300" y="129" text-anchor="middle" class="Ls" >-e/a: dative (to/for)</text>
<text x="120" y="139" text-anchor="middle" class="Ls" >-DA / -dı</text>
<text x="300" y="139" text-anchor="middle" class="Ls" >-de/da/-te/ta: locative (at/in)</text>
<text x="120" y="149" text-anchor="middle" class="Ls" >-DAn / -dın</text>
<text x="300" y="149" text-anchor="middle" class="Ls" >-den/dan: ablative (from)</text>
<text x="120" y="159" text-anchor="middle" class="Ls" >-(n)ın / -(n)in</text>
<text x="300" y="159" text-anchor="middle" class="Ls" >-in/ın: genitive (of/'s)</text>
<text x="120" y="169" text-anchor="middle" class="Ls" >-lA / -la</text>
<text x="300" y="169" text-anchor="middle" class="Ls" >-le/la: comitative (with)</text>
<line x1="20" y1="185" x2="460" y2="185" stroke="black" stroke-width="0.3"/>
<text x="240" y="194" text-anchor="middle" class="H" >— VERB MORPHOLOGY — SUFFIX TEMPLATE —</text>
<text x="240" y="204" text-anchor="middle" class="Ls" >Verb: Root + Aspect/Tense + Negation + Person/Number</text>
<text x="130" y="214" text-anchor="middle" class="L" >git-iyor-um</text>
<text x="320" y="214" text-anchor="middle" class="Ls" >I am going (root-PROG-1sg)</text>
<text x="130" y="224" text-anchor="middle" class="L" >git-ti-m</text>
<text x="320" y="224" text-anchor="middle" class="Ls" >I went (root-PAST-1sg)</text>
<text x="130" y="234" text-anchor="middle" class="L" >git-ecek-im</text>
<text x="320" y="234" text-anchor="middle" class="Ls" >I will go (root-FUT-1sg)</text>
<text x="130" y="244" text-anchor="middle" class="L" >git-me-iyor-um</text>
<text x="320" y="244" text-anchor="middle" class="Ls" >I am not going (neg -me-)</text>
<text x="130" y="254" text-anchor="middle" class="L" >git-miş</text>
<text x="320" y="254" text-anchor="middle" class="Ls" >he/she went (evidential past: -miş)</text>
<text x="130" y="264" text-anchor="middle" class="L" >git!</text>
<text x="320" y="264" text-anchor="middle" class="Ls" >Go! (imperative: bare root)</text>
<line x1="20" y1="280" x2="460" y2="280" stroke="black" stroke-width="0.3"/>
<text x="240" y="289" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
<text x="50" y="299" text-anchor="middle" class="Ls" >merhaba</text>
<text x="175" y="299" text-anchor="middle" class="Lx" >hello</text>
<text x="50" y="309" text-anchor="middle" class="Ls" >teşekkür ederim</text>
<text x="175" y="309" text-anchor="middle" class="Lx" >thank you</text>
<text x="50" y="319" text-anchor="middle" class="Ls" >evet</text>
<text x="175" y="319" text-anchor="middle" class="Lx" >yes</text>
<text x="50" y="329" text-anchor="middle" class="Ls" >hayır</text>
<text x="175" y="329" text-anchor="middle" class="Lx" >no</text>
<text x="50" y="339" text-anchor="middle" class="Ls" >pardon / özür dilerim</text>
<text x="175" y="339" text-anchor="middle" class="Lx" >excuse me</text>
<text x="50" y="349" text-anchor="middle" class="Ls" >nasılsınız?</text>
<text x="175" y="349" text-anchor="middle" class="Lx" >how are you?</text>
<text x="50" y="359" text-anchor="middle" class="Ls" >İyiyim, teşekkürler</text>
<text x="175" y="359" text-anchor="middle" class="Lx" >I am fine, thanks</text>
<text x="50" y="369" text-anchor="middle" class="Ls" >seni seviyorum</text>
<text x="175" y="369" text-anchor="middle" class="Lx" >I love you</text>
<text x="50" y="379" text-anchor="middle" class="Ls" >su</text>
<text x="175" y="379" text-anchor="middle" class="Lx" >water</text>
<text x="50" y="389" text-anchor="middle" class="Ls" >ateş</text>
<text x="175" y="389" text-anchor="middle" class="Lx" >fire</text>
<text x="50" y="399" text-anchor="middle" class="Ls" >toprak</text>
<text x="175" y="399" text-anchor="middle" class="Lx" >earth</text>
<text x="50" y="409" text-anchor="middle" class="Ls" >insan</text>
<text x="175" y="409" text-anchor="middle" class="Lx" >person</text>
<text x="285" y="299" text-anchor="middle" class="Ls" >zaman</text>
<text x="410" y="299" text-anchor="middle" class="Lx" >time</text>
<text x="285" y="309" text-anchor="middle" class="Ls" >ay</text>
<text x="410" y="309" text-anchor="middle" class="Lx" >moon</text>
<text x="285" y="319" text-anchor="middle" class="Ls" >yıldız</text>
<text x="410" y="319" text-anchor="middle" class="Lx" >star</text>
<text x="285" y="329" text-anchor="middle" class="Ls" >kalp</text>
<text x="410" y="329" text-anchor="middle" class="Lx" >heart</text>
<text x="285" y="339" text-anchor="middle" class="Ls" >aşk</text>
<text x="410" y="339" text-anchor="middle" class="Lx" >love</text>
<text x="285" y="349" text-anchor="middle" class="Ls" >özgürlük</text>
<text x="410" y="349" text-anchor="middle" class="Lx" >freedom</text>
<text x="285" y="359" text-anchor="middle" class="Ls" >hatıra</text>
<text x="410" y="359" text-anchor="middle" class="Lx" >memory</text>
<text x="285" y="369" text-anchor="middle" class="Ls" >gelecek</text>
<text x="410" y="369" text-anchor="middle" class="Lx" >future</text>
<text x="285" y="379" text-anchor="middle" class="Ls" >dünya</text>
<text x="410" y="379" text-anchor="middle" class="Lx" >world</text>
<text x="285" y="389" text-anchor="middle" class="Ls" >hayat</text>
<text x="410" y="389" text-anchor="middle" class="Lx" >life</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 51C — TURKISH: GRAMMAR — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
