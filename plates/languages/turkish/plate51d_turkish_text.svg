<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<defs><style>
text{font-family:Georgia,serif;}
.T{font-size:12px;font-weight:bold;letter-spacing:2px;}
.S{font-size:7px;letter-spacing:1.5px;}
.H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >TURKISH</text>
<text x="240" y="50" text-anchor="middle" class="S" >Running Text — Four Passages + Bridge Phrase</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="70" text-anchor="middle" class="H" >— I. ATASOZÜ — PROVERB —</text>
<text x="240" y="80" text-anchor="middle" class="L" >Bir mum diğerini yakmakla ışığını kaybetmez.</text>
<text x="240" y="90" text-anchor="middle" class="Lx" >bir=a mum=candle diğerini=another yak-mak-la=in-lighting ışığını=its-light kayb-et-mez=does-not-lose</text>
<text x="240" y="100" text-anchor="middle" class="F" >"A candle loses none of its light by lighting another." (Turkish proverb on sharing knowledge)</text>
<line x1="20" y1="109" x2="460" y2="109" stroke="black" stroke-width="0.3"/>
<text x="240" y="118" text-anchor="middle" class="H" >— II. HATİRA — ON MEMORY —</text>
<text x="240" y="128" text-anchor="middle" class="L" >Geçmişi hatırlayanlar, geleceği inşa edenlerdir.</text>
<text x="240" y="138" text-anchor="middle" class="Ls" >geçmişi=past-ACC hatırlayanlar=those-who-remember geleceği=future-ACC</text>
<text x="240" y="148" text-anchor="middle" class="Ls" >inşa-edenler-dir=are-those-who-build</text>
<text x="240" y="158" text-anchor="middle" class="F" >"Those who remember the past are those who build the future."</text>
<line x1="20" y1="167" x2="460" y2="167" stroke="black" stroke-width="0.3"/>
<text x="240" y="176" text-anchor="middle" class="H" >— III. BİLGİ — ON KNOWLEDGE —</text>
<text x="240" y="186" text-anchor="middle" class="L" >Bilgi en değerli hazinedir; paylaşıldıkça çoğalir.</text>
<text x="240" y="196" text-anchor="middle" class="Ls" >bilgi=knowledge en-değerli=most-valuable hazinedir=is-treasure</text>
<text x="240" y="206" text-anchor="middle" class="Ls" >paylaşıldıkça=as-it-is-shared çoğalir=multiplies</text>
<text x="240" y="216" text-anchor="middle" class="F" >"Knowledge is the most valuable treasure; the more it is shared, the more it grows."</text>
<line x1="20" y1="225" x2="460" y2="225" stroke="black" stroke-width="0.3"/>
<text x="240" y="234" text-anchor="middle" class="H" >— IV. İLERİ — FORWARD —</text>
<text x="240" y="244" text-anchor="middle" class="L" >Geçmişi hatırlayarak ileriye yürüyürz.</text>
<text x="240" y="254" text-anchor="middle" class="Ls" >geçmişi=past-ACC hatırlayarak=while-remembering ileriye=toward-the-front</text>
<text x="240" y="264" text-anchor="middle" class="Ls" >yürüyürz=we-walk</text>
<text x="240" y="274" text-anchor="middle" class="F" >"We walk forward while remembering the past." (guiding principle)</text>
<line x1="20" y1="283" x2="460" y2="283" stroke="black" stroke-width="0.3"/>
<text x="240" y="292" text-anchor="middle" class="H" >— V. BRIDGE PHRASE —</text>
<text x="240" y="305" text-anchor="middle" class="L" >Bu, sizin için, ücretsız olarak,</text>
<text x="240" y="315" text-anchor="middle" class="L" >ileriye hatırlayan insanlar tarafından yapıldı.</text>
<text x="240" y="329" text-anchor="middle" class="Ls" >bu=this sizin-için=for-you ücretsiz-olarak=free-of-charge (suffix -sız = without)</text>
<text x="240" y="338" text-anchor="middle" class="Ls" >ileriye=toward-forward hatırlayan=remembering insanlar=people</text>
<text x="240" y="347" text-anchor="middle" class="Ls" >tarafından=by yapıldı=was-made</text>
<text x="240" y="359" text-anchor="middle" class="F" >"This was made for you, freely, by people who remembered forward."</text>
<line x1="20" y1="370" x2="460" y2="370" stroke="black" stroke-width="0.3"/>
<text x="240" y="379" text-anchor="middle" class="H" >— BRIDGE PHRASE — NOTES —</text>
<text x="240" y="389" text-anchor="middle" class="Ls" >İleriye (İleri + dative -ye) = "toward forward/ahead." İleri = front/forward.</text>
<text x="240" y="399" text-anchor="middle" class="Ls" >Ücretsiz = free/without cost (ücret=fee + -siz=without, vowel harmony).</text>
<text x="240" y="409" text-anchor="middle" class="Ls" >Hatırlamak = to remember. -arak gerund: while remembering.</text>
<text x="240" y="419" text-anchor="middle" class="Ls" >Turkish SOV: all modifiers precede the verb; verb always final.</text>
<line x1="20" y1="427" x2="460" y2="427" stroke="black" stroke-width="0.3"/>
<text x="240" y="436" text-anchor="middle" class="H" >— LANGUAGE NOTES —</text>
<text x="240" y="446" text-anchor="middle" class="Ls" >Turkish: ~90 million L1 speakers; official in Turkey, Northern Cyprus.</text>
<text x="240" y="456" text-anchor="middle" class="Ls" >Language family: Turkic (with Azerbaijani, Uzbek, Kazakh, Uyghur, Kyrgyz).</text>
<text x="240" y="466" text-anchor="middle" class="Ls" >Ottoman Turkish written in Arabic script until Atatürk's 1928 Latin script reform.</text>
<text x="240" y="476" text-anchor="middle" class="Ls" >Vowel harmony and agglutination are defining features of the Turkic language family.</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 51D — TURKISH: RUNNING TEXT — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
