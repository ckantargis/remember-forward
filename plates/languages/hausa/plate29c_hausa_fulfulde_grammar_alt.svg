<text x="190" y="203" text-anchor="middle" class="Ls">wata</text>
<text x="248" y="203" text-anchor="middle" class="Lx">moon</text>
<text x="320" y="203" text-anchor="middle" class="Ls">tuna</text>
<text x="378" y="203" text-anchor="middle" class="Lx">remember</text>
<text x="60" y="213" text-anchor="middle" class="Ls">gaba</text>
<text x="118" y="213" text-anchor="middle" class="Lx">forward/future</text>
<text x="190" y="213" text-anchor="middle" class="Ls">yanci</text>
<text x="248" y="213" text-anchor="middle" class="Lx">freedom</text>
<text x="320" y="213" text-anchor="middle" class="Ls">zuciya</text>
<text x="378" y="213" text-anchor="middle" class="Lx">heart</text>
<text x="60" y="223" text-anchor="middle" class="Ls">ʁankāka</text>
<text x="118" y="223" text-anchor="middle" class="Lx">love</text>
<text x="190" y="223" text-anchor="middle" class="Ls">duniya</text>
<text x="248" y="223" text-anchor="middle" class="Lx">world</text>
<text x="320" y="223" text-anchor="middle" class="Ls">rai</text>
<text x="378" y="223" text-anchor="middle" class="Lx">life</text>
<line x1="20" y1="238" x2="460" y2="238" stroke="black" stroke-width="1.5"/>
<rect x="20" y="241" width="440" height="14" fill="black"/>
<text x="240" y="251" text-anchor="middle" class="Hb" fill="white">SECONDARY — FULFULDE — GRAMMAR · NOUN CLASS SYSTEM</text>
<line x1="20" y1="255" x2="460" y2="255" stroke="black" stroke-width="0.3"/>
<text x="240" y="264" text-anchor="middle" class="H">— FULFULDE — NOUN CLASS SYSTEM (25+ CLASSES) —</text>
<text x="240" y="274" text-anchor="middle" class="Ls">Fulfulde has one of the most complex noun class systems in the world: ~25 grammatical noun classes.</text>
<text x="240" y="283" text-anchor="middle" class="Lx">Each class has its own agreement suffix on nouns, adjectives, verbs, and pronouns. Class signals meaning.</text>
<text x="240" y="292" text-anchor="middle" class="Lx">Typical singular/plural pairs: o/ɓe (human), ŋu/ɗi (thing), ngu/ɗi (liquid), ko/ɗe (abstract).</text>
<line x1="20" y1="300" x2="460" y2="300" stroke="black" stroke-width="0.3"/>
<text x="240" y="308" text-anchor="middle" class="H">— FULFULDE NOUN CLASS SAMPLES —</text>
<text x="80" y="318" text-anchor="middle" class="Ls">Class o/ɓe</text>
<text x="210" y="318" text-anchor="middle" class="Lx">human singular/plural</text>
<text x="370" y="318" text-anchor="middle" class="Lx">gorko (man) → worɓe (men)</text>
<text x="80" y="328" text-anchor="middle" class="Ls">Class ngu/ɗi</text>
<text x="210" y="328" text-anchor="middle" class="Lx">liquid/mass</text>
<text x="370" y="328" text-anchor="middle" class="Lx">ɗam-ngu (the water) → ɗam-ɗi (waters)</text>
<text x="80" y="338" text-anchor="middle" class="Ls">Class ŋu/ɗi</text>
<text x="210" y="338" text-anchor="middle" class="Lx">large object</text>
<text x="370" y="338" text-anchor="middle" class="Lx">naŋga-ŋu (the cow) → naŋe-ɗi (cows)</text>
<text x="80" y="348" text-anchor="middle" class="Ls">Class ko/ɗe</text>
<text x="210" y="348" text-anchor="middle" class="Lx">abstract/action</text>
<text x="370" y="348" text-anchor="middle" class="Lx">jam-ko (the peace) — no plural</text>
<text x="80" y="358" text-anchor="middle" class="Ls">Class nga/ɗi</text>
<text x="210" y="358" text-anchor="middle" class="Lx">small object</text>
<text x="370" y="358" text-anchor="middle" class="Lx">nedda-nga (the body)</text>
<line x1="20" y1="375" x2="460" y2="375" stroke="black" stroke-width="0.3"/>
<text x="240" y="383" text-anchor="middle" class="H">— FULFULDE VERB SYSTEM — SOV WITH EXTENSIONS —</text>
<text x="240" y="393" text-anchor="middle" class="Ls">Fulfulde is largely SOV. Verbal extensions (suffixes) encode direction, benefactive, reflexive, causative.</text>
<text x="240" y="402" text-anchor="middle" class="Lx">wiɛ-a (say-complete), wiɛ-ude (to say/infinitive), wiɛ-ir-de (say-BEN-inf) = to say for someone.</text>
<line x1="20" y1="410" x2="460" y2="410" stroke="black" stroke-width="0.3"/>
<text x="240" y="418" text-anchor="middle" class="H">— FULFULDE CORE VOCABULARY —</text>
<text x="60" y="428" text-anchor="middle" class="Ls">ɗam</text>
<text x="120" y="428" text-anchor="middle" class="Lx">water</text>
<text x="190" y="428" text-anchor="middle" class="Ls">jayngol</text>
<text x="250" y="428" text-anchor="middle" class="Lx">fire</text>
