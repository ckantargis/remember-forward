<text x="240" y="30" text-anchor="middle" class="T">HAUSA + FULFULDE — GRAMMAR · VOCABULARY</text>
<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 29C · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— HAUSA GRAMMAR — SVO · TONAL GRAMMAR · GENDER —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Hausa is SVO. Grammatical information encoded partly by tone: subject vs. object forms of verbs differ by tone.</text>
<text x="240" y="82" text-anchor="middle" class="Lx">2 genders: masculine and feminine. No articles. Definiteness marked by demonstratives and context.</text>
<line x1="20" y1="90" x2="460" y2="90" stroke="black" stroke-width="0.3"/>
<text x="240" y="98" text-anchor="middle" class="H">— HAUSA ASPECT — NO TENSE, YES ASPECT —</text>
<text x="240" y="108" text-anchor="middle" class="Ls">Hausa marks ASPECT, not tense. Pre-verbal particles signal completive, continuative, subjunctive, negative.</text>
<text x="100" y="118" text-anchor="middle" class="Lx">Completive</text>
<text x="230" y="118" text-anchor="middle" class="Ls">naa tafi</text>
<text x="370" y="118" text-anchor="middle" class="Lx">I went / I have gone</text>
<text x="100" y="128" text-anchor="middle" class="Lx">Continuative</text>
<text x="230" y="128" text-anchor="middle" class="Ls">ina tafiya</text>
<text x="370" y="128" text-anchor="middle" class="Lx">I am going / I go (habitual)</text>
<text x="100" y="138" text-anchor="middle" class="Lx">Subjunctive</text>
<text x="230" y="138" text-anchor="middle" class="Ls">in tafi</text>
<text x="370" y="138" text-anchor="middle" class="Lx">that I go / let me go</text>
<text x="100" y="148" text-anchor="middle" class="Lx">Neg. completive</text>
<text x="230" y="148" text-anchor="middle" class="Ls">ban tafi ba</text>
<text x="370" y="148" text-anchor="middle" class="Lx">I did not go</text>
<text x="100" y="158" text-anchor="middle" class="Lx">Future intent</text>
<text x="230" y="158" text-anchor="middle" class="Ls">zan tafi</text>
<text x="370" y="158" text-anchor="middle" class="Lx">I will go / I intend to go</text>
<line x1="20" y1="175" x2="460" y2="175" stroke="black" stroke-width="0.3"/>
<text x="240" y="183" text-anchor="middle" class="H">— HAUSA CORE VOCABULARY —</text>
