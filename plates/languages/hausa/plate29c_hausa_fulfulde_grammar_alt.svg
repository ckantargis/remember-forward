<text x="60" y="438" text-anchor="middle" class="Ls">gorko/debbo</text>
<text x="120" y="438" text-anchor="middle" class="Lx">man/woman</text>
<text x="190" y="438" text-anchor="middle" class="Ls">lewru</text>
<text x="250" y="438" text-anchor="middle" class="Lx">moon</text>
<text x="320" y="438" text-anchor="middle" class="Ls">tigiɳi</text>
<text x="380" y="438" text-anchor="middle" class="Lx">remember</text>
<text x="60" y="448" text-anchor="middle" class="Ls">gaweɗi</text>
<text x="120" y="448" text-anchor="middle" class="Lx">future/forward</text>
<text x="190" y="448" text-anchor="middle" class="Ls">yiylaare</text>
<text x="250" y="448" text-anchor="middle" class="Lx">freedom</text>
<text x="320" y="448" text-anchor="middle" class="Ls">ƙŋuŋgu</text>
<text x="380" y="448" text-anchor="middle" class="Lx">heart</text>
<text x="60" y="458" text-anchor="middle" class="Ls">jɛlɛ</text>
<text x="120" y="458" text-anchor="middle" class="Lx">love</text>
<text x="190" y="458" text-anchor="middle" class="Ls">aduna</text>
<text x="250" y="458" text-anchor="middle" class="Lx">world</text>
<text x="320" y="458" text-anchor="middle" class="Ls">ɛndu</text>
<text x="380" y="458" text-anchor="middle" class="Lx">life</text>
<line x1="20" y1="475" x2="460" y2="475" stroke="black" stroke-width="0.3"/>
<text x="240" y="483" text-anchor="middle" class="H">— GRAMMAR BRIDGE — TWO DIFFERENT LANGUAGE FAMILIES —</text>
<text x="240" y="493" text-anchor="middle" class="Ls">Hausa (Afro-Asiatic/Chadic): gender, aspect-based verb system, tonal. Spread by trade networks.</text>
<text x="240" y="502" text-anchor="middle" class="Ls">Fulfulde (Niger-Congo/Fula): 25+ noun classes, SOV, verbal extensions. Spread by Fulani pastoral migration.</text>
<text x="240" y="511" text-anchor="middle" class="Lx">Two of the most widely-spoken languages of the Sahel — co-exist in nearly every northern Nigerian market.</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M">PLATE 29C ALT · Hausa / Fulfulde · GRAMMAR · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
