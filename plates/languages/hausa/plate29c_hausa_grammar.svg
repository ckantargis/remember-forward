<text x="50" y="387" text-anchor="middle" class="Ls" >don me?</text>
<text x="175" y="387" text-anchor="middle" class="Lx" >why</text>
<text x="50" y="397" text-anchor="middle" class="Ls" >ruwa</text>
<text x="175" y="397" text-anchor="middle" class="Lx" >water</text>
