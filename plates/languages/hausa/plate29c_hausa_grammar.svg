<line x1="20" y1="450" x2="460" y2="450" stroke="black" stroke-width="0.3"/>
<text x="240" y="459" text-anchor="middle" class="H" >— GENDER AND PLURALITY —</text>
<text x="240" y="470" text-anchor="middle" class="Ls" >Gender: masculine default; feminine marked by final -aa or -iyaa suffix in many nouns.</text>
<text x="240" y="479" text-anchor="middle" class="Ls" >Plural formation is complex and partly irregular — several plural patterns exist.</text>
<text x="240" y="488" text-anchor="middle" class="Ls" >gida (house) → gidaje (houses) · mutum (person) → mutane (people) · kīfi (fish, unchanged)</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M" >SERIES 29 · HAUSA · PLATE C · GRAMMAR · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
