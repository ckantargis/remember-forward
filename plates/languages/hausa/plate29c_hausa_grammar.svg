<text x="175" y="317" text-anchor="middle" class="Lx" >yes / no</text>
<text x="50" y="327" text-anchor="middle" class="Ls" >ni / kai</text>
<text x="175" y="327" text-anchor="middle" class="Lx" >I / you (m)</text>
<text x="50" y="337" text-anchor="middle" class="Ls" >wannan / wancan</text>
<text x="175" y="337" text-anchor="middle" class="Lx" >this / that</text>
<text x="50" y="347" text-anchor="middle" class="Ls" >ina?</text>
<text x="175" y="347" text-anchor="middle" class="Lx" >where</text>
<text x="50" y="357" text-anchor="middle" class="Ls" >me?</text>
<text x="175" y="357" text-anchor="middle" class="Lx" >what</text>
