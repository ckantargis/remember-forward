<text x="240" y="32" text-anchor="middle" class="T" >HAUSA — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 29C OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— SVO — ASPECT-BASED VERB SYSTEM — TWO GENDERS —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Hausa is SVO with postverbal objects. Two grammatical genders: masculine and feminine.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >Verbs do not conjugate for tense — instead, ASPECT is marked by a pronominal aspect complex (PAC).</text>
<text x="240" y="98" text-anchor="middle" class="Ls" >The PAC (subject pronoun + aspect marker) precedes the verb and encodes person, number, gender, aspect.</text>
<line x1="20" y1="106" x2="460" y2="106" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H" >— PRONOMINAL ASPECT COMPLEX — COMPLETIVE ASPECT —</text>
<text x="80" y="125" text-anchor="middle" class="Lx" >PAC</text>
<text x="155" y="125" text-anchor="middle" class="Lx" >Person</text>
<text x="260" y="125" text-anchor="middle" class="Lx" >Gloss</text>
<text x="360" y="125" text-anchor="middle" class="Lx" >Example: zo (come)</text>
<text x="80" y="134" text-anchor="middle" class="Ls" >nā</text>
<text x="155" y="134" text-anchor="middle" class="Lx" >1sg</text>
<text x="260" y="134" text-anchor="middle" class="Lx" >I (did)</text>
<text x="380" y="134" text-anchor="middle" class="Ls" >nā zo</text>
<text x="80" y="145" text-anchor="middle" class="Ls" >kā</text>
<text x="155" y="145" text-anchor="middle" class="Lx" >2sg M</text>
<text x="260" y="145" text-anchor="middle" class="Lx" >you-m (did)</text>
<text x="380" y="145" text-anchor="middle" class="Ls" >kā zo</text>
<text x="80" y="156" text-anchor="middle" class="Ls" >kī</text>
<text x="155" y="156" text-anchor="middle" class="Lx" >2sg F</text>
<text x="260" y="156" text-anchor="middle" class="Lx" >you-f (did)</text>
<text x="380" y="156" text-anchor="middle" class="Ls" >kī zo</text>
<text x="80" y="167" text-anchor="middle" class="Ls" >yā</text>
<text x="155" y="167" text-anchor="middle" class="Lx" >3sg M</text>
<text x="260" y="167" text-anchor="middle" class="Lx" >he (did)</text>
<text x="380" y="167" text-anchor="middle" class="Ls" >yā zo</text>
<text x="80" y="178" text-anchor="middle" class="Ls" >tā</text>
<text x="155" y="178" text-anchor="middle" class="Lx" >3sg F</text>
<text x="260" y="178" text-anchor="middle" class="Lx" >she (did)</text>
<text x="380" y="178" text-anchor="middle" class="Ls" >tā zo</text>
<text x="80" y="189" text-anchor="middle" class="Ls" >mun</text>
<text x="155" y="189" text-anchor="middle" class="Lx" >1pl</text>
<text x="260" y="189" text-anchor="middle" class="Lx" >we (did)</text>
<text x="380" y="189" text-anchor="middle" class="Ls" >mun zo</text>
<text x="80" y="200" text-anchor="middle" class="Ls" >kun</text>
<text x="155" y="200" text-anchor="middle" class="Lx" >2pl</text>
<text x="260" y="200" text-anchor="middle" class="Lx" >you pl (did)</text>
<text x="380" y="200" text-anchor="middle" class="Ls" >kun zo</text>
<text x="80" y="211" text-anchor="middle" class="Ls" >sun</text>
<text x="155" y="211" text-anchor="middle" class="Lx" >3pl</text>
<text x="260" y="211" text-anchor="middle" class="Lx" >they (did)</text>
<text x="380" y="211" text-anchor="middle" class="Ls" >sun zo</text>
<line x1="20" y1="225" x2="460" y2="225" stroke="black" stroke-width="0.3"/>
<text x="240" y="234" text-anchor="middle" class="H" >— ASPECT SYSTEM —</text>
<text x="80" y="244" text-anchor="middle" class="Ls" >Completive</text>
<text x="185" y="244" text-anchor="middle" class="Lx" >nā/yā…</text>
<text x="285" y="244" text-anchor="middle" class="Lx" >completed action</text>
<text x="400" y="244" text-anchor="middle" class="Lx" >yā ci ya’yi (he has eaten)</text>
<text x="80" y="257" text-anchor="middle" class="Ls" >Continuative</text>
<text x="185" y="257" text-anchor="middle" class="Lx" >inā/yā na…</text>
<text x="285" y="257" text-anchor="middle" class="Lx" >ongoing action</text>
<text x="400" y="257" text-anchor="middle" class="Lx" >yā na cin (he is eating)</text>
<text x="80" y="270" text-anchor="middle" class="Ls" >Future/Intentive</text>
<text x="185" y="270" text-anchor="middle" class="Lx" >ɓan/zā…</text>
<text x="285" y="270" text-anchor="middle" class="Lx" >future intention</text>
<text x="400" y="270" text-anchor="middle" class="Lx" >zā yā ci (he will eat)</text>
<text x="80" y="283" text-anchor="middle" class="Ls" >Subjunctive</text>
<text x="185" y="283" text-anchor="middle" class="Lx" >yā… (no asp)</text>
<text x="285" y="283" text-anchor="middle" class="Lx" >wish/command</text>
<text x="400" y="283" text-anchor="middle" class="Lx" >yā ci! (let him eat!)</text>
<line x1="20" y1="298" x2="460" y2="298" stroke="black" stroke-width="0.3"/>
<text x="240" y="307" text-anchor="middle" class="H" >— CORE VOCABULARY — 25 WORDS —</text>
