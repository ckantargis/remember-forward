<text x="175" y="417" text-anchor="middle" class="Lx" >earth/land</text>
<text x="50" y="427" text-anchor="middle" class="Ls" >mutum</text>
<text x="175" y="427" text-anchor="middle" class="Lx" >person</text>
<text x="50" y="437" text-anchor="middle" class="Ls" >littafi</text>
<text x="175" y="437" text-anchor="middle" class="Lx" >book</text>
<text x="280" y="317" text-anchor="middle" class="Ls" >lokaci</text>
<text x="405" y="317" text-anchor="middle" class="Lx" >time</text>
<text x="280" y="327" text-anchor="middle" class="Ls" >wata</text>
<text x="405" y="327" text-anchor="middle" class="Lx" >moon</text>
