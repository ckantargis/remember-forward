<text x="130" y="180" text-anchor="middle" class="Lx" >they</text>
<text x="260" y="180" text-anchor="middle" class="Ls" >basali</text>
<text x="390" y="180" text-anchor="middle" class="Lx" >they did</text>
<text x="240" y="197" text-anchor="middle" class="Ls" >Present: na-sala (I work) · Future: na-ko-sala (I will work) · Neg: na-sala-ki te (I did not work)</text>
<line x1="20" y1="205" x2="460" y2="205" stroke="black" stroke-width="0.3"/>
<text x="240" y="214" text-anchor="middle" class="H" >— NOUN AGREEMENT —</text>
<text x="240" y="225" text-anchor="middle" class="Ls" >All adjectives, demonstratives, and verbs agree with the noun class prefix.</text>
<text x="240" y="234" text-anchor="middle" class="Ls" >moto mokóló (1 elder person) · bato bakóló (2/pl elder people) · class changes prefix throughout.</text>
<line x1="20" y1="242" x2="460" y2="242" stroke="black" stroke-width="0.3"/>
