<line x1="20" y1="398" x2="460" y2="398" stroke="black" stroke-width="0.3"/>
<text x="240" y="407" text-anchor="middle" class="H" >— URBAN LINGALA —</text>
<text x="240" y="418" text-anchor="middle" class="Ls" >Urban Kinshasa/Brazzaville Lingala has absorbed many French words: foló (floor), tabló (table).</text>
<text x="240" y="427" text-anchor="middle" class="Ls" >Also creative coinages: kobeta nótà (to take notes, lit. "to hit notes"), mwaísé (baby, from French moi aussi).</text>
<text x="240" y="436" text-anchor="middle" class="Ls" >Lingala is the language of Congolese rumba music (soukous) — hugely influential across Africa.</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
