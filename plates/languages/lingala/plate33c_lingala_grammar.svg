<text x="240" y="32" text-anchor="middle" class="T" >LINGALA — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 33C OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— SVO — BANTU NOUN CLASSES — TONAL ASPECT —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Lingala is SVO. Verb agreement with noun class. Tense/aspect marked by verb prefixes and tone.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >Subject prefixes agree with noun class: a- (class 1 sg), ba- (class 2 pl), e- (class 7), etc.</text>
<line x1="20" y1="97" x2="460" y2="97" stroke="black" stroke-width="0.3"/>
<text x="240" y="106" text-anchor="middle" class="H" >— VERB CONJUGATION — kosala "to do/work" —</text>
<text x="55" y="116" text-anchor="middle" class="Lx" >Subject</text>
<text x="130" y="116" text-anchor="middle" class="Lx" >Pronoun</text>
<text x="260" y="116" text-anchor="middle" class="Lx" >Past form</text>
<text x="390" y="116" text-anchor="middle" class="Lx" >Gloss</text>
