<text x="240" y="206" text-anchor="middle" class="H">— TONE DIACRITICS — 3 TONES —</text>
<text x="70" y="216" text-anchor="middle" class="Lb">ကာ</text>
<text x="180" y="216" text-anchor="middle" class="Ls">Level (ka)</text>
<text x="360" y="216" text-anchor="middle" class="Lx">short, modal, mid-low</text>
<text x="70" y="227" text-anchor="middle" class="Lb">ကား</text>
<text x="180" y="227" text-anchor="middle" class="Ls">Heavy (kaa)</text>
<text x="360" y="227" text-anchor="middle" class="Lx">long, creaky, falling</text>
<text x="70" y="238" text-anchor="middle" class="Lb">ကိ့</text>
<text x="180" y="238" text-anchor="middle" class="Ls">Creaky (ka')</text>
<text x="360" y="238" text-anchor="middle" class="Lx">short, creaky+glottal</text>
<line x1="20" y1="252" x2="460" y2="252" stroke="black" stroke-width="0.3"/>
<text x="240" y="260" text-anchor="middle" class="H">— BURMESE NUMERALS  ၀၁၂၃၄၅၆၇၈၉ —</text>
<text x="240" y="272" text-anchor="middle" class="Lx">Brahmi-origin numerals. Same base-10 structure as Devanagari and Arabic numerals.</text>
<line x1="20" y1="282" x2="460" y2="282" stroke="black" stroke-width="1.5"/>
<rect x="20" y="285" width="440" height="14" fill="black"/>
<text x="240" y="295" text-anchor="middle" class="Hb" fill="white">SECONDARY — S’GAW KAREN — ကညီကျိာ် — SCRIPT · WRITING</text>
<line x1="20" y1="299" x2="460" y2="299" stroke="black" stroke-width="0.3"/>
<text x="240" y="308" text-anchor="middle" class="H">— S’GAW KAREN SCRIPT — BURMESE-BASED ADAPTATION —</text>
<text x="240" y="318" text-anchor="middle" class="Ls">S’gaw Karen uses a modified form of the Burmese/Mon script established ~1832 CE by</text>
<text x="240" y="327" text-anchor="middle" class="Lx">Baptist missionary Jonathan Wade and Karen evangelist Ko Tha Byu. Same Unicode block (U+1000–U+109F).</text>
<text x="240" y="336" text-anchor="middle" class="Lx">Karen letters use Burmese character shapes but with different phonemic values and additional stacking.</text>
<line x1="20" y1="344" x2="460" y2="344" stroke="black" stroke-width="0.3"/>
<text x="240" y="352" text-anchor="middle" class="H">— S’GAW KAREN — SAMPLE SYLLABLES (ROMANIZED + SCRIPT NOTES) —</text>
<text x="80" y="362" text-anchor="middle" class="Ls">kaw lah</text>
<text x="200" y="362" text-anchor="middle" class="Lx">S’gaw Karen</text>
<text x="370" y="362" text-anchor="middle" class="Lx">self-name: “Kaw Lah” (people/human)</text>
<text x="80" y="372" text-anchor="middle" class="Ls">pga k̂nyŵ</text>
<text x="200" y="372" text-anchor="middle" class="Lx">language / word</text>
<text x="370" y="372" text-anchor="middle" class="Lx">lit. mouth/voice of the people</text>
<text x="80" y="382" text-anchor="middle" class="Ls">ta</text>
<text x="200" y="382" text-anchor="middle" class="Lx">one</text>
<text x="370" y="382" text-anchor="middle" class="Lx">monosyllabic base form</text>
<text x="80" y="392" text-anchor="middle" class="Ls">ler</text>
<text x="200" y="392" text-anchor="middle" class="Lx">water</text>
<text x="370" y="392" text-anchor="middle" class="Lx">core vocabulary</text>
<text x="80" y="402" text-anchor="middle" class="Ls">mu</text>
<text x="200" y="402" text-anchor="middle" class="Lx">sky / heaven</text>
<text x="370" y="402" text-anchor="middle" class="Lx">also: world above</text>
<text x="80" y="412" text-anchor="middle" class="Ls">naw</text>
<text x="200" y="412" text-anchor="middle" class="Lx">woman</text>
<text x="370" y="412" text-anchor="middle" class="Lx">gender-marked pronoun base</text>
<text x="80" y="422" text-anchor="middle" class="Ls">saw</text>
<text x="200" y="422" text-anchor="middle" class="Lx">man / person</text>
<text x="370" y="422" text-anchor="middle" class="Lx">also personal name prefix</text>
<line x1="20" y1="435" x2="460" y2="435" stroke="black" stroke-width="0.3"/>
<text x="240" y="443" text-anchor="middle" class="H">— SCRIPT BRIDGE — SHARED ORIGIN, DIVERGENT PATHS —</text>
<text x="240" y="453" text-anchor="middle" class="Ls">Burmese and Karen scripts share the same Mon/Brahmic ancestor and Unicode block.</text>
<text x="240" y="462" text-anchor="middle" class="Lx">Burmese: organic Brahmic evolution. Karen: missionary adaptation for new phonology and tones.</text>
<text x="240" y="471" text-anchor="middle" class="Lx">S’gaw Karen has 7 tones — more than Burmese (3+1). Extra diacritics encode the additional tone distinctions.</text>
<text x="240" y="480" text-anchor="middle" class="Lx">Both read left to right. Karen adds tone letters after the rhyme, whereas Burmese uses diacritic marks.</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M">PLATE 40A ALT · Burmese / S’gaw Karen · SCRIPT · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
