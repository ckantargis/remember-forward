<text x="240" y="30" text-anchor="middle" class="T">BURMESE + S’GAW KAREN — SCRIPT · WRITING SYSTEMS</text>
<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 40A · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— BURMESE — ABUGIDA SCRIPT — BRAHMIC ORIGIN —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Burmese script: abugida descended from Mon script — itself from South Indian Brahmic (~4th c. CE).</text>
<text x="240" y="82" text-anchor="middle" class="Lx">Distinctive rounded letterforms: developed writing on palm leaves, where angular strokes tear the surface.</text>
<text x="240" y="91" text-anchor="middle" class="Lx">Written left to right. Consonants carry inherent /a/. Diacritics modify vowel. 33 consonants, 3 tones.</text>
<line x1="20" y1="98" x2="460" y2="98" stroke="black" stroke-width="0.3"/>
<text x="240" y="106" text-anchor="middle" class="H">— CORE CONSONANTS — SAMPLE (6 ROWS) —</text>
<text x="55" y="116" text-anchor="middle" class="Lb">က</text>
<text x="55" y="124" text-anchor="middle" class="Lx">ka</text>
<text x="135" y="116" text-anchor="middle" class="Lb">ခ</text>
