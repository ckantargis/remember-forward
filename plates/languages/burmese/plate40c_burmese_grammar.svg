<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<defs><style>
text{font-family:Georgia,serif;}
.T{font-size:12px;font-weight:bold;letter-spacing:2px;}
.S{font-size:7px;letter-spacing:1.5px;}
.H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.Lb{font-size:11px;}
.Lbs{font-size:8px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >BURMESE</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — SOV —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Burmese is Subject-Object-Verb (SOV) — verb always final.</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >Nga htamin sa de. I rice eat. (nga=I htamin=rice sa=eat de=particle)</text>
<text x="240" y="102" text-anchor="middle" class="Ls" >Particles follow every major element: subject -ga/-kə, object -go, location -hma.</text>
<line x1="20" y1="110" x2="460" y2="110" stroke="black" stroke-width="0.3"/>
<text x="240" y="119" text-anchor="middle" class="H" >— CASE PARTICLES —</text>
<text x="120" y="129" text-anchor="middle" class="Ls" >-ga / -kə</text>
<text x="300" y="129" text-anchor="middle" class="Ls" >subject/topic marker</text>
<text x="120" y="139" text-anchor="middle" class="Ls" >-go</text>
<text x="300" y="139" text-anchor="middle" class="Ls" >object/direction marker</text>
<text x="120" y="149" text-anchor="middle" class="Ls" >-hma</text>
<text x="300" y="149" text-anchor="middle" class="Ls" >locative (at/in/on)</text>
<text x="120" y="159" text-anchor="middle" class="Ls" >-nə</text>
<text x="300" y="159" text-anchor="middle" class="Ls" >instrumental (by/with)</text>
<text x="120" y="169" text-anchor="middle" class="Ls" >-pei</text>
<text x="300" y="169" text-anchor="middle" class="Ls" >benefactive (for)</text>
<text x="120" y="179" text-anchor="middle" class="Ls" >-hə</text>
<text x="300" y="179" text-anchor="middle" class="Ls" >ablative (from)</text>
<text x="120" y="189" text-anchor="middle" class="Ls" >-ɔŋ</text>
<text x="300" y="189" text-anchor="middle" class="Ls" >comitative (with, accompaniment)</text>
<line x1="20" y1="205" x2="460" y2="205" stroke="black" stroke-width="0.3"/>
<text x="240" y="214" text-anchor="middle" class="H" >— VERB SYSTEM —</text>
<text x="240" y="224" text-anchor="middle" class="Ls" >Verbs are final; tense/aspect by particles following the verb stem.</text>
<text x="130" y="234" text-anchor="middle" class="Ls" >sa de</text>
<text x="320" y="234" text-anchor="middle" class="Lx" >eats (present/habitual, -de = assertion)</text>
<text x="130" y="244" text-anchor="middle" class="Ls" >sa mɛ</text>
<text x="320" y="244" text-anchor="middle" class="Lx" >will eat (-mɛ = future)</text>
<text x="130" y="254" text-anchor="middle" class="Ls" >sa bí</text>
<text x="320" y="254" text-anchor="middle" class="Lx" >ate (-bi = past completive)</text>
<text x="130" y="264" text-anchor="middle" class="Ls" >sa ʡæ</text>
<text x="320" y="264" text-anchor="middle" class="Lx" >is eating (-ʡæ = progressive)</text>
<text x="130" y="274" text-anchor="middle" class="Ls" >ma-sa-bú</text>
<text x="320" y="274" text-anchor="middle" class="Lx" >did not eat (ma-...bú = past negative)</text>
<text x="130" y="284" text-anchor="middle" class="Ls" >sa ló</text>
<text x="320" y="284" text-anchor="middle" class="Lx" >eat! (imperative)</text>
<line x1="20" y1="305" x2="460" y2="305" stroke="black" stroke-width="0.3"/>
<text x="240" y="314" text-anchor="middle" class="H" >— PRONOUNS —</text>
<text x="80" y="324" text-anchor="middle" class="Lx" >nga = I (informal)</text>
<text x="280" y="324" text-anchor="middle" class="Lx" >kəma = I (female formal)</text>
<text x="80" y="334" text-anchor="middle" class="Lx" >kjəma = I (male formal)</text>
<text x="280" y="334" text-anchor="middle" class="Lx" >níng = you (informal)</text>
<text x="80" y="344" text-anchor="middle" class="Lx" >shin = you (respectful to monk)</text>
<text x="280" y="344" text-anchor="middle" class="Lx" >thu = he/she</text>
<text x="80" y="354" text-anchor="middle" class="Lx" >doa = we (incl)</text>
<text x="280" y="354" text-anchor="middle" class="Lx" >shɔ = they</text>
<line x1="20" y1="385" x2="460" y2="385" stroke="black" stroke-width="0.3"/>
<text x="240" y="394" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
<text x="50" y="404" text-anchor="middle" class="Ls" >ming-ga-la-ba</text>
<text x="175" y="404" text-anchor="middle" class="Lx" >hello</text>
<text x="50" y="414" text-anchor="middle" class="Ls" >kyei-zu-tin-ba-de</text>
<text x="175" y="414" text-anchor="middle" class="Lx" >thank you</text>
<text x="50" y="424" text-anchor="middle" class="Ls" >hóuq-keh</text>
<text x="175" y="424" text-anchor="middle" class="Lx" >yes</text>
<text x="50" y="434" text-anchor="middle" class="Ls" >mà hóuq-bú</text>
<text x="175" y="434" text-anchor="middle" class="Lx" >no</text>
<text x="50" y="444" text-anchor="middle" class="Ls" >seim-na-ma-shi-bú</text>
<text x="175" y="444" text-anchor="middle" class="Lx" >excuse me/sorry</text>
<text x="50" y="454" text-anchor="middle" class="Ls" >nei-kàuq-là?</text>
<text x="175" y="454" text-anchor="middle" class="Lx" >how are you?</text>
<text x="50" y="464" text-anchor="middle" class="Ls" >kə-mə nei-kàuq-dé</text>
<text x="175" y="464" text-anchor="middle" class="Lx" >I am fine</text>
<text x="50" y="474" text-anchor="middle" class="Ls" >jə jə</text>
<text x="175" y="474" text-anchor="middle" class="Lx" >I love you</text>
<text x="50" y="484" text-anchor="middle" class="Ls" >ye</text>
<text x="175" y="484" text-anchor="middle" class="Lx" >water</text>
<text x="50" y="494" text-anchor="middle" class="Ls" >míq</text>
<text x="175" y="494" text-anchor="middle" class="Lx" >fire</text>
<text x="50" y="504" text-anchor="middle" class="Ls" >məjé</text>
<text x="175" y="504" text-anchor="middle" class="Lx" >earth</text>
<text x="285" y="404" text-anchor="middle" class="Ls" >lu</text>
<text x="410" y="404" text-anchor="middle" class="Lx" >person</text>
<text x="285" y="414" text-anchor="middle" class="Ls" >aq-já</text>
<text x="410" y="414" text-anchor="middle" class="Lx" >time</text>
<text x="285" y="424" text-anchor="middle" class="Ls" >là</text>
<text x="410" y="424" text-anchor="middle" class="Lx" >moon</text>
<text x="285" y="434" text-anchor="middle" class="Ls" >kjó thaŋŋé</text>
<text x="410" y="434" text-anchor="middle" class="Lx" >star</text>
<text x="285" y="444" text-anchor="middle" class="Ls" >hŋ-thà</text>
<text x="410" y="444" text-anchor="middle" class="Lx" >heart</text>
<text x="285" y="454" text-anchor="middle" class="Ls" >chæt-thà</text>
<text x="410" y="454" text-anchor="middle" class="Lx" >love</text>
<text x="285" y="464" text-anchor="middle" class="Ls" >víq-thà</text>
<text x="410" y="464" text-anchor="middle" class="Lx" >freedom</text>
<text x="285" y="474" text-anchor="middle" class="Ls" >mhàu-zà</text>
<text x="410" y="474" text-anchor="middle" class="Lx" >memory/remember</text>
<text x="285" y="484" text-anchor="middle" class="Ls" >nä-nä</text>
<text x="410" y="484" text-anchor="middle" class="Lx" >future</text>
<text x="285" y="494" text-anchor="middle" class="Ls" >kàbà</text>
<text x="410" y="494" text-anchor="middle" class="Lx" >world</text>
<text x="285" y="504" text-anchor="middle" class="Ls" >a-thà</text>
<text x="410" y="504" text-anchor="middle" class="Lx" >life</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 40C — BURMESE: GRAMMAR — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
