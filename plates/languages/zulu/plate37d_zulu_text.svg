</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >ZULU</text>
<text x="240" y="50" text-anchor="middle" class="S" >Running Text — Four Passages + Bridge Phrase</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="70" text-anchor="middle" class="H" >— I. UBUNTU — FOUNDATIONAL PHILOSOPHY —</text>
<text x="240" y="80" text-anchor="middle" class="L" >Umuntu ngumuntu ngabantu.</text>
<text x="240" y="90" text-anchor="middle" class="Ls" >umuntu=person ngu=is umuntu=person nga=through abantu=people</text>
<text x="240" y="100" text-anchor="middle" class="F" >"A person is a person through other people." (Nguni ubuntu proverb)</text>
<line x1="20" y1="109" x2="460" y2="109" stroke="black" stroke-width="0.3"/>
<text x="240" y="118" text-anchor="middle" class="H" >— II. UKUKHUMBULA — ON REMEMBERING —</text>
<text x="240" y="128" text-anchor="middle" class="L" >Ukukhumbula abadlule kuyisikhungo sokuqhubeka phambili.</text>
<text x="240" y="138" text-anchor="middle" class="Ls" >ukukhumbula=to-remember abadlule=those-who-passed kuyisikhungo=is-the-anchor</text>
<text x="240" y="147" text-anchor="middle" class="Ls" >sokuqhubeka=of-going-forward phambili=ahead</text>
<text x="240" y="157" text-anchor="middle" class="F" >"Remembering those who have passed is the anchor of moving forward." (Zulu saying)</text>
<line x1="20" y1="166" x2="460" y2="166" stroke="black" stroke-width="0.3"/>
<text x="240" y="175" text-anchor="middle" class="H" >— III. ULWAZI — ON KNOWLEDGE —</text>
<text x="240" y="185" text-anchor="middle" class="L" >Ulwazi alupheleli mntwini munye; ludluliselwa kwabalandela.</text>
<text x="240" y="195" text-anchor="middle" class="Ls" >ulwazi=knowledge alupheleli=does-not-end-with mntwini-munye=one-person</text>
<text x="240" y="205" text-anchor="middle" class="Ls" >ludluliselwa=is-passed-on kwabalandela=to-those-who-follow</text>
<text x="240" y="215" text-anchor="middle" class="F" >"Knowledge does not end with one person; it is passed on to those who follow."</text>
<line x1="20" y1="224" x2="460" y2="224" stroke="black" stroke-width="0.3"/>
<text x="240" y="233" text-anchor="middle" class="H" >— IV. PHAMBILI — FORWARD —</text>
<text x="240" y="243" text-anchor="middle" class="L" >Siyahamba phambili sikhumbula izinyanya.</text>
<text x="240" y="253" text-anchor="middle" class="Ls" >siyahamba=we-walk phambili=forward sikhumbula=we-remember izinyanya=ancestors</text>
<text x="240" y="263" text-anchor="middle" class="F" >"We walk forward remembering the ancestors." (ancestral continuity)</text>
<line x1="20" y1="272" x2="460" y2="272" stroke="black" stroke-width="0.3"/>
<text x="240" y="281" text-anchor="middle" class="H" >— V. BRIDGE PHRASE —</text>
<text x="240" y="294" text-anchor="middle" class="L" >Lesi sinto senziwa ngawe, mahhala, ngabantu abakhumbula phambili.</text>
<text x="240" y="308" text-anchor="middle" class="Ls" >lesi-sinto=this-thing senziwa=was-made ngawe=for-you mahhala=freely (without cost)</text>
<text x="240" y="317" text-anchor="middle" class="Ls" >ngabantu=by-people abakhumbula=who-remember phambili=forward / ahead</text>
<text x="240" y="329" text-anchor="middle" class="F" >"This was made for you, freely, by people who remembered forward."</text>
<line x1="20" y1="340" x2="460" y2="340" stroke="black" stroke-width="0.3"/>
<text x="240" y="349" text-anchor="middle" class="H" >— BRIDGE PHRASE — NOTES —</text>
<text x="240" y="359" text-anchor="middle" class="Ls" >Phambili (from Proto-Bantu *-pamba) = "forward / ahead / in front."</text>
<text x="240" y="369" text-anchor="middle" class="Ls" >Abakhumbula phambili = "those who remember forward" — honouring ancestors</text>
<text x="240" y="379" text-anchor="middle" class="Ls" >while facing forward. In Zulu thought the future is built on ancestral memory.</text>
<text x="240" y="389" text-anchor="middle" class="Ls" >Mahhala = free/gratis (from Afrikaans/Dutch gratis, via South African contact).</text>
<text x="240" y="399" text-anchor="middle" class="Ls" >Sawubona (I see you) / Siyabona (we see you) — greeting acknowledges personhood.</text>
<line x1="20" y1="407" x2="460" y2="407" stroke="black" stroke-width="0.3"/>
<text x="240" y="416" text-anchor="middle" class="H" >— LANGUAGE NOTES —</text>
<text x="240" y="426" text-anchor="middle" class="Ls" >Zulu: ~13 million L1 speakers; South Africa's most widely spoken home language.</text>
<text x="240" y="436" text-anchor="middle" class="Ls" >Language family: Bantu, Nguni branch (with Xhosa, Swati, Ndebele).</text>
<text x="240" y="446" text-anchor="middle" class="Ls" >Click consonants absorbed from contact with Khoisan peoples over millennia.</text>
<text x="240" y="456" text-anchor="middle" class="Ls" >Official language of South Africa; also spoken in Lesotho, Swaziland, Zimbabwe.</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 37D — ZULU: RUNNING TEXT — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
