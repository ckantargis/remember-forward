<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >ZULU</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — SVO + AGGLUTINATION —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Zulu is Subject-Verb-Object. Extensive agglutination on verbs.</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >Umuntu udla ukudla. umuntu=person u-dla=3SG.eat ukudla=food = "The person eats food."</text>
<line x1="20" y1="100" x2="460" y2="100" stroke="black" stroke-width="0.3"/>
<text x="240" y="109" text-anchor="middle" class="H" >— NOUN CLASS SYSTEM — 17 CLASSES —</text>
<text x="240" y="119" text-anchor="middle" class="Ls" >All Zulu nouns belong to a class marked by prefix. Agreement spreads to verbs, adjectives.</text>
<text x="90" y="129" text-anchor="middle" class="Ls" >umu-/aba-</text>
<text x="320" y="129" text-anchor="middle" class="Lx" >Class 1/2: persons — umuntu (person) / abantu (people)</text>
<text x="90" y="140" text-anchor="middle" class="Ls" >umu-/imi-</text>
<text x="320" y="140" text-anchor="middle" class="Lx" >Class 3/4: trees — umuthi (medicine/tree) / imithi</text>
<text x="90" y="151" text-anchor="middle" class="Ls" >ili-/ama-</text>
<text x="320" y="151" text-anchor="middle" class="Lx" >Class 5/6: general — ilanga (sun/day) / amalanga</text>
<text x="90" y="162" text-anchor="middle" class="Ls" >isi-/izi-</text>
<text x="320" y="162" text-anchor="middle" class="Lx" >Class 7/8: things — isifundo (lesson) / izifundo</text>
<text x="90" y="173" text-anchor="middle" class="Ls" >in-/izin-</text>
<text x="320" y="173" text-anchor="middle" class="Lx" >Class 9/10: animals/things — inkosi (chief) / izinkosi</text>
<text x="90" y="184" text-anchor="middle" class="Ls" >u-/izin-</text>
<text x="320" y="184" text-anchor="middle" class="Lx" >Class 11/10: abstract — ubuntu (humanity)</text>
<text x="90" y="195" text-anchor="middle" class="Ls" >ubu-/—</text>
<text x="320" y="195" text-anchor="middle" class="Lx" >Class 14: abstract mass — ubukhosi (royalty)</text>
<text x="90" y="206" text-anchor="middle" class="Ls" >uku-/—</text>
<text x="320" y="206" text-anchor="middle" class="Lx" >Class 15: verbal nouns — ukuthanda (to love)</text>
<line x1="20" y1="225" x2="460" y2="225" stroke="black" stroke-width="0.3"/>
<text x="240" y="234" text-anchor="middle" class="H" >— VERB MORPHOLOGY —</text>
<text x="240" y="244" text-anchor="middle" class="Ls" >Template: Subject concord + Tense/Aspect + Object concord + Root + Extension + Final.</text>
<text x="140" y="254" text-anchor="middle" class="L" >ngiyathanda</text>
<text x="330" y="254" text-anchor="middle" class="Ls" >I love (ngi-ya-thanda)</text>
<text x="140" y="264" text-anchor="middle" class="L" >uthanda</text>
<text x="330" y="264" text-anchor="middle" class="Ls" >he/she loves (u-thanda)</text>
<text x="140" y="274" text-anchor="middle" class="L" >ngathanda</text>
<text x="330" y="274" text-anchor="middle" class="Ls" >I loved (past)</text>
<text x="140" y="284" text-anchor="middle" class="L" >ngizothanda</text>
<text x="330" y="284" text-anchor="middle" class="Ls" >I will love (ngi-zo-thanda)</text>
<text x="140" y="294" text-anchor="middle" class="L" >ngiyamthanda</text>
<text x="330" y="294" text-anchor="middle" class="Ls" >I love him/her (obj concord -m-)</text>
<text x="140" y="304" text-anchor="middle" class="L" >angithandi</text>
<text x="330" y="304" text-anchor="middle" class="Ls" >I don't love (a-ngi-thandi, negative final -i)</text>
<text x="140" y="314" text-anchor="middle" class="L" >thanda!</text>
<text x="330" y="314" text-anchor="middle" class="Ls" >love! (imperative)</text>
<text x="140" y="324" text-anchor="middle" class="L" >ngithande</text>
<text x="330" y="324" text-anchor="middle" class="Ls" >let me love (subjunctive)</text>
<line x1="20" y1="342" x2="460" y2="342" stroke="black" stroke-width="0.3"/>
<text x="240" y="351" text-anchor="middle" class="H" >— UBUNTU — KEY CULTURAL CONCEPT —</text>
<text x="240" y="361" text-anchor="middle" class="Ls" >"Umuntu ngumuntu ngabantu" — A person is a person through other people.</text>
<text x="240" y="371" text-anchor="middle" class="Ls" >Ubuntu = humanity/humanness: the philosophy that identity is relational.</text>
<text x="240" y="381" text-anchor="middle" class="Ls" >Central to Zulu (and broader Nguni/Bantu) ethics and community life.</text>
<line x1="20" y1="389" x2="460" y2="389" stroke="black" stroke-width="0.3"/>
<text x="240" y="398" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
<text x="50" y="408" text-anchor="middle" class="Ls" >sawubona</text>
<text x="175" y="408" text-anchor="middle" class="Lx" >hello (I see you)</text>
<text x="50" y="418" text-anchor="middle" class="Ls" >siyabonga</text>
<text x="175" y="418" text-anchor="middle" class="Lx" >thank you</text>
<text x="50" y="428" text-anchor="middle" class="Ls" >yebo</text>
<text x="175" y="428" text-anchor="middle" class="Lx" >yes</text>
<text x="50" y="438" text-anchor="middle" class="Ls" >cha</text>
<text x="175" y="438" text-anchor="middle" class="Lx" >no</text>
<text x="50" y="448" text-anchor="middle" class="Ls" >ngicela</text>
<text x="175" y="448" text-anchor="middle" class="Lx" >please</text>
<text x="50" y="458" text-anchor="middle" class="Ls" >unjani?</text>
<text x="175" y="458" text-anchor="middle" class="Lx" >how are you?</text>
<text x="50" y="468" text-anchor="middle" class="Ls" >ngiyaphila</text>
<text x="175" y="468" text-anchor="middle" class="Lx" >I am well</text>
<text x="50" y="478" text-anchor="middle" class="Ls" >ngiyakuthanda</text>
<text x="175" y="478" text-anchor="middle" class="Lx" >I love you</text>
<text x="50" y="488" text-anchor="middle" class="Ls" >igama lami</text>
<text x="175" y="488" text-anchor="middle" class="Lx" >my name is...</text>
<text x="50" y="498" text-anchor="middle" class="Ls" >amanzi</text>
<text x="175" y="498" text-anchor="middle" class="Lx" >water</text>
<text x="50" y="508" text-anchor="middle" class="Ls" >umlilo</text>
<text x="175" y="508" text-anchor="middle" class="Lx" >fire</text>
<text x="50" y="518" text-anchor="middle" class="Ls" >umhlaba</text>
<text x="175" y="518" text-anchor="middle" class="Lx" >earth/world</text>
<text x="50" y="528" text-anchor="middle" class="Ls" >umuntu</text>
<text x="175" y="528" text-anchor="middle" class="Lx" >person</text>
<text x="285" y="408" text-anchor="middle" class="Ls" >isikhathi</text>
<text x="410" y="408" text-anchor="middle" class="Lx" >time</text>
<text x="285" y="418" text-anchor="middle" class="Ls" >inyanga</text>
<text x="410" y="418" text-anchor="middle" class="Lx" >moon</text>
<text x="285" y="428" text-anchor="middle" class="Ls" >inkanyezi</text>
<text x="410" y="428" text-anchor="middle" class="Lx" >star</text>
<text x="285" y="438" text-anchor="middle" class="Ls" >inhliziyo</text>
<text x="410" y="438" text-anchor="middle" class="Lx" >heart</text>
<text x="285" y="448" text-anchor="middle" class="Ls" >uthando</text>
<text x="410" y="448" text-anchor="middle" class="Lx" >love</text>
<text x="285" y="458" text-anchor="middle" class="Ls" >inkululeko</text>
<text x="410" y="458" text-anchor="middle" class="Lx" >freedom</text>
<text x="285" y="468" text-anchor="middle" class="Ls" >ukukhumbula</text>
<text x="410" y="468" text-anchor="middle" class="Lx" >to remember</text>
<text x="285" y="478" text-anchor="middle" class="Ls" >kusasa</text>
<text x="410" y="478" text-anchor="middle" class="Lx" >tomorrow / future</text>
<text x="285" y="488" text-anchor="middle" class="Ls" >ubuntu</text>
<text x="410" y="488" text-anchor="middle" class="Lx" >humanity / togetherness</text>
<text x="285" y="498" text-anchor="middle" class="Ls" >impilo</text>
<text x="410" y="498" text-anchor="middle" class="Lx" >life</text>
<text x="285" y="508" text-anchor="middle" class="Ls" >amandla</text>
<text x="410" y="508" text-anchor="middle" class="Lx" >power/strength</text>
<text x="285" y="518" text-anchor="middle" class="Ls" >isizwe</text>
<text x="410" y="518" text-anchor="middle" class="Lx" >nation/people</text>
