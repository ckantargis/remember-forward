<text x="240" y="32" text-anchor="middle" class="T">AMERICAN SIGN LANGUAGE (ASL)</text>
<text x="240" y="47" text-anchor="middle" class="S">MANUAL ALPHABET · HANDSHAPE INVENTORY · SERIES 62A</text>
<line x1="24" y1="55" x2="456" y2="55" stroke="#111" stroke-width="0.3"/>
<text x="240" y="65" text-anchor="middle" class="Lx">Sign languages are complete natural human languages — not codes for spoken languages.</text>
<text x="240" y="74" text-anchor="middle" class="Lx">ASL is the primary language of Deaf communities in the United States and Canada.</text>
<text x="240" y="83" text-anchor="middle" class="Lx">c. 500,000 native signers. Descended from French Sign Language (LSF) via Gallaudet/Clerc, 1817.</text>
<line x1="24" y1="91" x2="456" y2="91" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="98" x2="118" y2="98" stroke="#111" stroke-width="0.3"/>
