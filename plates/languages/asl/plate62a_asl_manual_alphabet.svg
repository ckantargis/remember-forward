<text x="240" y="220" text-anchor="middle" class="H">— HANDSHAPE INVENTORY CATEGORIES —</text>
<line x1="362" y1="216" x2="450" y2="216" stroke="#111" stroke-width="0.3"/>
<text x="240" y="227" text-anchor="middle" class="Lx">ASL uses ~50 distinct handshapes. Key categories:</text>
<text x="36" y="235" text-anchor="start" class="H">OPEN HAND:</text>
<text x="110" y="235" text-anchor="start" class="Lx">All fingers extended: B (flat), 5 (spread)</text>
<text x="36" y="244" text-anchor="start" class="H">CLOSED/FIST:</text>
<text x="110" y="244" text-anchor="start" class="Lx">A (fist), S (knuckles over thumb), E (bent)</text>
<text x="36" y="253" text-anchor="start" class="H">SELECTED:</text>
<text x="110" y="253" text-anchor="start" class="Lx">Specific fingers: G/L/D (index), I/Y (pinky), V/K (two)</text>
<text x="36" y="262" text-anchor="start" class="H">BENT:</text>
<text x="110" y="262" text-anchor="start" class="Lx">Curved fingers: C, O, F (circle), X (hook)</text>
<text x="36" y="271" text-anchor="start" class="H">COMPOUND:</text>
<text x="110" y="271" text-anchor="start" class="Lx">Complex: T (thumb between), R (crossed), W (three spread)</text>
<line x1="24" y1="283" x2="456" y2="283" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="290" x2="118" y2="290" stroke="#111" stroke-width="0.3"/>
<text x="240" y="294" text-anchor="middle" class="H">— NUMBERS 1–10 (COMPACT REFERENCE) —</text>
<line x1="362" y1="290" x2="450" y2="290" stroke="#111" stroke-width="0.3"/>
<text x="36" y="300" text-anchor="start" class="Ls">1</text>
<text x="50" y="300" text-anchor="start" class="Lx">Index up</text>
<text x="117" y="300" text-anchor="start" class="Ls">2</text>
<text x="131" y="300" text-anchor="start" class="Lx">V/peace</text>
<text x="198" y="300" text-anchor="start" class="Ls">3</text>
<text x="212" y="300" text-anchor="start" class="Lx">Thumb+idx+mid</text>
<text x="279" y="300" text-anchor="start" class="Ls">4</text>
<text x="293" y="300" text-anchor="start" class="Lx">4 fingers up</text>
<text x="360" y="300" text-anchor="start" class="Ls">5</text>
<text x="374" y="300" text-anchor="start" class="Lx">Open 5-spread</text>
<text x="36" y="318" text-anchor="start" class="Ls">6</text>
<text x="50" y="318" text-anchor="start" class="Lx">Pinky+thumb touch</text>
<text x="117" y="318" text-anchor="start" class="Ls">7</text>
<text x="131" y="318" text-anchor="start" class="Lx">Ring+thumb touch</text>
<text x="198" y="318" text-anchor="start" class="Ls">8</text>
<text x="212" y="318" text-anchor="start" class="Lx">Mid+thumb touch</text>
<text x="279" y="318" text-anchor="start" class="Ls">9</text>
<text x="293" y="318" text-anchor="start" class="Lx">Idx+thumb circle</text>
<text x="360" y="318" text-anchor="start" class="Ls">10</text>
<text x="374" y="318" text-anchor="start" class="Lx">Fist, thumb up, shake</text>
<line x1="24" y1="340" x2="456" y2="340" stroke="#111" stroke-width="0.3"/>
