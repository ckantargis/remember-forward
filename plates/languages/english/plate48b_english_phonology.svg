</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >ENGLISH</text>
<text x="240" y="50" text-anchor="middle" class="S" >Phonology — 44 Phonemes, Stress, Intonation</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— CONSONANT INVENTORY — 24 CONSONANTS —</text>
<text x="80" y="82" text-anchor="middle" class="Lx" >p /p/: bilabial stop vl: pin</text>
<text x="280" y="82" text-anchor="middle" class="Lx" >b /b/: bilabial stop vd: bin</text>
<text x="80" y="92" text-anchor="middle" class="Lx" >t /t/: alveolar stop vl: tin</text>
<text x="280" y="92" text-anchor="middle" class="Lx" >d /d/: alveolar stop vd: din</text>
<text x="80" y="102" text-anchor="middle" class="Lx" >k /k/: velar stop vl: kin</text>
<text x="280" y="102" text-anchor="middle" class="Lx" >ɡ /ɡ/: velar stop vd: give</text>
<text x="80" y="112" text-anchor="middle" class="Lx" >tʃ /tʃ/: postalveolar affricate: chin</text>
<text x="280" y="112" text-anchor="middle" class="Lx" >dʒ /dʒ/: postalveolar aff vd: gin</text>
<text x="80" y="122" text-anchor="middle" class="Lx" >f /f/: labiodental: fin</text>
<text x="280" y="122" text-anchor="middle" class="Lx" >v /v/: labiodental vd: vine</text>
<text x="80" y="132" text-anchor="middle" class="Lx" >θ /θ/: dental fricative: thin</text>
<text x="280" y="132" text-anchor="middle" class="Lx" >ð /ð/: dental fricative vd: this</text>
<text x="80" y="142" text-anchor="middle" class="Lx" >s /s/: alveolar fric: sin</text>
<text x="280" y="142" text-anchor="middle" class="Lx" >z /z/: alveolar fric vd: zip</text>
<text x="80" y="152" text-anchor="middle" class="Lx" >ʃ /ʃ/: postalveolar: shin</text>
<text x="280" y="152" text-anchor="middle" class="Lx" >ʒ /ʒ/: postalveolar vd: measure</text>
<text x="80" y="162" text-anchor="middle" class="Lx" >h /h/: glottal: hat</text>
<text x="280" y="162" text-anchor="middle" class="Lx" >m /m/: bilabial nasal: man</text>
<text x="80" y="172" text-anchor="middle" class="Lx" >n /n/: alveolar nasal: nun</text>
<text x="280" y="172" text-anchor="middle" class="Lx" >ŋ /ŋ/: velar nasal: sing</text>
<text x="80" y="182" text-anchor="middle" class="Lx" >l /l/: lateral: lip</text>
<text x="280" y="182" text-anchor="middle" class="Lx" >r /r/: approximant: run</text>
<text x="80" y="192" text-anchor="middle" class="Lx" >w /w/: labio-velar: win</text>
<text x="280" y="192" text-anchor="middle" class="Lx" >j /j/: palatal: yes</text>
<line x1="20" y1="212" x2="460" y2="212" stroke="black" stroke-width="0.3"/>
<text x="240" y="221" text-anchor="middle" class="H" >— VOWEL SYSTEM — 20 VOWELS (RP) —</text>
<text x="240" y="231" text-anchor="middle" class="Ls" >English has one of the largest vowel inventories of major world languages.</text>
<text x="240" y="241" text-anchor="middle" class="Lx" >Short:</text>
<text x="30" y="251" text-anchor="middle" class="Lx" >i /ɪ/</text>
<text x="30" y="260" text-anchor="middle" class="Lx" >kit</text>
<text x="92" y="251" text-anchor="middle" class="Lx" >e /e/</text>
<text x="92" y="260" text-anchor="middle" class="Lx" >dress</text>
<text x="154" y="251" text-anchor="middle" class="Lx" >æ /æ/</text>
<text x="154" y="260" text-anchor="middle" class="Lx" >trap</text>
<text x="216" y="251" text-anchor="middle" class="Lx" >ɔ /ɔ/</text>
<text x="216" y="260" text-anchor="middle" class="Lx" >lot</text>
<text x="278" y="251" text-anchor="middle" class="Lx" >ʌ /ʌ/</text>
<text x="278" y="260" text-anchor="middle" class="Lx" >strut</text>
<text x="340" y="251" text-anchor="middle" class="Lx" >ʊ /ʊ/</text>
<text x="340" y="260" text-anchor="middle" class="Lx" >foot</text>
<text x="402" y="251" text-anchor="middle" class="Lx" >ə /ə/</text>
<text x="402" y="260" text-anchor="middle" class="Lx" >comma</text>
<text x="240" y="271" text-anchor="middle" class="Lx" >Long:</text>
<text x="50" y="281" text-anchor="middle" class="Lx" >iː /iː/</text>
<text x="50" y="290" text-anchor="middle" class="Lx" >fleece</text>
<text x="130" y="281" text-anchor="middle" class="Lx" >uː /uː/</text>
<text x="130" y="290" text-anchor="middle" class="Lx" >goose</text>
<text x="210" y="281" text-anchor="middle" class="Lx" >ɑː /ɑː/</text>
<text x="210" y="290" text-anchor="middle" class="Lx" >palm</text>
<text x="290" y="281" text-anchor="middle" class="Lx" >ɔː /ɔː/</text>
<text x="290" y="290" text-anchor="middle" class="Lx" >thought</text>
<text x="370" y="281" text-anchor="middle" class="Lx" >ɜː /ɜː/</text>
<text x="370" y="290" text-anchor="middle" class="Lx" >nurse</text>
<text x="240" y="300" text-anchor="middle" class="Lx" >Diphthongs:</text>
<text x="30" y="310" text-anchor="middle" class="Lx" >eɪ /eɪ/</text>
<text x="30" y="319" text-anchor="middle" class="Lx" >face</text>
<text x="85" y="310" text-anchor="middle" class="Lx" >əʊ /əʊ/</text>
<text x="85" y="319" text-anchor="middle" class="Lx" >goat</text>
<text x="140" y="310" text-anchor="middle" class="Lx" >aɪ /aɪ/</text>
<text x="140" y="319" text-anchor="middle" class="Lx" >price</text>
<text x="195" y="310" text-anchor="middle" class="Lx" >ɔɪ /ɔɪ/</text>
<text x="195" y="319" text-anchor="middle" class="Lx" >choice</text>
<text x="250" y="310" text-anchor="middle" class="Lx" >aʊ /aʊ/</text>
<text x="250" y="319" text-anchor="middle" class="Lx" >mouth</text>
<text x="305" y="310" text-anchor="middle" class="Lx" >ɪə /ɪə/</text>
<text x="305" y="319" text-anchor="middle" class="Lx" >near</text>
<text x="360" y="310" text-anchor="middle" class="Lx" >eə /eə/</text>
<text x="360" y="319" text-anchor="middle" class="Lx" >square</text>
<text x="415" y="310" text-anchor="middle" class="Lx" >ʊə /ʊə/</text>
<text x="415" y="319" text-anchor="middle" class="Lx" >cure</text>
<line x1="20" y1="328" x2="460" y2="328" stroke="black" stroke-width="0.3"/>
<text x="240" y="337" text-anchor="middle" class="H" >— STRESS — PHONEMIC AND UNPREDICTABLE —</text>
<text x="240" y="347" text-anchor="middle" class="Ls" >English stress is unpredictable: must be learned for each word.</text>
<text x="240" y="357" text-anchor="middle" class="Ls" >"REcord" (noun) vs. "reCORD" (verb). "PERmit" vs. "perMIT."</text>
<text x="240" y="367" text-anchor="middle" class="Ls" >Unstressed vowels reduce to /ə/ (schwa): "the", "a", unstressed syllables.</text>
<line x1="20" y1="375" x2="460" y2="375" stroke="black" stroke-width="0.3"/>
<text x="240" y="384" text-anchor="middle" class="H" >— TH-SOUNDS — UNIQUE TO ENGLISH —</text>
<text x="240" y="394" text-anchor="middle" class="Ls" >English /θ/ and /ð/ are rare cross-linguistically. Most L2 speakers replace with t/d or s/z.</text>
<text x="240" y="404" text-anchor="middle" class="Ls" >/θ/ voiceless: think, three, both, tooth, health, cloth.</text>
<text x="240" y="414" text-anchor="middle" class="Ls" >/ð/ voiced: this, that, the, though, breathe, father.</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 48B — ENGLISH: PHONOLOGY — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
