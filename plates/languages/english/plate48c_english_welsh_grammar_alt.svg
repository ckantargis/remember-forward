<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— ENGLISH — SVO · ANALYTIC · MINIMAL INFLECTION —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">English is highly analytic: word order, not endings, marks grammatical roles. Lost case endings ~1200 CE.</text>
<text x="240" y="82" text-anchor="middle" class="Lx">Verb: only -s for 3rd sg present; -ed for past; -ing for progressive. No gender agreement.</text>
<text x="240" y="91" text-anchor="middle" class="Lx">Articles: the (definite) / a, an (indefinite) — no grammatical gender.</text>
<line x1="20" y1="99" x2="460" y2="99" stroke="black" stroke-width="0.3"/>
