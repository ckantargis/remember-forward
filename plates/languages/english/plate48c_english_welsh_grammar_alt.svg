<text x="240" y="243" text-anchor="middle" class="Hb" fill="white">WELSH (CYMRAEG) · GRAMMAR · VOCABULARY</text>
<line x1="20" y1="247" x2="460" y2="247" stroke="black" stroke-width="0.3"/>
<text x="240" y="262" text-anchor="middle" class="Ls">Welsh is VSO (Verb-Subject-Object) — unusual in Europe. "Mae Sioned yn canu" = Is Sioned singing = Sioned sings.</text>
<text x="240" y="271" text-anchor="middle" class="Lx">Inflected prepositions: unique Celtic feature. "I am" = Mae + subject; prepositions conjugate like verbs.</text>
<text x="240" y="280" text-anchor="middle" class="Lx">"ar" (on): arnaf i (on-me), arnat ti (on-you), arno fe (on-him). Prepositions merge with pronouns.</text>
<line x1="20" y1="287" x2="460" y2="287" stroke="black" stroke-width="0.3"/>
<text x="240" y="295" text-anchor="middle" class="H">— WELSH VERB "BOD" (TO BE) — PRESENT TENSE —</text>
<text x="160" y="304" text-anchor="middle" class="Ls">rydw i</text>
<text x="330" y="304" text-anchor="middle" class="Lx">I am</text>
<text x="160" y="314" text-anchor="middle" class="Ls">rwyt ti</text>
<text x="330" y="314" text-anchor="middle" class="Lx">you are (inf.)</text>
<text x="160" y="324" text-anchor="middle" class="Ls">mae e/hi</text>
<text x="330" y="324" text-anchor="middle" class="Lx">he/she is</text>
<text x="160" y="334" text-anchor="middle" class="Ls">rydyn ni</text>
<text x="330" y="334" text-anchor="middle" class="Lx">we are</text>
<text x="160" y="344" text-anchor="middle" class="Ls">rydych chi</text>
<text x="330" y="344" text-anchor="middle" class="Lx">you are (formal)</text>
<text x="160" y="354" text-anchor="middle" class="Ls">maen nhw</text>
<text x="330" y="354" text-anchor="middle" class="Lx">they are</text>
