<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<defs><style>
text{font-family:Georgia,serif;}
.T{font-size:12px;font-weight:bold;letter-spacing:2px;}
.S{font-size:7px;letter-spacing:1.5px;}
.H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >TAGALOG / FILIPINO</text>
<text x="240" y="50" text-anchor="middle" class="S" >Phonology — Sounds and Stress</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— CONSONANT INVENTORY —</text>
<text x="80" y="82" text-anchor="middle" class="Lx" >p /p/ bilabial stop vl</text>
<text x="280" y="82" text-anchor="middle" class="Lx" >b /b/ bilabial stop vd</text>
<text x="80" y="92" text-anchor="middle" class="Lx" >t /t/ alveolar stop vl</text>
<text x="280" y="92" text-anchor="middle" class="Lx" >d /d/ alveolar stop vd</text>
<text x="80" y="102" text-anchor="middle" class="Lx" >k /k/ velar stop vl</text>
<text x="280" y="102" text-anchor="middle" class="Lx" >g /ɡ/ velar stop vd</text>
<text x="80" y="112" text-anchor="middle" class="Lx" >ʔ /ʔ/ glottal stop (unmarked in spelling)</text>
<text x="280" y="112" text-anchor="middle" class="Lx" >m /m/ bilabial nasal</text>
<text x="80" y="122" text-anchor="middle" class="Lx" >n /n/ alveolar nasal</text>
<text x="280" y="122" text-anchor="middle" class="Lx" >ng /ŋ/ velar nasal</text>
<text x="80" y="132" text-anchor="middle" class="Lx" >l /l/ lateral</text>
<text x="280" y="132" text-anchor="middle" class="Lx" >r /r/ trill/tap</text>
<text x="80" y="142" text-anchor="middle" class="Lx" >s /s/ alveolar fricative</text>
<text x="280" y="142" text-anchor="middle" class="Lx" >h /h/ glottal fricative</text>
<text x="80" y="152" text-anchor="middle" class="Lx" >w /w/ labio-velar approx</text>
<text x="280" y="152" text-anchor="middle" class="Lx" >y /j/ palatal approx</text>
<text x="80" y="162" text-anchor="middle" class="Lx" >f /f/ labiodental (loanwords)</text>
<text x="280" y="162" text-anchor="middle" class="Lx" >v /v/ labiodental vd (loanwords)</text>
<line x1="20" y1="187" x2="460" y2="187" stroke="black" stroke-width="0.3"/>
<text x="240" y="196" text-anchor="middle" class="H" >— VOWEL SYSTEM — 5 VOWELS —</text>
<text x="80" y="206" text-anchor="middle" class="Ls" >a /a/</text>
<text x="300" y="206" text-anchor="middle" class="Lx" >open front: bahay (house)</text>
<text x="80" y="216" text-anchor="middle" class="Ls" >e /ɛ/</text>
<text x="300" y="216" text-anchor="middle" class="Lx" >mid-front: bente (twenty)</text>
<text x="80" y="226" text-anchor="middle" class="Ls" >i /i/</text>
<text x="300" y="226" text-anchor="middle" class="Lx" >high front: isa (one)</text>
<text x="80" y="236" text-anchor="middle" class="Ls" >o /o/</text>
<text x="300" y="236" text-anchor="middle" class="Lx" >mid-back: oo (yes)</text>
<text x="80" y="246" text-anchor="middle" class="Ls" >u /u/</text>
<text x="300" y="246" text-anchor="middle" class="Lx" >high back: uno (one, Spanish loan)</text>
<line x1="20" y1="262" x2="460" y2="262" stroke="black" stroke-width="0.3"/>
<text x="240" y="271" text-anchor="middle" class="H" >— GLOTTAL STOP — KEY FEATURE —</text>
<text x="240" y="281" text-anchor="middle" class="Ls" >The glottal stop /ʔ/ is phonemic in Tagalog but not written in modern orthography.</text>
<text x="240" y="291" text-anchor="middle" class="Ls" >Word-final glottal stop: mata (eyes) /ma.taʔ/ vs. mata (to kill) /ma.ta/.</text>
<text x="240" y="301" text-anchor="middle" class="Ls" >Medial glottal: baa /baʔa/ (to brand) vs. baa /ba.a/.</text>
<text x="240" y="311" text-anchor="middle" class="Ls" >Learners must acquire glottal placement from context and exposure.</text>
<line x1="20" y1="319" x2="460" y2="319" stroke="black" stroke-width="0.3"/>
<text x="240" y="328" text-anchor="middle" class="H" >— STRESS SYSTEM —</text>
<text x="240" y="338" text-anchor="middle" class="Ls" >Tagalog has phonemic stress (distinguishes word meaning).</text>
<text x="240" y="348" text-anchor="middle" class="Ls" >Default: stress on penultimate (second-to-last) syllable.</text>
<text x="240" y="358" text-anchor="middle" class="Ls" >Final stress (mabuting = becoming good) vs. penultimate (mabuting = good [linker]).</text>
<text x="240" y="368" text-anchor="middle" class="Ls" >Stress + glottal stop combinations create multiple minimal pairs.</text>
<line x1="20" y1="376" x2="460" y2="376" stroke="black" stroke-width="0.3"/>
<text x="240" y="385" text-anchor="middle" class="H" >— LOAN PHONOLOGY —</text>
<text x="240" y="395" text-anchor="middle" class="Ls" >Spanish loans retain /f v/ and clusters: flores, crema, presidente.</text>
<text x="240" y="405" text-anchor="middle" class="Ls" >English loans common in modern speech: computer, internet, cellphone.</text>
<text x="240" y="415" text-anchor="middle" class="Ls" >Tagalog easily adapts foreign words to CV syllable structure.</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 42B — TAGALOG: PHONOLOGY — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
