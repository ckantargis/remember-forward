<text x="175" y="416" text-anchor="middle" class="Lx" >fire</text>
<text x="50" y="426" text-anchor="middle" class="Ls" >lupa</text>
<text x="175" y="426" text-anchor="middle" class="Lx" >earth/land</text>
<text x="285" y="326" text-anchor="middle" class="Ls" >tao</text>
<text x="410" y="326" text-anchor="middle" class="Lx" >person</text>
<text x="285" y="336" text-anchor="middle" class="Ls" >oras</text>
<text x="410" y="336" text-anchor="middle" class="Lx" >time</text>
<text x="285" y="346" text-anchor="middle" class="Ls" >buwan</text>
<text x="410" y="346" text-anchor="middle" class="Lx" >moon</text>
<text x="285" y="356" text-anchor="middle" class="Ls" >bituin</text>
<text x="410" y="356" text-anchor="middle" class="Lx" >star</text>
<text x="285" y="366" text-anchor="middle" class="Ls" >puso</text>
<text x="410" y="366" text-anchor="middle" class="Lx" >heart</text>
<text x="285" y="376" text-anchor="middle" class="Ls" >pagmamahal</text>
<text x="410" y="376" text-anchor="middle" class="Lx" >love</text>
<text x="285" y="386" text-anchor="middle" class="Ls" >kalayaan</text>
<text x="410" y="386" text-anchor="middle" class="Lx" >freedom</text>
<text x="285" y="396" text-anchor="middle" class="Ls" >alaala</text>
<text x="410" y="396" text-anchor="middle" class="Lx" >memory/remembrance</text>
<text x="285" y="406" text-anchor="middle" class="Ls" >kinabukasan</text>
<text x="410" y="406" text-anchor="middle" class="Lx" >future/tomorrow</text>
<text x="285" y="416" text-anchor="middle" class="Ls" >mundo</text>
<text x="410" y="416" text-anchor="middle" class="Lx" >world</text>
<text x="285" y="426" text-anchor="middle" class="Ls" >buhay</text>
<text x="410" y="426" text-anchor="middle" class="Lx" >life</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 42C — TAGALOG: GRAMMAR — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
