<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >TAGALOG / FILIPINO</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar — Focus System &amp; Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — FOCUS SYSTEM (UNIQUE) —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Tagalog has a focus/trigger system rather than standard SVO/SOV.</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >The focus particle marks which argument is "in focus" (topic/pivot).</text>
<text x="240" y="102" text-anchor="middle" class="Ls" >Verb affixes change to show which semantic role is focused.</text>
<line x1="20" y1="110" x2="460" y2="110" stroke="black" stroke-width="0.3"/>
<text x="240" y="119" text-anchor="middle" class="H" >— FOCUS TYPES —</text>
<text x="100" y="129" text-anchor="middle" class="Ls" >Actor focus (AF)</text>
<text x="190" y="129" text-anchor="middle" class="Ls" >-um- / mag-</text>
<text x="360" y="129" text-anchor="middle" class="Lx" >Bumili siya ng tinapay. HE bought bread.</text>
<text x="100" y="143" text-anchor="middle" class="Ls" >Patient/Object focus (PF)</text>
<text x="190" y="143" text-anchor="middle" class="Ls" >-in / -hin</text>
<text x="360" y="143" text-anchor="middle" class="Lx" >Binili niya ang tinapay. BREAD was bought by him.</text>
<text x="100" y="157" text-anchor="middle" class="Ls" >Locative focus (LF)</text>
<text x="190" y="157" text-anchor="middle" class="Ls" >-an</text>
<text x="360" y="157" text-anchor="middle" class="Lx" >Binilhan niya ng tinapay ang tindahan. AT the store.</text>
<text x="100" y="171" text-anchor="middle" class="Ls" >Benefactive focus (BF)</text>
<text x="190" y="171" text-anchor="middle" class="Ls" >-an / i-</text>
<text x="360" y="171" text-anchor="middle" class="Lx" >Ibinili niya siya ng tinapay. FOR her, he bought bread.</text>
<line x1="20" y1="195" x2="460" y2="195" stroke="black" stroke-width="0.3"/>
<text x="240" y="204" text-anchor="middle" class="H" >— ANG, NG, SA — CASE MARKERS —</text>
<text x="240" y="214" text-anchor="middle" class="Ls" >Tagalog uses three case markers (not inflections on the noun):</text>
<text x="80" y="224" text-anchor="middle" class="L" >ang</text>
<text x="290" y="224" text-anchor="middle" class="Ls" >nominative / focus / definite: ang bahay (THE house)</text>
<text x="80" y="234" text-anchor="middle" class="L" >ng /naŋ/</text>
<text x="290" y="234" text-anchor="middle" class="Ls" >genitive/object: ng bahay (of a house)</text>
<text x="80" y="244" text-anchor="middle" class="L" >sa</text>
<text x="290" y="244" text-anchor="middle" class="Ls" >oblique/locative: sa bahay (at/in/to the house)</text>
<line x1="20" y1="260" x2="460" y2="260" stroke="black" stroke-width="0.3"/>
<text x="240" y="269" text-anchor="middle" class="H" >— LINKER — NA/NG —</text>
<text x="240" y="279" text-anchor="middle" class="Ls" >Linker na (after consonant) / ng (after vowel) connects modifier to head.</text>
<text x="240" y="289" text-anchor="middle" class="Ls" >magandang babae = beautiful woman (maganda + ng + babae).</text>
<text x="240" y="299" text-anchor="middle" class="Ls" >Linker marks adjectives, relative clauses, and genitive relationships.</text>
<line x1="20" y1="307" x2="460" y2="307" stroke="black" stroke-width="0.3"/>
<text x="240" y="316" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
