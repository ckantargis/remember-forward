<text x="175" y="346" text-anchor="middle" class="Lx" >yes</text>
<text x="50" y="356" text-anchor="middle" class="Ls" >hindi</text>
<text x="175" y="356" text-anchor="middle" class="Lx" >no/not</text>
<text x="50" y="366" text-anchor="middle" class="Ls" >paumanhin</text>
