<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">TAGALOG</text>
<text x="240" y="40" text-anchor="middle" class="S">FOCUS SYSTEM &amp; GRAMMAR</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">THE PHILIPPINE FOCUS SYSTEM</text>
<text x="240" y="68" text-anchor="middle" class="L">Tagalog verbs mark which argument is "in focus" (prominent)</text>
<text x="240" y="79" text-anchor="middle" class="L">Actor Focus (AF): -um- / mag- marks subject as actor</text>
<text x="240" y="90" text-anchor="middle" class="L">Bumili ako ng mangga sa tindahan.</text>
<text x="240" y="101" text-anchor="middle" class="Ls">"I bought mango at the store." (actor in focus)</text>
<text x="240" y="112" text-anchor="middle" class="L">Object Focus (OF): -in- marks object as focus</text>
<text x="240" y="123" text-anchor="middle" class="L">Binili ko ang mangga sa tindahan.</text>
<text x="240" y="134" text-anchor="middle" class="Ls">"The mango was bought by me at the store." (object in focus)</text>
<line x1="20" y1="142" x2="460" y2="142" stroke="#555" stroke-width="0.5"/>
<text x="240" y="150" text-anchor="middle" class="H">FOCUS TYPES</text>
<text x="240" y="161" text-anchor="middle" class="L">Actor (-um-/mag-) • Object (-in-) • Locative (-an)</text>
<text x="240" y="172" text-anchor="middle" class="L">Benefactive (-an/-in-an) • Instrumental (i-)</text>
<text x="240" y="183" text-anchor="middle" class="Ls">"ang" particle marks the focused argument</text>
<line x1="20" y1="191" x2="460" y2="191" stroke="#555" stroke-width="0.5"/>
<text x="240" y="199" text-anchor="middle" class="H">TAGALOG WORD ORDER</text>
<text x="240" y="210" text-anchor="middle" class="L">Predicate-initial: VSO or VOS typical</text>
<text x="240" y="221" text-anchor="middle" class="Ls">Verb comes first; subject follows; topic marked by ang</text>
<line x1="20" y1="229" x2="460" y2="229" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="236" width="460" height="13" fill="#111"/>
<text x="240" y="245.5" text-anchor="middle" class="Hb">CEBUANO GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="261" text-anchor="middle" class="H">CEBUANO FOCUS SYSTEM</text>
<text x="240" y="272" text-anchor="middle" class="L">Cebuano has the SAME Philippine focus system!</text>
<text x="240" y="283" text-anchor="middle" class="L">Actor Focus: mo-/mag- prefix (Cebuano uses mo- where Tagalog uses um-)</text>
<text x="240" y="294" text-anchor="middle" class="L">Moadto ko sa merkado.  "I will go to the market." (AF)</text>
<text x="240" y="305" text-anchor="middle" class="L">Object Focus: -on suffix (Tagalog uses -in)</text>
<text x="240" y="316" text-anchor="middle" class="Ls">Adtoon nako ang merkado.  "The market I will go to." (OF)</text>
<line x1="20" y1="324" x2="460" y2="324" stroke="#555" stroke-width="0.5"/>
<text x="240" y="332" text-anchor="middle" class="H">CEBUANO FOCUS MARKERS</text>
<text x="240" y="343" text-anchor="middle" class="L">ang = topic marker (same as Tagalog!)</text>
<text x="240" y="354" text-anchor="middle" class="L">ni/sa = non-topic markers (similar to Tagalog ng/sa)</text>
<text x="240" y="365" text-anchor="middle" class="L">Shared particles: ang, sa, ni — core Philippine grammar</text>
<line x1="20" y1="373" x2="460" y2="373" stroke="#555" stroke-width="0.5"/>
<text x="240" y="381" text-anchor="middle" class="H">SHARED PHILIPPINE GRAMMAR</text>
<text x="240" y="392" text-anchor="middle" class="L">Both: predicate-initial VSO word order</text>
<text x="240" y="403" text-anchor="middle" class="L">Both: ang topic marker  •  sa locative  •  focus morphology</text>
<text x="240" y="414" text-anchor="middle" class="L">Both: no grammatical gender  •  no case inflection on nouns</text>
<text x="240" y="425" text-anchor="middle" class="Ls">Tagalog: -um-/-in-  vs.  Cebuano: mo-/-on  (parallel system)</text>
<text x="240" y="436" text-anchor="middle" class="Ls">Mutual intelligibility: LOW for core vocabulary, HIGH for grammar</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 42c ALT  ·  TAGALOG / CEBUANO  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
