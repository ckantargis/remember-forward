<line x1="24" y1="279" x2="456" y2="279" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="285" x2="118" y2="285" stroke="#111" stroke-width="0.3"/>
<text x="240" y="289" text-anchor="middle" class="H">— THE VOWEL PROBLEM —</text>
<line x1="362" y1="285" x2="450" y2="285" stroke="#111" stroke-width="0.3"/>
<text x="36" y="297" text-anchor="start" class="Lx">Egyptian hieroglyphs record CONSONANTS ONLY. Vowels are not written.</text>
<text x="36" y="306" text-anchor="start" class="Lx">Egyptologists conventionally insert the vowel "e" between consonants for pronunciation.</text>
<text x="36" y="315" text-anchor="start" class="Lx">Example: nfr (beautiful) = pronounced approximately "ne-fer".</text>
<text x="36" y="324" text-anchor="start" class="Lx">The word pr (house) might be read "per", sn (brother) = "sen".</text>
<line x1="24" y1="335" x2="456" y2="335" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="341" x2="118" y2="341" stroke="#111" stroke-width="0.3"/>
<text x="240" y="345" text-anchor="middle" class="H">— COPTIC — THE VOWEL KEY —</text>
<line x1="362" y1="341" x2="450" y2="341" stroke="#111" stroke-width="0.3"/>
<text x="36" y="353" text-anchor="start" class="Lx">Coptic (3rd–17th CE) is the final stage of the Egyptian language, written in the Greek</text>
<text x="36" y="362" text-anchor="start" class="Lx">alphabet plus 6–7 demotic-derived letters. It PRESERVES VOWELS, revealing what the</text>
<text x="36" y="371" text-anchor="start" class="Lx">hieroglyphic consonants actually sounded like.</text>
<text x="36" y="380" text-anchor="start" class="Lx">Three primary vowel qualities: a, i, u (plus schwa ə in unstressed syllables).</text>
<text x="36" y="389" text-anchor="start" class="Lx">Key: Egyptian ꜣ often = Coptic a, Egyptian i = Coptic i, Egyptian w = Coptic u/ou.</text>
<text x="36" y="398" text-anchor="start" class="Lx">Stress falls on the last heavy syllable (closed or with long vowel).</text>
<line x1="24" y1="409" x2="456" y2="409" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="415" x2="118" y2="415" stroke="#111" stroke-width="0.3"/>
<text x="240" y="419" text-anchor="middle" class="H">— TRANSLITERATION SYSTEM (MANUEL DE CODAGE) —</text>
<line x1="362" y1="415" x2="450" y2="415" stroke="#111" stroke-width="0.3"/>
<text x="240" y="427" text-anchor="middle" class="Lx">Standard Egyptological transliteration symbols with approximate IPA values:</text>
