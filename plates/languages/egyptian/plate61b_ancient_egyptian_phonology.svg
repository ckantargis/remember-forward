<line x1="30" y1="519" x2="118" y2="519" stroke="#111" stroke-width="0.3"/>
<text x="240" y="523" text-anchor="middle" class="H">— COPTIC ALPHABET (DESCENDANT OF EGYPTIAN) —</text>
<line x1="362" y1="519" x2="450" y2="519" stroke="#111" stroke-width="0.3"/>
<text x="240" y="531" text-anchor="middle" class="L">Coptic letters: ⲀⲁⲂⲃⲄⲅⲆⲇⲈⲉⲊⲋⲌⲍⲎⲏⲐⲑⲒⲓⲔⲕⲖⲗⲘⲙⲚⲛⲜⲝⲞⲟ</text>
<text x="240" y="542" text-anchor="middle" class="Lx">(Greek-alphabet base + Demotic-derived signs for Egyptian sounds without Greek equivalents)</text>
<text x="240" y="551" text-anchor="middle" class="Lx">Unicode block U+2C80–U+2CFF · Font: Noto Sans Coptic</text>
