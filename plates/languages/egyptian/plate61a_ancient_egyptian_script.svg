<text x="240" y="67" text-anchor="middle" class="H">— THE THREE WRITING SYSTEMS —</text>
<line x1="362" y1="63" x2="450" y2="63" stroke="#111" stroke-width="0.3"/>
<text x="100" y="75" text-anchor="middle" class="H">HIEROGLYPHIC</text>
<text x="100" y="85" text-anchor="middle" class="Lx">Formal / monumental</text>
<text x="100" y="94" text-anchor="middle" class="Lx">c. 3200 BCE – 400 CE</text>
<text x="100" y="103" text-anchor="middle" class="Lx">Stone inscriptions, temple</text>
<text x="100" y="112" text-anchor="middle" class="Lx">walls, coffins, papyrus</text>
<text x="100" y="121" text-anchor="middle" class="Lx">1,000+ signs</text>
<text x="240" y="75" text-anchor="middle" class="H">HIERATIC</text>
<text x="240" y="85" text-anchor="middle" class="Lx">Cursive reed-pen script</text>
<text x="240" y="94" text-anchor="middle" class="Lx">c. 2700 BCE – 200 CE</text>
<text x="240" y="103" text-anchor="middle" class="Lx">Papyrus, ostraca (pottery)</text>
<text x="240" y="112" text-anchor="middle" class="Lx">Literary, religious, admin</text>
<text x="240" y="121" text-anchor="middle" class="Lx">Simplified from hieroglyphs</text>
<text x="380" y="75" text-anchor="middle" class="H">DEMOTIC</text>
<text x="380" y="85" text-anchor="middle" class="Lx">Rapid cursive with ligatures</text>
<text x="380" y="94" text-anchor="middle" class="Lx">c. 650 BCE – 400 CE</text>
<text x="380" y="103" text-anchor="middle" class="Lx">Admin, legal, personal use</text>
<text x="380" y="112" text-anchor="middle" class="Lx">On Rosetta Stone (196 BCE)</text>
<text x="380" y="121" text-anchor="middle" class="Lx">Highly abbreviated</text>
