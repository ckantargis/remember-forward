<line x1="24" y1="310" x2="456" y2="310" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="317" x2="118" y2="317" stroke="#111" stroke-width="0.3"/>
<text x="240" y="321" text-anchor="middle" class="H">— READING CONVENTIONS —</text>
<line x1="362" y1="317" x2="450" y2="317" stroke="#111" stroke-width="0.3"/>
<text x="36" y="328" text-anchor="start" class="Lx">DIRECTION: Follow where human/animal figures face. Figures face start of text.</text>
<text x="36" y="337" text-anchor="start" class="Lx">Can read left-to-right, right-to-left, or top-to-bottom (in columns).</text>
<text x="36" y="346" text-anchor="start" class="Lx">CARTOUCHE: Oval ring enclosing a royal name — oval indicates a living king.</text>
<text x="36" y="355" text-anchor="start" class="Lx">DETERMINATIVE: Unpronounced sign that classifies the word (e.g., ⊕ after city names).</text>
<text x="36" y="364" text-anchor="start" class="Lx">LOGOGRAM: Sign read as a whole word — often has a vertical stroke below.</text>
<text x="36" y="373" text-anchor="start" class="Lx">PHONOGRAM: Sign read for its consonant sounds only (ignoring original meaning).</text>
<line x1="24" y1="396" x2="456" y2="396" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="403" x2="118" y2="403" stroke="#111" stroke-width="0.3"/>
<text x="240" y="407" text-anchor="middle" class="H">— UNICODE &amp; FONT —</text>
<line x1="362" y1="403" x2="450" y2="403" stroke="#111" stroke-width="0.3"/>
<text x="36" y="413" text-anchor="start" class="Lx">Hieroglyphic Unicode block: U+13000–U+1342F (1,072 characters)</text>
<text x="36" y="422" text-anchor="start" class="Lx">Font required: Noto Sans Egyptian Hieroglyphs (Google Fonts, free)</text>
<text x="36" y="431" text-anchor="start" class="Lx">All hieroglyphs are in the Supplementary Multilingual Plane (SMP)</text>
<text x="36" y="440" text-anchor="start" class="Lx">Coptic Unicode block (descendant script): U+2C80–U+2CFF</text>
<line x1="24" y1="448" x2="456" y2="448" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="455" x2="118" y2="455" stroke="#111" stroke-width="0.3"/>
<text x="240" y="459" text-anchor="middle" class="H">— HIEROGLYPH SIGN TYPES —</text>
<line x1="362" y1="455" x2="450" y2="455" stroke="#111" stroke-width="0.3"/>
<text x="50" y="464" text-anchor="start" class="H">TYPE</text>
<text x="140" y="464" text-anchor="start" class="H">FUNCTION</text>
<text x="270" y="464" text-anchor="start" class="H">EXAMPLE</text>
<text x="350" y="464" text-anchor="start" class="H">NOTE</text>
<line x1="24" y1="467" x2="456" y2="467" stroke="#111" stroke-width="0.3"/>
<text x="50" y="474" text-anchor="start" class="Lx">LOGOGRAM</text>
<text x="140" y="474" text-anchor="start" class="Lx">Sign = whole word</text>
<text x="270" y="474" text-anchor="start" class="Lx">pr</text>
<text x="350" y="474" text-anchor="start" class="Lx">house</text>
<text x="50" y="483" text-anchor="start" class="Lx">PHONOGRAM</text>
<text x="140" y="483" text-anchor="start" class="Lx">Sign = sound(s)</text>
<text x="270" y="483" text-anchor="start" class="Lx">m</text>
<text x="350" y="483" text-anchor="start" class="Lx">owl = sound /m/</text>
<text x="50" y="492" text-anchor="start" class="Lx">BILITERAL</text>
<text x="140" y="492" text-anchor="start" class="Lx">2-consonant sign</text>
<text x="270" y="492" text-anchor="start" class="Lx">mn</text>
<text x="350" y="492" text-anchor="start" class="Lx">gaming board</text>
<text x="50" y="501" text-anchor="start" class="Lx">TRILITERAL</text>
<text x="140" y="501" text-anchor="start" class="Lx">3-consonant sign</text>
<text x="270" y="501" text-anchor="start" class="Lx">nfr</text>
<text x="350" y="501" text-anchor="start" class="Lx">windpipe/heart</text>
<text x="50" y="510" text-anchor="start" class="Lx">DETERMINATIVE</text>
<text x="140" y="510" text-anchor="start" class="Lx">Unpronounced classifier</text>
<text x="270" y="510" text-anchor="start" class="Lx">⊕</text>
<text x="350" y="510" text-anchor="start" class="Lx">after city names</text>
<line x1="24" y1="510" x2="456" y2="510" stroke="#111" stroke-width="0.3"/>
<text x="240" y="520" text-anchor="middle" class="Lx">HISTORICAL NOTE: Egyptian is the world's oldest attested writing system (c. 3200 BCE)</text>
<text x="240" y="530" text-anchor="middle" class="Lx">and the direct ancestor of Coptic (3rd–17th CE), which preserves the vowel sounds.</text>
<text x="240" y="540" text-anchor="middle" class="Lx">Hieroglyphs were deciphered in 1822 by Jean-François Champollion using the Rosetta Stone.</text>
<text x="240" y="550" text-anchor="middle" class="Lx">The Rosetta Stone (196 BCE) contains the same decree in hieroglyphic, demotic, and Greek.</text>
<text x="240" y="560" text-anchor="middle" class="Lx">See Plate 01 (Rosetta Index) for the symbolic connection to this project's design.</text>
<line x1="24" y1="607" x2="456" y2="607" stroke="#111" stroke-width="0.3"/>
<text x="240" y="616" text-anchor="middle" class="M">PLATE 61A  ·  SERIES 61  ·  ANCIENT EGYPTIAN  ·  MIDDLE EGYPTIAN c. 2000 BCE  ·  U+13000–U+13431</text>
