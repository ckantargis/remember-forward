<text x="240" y="32" text-anchor="middle" class="T">MANDARIN CHINESE — SCRIPT · WRITING SYSTEM</text>
<text x="240" y="50" text-anchor="middle" class="S">SERIES 17A OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="#000" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H">— · —  THE WRITING SYSTEM  — · —</text>
<text x="240" y="79" text-anchor="middle" class="L">Logographic script: ~50,000 characters total; ~3,500 required for everyday literacy</text>
<text x="240" y="89" text-anchor="middle" class="Ls">Traditional 繁體字 fántǐzì (Taiwan, HK, Macau) · Simplified 简体字 jiǎnǐzì (PRC, Singapore)</text>
<text x="240" y="99" text-anchor="middle" class="Ls">Unicode: CJK Unified Ideographs U+4E00–U+9FFF (20,992 chars) + extension blocks</text>
<text x="240" y="109" text-anchor="middle" class="Ls">Direction: traditionally top→bottom, right→left column; modern usage: left→right</text>
<line x1="20" y1="118" x2="460" y2="118" stroke="#000" stroke-width="0.3"/>
<text x="240" y="127" text-anchor="middle" class="H">— · —  CHARACTER STRUCTURE  — · —</text>
<text x="240" y="138" text-anchor="middle" class="L">Characters combine a semantic radical (meaning clue) + phonetic component (sound clue)</text>
<text x="240" y="149" text-anchor="middle" class="Ls">Pictographic 象形 xiàngxíng: direct visual representations of objects</text>
<text x="58" y="161" text-anchor="middle" class="Lcs">日</text>
<text x="58" y="172" text-anchor="middle" class="Lx">rì</text>
<text x="58" y="180" text-anchor="middle" class="Lx">sun/day</text>
<text x="152" y="161" text-anchor="middle" class="Lcs">月</text>
<text x="152" y="172" text-anchor="middle" class="Lx">yuè</text>
<text x="152" y="180" text-anchor="middle" class="Lx">moon</text>
<text x="240" y="161" text-anchor="middle" class="Lcs">山</text>
<text x="240" y="172" text-anchor="middle" class="Lx">shān</text>
<text x="240" y="180" text-anchor="middle" class="Lx">mountain</text>
<text x="328" y="161" text-anchor="middle" class="Lcs">木</text>
<text x="328" y="172" text-anchor="middle" class="Lx">mù</text>
<text x="328" y="180" text-anchor="middle" class="Lx">tree</text>
<text x="420" y="161" text-anchor="middle" class="Lcs">水</text>
<text x="420" y="172" text-anchor="middle" class="Lx">shuǐ</text>
<text x="420" y="180" text-anchor="middle" class="Lx">water</text>
<text x="240" y="191" text-anchor="middle" class="Ls">Compound 会意: 明 míng (bright) = 日 sun + 月 moon · 森 sēn (forest) = 木 + 木 + 木</text>
<text x="240" y="201" text-anchor="middle" class="Ls">Phono-semantic 形声 xíngshēng (~90% of characters): radical signals meaning, phonetic signals sound</text>
<line x1="20" y1="210" x2="460" y2="210" stroke="#000" stroke-width="0.3"/>
<text x="240" y="219" text-anchor="middle" class="H">— · —  STROKE TYPES — 永字八法: CHARACTER 永 yǒng CONTAINS ALL EIGHT  — · —</text>
<text x="58" y="231" text-anchor="middle" class="Ls">横 héng</text>
<text x="58" y="242" text-anchor="middle" class="Lx">→ horizontal</text>
<text x="172" y="231" text-anchor="middle" class="Ls">糭 shù</text>
<text x="172" y="242" text-anchor="middle" class="Lx">↓ vertical</text>
<text x="296" y="231" text-anchor="middle" class="Ls">撇 piě</text>
<text x="296" y="242" text-anchor="middle" class="Lx">↙ left-falling</text>
<text x="410" y="231" text-anchor="middle" class="Ls">捐 nà</text>
<text x="410" y="242" text-anchor="middle" class="Lx">↘ right-falling</text>
<text x="58" y="253" text-anchor="middle" class="Ls">点 diǎn</text>
<text x="58" y="264" text-anchor="middle" class="Lx">· dot</text>
<text x="172" y="253" text-anchor="middle" class="Ls">折 zhé</text>
<text x="172" y="264" text-anchor="middle" class="Lx">↱ turning</text>
<text x="296" y="253" text-anchor="middle" class="Ls">钉 gōu</text>
<text x="296" y="264" text-anchor="middle" class="Lx">↳ hook</text>
<text x="410" y="253" text-anchor="middle" class="Ls">提 tí</text>
<text x="410" y="264" text-anchor="middle" class="Lx">↗ rising</text>
<text x="240" y="277" text-anchor="middle" class="Ls">Rules: top→bottom · left→right · horizontal before vertical · outside before inside</text>
<line x1="20" y1="286" x2="460" y2="286" stroke="#000" stroke-width="0.3"/>
<text x="240" y="295" text-anchor="middle" class="H">— · —  TRADITIONAL AND SIMPLIFIED — KEY PAIRS  — · —</text>
