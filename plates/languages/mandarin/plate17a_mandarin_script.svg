<text x="240" y="449" text-anchor="middle" class="H">— · —  KEY KANGXI RADICALS — 部首 BÙSHǒU  — · —</text>
<text x="240" y="459" text-anchor="middle" class="Lx">214 Kangxi radicals (1716 CE) serve as the indexing system for all Chinese dictionaries</text>
