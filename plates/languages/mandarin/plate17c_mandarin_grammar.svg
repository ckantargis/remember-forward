<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<style>
  text { font-family: Georgia, serif; }
  .T  { font-size:12px; font-weight:bold; letter-spacing:2px; }
  .S  { font-size:7px; letter-spacing:1.5px; }
  .H  { font-size:6.5px; font-weight:bold; letter-spacing:2.5px; }
  .L  { font-size:7px; }
  .Ls { font-size:6px; }
  .Lx { font-size:5.5px; }
  .M  { font-size:6px; }
  .F  { font-size:7px; font-style:italic; }
  .Fb { font-size:7.5px; font-weight:bold; }
  .Lc { font-size:13px; }
  .Lcl{ font-size:17px; }
  .Lcs{ font-size:10px; }
  .Lcx{ font-size:8px; }
</style>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#000" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="#000" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">MANDARIN CHINESE — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S">SERIES 17C OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="#000" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H">— · —  BASIC WORD ORDER — SVO  — · —</text>
<text x="240" y="79" text-anchor="middle" class="L">Subject → Verb → Object (parallel to English; unlike Latin or Japanese)</text>
<rect x="88" y="85" width="92" height="28" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="134" y="97" text-anchor="middle" class="Ls">我 wǒ</text>
<text x="134" y="107" text-anchor="middle" class="Lx">I</text>
<rect x="198" y="85" width="92" height="28" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="244" y="97" text-anchor="middle" class="Ls">吃 chī</text>
<text x="244" y="107" text-anchor="middle" class="Lx">eat</text>
<rect x="308" y="85" width="92" height="28" fill="none" stroke="#000" stroke-width="0.8"/>
<text x="354" y="97" text-anchor="middle" class="Ls">饭 fàn</text>
<text x="354" y="107" text-anchor="middle" class="Lx">rice</text>
<text x="184" y="99" text-anchor="middle" class="L">→</text>
<text x="294" y="99" text-anchor="middle" class="L">→</text>
<text x="240" y="124" text-anchor="middle" class="Ls">Modifiers precede: 红色的苹果 hóngsè de píngguǒ = red-DE apple = "red apple"</text>
<line x1="20" y1="133" x2="460" y2="133" stroke="#000" stroke-width="0.3"/>
<text x="240" y="143" text-anchor="middle" class="H">— · —  THE 把 Bǎ CONSTRUCTION — DISPOSAL OF OBJECT  — · —</text>
<text x="240" y="154" text-anchor="middle" class="L">S + 把 + Object + Verb + Result / Direction</text>
<text x="240" y="166" text-anchor="middle" class="Lcs">我把书放在桌上</text>
<text x="240" y="179" text-anchor="middle" class="Ls">wǒ bǎ shū fàng zài zhuŏ shàng</text>
<text x="240" y="189" text-anchor="middle" class="Lx">I  BA  book  put  at  table  above  =  “I put the book on the table”</text>
<text x="240" y="199" text-anchor="middle" class="Ls">Required when an action has a clear result or physical effect on a specific object</text>
<line x1="20" y1="208" x2="460" y2="208" stroke="#000" stroke-width="0.3"/>
<text x="240" y="218" text-anchor="middle" class="H">— · —  ASPECT MARKERS — 时态 SHÍTÀI  — · —</text>
<text x="240" y="229" text-anchor="middle" class="Ls">Chinese marks ASPECT (completion / state) not TENSE — time is set by context</text>
<text x="58" y="241" text-anchor="middle" class="Ls">了 le</text>
<text x="140" y="241" text-anchor="start" class="Lx">— perfective:</text>
<text x="272" y="241" text-anchor="middle" class="Lcs">我吃了</text>
<text x="408" y="241" text-anchor="middle" class="Lx">wǒ chī le  “I ate / have eaten”</text>
<text x="58" y="263" text-anchor="middle" class="Ls">过 guò</text>
<text x="140" y="263" text-anchor="start" class="Lx">— experiential:</text>
<text x="272" y="263" text-anchor="middle" class="Lcs">我去过北京</text>
<text x="408" y="263" text-anchor="middle" class="Lx">wǒ qù guò Bĝijīng  “I have been to Beijing”</text>
<text x="58" y="285" text-anchor="middle" class="Ls">着 zhe</text>
<text x="140" y="285" text-anchor="start" class="Lx">— continuous state:</text>
<text x="272" y="285" text-anchor="middle" class="Lcs">她笑着</text>
<text x="408" y="285" text-anchor="middle" class="Lx">tā xiào zhe  “she is smiling”</text>
<text x="58" y="307" text-anchor="middle" class="Ls">在 zài</text>
<text x="140" y="307" text-anchor="start" class="Lx">— in progress:</text>
<text x="272" y="307" text-anchor="middle" class="Lcs">他在吃饭</text>
<text x="408" y="307" text-anchor="middle" class="Lx">tā zài chīfàn  “he is eating”</text>
<line x1="20" y1="330" x2="460" y2="330" stroke="#000" stroke-width="0.3"/>
<text x="240" y="340" text-anchor="middle" class="H">— · —  MEASURE WORDS — 量词 LIÀNGCÍ  — · —</text>
<text x="240" y="351" text-anchor="middle" class="Ls">Number + Measure Word + Noun is required — no direct equivalent in English</text>
<text x="52" y="362" text-anchor="middle" class="Ls">个 gè</text>
<text x="127" y="362" text-anchor="start" class="Lx">— general</text>
<text x="255" y="362" text-anchor="middle" class="Lcs">一个人</text>
<text x="350" y="362" text-anchor="middle" class="Lx">yī gè rén</text>
<text x="430" y="362" text-anchor="middle" class="Lx">one person</text>
<text x="52" y="376" text-anchor="middle" class="Ls">本 běn</text>
<text x="127" y="376" text-anchor="start" class="Lx">— bound volumes</text>
<text x="255" y="376" text-anchor="middle" class="Lcs">三本书</text>
<text x="350" y="376" text-anchor="middle" class="Lx">sān běn shū</text>
<text x="430" y="376" text-anchor="middle" class="Lx">three books</text>
<text x="52" y="390" text-anchor="middle" class="Ls">张 zhāng</text>
<text x="127" y="390" text-anchor="start" class="Lx">— flat objects</text>
<text x="255" y="390" text-anchor="middle" class="Lcs">一张纸</text>
<text x="350" y="390" text-anchor="middle" class="Lx">yī zhāng zhǐ</text>
<text x="430" y="390" text-anchor="middle" class="Lx">one sheet of paper</text>
<text x="52" y="404" text-anchor="middle" class="Ls">条 tiáo</text>
<text x="127" y="404" text-anchor="start" class="Lx">— long flexible</text>
<text x="255" y="404" text-anchor="middle" class="Lcs">一条鱼</text>
<text x="350" y="404" text-anchor="middle" class="Lx">yī tiáo yú</text>
<text x="430" y="404" text-anchor="middle" class="Lx">one fish</text>
<text x="52" y="418" text-anchor="middle" class="Ls">只 zhī</text>
<text x="127" y="418" text-anchor="start" class="Lx">— small creatures</text>
<text x="255" y="418" text-anchor="middle" class="Lcs">两只猫</text>
<text x="350" y="418" text-anchor="middle" class="Lx">liǎng zhī māo</text>
<text x="430" y="418" text-anchor="middle" class="Lx">two cats</text>
<text x="52" y="432" text-anchor="middle" class="Ls">座 zuò</text>
<text x="127" y="432" text-anchor="start" class="Lx">— large structures</text>
<text x="255" y="432" text-anchor="middle" class="Lcs">一座山</text>
<text x="350" y="432" text-anchor="middle" class="Lx">yī zuò shān</text>
<text x="430" y="432" text-anchor="middle" class="Lx">one mountain</text>
<line x1="20" y1="449" x2="460" y2="449" stroke="#000" stroke-width="0.3"/>
<text x="240" y="459" text-anchor="middle" class="H">— · —  THE THREE DE — 的 地 得  — · —</text>
<text x="52" y="471" text-anchor="middle" class="Ls">的 de</text>
<text x="120" y="471" text-anchor="start" class="Lx">— attributive</text>
<text x="255" y="471" text-anchor="middle" class="Lcs">我的书</text>
<text x="352" y="471" text-anchor="middle" class="Lx">wǒ de shū</text>
<text x="432" y="471" text-anchor="middle" class="Lx">my book</text>
<text x="52" y="485" text-anchor="middle" class="Ls">地 de</text>
<text x="120" y="485" text-anchor="start" class="Lx">— adverbial</text>
<text x="255" y="485" text-anchor="middle" class="Lcs">慢慢地走</text>
<text x="352" y="485" text-anchor="middle" class="Lx">mànmàn de zǒu</text>
<text x="432" y="485" text-anchor="middle" class="Lx">walk slowly</text>
<text x="52" y="499" text-anchor="middle" class="Ls">得 de</text>
<text x="120" y="499" text-anchor="start" class="Lx">— resultative</text>
<text x="255" y="499" text-anchor="middle" class="Lcs">跑得很快</text>
<text x="352" y="499" text-anchor="middle" class="Lx">pǎo de hěn kuài</text>
<text x="432" y="499" text-anchor="middle" class="Lx">runs very fast</text>
<line x1="20" y1="509" x2="460" y2="509" stroke="#000" stroke-width="0.3"/>
<text x="240" y="519" text-anchor="middle" class="H">— · —  CORE VOCABULARY — 30 WORDS  — · —</text>
<text x="80" y="530" text-anchor="middle" class="Lx">人 rén  —  person</text>
<text x="80" y="537" text-anchor="middle" class="Lx">水 shuǐ  —  water</text>
<text x="80" y="544" text-anchor="middle" class="Lx">火 huǒ  —  fire</text>
<text x="80" y="551" text-anchor="middle" class="Lx">天 tiān  —  sky/heaven</text>
<text x="80" y="558" text-anchor="middle" class="Lx">地 dì  —  earth</text>
<text x="80" y="565" text-anchor="middle" class="Lx">日 rì  —  sun/day</text>
<text x="80" y="572" text-anchor="middle" class="Lx">月 yuè  —  moon</text>
<text x="80" y="579" text-anchor="middle" class="Lx">山 shān  —  mountain</text>
<text x="80" y="586" text-anchor="middle" class="Lx">木 mù  —  tree/wood</text>
<text x="80" y="593" text-anchor="middle" class="Lx">心 xīn  —  heart</text>
<text x="240" y="530" text-anchor="middle" class="Lx">我 wǒ  —  I/me</text>
<text x="240" y="537" text-anchor="middle" class="Lx">你 nǐ  —  you</text>
<text x="240" y="544" text-anchor="middle" class="Lx">他/她 tā  —  he/she</text>
<text x="240" y="551" text-anchor="middle" class="Lx">来 lái  —  come</text>
<text x="240" y="558" text-anchor="middle" class="Lx">去 qù  —  go</text>
<text x="240" y="565" text-anchor="middle" class="Lx">吃 chī  —  eat</text>
<text x="240" y="572" text-anchor="middle" class="Lx">喝 hē  —  drink</text>
<text x="240" y="579" text-anchor="middle" class="Lx">说 shuō  —  speak</text>
<text x="240" y="586" text-anchor="middle" class="Lx">看 kàn  —  see/read</text>
<text x="240" y="593" text-anchor="middle" class="Lx">走 zǒu  —  walk/go</text>
<text x="400" y="530" text-anchor="middle" class="Lx">大 dà  —  big</text>
<text x="400" y="537" text-anchor="middle" class="Lx">小 xiǎo  —  small</text>
<text x="400" y="544" text-anchor="middle" class="Lx">好 hǎo  —  good</text>
<text x="400" y="551" text-anchor="middle" class="Lx">多 duō  —  many</text>
<text x="400" y="558" text-anchor="middle" class="Lx">少 shǎo  —  few</text>
<text x="400" y="565" text-anchor="middle" class="Lx">家 jiā  —  home</text>
<text x="400" y="572" text-anchor="middle" class="Lx">书 shū  —  book</text>
<text x="400" y="579" text-anchor="middle" class="Lx">路 lù  —  road</text>
<text x="400" y="586" text-anchor="middle" class="Lx">爱 ài  —  love</text>
<text x="400" y="593" text-anchor="middle" class="Lx">生 shēng  —  life/birth</text>
<line x1="20" y1="607" x2="460" y2="607" stroke="#000" stroke-width="0.3"/>
<text x="240" y="615" text-anchor="middle" class="M">PLATE 17C · MANDARIN CHINESE · GRAMMAR · CC BY-SA 4.0 · rememberforward.org</text>
<line x1="20" y1="622" x2="460" y2="622" stroke="#000" stroke-width="0.3"/>
<text x="240" y="631" text-anchor="middle" class="M">SERIES 17 OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="638" x2="460" y2="638" stroke="#000" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
