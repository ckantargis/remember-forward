<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<style>
  text { font-family: Georgia, serif; }
  .T{font-size:11px;font-weight:bold;letter-spacing:1.5px}
  .S{font-size:6.5px;letter-spacing:1.5px}
  .H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px}
  .Hb{font-size:7px;font-weight:bold;letter-spacing:2px}
  .L{font-size:7px} .Ls{font-size:6px} .Lx{font-size:5.5px}
  .Lg{font-size:12px}
  .M{font-size:6px;letter-spacing:1px}
  .F{font-size:7px;font-style:italic}
  .Fb{font-size:7.5px;font-weight:bold}
</style>
<rect x="0" y="0" width="480" height="680" fill="white"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="30" text-anchor="middle" class="T">GREEK + ALBANIAN — PHONOLOGY</text>
<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 21B · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— GREEK PHONOLOGY — MODERN GREEK —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Modern Greek has 5 vowels: /a e i o u/ — much simpler than Ancient Greek (no long/short vowel distinction).</text>
<text x="240" y="82" text-anchor="middle" class="Ls">Seven letters/digraphs → /i/: η ι υ αι ει οι υι — all pronounced identically in Modern Greek.</text>
<text x="240" y="91" text-anchor="middle" class="Lx">This iotacism (merger of front vowels) is a major feature of modern pronunciation.</text>
<line x1="20" y1="99" x2="460" y2="99" stroke="black" stroke-width="0.3"/>
<text x="240" y="107" text-anchor="middle" class="H">— GREEK CONSONANTS — MODERN VALUES —</text>
<text x="45" y="117" text-anchor="middle" class="Lg">β</text>
<text x="90" y="117" text-anchor="middle" class="Lx">/v/</text>
<text x="310" y="117" text-anchor="middle" class="Lx">was /b/ in Ancient; now bilabial fricative</text>
<text x="45" y="127" text-anchor="middle" class="Lg">γ</text>
<text x="90" y="127" text-anchor="middle" class="Lx">/ɣ/ or /j/</text>
<text x="310" y="127" text-anchor="middle" class="Lx">velar fricative; /j/ before front vowels</text>
<text x="45" y="137" text-anchor="middle" class="Lg">δ</text>
<text x="90" y="137" text-anchor="middle" class="Lx">/ð/</text>
<text x="310" y="137" text-anchor="middle" class="Lx">was /d/; now dental fricative like “this”</text>
<text x="45" y="147" text-anchor="middle" class="Lg">θ</text>
<text x="90" y="147" text-anchor="middle" class="Lx">/θ/</text>
<text x="310" y="147" text-anchor="middle" class="Lx">was aspirated /tʰ/; now dental fricative like “thin”</text>
<text x="45" y="157" text-anchor="middle" class="Lg">φ</text>
<text x="90" y="157" text-anchor="middle" class="Lx">/f/</text>
<text x="310" y="157" text-anchor="middle" class="Lx">was aspirated /pʰ/; now labiodental fricative</text>
<text x="45" y="167" text-anchor="middle" class="Lg">χ</text>
<text x="90" y="167" text-anchor="middle" class="Lx">/x/ or /ç/</text>
<text x="310" y="167" text-anchor="middle" class="Lx">was aspirated /kʰ/; now velar/palatal fricative</text>
<text x="45" y="177" text-anchor="middle" class="Lg">σ/ς</text>
<text x="90" y="177" text-anchor="middle" class="Lx">/s/</text>
<text x="310" y="177" text-anchor="middle" class="Lx">standard sibilant; ς word-final only</text>
<text x="45" y="187" text-anchor="middle" class="Lg">ρ</text>
<text x="90" y="187" text-anchor="middle" class="Lx">/r/</text>
<text x="310" y="187" text-anchor="middle" class="Lx">alveolar, often uvular in some dialects</text>
<line x1="20" y1="200" x2="460" y2="200" stroke="black" stroke-width="0.3"/>
<text x="240" y="208" text-anchor="middle" class="H">— GREEK STRESS — TONIC ACCENT —</text>
<text x="240" y="218" text-anchor="middle" class="Ls">Modern Greek has a fixed tonic (pitch/intensity) accent, marked with an acute: ά έ ή ί ό ύ ώ.</text>
<text x="240" y="227" text-anchor="middle" class="Lx">Stress is lexical and can fall on one of the last three syllables. θάλασσα (sea), αγάπη (love).</text>
<text x="240" y="236" text-anchor="middle" class="Lx">Ancient Greek had pitch accent (high/low tones). Modern: intensity accent. Accent can shift with case.</text>
<line x1="20" y1="244" x2="460" y2="244" stroke="black" stroke-width="0.3"/>
<text x="240" y="252" text-anchor="middle" class="H">— GREEK PITCH ACCENT VS. MODERN STRESS —</text>
<text x="240" y="262" text-anchor="middle" class="Ls">Ancient: three accents — acute (́), grave (̀), circumflex (̂) — encoding pitch melody over syllables.</text>
<text x="240" y="271" text-anchor="middle" class="Lx">Modern: single acute only — marks syllable receiving stress. Historical accent preserved in spelling only.</text>
<line x1="20" y1="281" x2="460" y2="281" stroke="black" stroke-width="1.5"/>
<rect x="20" y="284" width="440" height="14" fill="black"/>
<text x="240" y="294" text-anchor="middle" class="Hb" fill="white">SECONDARY — ALBANIAN (SHQIP) — PHONOLOGY</text>
<line x1="20" y1="298" x2="460" y2="298" stroke="black" stroke-width="0.3"/>
<text x="240" y="307" text-anchor="middle" class="H">— ALBANIAN VOWELS — 7 PHONEMES —</text>
<text x="240" y="317" text-anchor="middle" class="Ls">Albanian has 7 vowels: /a e ɛ i o u ə/. The schwa /ə/ (written ë) is distinctive and common.</text>
<text x="55" y="327" text-anchor="middle" class="Lx">/a/ ânë (breath)</text>
<text x="160" y="327" text-anchor="middle" class="Lx">/e/ emr (name)</text>
<text x="265" y="327" text-anchor="middle" class="Lx">/ɛ/ është (is)</text>
<text x="370" y="327" text-anchor="middle" class="Lx">/i/ im (my)</text>
<text x="55" y="338" text-anchor="middle" class="Lx">/o/ or (gold)</text>
<text x="160" y="338" text-anchor="middle" class="Lx">/u/ ujë (water)</text>
<text x="265" y="338" text-anchor="middle" class="Lx">/ə/ ëndër (dream)</text>
<line x1="20" y1="353" x2="460" y2="353" stroke="black" stroke-width="0.3"/>
<text x="240" y="361" text-anchor="middle" class="H">— ALBANIAN CONSONANTS — RHOTICS AND AFFRICATES —</text>
<text x="240" y="371" text-anchor="middle" class="Ls">Albanian distinguishes r (flap /ɾ/) vs. rr (trill /r/): rruga (road) vs. arusha (bear).</text>
<text x="240" y="380" text-anchor="middle" class="Lx">l (lateral /l/) vs. ll (dark lateral /ɫ/): like English l in “lid” vs. “mall”.</text>
<text x="240" y="389" text-anchor="middle" class="Lx">Rich affricate series: c /ts/, ç /tʃ/, x /dz/, xh /dʒ/ — all phonemically distinct.</text>
<text x="240" y="398" text-anchor="middle" class="Lx">gj /ɟ/ and nj /ɲ/: palatalized stops, preserved from Proto-Albanian.</text>
<line x1="20" y1="406" x2="460" y2="406" stroke="black" stroke-width="0.3"/>
<text x="240" y="414" text-anchor="middle" class="H">— ALBANIAN STRESS — PENULTIMATE DEFAULT —</text>
<text x="240" y="424" text-anchor="middle" class="Ls">Stress typically falls on penultimate syllable: ’gjuhë (language), ’njeri (person), ’liri (freedom).</text>
<text x="240" y="433" text-anchor="middle" class="Lx">Final syllable stress in some loanwords and grammatical forms (e.g., definite article suffixes).</text>
<line x1="20" y1="441" x2="460" y2="441" stroke="black" stroke-width="0.3"/>
<text x="240" y="449" text-anchor="middle" class="H">— PHONOLOGICAL BRIDGE — GREEK AND ALBANIAN —</text>
<text x="80" y="459" text-anchor="middle" class="Lx">Feature</text>
<text x="235" y="459" text-anchor="middle" class="Lx">Greek</text>
<text x="380" y="459" text-anchor="middle" class="Lx">Albanian</text>
<text x="80" y="469" text-anchor="middle" class="Lx">Vowels</text>
<text x="235" y="469" text-anchor="middle" class="Lx">5 (/a e i o u/)</text>
<text x="380" y="469" text-anchor="middle" class="Lx">7 (incl. schwa /ə/)</text>
<text x="80" y="479" text-anchor="middle" class="Lx">Schwa</text>
<text x="235" y="479" text-anchor="middle" class="Lx">No</text>
<text x="380" y="479" text-anchor="middle" class="Lx">Yes — ë is common</text>
<text x="80" y="489" text-anchor="middle" class="Lx">Rhotics</text>
<text x="235" y="489" text-anchor="middle" class="Lx">1 (/r/)</text>
<text x="380" y="489" text-anchor="middle" class="Lx">2 (r flap, rr trill)</text>
<text x="80" y="499" text-anchor="middle" class="Lx">Laterals</text>
<text x="235" y="499" text-anchor="middle" class="Lx">1 (/l/)</text>
<text x="380" y="499" text-anchor="middle" class="Lx">2 (l clear, ll dark)</text>
<text x="80" y="509" text-anchor="middle" class="Lx">Script</text>
<text x="235" y="509" text-anchor="middle" class="Lx">Greek alphabet</text>
<text x="380" y="509" text-anchor="middle" class="Lx">Latin (since 1908)</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M">PLATE 21B ALT · Greek / Albanian · PHONOLOGY · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
