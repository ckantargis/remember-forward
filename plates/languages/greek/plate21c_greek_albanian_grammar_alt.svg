<text x="60" y="206" text-anchor="middle" class="Ls">αγάπη</text>
<text x="120" y="206" text-anchor="middle" class="Lx">love</text>
<text x="190" y="206" text-anchor="middle" class="Ls">κόσμος</text>
<text x="250" y="206" text-anchor="middle" class="Lx">world</text>
<text x="320" y="206" text-anchor="middle" class="Ls">ζωή</text>
<text x="380" y="206" text-anchor="middle" class="Lx">life</text>
<line x1="20" y1="221" x2="460" y2="221" stroke="black" stroke-width="1.5"/>
<rect x="20" y="224" width="440" height="14" fill="black"/>
<text x="240" y="234" text-anchor="middle" class="Hb" fill="white">SECONDARY — ALBANIAN (SHQIP) — GRAMMAR · VOCABULARY</text>
<line x1="20" y1="238" x2="460" y2="238" stroke="black" stroke-width="0.3"/>
<text x="240" y="247" text-anchor="middle" class="H">— ALBANIAN GRAMMAR — UNIQUE FEATURES —</text>
<text x="240" y="257" text-anchor="middle" class="Ls">Albanian is SVO. Suffixed definite article (postposed): gjuh + ë = gjuha (the language).</text>
<text x="240" y="266" text-anchor="middle" class="Lx">This is typologically unusual in Europe — article comes AFTER the noun (like Romanian, Bulgarian, Scandinavian).</text>
<text x="240" y="275" text-anchor="middle" class="Lx">5 cases: nominative, genitive, dative, accusative, ablative. Genitive = Dative in many paradigms.</text>
<text x="240" y="284" text-anchor="middle" class="Lx">2 dialects: Gheg (north, Kosovo) and Tosk (south, standard). Differ in phonology and some morphology.</text>
<line x1="20" y1="292" x2="460" y2="292" stroke="black" stroke-width="0.3"/>
<text x="240" y="300" text-anchor="middle" class="H">— ALBANIAN DEFINITE ARTICLE — SUFFIXED —</text>
<text x="55" y="310" text-anchor="middle" class="Lx">Masc.</text>
<text x="150" y="310" text-anchor="middle" class="Ls">njeri (man)</text>
<text x="280" y="310" text-anchor="middle" class="Ls">njeriu (the man)</text>
<text x="390" y="310" text-anchor="middle" class="Lx">-u suffix</text>
<text x="55" y="321" text-anchor="middle" class="Lx">Fem.</text>
<text x="150" y="321" text-anchor="middle" class="Ls">gjuhë (language)</text>
<text x="280" y="321" text-anchor="middle" class="Ls">gjuha (the language)</text>
<text x="390" y="321" text-anchor="middle" class="Lx">-a suffix</text>
<text x="55" y="332" text-anchor="middle" class="Lx">Neut.</text>
<text x="150" y="332" text-anchor="middle" class="Ls">ujk (wolf)</text>
<text x="280" y="332" text-anchor="middle" class="Ls">ujku (the wolf)</text>
<text x="390" y="332" text-anchor="middle" class="Lx">-u suffix</text>
<line x1="20" y1="348" x2="460" y2="348" stroke="black" stroke-width="0.3"/>
<text x="240" y="356" text-anchor="middle" class="H">— ALBANIAN VERB SYSTEM — flas (speak) —</text>
<text x="80" y="366" text-anchor="middle" class="Ls">flas</text>
<text x="150" y="366" text-anchor="middle" class="Lx">I speak</text>
<text x="300" y="366" text-anchor="middle" class="Ls">flet</text>
<text x="370" y="366" text-anchor="middle" class="Lx">you speak</text>
<text x="80" y="376" text-anchor="middle" class="Ls">flet</text>
<text x="150" y="376" text-anchor="middle" class="Lx">he/she speaks</text>
<text x="300" y="376" text-anchor="middle" class="Ls">flasim</text>
<text x="370" y="376" text-anchor="middle" class="Lx">we speak</text>
<text x="80" y="386" text-anchor="middle" class="Ls">flisni</text>
<text x="150" y="386" text-anchor="middle" class="Lx">you (pl) speak</text>
<text x="300" y="386" text-anchor="middle" class="Ls">flasin</text>
<text x="370" y="386" text-anchor="middle" class="Lx">they speak</text>
<text x="240" y="399" text-anchor="middle" class="Lx">Past: fola (I spoke). Future: do të flas (will to speak — periphrastic). Negation: nuk flas.</text>
<line x1="20" y1="407" x2="460" y2="407" stroke="black" stroke-width="0.3"/>
<text x="240" y="415" text-anchor="middle" class="H">— ALBANIAN CORE VOCABULARY —</text>
<text x="60" y="425" text-anchor="middle" class="Ls">ujë</text>
<text x="120" y="425" text-anchor="middle" class="Lx">water</text>
<text x="190" y="425" text-anchor="middle" class="Ls">zjarr</text>
