<text x="240" y="30" text-anchor="middle" class="T">GREEK + ALBANIAN — GRAMMAR · VOCABULARY</text>
<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 21C · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— GREEK GRAMMAR — SVO · INFLECTING · 3 GENDERS —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Modern Greek is SVO with relatively free word order (inflection carries grammar).</text>
<text x="240" y="82" text-anchor="middle" class="Lx">3 genders: masculine, feminine, neuter. 4 cases: nominative, genitive, accusative, vocative.</text>
<text x="240" y="91" text-anchor="middle" class="Lx">Articles: definite ο/η/το (M/F/N) · indefinite ένας/μία/ένα. Must agree in gender, number, case.</text>
<line x1="20" y1="99" x2="460" y2="99" stroke="black" stroke-width="0.3"/>
<text x="240" y="107" text-anchor="middle" class="H">— GREEK VERB SYSTEM — γράφω (write) —</text>
<text x="80" y="117" text-anchor="middle" class="Ls">γράφω</text>
<text x="160" y="117" text-anchor="middle" class="Lx">I write</text>
<text x="300" y="117" text-anchor="middle" class="Ls">γράφεις</text>
<text x="380" y="117" text-anchor="middle" class="Lx">you write</text>
<text x="80" y="127" text-anchor="middle" class="Ls">γράφει</text>
<text x="160" y="127" text-anchor="middle" class="Lx">he/she writes</text>
<text x="300" y="127" text-anchor="middle" class="Ls">γράφουμε</text>
<text x="380" y="127" text-anchor="middle" class="Lx">we write</text>
<text x="80" y="137" text-anchor="middle" class="Ls">γράφετε</text>
<text x="160" y="137" text-anchor="middle" class="Lx">you (pl) write</text>
<text x="300" y="137" text-anchor="middle" class="Ls">γράφουν</text>
<text x="380" y="137" text-anchor="middle" class="Lx">they write</text>
<text x="240" y="150" text-anchor="middle" class="Lx">Aspect: imperfective vs. perfective. Past: έγραψα (I wrote). Future: θα γράψω.</text>
<line x1="20" y1="158" x2="460" y2="158" stroke="black" stroke-width="0.3"/>
