<text x="380" y="425" text-anchor="middle" class="Lx">earth</text>
<text x="60" y="435" text-anchor="middle" class="Ls">njeri</text>
<text x="120" y="435" text-anchor="middle" class="Lx">person</text>
<text x="190" y="435" text-anchor="middle" class="Ls">hënë</text>
<text x="250" y="435" text-anchor="middle" class="Lx">moon</text>
<text x="320" y="435" text-anchor="middle" class="Ls">kujtim</text>
<text x="380" y="435" text-anchor="middle" class="Lx">memory</text>
<text x="60" y="445" text-anchor="middle" class="Ls">e ardhmja</text>
<text x="120" y="445" text-anchor="middle" class="Lx">future</text>
<text x="190" y="445" text-anchor="middle" class="Ls">liri</text>
<text x="250" y="445" text-anchor="middle" class="Lx">freedom</text>
<text x="320" y="445" text-anchor="middle" class="Ls">zemër</text>
<text x="380" y="445" text-anchor="middle" class="Lx">heart</text>
<text x="60" y="455" text-anchor="middle" class="Ls">dashuri</text>
<text x="120" y="455" text-anchor="middle" class="Lx">love</text>
<text x="190" y="455" text-anchor="middle" class="Ls">botë</text>
<text x="250" y="455" text-anchor="middle" class="Lx">world</text>
<text x="320" y="455" text-anchor="middle" class="Ls">jetë</text>
<text x="380" y="455" text-anchor="middle" class="Lx">life</text>
<line x1="20" y1="470" x2="460" y2="470" stroke="black" stroke-width="0.3"/>
<text x="240" y="478" text-anchor="middle" class="H">— GRAMMAR BRIDGE — AN ISOLATED BRANCH —</text>
<text x="240" y="488" text-anchor="middle" class="Ls">Albanian has no close relatives in Indo-European. It shares the same ancestor but diverged early and completely.</text>
<text x="240" y="497" text-anchor="middle" class="Lx">Many Greek loanwords in Albanian: është (is) ← Greek εστί. Millennia of close geographic contact.</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
