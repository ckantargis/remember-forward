<text x="240" y="328" text-anchor="middle" class="H" >— NOUN DECLENSION — ANCIENT: ἄνθρωπος (HUMAN BEING, MASC.) —</text>
<text x="40" y="338" text-anchor="middle" class="Lx" >Nom.</text>
<text x="110" y="338" text-anchor="middle" class="Ls" >ἄνθρωπος</text>
<text x="195" y="338" text-anchor="middle" class="Lx" >anthrōpos</text>
<text x="360" y="338" text-anchor="middle" class="Lx" >the human being (subject)</text>
<text x="40" y="350" text-anchor="middle" class="Lx" >Gen.</text>
<text x="110" y="350" text-anchor="middle" class="Ls" >ἀνθρώπου</text>
<text x="195" y="350" text-anchor="middle" class="Lx" >anthrōpou</text>
<text x="360" y="350" text-anchor="middle" class="Lx" >of the human being</text>
<text x="40" y="362" text-anchor="middle" class="Lx" >Dat.</text>
<text x="110" y="362" text-anchor="middle" class="Ls" >ἀνθρώπῳ</text>
<text x="195" y="362" text-anchor="middle" class="Lx" >anthrōpōi</text>
<text x="360" y="362" text-anchor="middle" class="Lx" >to/for the human being</text>
<text x="40" y="374" text-anchor="middle" class="Lx" >Acc.</text>
<text x="110" y="374" text-anchor="middle" class="Ls" >ἄνθρωπον</text>
<text x="195" y="374" text-anchor="middle" class="Lx" >anthrōpon</text>
<text x="360" y="374" text-anchor="middle" class="Lx" >the human being (object)</text>
<text x="40" y="386" text-anchor="middle" class="Lx" >Voc.</text>
<text x="110" y="386" text-anchor="middle" class="Ls" >ἄνθρωπε</text>
<text x="195" y="386" text-anchor="middle" class="Lx" >anthrōpe</text>
<text x="360" y="386" text-anchor="middle" class="Lx" >O human being! (address)</text>
<line x1="20" y1="402" x2="460" y2="402" stroke="black" stroke-width="0.3"/>
<text x="240" y="410" text-anchor="middle" class="H" >— CORE VOCABULARY — 25 WORDS (MODERN GREEK) —</text>
<text x="80" y="420" text-anchor="middle" class="Ls" >ναι / όχι</text>
<text x="180" y="420" text-anchor="middle" class="Lx" >nai / óchi</text>
<text x="250" y="420" text-anchor="middle" class="Lx" >yes / no</text>
<text x="320" y="420" text-anchor="middle" class="Ls" >ευχαριστώ</text>
<text x="420" y="420" text-anchor="middle" class="Lx" >efcharistó</text>
<text x="490" y="420" text-anchor="middle" class="Lx" >thank you</text>
<text x="80" y="432" text-anchor="middle" class="Ls" >παρακαλώ / συγγνώμη</text>
<text x="180" y="432" text-anchor="middle" class="Lx" >parakaló / sygnómi</text>
<text x="250" y="432" text-anchor="middle" class="Lx" >please / sorry</text>
<text x="320" y="432" text-anchor="middle" class="Ls" >εγώ / εσύ</text>
<text x="420" y="432" text-anchor="middle" class="Lx" >egó / esý</text>
<text x="490" y="432" text-anchor="middle" class="Lx" >I / you</text>
<text x="80" y="444" text-anchor="middle" class="Ls" >αυτός / αυτή</text>
<text x="180" y="444" text-anchor="middle" class="Lx" >aftós / aftí</text>
<text x="250" y="444" text-anchor="middle" class="Lx" >he / she</text>
<text x="320" y="444" text-anchor="middle" class="Ls" >εδώ / εκεί</text>
<text x="420" y="444" text-anchor="middle" class="Lx" >edó / ekéi</text>
<text x="490" y="444" text-anchor="middle" class="Lx" >here / there</text>
<text x="80" y="456" text-anchor="middle" class="Ls" >που</text>
<text x="180" y="456" text-anchor="middle" class="Lx" >pou</text>
<text x="250" y="456" text-anchor="middle" class="Lx" >where / who</text>
<text x="320" y="456" text-anchor="middle" class="Ls" >τι</text>
<text x="420" y="456" text-anchor="middle" class="Lx" >ti</text>
<text x="490" y="456" text-anchor="middle" class="Lx" >what</text>
<text x="80" y="468" text-anchor="middle" class="Ls" >πότε</text>
<text x="180" y="468" text-anchor="middle" class="Lx" >póte</text>
<text x="250" y="468" text-anchor="middle" class="Lx" >when</text>
<text x="320" y="468" text-anchor="middle" class="Ls" >γιατί</text>
<text x="420" y="468" text-anchor="middle" class="Lx" >giati</text>
<text x="490" y="468" text-anchor="middle" class="Lx" >why</text>
<text x="80" y="480" text-anchor="middle" class="Ls" >νερό</text>
<text x="180" y="480" text-anchor="middle" class="Lx" >neró</text>
<text x="250" y="480" text-anchor="middle" class="Lx" >water</text>
<text x="320" y="480" text-anchor="middle" class="Ls" >φαγητό</text>
<text x="420" y="480" text-anchor="middle" class="Lx" >fagitó</text>
<text x="490" y="480" text-anchor="middle" class="Lx" >food</text>
<text x="80" y="492" text-anchor="middle" class="Ls" >άνθρωπος</text>
<text x="180" y="492" text-anchor="middle" class="Lx" >ánthrōpos</text>
<text x="250" y="492" text-anchor="middle" class="Lx" >human being</text>
