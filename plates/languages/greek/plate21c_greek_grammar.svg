<text x="100" y="290" text-anchor="middle" class="Ls" >λύετε</text>
<text x="160" y="290" text-anchor="middle" class="Lx" >lýete</text>
<text x="230" y="290" text-anchor="middle" class="Ls" >λύνετε</text>
<text x="295" y="290" text-anchor="middle" class="Lx" >línete</text>
<text x="390" y="290" text-anchor="middle" class="Lx" >you (pl) free</text>
