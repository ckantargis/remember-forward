<text x="240" y="32" text-anchor="middle" class="T" >GREEK — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 21C OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="67" text-anchor="middle" class="H" >— INFLECTED LANGUAGE — CASES, GENDERS, VERB SYSTEM —</text>
<text x="240" y="77" text-anchor="middle" class="L" >Greek is HIGHLY INFLECTED: nouns, adjectives, and verbs all change their endings.</text>
<text x="240" y="87" text-anchor="middle" class="Ls" >Modern Greek: 4 cases (nominative, genitive, accusative, vocative). Ancient Greek: +dative (5).</text>
<text x="240" y="96" text-anchor="middle" class="Ls" >3 grammatical genders: masculine (ο), feminine (η), neuter (το). Articles indicate class.</text>
<line x1="20" y1="104" x2="460" y2="104" stroke="black" stroke-width="0.3"/>
<text x="240" y="112" text-anchor="middle" class="H" >— DEFINITE ARTICLE — THE KEY TO NOUN CLASS —</text>
<text x="240" y="121" text-anchor="middle" class="L" >The definite article agrees with gender and case. Masculine/Feminine/Neuter:</text>
<text x="30" y="131" text-anchor="middle" class="Lx" >Case</text>
<text x="100" y="131" text-anchor="middle" class="Lx" >Masc.</text>
<text x="155" y="131" text-anchor="middle" class="Lx" >Fem.</text>
<text x="210" y="131" text-anchor="middle" class="Lx" >Neut.</text>
<text x="265" y="131" text-anchor="middle" class="Lx" >Masc.PL</text>
<text x="330" y="131" text-anchor="middle" class="Lx" >Fem.PL</text>
<text x="400" y="131" text-anchor="middle" class="Lx" >Neut.PL</text>
<text x="30" y="144" text-anchor="middle" class="Ls" >Nominative</text>
<text x="100" y="144" text-anchor="middle" class="Ls" >ο</text>
<text x="155" y="144" text-anchor="middle" class="Ls" >η</text>
<text x="210" y="144" text-anchor="middle" class="Ls" >το</text>
<text x="265" y="144" text-anchor="middle" class="Ls" >οι</text>
<text x="330" y="144" text-anchor="middle" class="Ls" >οι</text>
<text x="400" y="144" text-anchor="middle" class="Ls" >τα</text>
<text x="30" y="157" text-anchor="middle" class="Ls" >Genitive</text>
<text x="100" y="157" text-anchor="middle" class="Ls" >του</text>
<text x="155" y="157" text-anchor="middle" class="Ls" >της</text>
<text x="210" y="157" text-anchor="middle" class="Ls" >του</text>
<text x="265" y="157" text-anchor="middle" class="Ls" >των</text>
<text x="330" y="157" text-anchor="middle" class="Ls" >των</text>
<text x="400" y="157" text-anchor="middle" class="Ls" >των</text>
<text x="30" y="170" text-anchor="middle" class="Ls" >Accusative</text>
<text x="100" y="170" text-anchor="middle" class="Ls" >τον</text>
<text x="155" y="170" text-anchor="middle" class="Ls" >την</text>
<text x="210" y="170" text-anchor="middle" class="Ls" >το</text>
<text x="265" y="170" text-anchor="middle" class="Ls" >τους</text>
<text x="330" y="170" text-anchor="middle" class="Ls" >τις</text>
<text x="400" y="170" text-anchor="middle" class="Ls" >τα</text>
<text x="30" y="183" text-anchor="middle" class="Ls" >Vocative</text>
<text x="100" y="183" text-anchor="middle" class="Ls" >—</text>
<text x="155" y="183" text-anchor="middle" class="Ls" >—</text>
<text x="210" y="183" text-anchor="middle" class="Ls" >—</text>
<text x="265" y="183" text-anchor="middle" class="Ls" >—</text>
<text x="330" y="183" text-anchor="middle" class="Ls" >—</text>
<text x="400" y="183" text-anchor="middle" class="Ls" >—</text>
<line x1="20" y1="200" x2="460" y2="200" stroke="black" stroke-width="0.3"/>
<text x="240" y="208" text-anchor="middle" class="H" >— VERB CONJUGATION — PRESENT ACTIVE (λύω / λύνω — "to free/solve") —</text>
<text x="240" y="217" text-anchor="middle" class="Ls" >Ancient Greek (Attic)  vs  Modern Greek — present active indicative</text>
<text x="30" y="228" text-anchor="middle" class="Lx" >Person</text>
<text x="100" y="228" text-anchor="middle" class="Lx" >Ancient</text>
<text x="160" y="228" text-anchor="middle" class="Lx" >Translit.</text>
<text x="230" y="228" text-anchor="middle" class="Lx" >Modern</text>
<text x="295" y="228" text-anchor="middle" class="Lx" >Translit.</text>
<text x="390" y="228" text-anchor="middle" class="Lx" >Meaning</text>
<text x="30" y="238" text-anchor="middle" class="Lx" >1sg</text>
<text x="100" y="238" text-anchor="middle" class="Ls" >λύω</text>
<text x="160" y="238" text-anchor="middle" class="Lx" >lýō</text>
<text x="230" y="238" text-anchor="middle" class="Ls" >λύνω</text>
