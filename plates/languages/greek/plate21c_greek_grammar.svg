<text x="100" y="264" text-anchor="middle" class="Ls" >λύει</text>
<text x="160" y="264" text-anchor="middle" class="Lx" >lýei</text>
<text x="230" y="264" text-anchor="middle" class="Ls" >λύνει</text>
<text x="295" y="264" text-anchor="middle" class="Lx" >línei</text>
<text x="390" y="264" text-anchor="middle" class="Lx" >he/she frees</text>
