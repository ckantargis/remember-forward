<text x="80" y="540" text-anchor="middle" class="Ls" >μεγάλος / μικρός</text>
<text x="180" y="540" text-anchor="middle" class="Lx" >megálos / mikrós</text>
<text x="250" y="540" text-anchor="middle" class="Lx" >big / small</text>
<text x="320" y="540" text-anchor="middle" class="Ls" >καλός / κακός</text>
<text x="420" y="540" text-anchor="middle" class="Lx" >kalós / kakós</text>
<text x="490" y="540" text-anchor="middle" class="Lx" >good / bad</text>
<text x="80" y="552" text-anchor="middle" class="Ls" >νέος / παλιός</text>
<text x="180" y="552" text-anchor="middle" class="Lx" >néos / palios</text>
