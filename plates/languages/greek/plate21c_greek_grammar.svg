<text x="80" y="564" text-anchor="middle" class="Ls" >θυμάμαι / θυμούμαι</text>
<text x="180" y="564" text-anchor="middle" class="Lx" >thimámai</text>
<text x="250" y="564" text-anchor="middle" class="Lx" >I remember</text>
<line x1="20" y1="580" x2="460" y2="580" stroke="black" stroke-width="0.3"/>
<text x="240" y="588" text-anchor="middle" class="H" >— WORD ORDER AND SYNTAX —</text>
<text x="240" y="598" text-anchor="middle" class="Ls" >Greek word order is flexible (due to inflection indicating roles) but SVO is most common.</text>
<text x="240" y="607" text-anchor="middle" class="Ls" >The famous Greek copula: είμαι (I am) — Είμαι άνθρωπος. "I am a human being."</text>
