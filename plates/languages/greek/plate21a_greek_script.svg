<text x="240" y="32" text-anchor="middle" class="T" >GREEK — SCRIPT · ALPHABET · HISTORY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 21A OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="67" text-anchor="middle" class="H" >— THE GREEK ALPHABET — 24 LETTERS —</text>
<text x="240" y="76" text-anchor="middle" class="Ls" >The Greek alphabet (c. 800 BCE) is the ancestor of Latin, Cyrillic, Coptic, Gothic, and Armenian scripts.</text>
<text x="240" y="84" text-anchor="middle" class="Ls" >First alphabet to systematically represent vowels — adapted from Phoenician consonantal abjad.</text>
<text x="22" y="96" text-anchor="middle" class="Lg" >Α</text>
<text x="34" y="96" text-anchor="middle" class="Lg" >α</text>
<text x="52" y="93" text-anchor="middle" class="Lx" >Alpha</text>
<text x="52" y="100" text-anchor="middle" class="Lx" >A</text>
<text x="94" y="96" text-anchor="middle" class="Lx" >/a, aː/  →  /a/</text>
<text x="22" y="115" text-anchor="middle" class="Lg" >Β</text>
<text x="34" y="115" text-anchor="middle" class="Lg" >β</text>
<text x="52" y="112" text-anchor="middle" class="Lx" >Beta</text>
<text x="52" y="119" text-anchor="middle" class="Lx" >B</text>
<text x="94" y="115" text-anchor="middle" class="Lx" >/b/      →  /v/</text>
<text x="22" y="134" text-anchor="middle" class="Lg" >Γ</text>
<text x="34" y="134" text-anchor="middle" class="Lg" >γ</text>
<text x="52" y="131" text-anchor="middle" class="Lx" >Gamma</text>
<text x="52" y="138" text-anchor="middle" class="Lx" >G</text>
<text x="94" y="134" text-anchor="middle" class="Lx" >/ɡ/      →  /ɣ/ or /j/</text>
<text x="22" y="153" text-anchor="middle" class="Lg" >Δ</text>
<text x="34" y="153" text-anchor="middle" class="Lg" >δ</text>
<text x="52" y="150" text-anchor="middle" class="Lx" >Delta</text>
<text x="52" y="157" text-anchor="middle" class="Lx" >D</text>
<text x="94" y="153" text-anchor="middle" class="Lx" >/d/      →  /ð/</text>
<text x="22" y="172" text-anchor="middle" class="Lg" >Ε</text>
<text x="34" y="172" text-anchor="middle" class="Lg" >ε</text>
<text x="52" y="169" text-anchor="middle" class="Lx" >Epsilon</text>
<text x="52" y="176" text-anchor="middle" class="Lx" >E</text>
<text x="94" y="172" text-anchor="middle" class="Lx" >/e/      →  /e/</text>
<text x="22" y="191" text-anchor="middle" class="Lg" >Ζ</text>
<text x="34" y="191" text-anchor="middle" class="Lg" >ζ</text>
<text x="52" y="188" text-anchor="middle" class="Lx" >Zeta</text>
<text x="52" y="195" text-anchor="middle" class="Lx" >Z</text>
<text x="94" y="191" text-anchor="middle" class="Lx" >/zd/ or /dz/ →  /z/</text>
<text x="142" y="96" text-anchor="middle" class="Lg" >Η</text>
<text x="154" y="96" text-anchor="middle" class="Lg" >η</text>
<text x="172" y="93" text-anchor="middle" class="Lx" >Eta</text>
<text x="172" y="100" text-anchor="middle" class="Lx" >Ē</text>
<text x="214" y="96" text-anchor="middle" class="Lx" >/ɛː/     →  /i/</text>
<text x="142" y="115" text-anchor="middle" class="Lg" >Θ</text>
<text x="154" y="115" text-anchor="middle" class="Lg" >θ</text>
<text x="172" y="112" text-anchor="middle" class="Lx" >Theta</text>
<text x="172" y="119" text-anchor="middle" class="Lx" >Th</text>
<text x="214" y="115" text-anchor="middle" class="Lx" >/tʰ/     →  /θ/</text>
<text x="142" y="134" text-anchor="middle" class="Lg" >Ι</text>
<text x="154" y="134" text-anchor="middle" class="Lg" >ι</text>
<text x="172" y="131" text-anchor="middle" class="Lx" >Iota</text>
<text x="172" y="138" text-anchor="middle" class="Lx" >I</text>
<text x="214" y="134" text-anchor="middle" class="Lx" >/i, iː/  →  /i/</text>
<text x="142" y="153" text-anchor="middle" class="Lg" >Κ</text>
<text x="154" y="153" text-anchor="middle" class="Lg" >κ</text>
<text x="172" y="150" text-anchor="middle" class="Lx" >Kappa</text>
<text x="172" y="157" text-anchor="middle" class="Lx" >K</text>
<text x="214" y="153" text-anchor="middle" class="Lx" >/k/      →  /k/</text>
<text x="142" y="172" text-anchor="middle" class="Lg" >Λ</text>
<text x="154" y="172" text-anchor="middle" class="Lg" >λ</text>
<text x="172" y="169" text-anchor="middle" class="Lx" >Lambda</text>
<text x="172" y="176" text-anchor="middle" class="Lx" >L</text>
<text x="214" y="172" text-anchor="middle" class="Lx" >/l/      →  /l/</text>
<text x="142" y="191" text-anchor="middle" class="Lg" >Μ</text>
<text x="154" y="191" text-anchor="middle" class="Lg" >μ</text>
<text x="172" y="188" text-anchor="middle" class="Lx" >Mu</text>
<text x="172" y="195" text-anchor="middle" class="Lx" >M</text>
<text x="214" y="191" text-anchor="middle" class="Lx" >/m/      →  /m/</text>
<text x="262" y="96" text-anchor="middle" class="Lg" >Ν</text>
<text x="274" y="96" text-anchor="middle" class="Lg" >ν</text>
<text x="292" y="93" text-anchor="middle" class="Lx" >Nu</text>
<text x="292" y="100" text-anchor="middle" class="Lx" >N</text>
<text x="334" y="96" text-anchor="middle" class="Lx" >/n/      →  /n/</text>
<text x="262" y="115" text-anchor="middle" class="Lg" >Ξ</text>
<text x="274" y="115" text-anchor="middle" class="Lg" >ξ</text>
<text x="292" y="112" text-anchor="middle" class="Lx" >Xi</text>
<text x="292" y="119" text-anchor="middle" class="Lx" >X</text>
<text x="334" y="115" text-anchor="middle" class="Lx" >/ks/     →  /ks/</text>
<text x="262" y="134" text-anchor="middle" class="Lg" >Ο</text>
<text x="274" y="134" text-anchor="middle" class="Lg" >ο</text>
<text x="292" y="131" text-anchor="middle" class="Lx" >Omicron</text>
<text x="292" y="138" text-anchor="middle" class="Lx" >O</text>
<text x="334" y="134" text-anchor="middle" class="Lx" >/o/      →  /o/</text>
<text x="262" y="153" text-anchor="middle" class="Lg" >Π</text>
<text x="274" y="153" text-anchor="middle" class="Lg" >π</text>
<text x="292" y="150" text-anchor="middle" class="Lx" >Pi</text>
<text x="292" y="157" text-anchor="middle" class="Lx" >P</text>
<text x="334" y="153" text-anchor="middle" class="Lx" >/p/      →  /p/</text>
<text x="262" y="172" text-anchor="middle" class="Lg" >Ρ</text>
<text x="274" y="172" text-anchor="middle" class="Lg" >ρ</text>
<text x="292" y="169" text-anchor="middle" class="Lx" >Rho</text>
<text x="292" y="176" text-anchor="middle" class="Lx" >R</text>
<text x="334" y="172" text-anchor="middle" class="Lx" >/r/      →  /r/</text>
<text x="262" y="191" text-anchor="middle" class="Lg" >Σ</text>
<text x="274" y="191" text-anchor="middle" class="Lg" >σ/ς</text>
<text x="292" y="188" text-anchor="middle" class="Lx" >Sigma</text>
<text x="292" y="195" text-anchor="middle" class="Lx" >S</text>
<text x="334" y="191" text-anchor="middle" class="Lx" >/s/      →  /s/</text>
<text x="382" y="96" text-anchor="middle" class="Lg" >Τ</text>
<text x="394" y="96" text-anchor="middle" class="Lg" >τ</text>
<text x="412" y="93" text-anchor="middle" class="Lx" >Tau</text>
<text x="412" y="100" text-anchor="middle" class="Lx" >T</text>
<text x="454" y="96" text-anchor="middle" class="Lx" >/t/      →  /t/</text>
<text x="382" y="115" text-anchor="middle" class="Lg" >Υ</text>
<text x="394" y="115" text-anchor="middle" class="Lg" >υ</text>
<text x="412" y="112" text-anchor="middle" class="Lx" >Upsilon</text>
<text x="412" y="119" text-anchor="middle" class="Lx" >Y/U</text>
<text x="454" y="115" text-anchor="middle" class="Lx" >/y, yː/  →  /i/</text>
<text x="382" y="134" text-anchor="middle" class="Lg" >Φ</text>
<text x="394" y="134" text-anchor="middle" class="Lg" >φ</text>
<text x="412" y="131" text-anchor="middle" class="Lx" >Phi</text>
<text x="412" y="138" text-anchor="middle" class="Lx" >Ph</text>
<text x="454" y="134" text-anchor="middle" class="Lx" >/pʰ/     →  /f/</text>
<text x="382" y="153" text-anchor="middle" class="Lg" >Χ</text>
<text x="394" y="153" text-anchor="middle" class="Lg" >χ</text>
<text x="412" y="150" text-anchor="middle" class="Lx" >Chi</text>
<text x="412" y="157" text-anchor="middle" class="Lx" >Ch</text>
<text x="454" y="153" text-anchor="middle" class="Lx" >/kʰ/     →  /x/ or /ç/</text>
<text x="382" y="172" text-anchor="middle" class="Lg" >Ψ</text>
<text x="394" y="172" text-anchor="middle" class="Lg" >ψ</text>
<text x="412" y="169" text-anchor="middle" class="Lx" >Psi</text>
<text x="412" y="176" text-anchor="middle" class="Lx" >Ps</text>
<text x="454" y="172" text-anchor="middle" class="Lx" >/ps/     →  /ps/</text>
<text x="382" y="191" text-anchor="middle" class="Lg" >Ω</text>
<text x="394" y="191" text-anchor="middle" class="Lg" >ω</text>
<text x="412" y="188" text-anchor="middle" class="Lx" >Omega</text>
<text x="412" y="195" text-anchor="middle" class="Lx" >Ō</text>
<text x="454" y="191" text-anchor="middle" class="Lx" >/ɔː/     →  /o/</text>
<text x="240" y="213" text-anchor="middle" class="Lx" >σ is used medially; ς is used only in word-final position.  Σίγμα = Sigma (example).</text>
<line x1="20" y1="220" x2="460" y2="220" stroke="black" stroke-width="0.3"/>
<text x="240" y="228" text-anchor="middle" class="H" >— HISTORICAL DEVELOPMENT FROM PHOENICIAN —</text>
<text x="130" y="238" text-anchor="middle" class="Ls" >Aleph → Alpha Α</text>
<text x="340" y="238" text-anchor="middle" class="Lx" >Phoenician ox-head (\u05d0) → Greek vowel A</text>
<text x="130" y="250" text-anchor="middle" class="Ls" >Beth → Beta Β</text>
<text x="340" y="250" text-anchor="middle" class="Lx" >Phoenician house → Greek B (reversed in early forms)</text>
<text x="130" y="262" text-anchor="middle" class="Ls" >Gimel → Gamma Γ</text>
<text x="340" y="262" text-anchor="middle" class="Lx" >Phoenician camel → Greek G (later became Latin C, G)</text>
<text x="130" y="274" text-anchor="middle" class="Ls" >Daleth → Delta Δ</text>
<text x="340" y="274" text-anchor="middle" class="Lx" >Phoenician door → Greek Δ (triangle form)</text>
<text x="130" y="286" text-anchor="middle" class="Ls" >He → Epsilon Ε</text>
<text x="340" y="286" text-anchor="middle" class="Lx" >Phoenician window → Greek vowel E</text>
<text x="130" y="298" text-anchor="middle" class="Ls" >Yodh → Iota Ι</text>
<text x="340" y="298" text-anchor="middle" class="Lx" >Phoenician hand → Greek vowel I (most-used letter)</text>
<text x="240" y="315" text-anchor="middle" class="Lx" >Phoenician script (c. 1050 BCE) was abjad (consonants only). Greeks added vowel letters ~800 BCE.</text>
<line x1="20" y1="323" x2="460" y2="323" stroke="black" stroke-width="0.3"/>
<text x="240" y="331" text-anchor="middle" class="H" >— ANCIENT vs. MODERN PRONUNCIATION — KEY CHANGES —</text>
<text x="45" y="341" text-anchor="middle" class="Ls" >Β β</text>
<text x="175" y="341" text-anchor="middle" class="Lx" >Ancient /b/ → Modern /v/</text>
<text x="370" y="341" text-anchor="middle" class="Lx" >βήτα: "beta" → "vita"</text>
<text x="45" y="353" text-anchor="middle" class="Ls" >Δ δ</text>
<text x="175" y="353" text-anchor="middle" class="Lx" >Ancient /d/ → Modern /ð/</text>
<text x="370" y="353" text-anchor="middle" class="Lx" >δέλτα: "delta" → "thelta"</text>
<text x="45" y="365" text-anchor="middle" class="Ls" >Η η</text>
<text x="175" y="365" text-anchor="middle" class="Lx" >Ancient /ɛː/ (long e) → Modern /i/</text>
<text x="370" y="365" text-anchor="middle" class="Lx" >ήτα: sounds like "ee"</text>
<text x="45" y="377" text-anchor="middle" class="Ls" >Θ θ</text>
<text x="175" y="377" text-anchor="middle" class="Lx" >Ancient /tʰ/ (aspirated t) → Modern /θ/</text>
<text x="370" y="377" text-anchor="middle" class="Lx" >θ: like English "th" in "thin"</text>
<text x="45" y="389" text-anchor="middle" class="Ls" >Υ υ</text>
<text x="175" y="389" text-anchor="middle" class="Lx" >Ancient /y/ (front rounded) → Modern /i/</text>
<text x="370" y="389" text-anchor="middle" class="Lx" >ύψιλον: now = "ee"</text>
<text x="45" y="401" text-anchor="middle" class="Ls" >Φ φ</text>
<text x="175" y="401" text-anchor="middle" class="Lx" >Ancient /pʰ/ (aspirated p) → Modern /f/</text>
<text x="370" y="401" text-anchor="middle" class="Lx" >φ: now = "f"</text>
<text x="45" y="413" text-anchor="middle" class="Ls" >Χ χ</text>
<text x="175" y="413" text-anchor="middle" class="Lx" >Ancient /kʰ/ (aspirated k) → Modern /x/</text>
<text x="370" y="413" text-anchor="middle" class="Lx" >χ: like German "ch" in "Bach"</text>
<text x="45" y="425" text-anchor="middle" class="Ls" >ΟΙ/ΕΙ/ΥΙ</text>
<text x="175" y="425" text-anchor="middle" class="Lx" >Ancient diphthongs → Modern /i/</text>
<text x="370" y="425" text-anchor="middle" class="Lx" >iotacism: many spellings → /i/ sound</text>
<line x1="20" y1="440" x2="460" y2="440" stroke="black" stroke-width="0.3"/>
<text x="240" y="448" text-anchor="middle" class="H" >— GREEK NUMERALS — ALPHABETIC SYSTEM —</text>
<text x="240" y="457" text-anchor="middle" class="Lx" >Ancient Greeks used letters as numerals (iota-style). Three archaic letters added: digamma (6), koppa (90), sampi (900).</text>
<text x="30" y="467" text-anchor="middle" class="Lx" >α=1</text>
<text x="80" y="467" text-anchor="middle" class="Lx" >β=2</text>
<text x="130" y="467" text-anchor="middle" class="Lx" >γ=3</text>
<text x="180" y="467" text-anchor="middle" class="Lx" >δ=4</text>
<text x="230" y="467" text-anchor="middle" class="Lx" >ε=5</text>
<text x="280" y="467" text-anchor="middle" class="Lx" >ϛ=6</text>
<text x="330" y="467" text-anchor="middle" class="Lx" >ζ=7</text>
<text x="380" y="467" text-anchor="middle" class="Lx" >η=8</text>
<text x="430" y="467" text-anchor="middle" class="Lx" >θ=9</text>
<text x="30" y="478" text-anchor="middle" class="Lx" >ι=10</text>
<text x="80" y="478" text-anchor="middle" class="Lx" >κ=20</text>
<text x="130" y="478" text-anchor="middle" class="Lx" >λ=30</text>
<text x="180" y="478" text-anchor="middle" class="Lx" >μ=40</text>
<text x="230" y="478" text-anchor="middle" class="Lx" >ν=50</text>
<text x="280" y="478" text-anchor="middle" class="Lx" >ξ=60</text>
<text x="330" y="478" text-anchor="middle" class="Lx" >ο=70</text>
<text x="380" y="478" text-anchor="middle" class="Lx" >π=80</text>
<text x="430" y="478" text-anchor="middle" class="Lx" >ϟ=90</text>
<text x="30" y="489" text-anchor="middle" class="Lx" >ρ=100</text>
<text x="80" y="489" text-anchor="middle" class="Lx" >σ=200</text>
<text x="130" y="489" text-anchor="middle" class="Lx" >τ=300</text>
<text x="180" y="489" text-anchor="middle" class="Lx" >υ=400</text>
<text x="230" y="489" text-anchor="middle" class="Lx" >φ=500</text>
<text x="280" y="489" text-anchor="middle" class="Lx" >χ=600</text>
<text x="330" y="489" text-anchor="middle" class="Lx" >ψ=700</text>
<text x="380" y="489" text-anchor="middle" class="Lx" >ω=800</text>
<text x="430" y="489" text-anchor="middle" class="Lx" >ϡ=900</text>
<text x="240" y="503" text-anchor="middle" class="Lx" >Thousands: ͵α = 1000, ͵β = 2000 (lower comma prefix). Myriad (M) = 10,000.</text>
<line x1="20" y1="511" x2="460" y2="511" stroke="black" stroke-width="0.3"/>
<text x="240" y="519" text-anchor="middle" class="H" >— DIACRITICS — ANCIENT POLYTONIC SYSTEM —</text>
<text x="240" y="529" text-anchor="middle" class="Lx" >Ancient Greek uses BREATHING MARKS and ACCENT marks. Modern Greek (1982+) uses monotonic (single accent only).</text>
<text x="115" y="539" text-anchor="middle" class="Ls" >ἁ (rough breathing)</text>
<text x="330" y="539" text-anchor="middle" class="Lx" >h-sound before vowel: ἡ hē (or)</text>
<text x="115" y="550" text-anchor="middle" class="Ls" >ἀ (smooth breathing)</text>
<text x="330" y="550" text-anchor="middle" class="Lx" >no h-sound: ἐ e</text>
<text x="115" y="561" text-anchor="middle" class="Ls" >ά (acute accent)</text>
<text x="330" y="561" text-anchor="middle" class="Lx" >high pitch on that syllable</text>
<text x="115" y="572" text-anchor="middle" class="Ls" >ὰ (grave accent)</text>
<text x="330" y="572" text-anchor="middle" class="Lx" >falling or secondary stress</text>
<text x="115" y="583" text-anchor="middle" class="Ls" >ᾶ (circumflex)</text>
<text x="330" y="583" text-anchor="middle" class="Lx" >rise-fall pitch (long vowels)</text>
<text x="115" y="594" text-anchor="middle" class="Ls" >ᾳ (iota subscript)</text>
<text x="330" y="594" text-anchor="middle" class="Lx" >historical /j/ written under long vowels</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M" >SERIES 21 · GREEK · PLATE A · SCRIPT · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
