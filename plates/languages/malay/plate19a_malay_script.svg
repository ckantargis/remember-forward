<text x="30" y="194" text-anchor="middle" class="L" >Y</text>
<text x="30" y="201" text-anchor="middle" class="Lx" >y/j</text>
<text x="30" y="207" text-anchor="middle" class="Lx" >wai</text>
<text x="110" y="194" text-anchor="middle" class="L" >Z</text>
<text x="110" y="201" text-anchor="middle" class="Lx" >z</text>
<text x="110" y="207" text-anchor="middle" class="Lx" >zet</text>
<line x1="20" y1="205" x2="460" y2="205" stroke="black" stroke-width="0.3"/>
<text x="240" y="213" text-anchor="middle" class="H" >— DIGRAPHS — LETTER COMBINATIONS WITH SPECIAL SOUNDS —</text>
<text x="35" y="223" text-anchor="middle" class="Ls" >ng</text>
<text x="70" y="223" text-anchor="middle" class="Lx" >/ŋ/</text>
<text x="140" y="223" text-anchor="middle" class="Lx" >velar nasal</text>
<text x="275" y="223" text-anchor="middle" class="Lx" >berenang (swim), bukan (not)</text>
<text x="415" y="223" text-anchor="middle" class="Lx" >like "ng" in "sing"</text>
<text x="35" y="239" text-anchor="middle" class="Ls" >ny</text>
<text x="70" y="239" text-anchor="middle" class="Lx" >/ɲ/</text>
<text x="140" y="239" text-anchor="middle" class="Lx" >palatal nasal</text>
<text x="275" y="239" text-anchor="middle" class="Lx" >nyonya (ma'am), nyaman (comfortable)</text>
<text x="415" y="239" text-anchor="middle" class="Lx" >like "ny" in Spanish "señor"</text>
<text x="35" y="255" text-anchor="middle" class="Ls" >kh</text>
<text x="70" y="255" text-anchor="middle" class="Lx" >/x/</text>
<text x="140" y="255" text-anchor="middle" class="Lx" >velar fricative</text>
<text x="275" y="255" text-anchor="middle" class="Lx" >khas (special), akhir (end)</text>
<text x="415" y="255" text-anchor="middle" class="Lx" >Arabic/Persian borrowing — "ch" in "Bach"</text>
<text x="35" y="271" text-anchor="middle" class="Ls" >gh</text>
<text x="70" y="271" text-anchor="middle" class="Lx" >/ɣ/</text>
<text x="140" y="271" text-anchor="middle" class="Lx" >voiced velar fric.</text>
<text x="275" y="271" text-anchor="middle" class="Lx" >ghairah (passion), maghrib (west)</text>
<text x="415" y="271" text-anchor="middle" class="Lx" >Arabic borrowing — voiced "kh"</text>
<text x="35" y="287" text-anchor="middle" class="Ls" >sy</text>
<text x="70" y="287" text-anchor="middle" class="Lx" >/ʃ/</text>
<text x="140" y="287" text-anchor="middle" class="Lx" >palato-alveolar fric.</text>
<text x="275" y="287" text-anchor="middle" class="Lx" >syarat (condition), syukur (gratitude)</text>
<text x="415" y="287" text-anchor="middle" class="Lx" >like "sh" in "shoe" — Arabic borrowing</text>
<line x1="20" y1="303" x2="460" y2="303" stroke="black" stroke-width="0.3"/>
<text x="240" y="311" text-anchor="middle" class="H" >— JAWI — HISTORICAL ARABIC-BASED SCRIPT —</text>
<text x="240" y="321" text-anchor="middle" class="Ls" >Before Romanization, Malay was written in Jawi — an adapted Arabic alphabet with extra letters for Malay sounds.</text>
<text x="240" y="330" text-anchor="middle" class="Ls" >Jawi is still used officially in Malaysia (signage, religious texts, royal documents) and in Brunei.</text>
<text x="240" y="339" text-anchor="middle" class="Ls" >Written right-to-left. 37 letters total: 28 Arabic + 6 added for Malay phonemes (ca, nga, pa, ga, nya, va).</text>
<text x="240" y="348" text-anchor="middle" class="Ls" >Sample: بهاس ملايو = Bahasa Melayu · كيتا = kita (we) · هاتي = hati (heart)</text>
<text x="240" y="357" text-anchor="middle" class="Ls" >Jawi literacy is taught in Malaysian schools alongside Rumi, keeping both scripts active.</text>
<line x1="20" y1="365" x2="460" y2="365" stroke="black" stroke-width="0.3"/>
<text x="240" y="373" text-anchor="middle" class="H" >— HISTORICAL SCRIPTS — RENCONG AND OTHERS —</text>
<text x="240" y="383" text-anchor="middle" class="Ls" >Before Jawi spread via Islam (~13th–16th c.), Malay was written in indigenous Indic-derived scripts.</text>
<text x="240" y="392" text-anchor="middle" class="Ls" >Rencong / Incung: abugida script of Sumatra (Kerinci, Rejang, Lampung regions) — written on bamboo.</text>
<text x="240" y="401" text-anchor="middle" class="Ls" >Pallava/Kawi: Old Malay inscriptions (7th–14th c.) in Tamil Pallava and Javanese Kawi scripts.</text>
<text x="240" y="410" text-anchor="middle" class="Ls" >Kedukan Bukit inscription (683 CE, Palembang): oldest known Old Malay text — in Pallava script.</text>
<text x="240" y="419" text-anchor="middle" class="Ls" >Lontara: Bugis/Makassar script still used in Sulawesi — an abugida descended from Brahmi.</text>
<line x1="20" y1="427" x2="460" y2="427" stroke="black" stroke-width="0.3"/>
<text x="240" y="435" text-anchor="middle" class="H" >— SPELLING SYSTEM — KEY RULES —</text>
<text x="70" y="445" text-anchor="middle" class="Ls" >Stress</text>
<text x="310" y="445" text-anchor="middle" class="Lx" >Always on penultimate (second-to-last) syllable: ba-HA-sa, ma-KAN-an</text>
<text x="70" y="459" text-anchor="middle" class="Ls" >e ambiguity</text>
<text x="310" y="459" text-anchor="middle" class="Lx" >&lt;e&gt; = /e/ (clear) or /ə/ (schwa) — context determines: enam (6)=/e/, emak (mum)=/ə/</text>
<text x="70" y="473" text-anchor="middle" class="Ls" >c</text>
<text x="310" y="473" text-anchor="middle" class="Lx" >Always /tʃ/ (like "ch") — cinta (love), cantik (beautiful)</text>
<text x="70" y="487" text-anchor="middle" class="Ls" >j</text>
<text x="310" y="487" text-anchor="middle" class="Lx" >Always /dʒ/ (like "j" in "joy") — jalan (road), juga (also)</text>
<text x="70" y="501" text-anchor="middle" class="Ls" >r</text>
<text x="310" y="501" text-anchor="middle" class="Lx" >Trilled /r/ in careful speech; flap [ɾ] in fast speech</text>
<text x="70" y="515" text-anchor="middle" class="Ls" >f, v, z</text>
<text x="310" y="515" text-anchor="middle" class="Lx" >Appear in Arabic/English loanwords: fikir (think), vitamin, zaman (era)</text>
<line x1="20" y1="530" x2="460" y2="530" stroke="black" stroke-width="0.3"/>
<text x="240" y="538" text-anchor="middle" class="H" >— MALAY vs INDONESIAN — SAME LANGUAGE? —</text>
<text x="240" y="548" text-anchor="middle" class="Ls" >Bahasa Malaysia and Bahasa Indonesia are mutually intelligible. Differences are lexical and minor.</text>
<text x="240" y="557" text-anchor="middle" class="Ls" >Malaysia: kereta (car) vs Indonesia: mobil · Malaysia: pekan vs Indonesia: kota (city)</text>
<text x="240" y="566" text-anchor="middle" class="Ls" >Combined: ~270 million speakers (Indonesia alone ~199M native) — 4th most-spoken world language.</text>
<text x="240" y="575" text-anchor="middle" class="Ls" >ISO 639: ms (Malay) · id (Indonesian) — classified separately but share standard written form.</text>
<text x="240" y="584" text-anchor="middle" class="Ls" >Arabic influence: 40%+ of literary vocabulary via Jawi-era Islam · Dutch/Portuguese in Indonesian.</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M" >SERIES 19 · MALAY/INDONESIAN · PLATE A · SCRIPT · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
