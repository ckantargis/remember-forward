<text x="240" y="32" text-anchor="middle" class="T" >MALAY / INDONESIAN — SCRIPT · WRITING</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 19A OF 50 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="67" text-anchor="middle" class="H" >— LATIN SCRIPT — RUMI (SINCE 1972 STANDARDIZATION) —</text>
<text x="240" y="77" text-anchor="middle" class="L" >Malay (Bahasa Melayu) and Indonesian (Bahasa Indonesia) share a standardized Latin orthography.</text>
<text x="240" y="87" text-anchor="middle" class="Ls" >The 1972 Melindo/EYD agreement unified spelling across Malaysia, Indonesia, and Brunei.</text>
<text x="240" y="96" text-anchor="middle" class="Ls" >Official names: Rumi (Malaysia) = "Roman script" · Ejaan yang Disempurnakan (Indonesia) = "Perfected Spelling"</text>
<line x1="20" y1="104" x2="460" y2="104" stroke="black" stroke-width="0.3"/>
<text x="240" y="112" text-anchor="middle" class="H" >— THE 26-LETTER ALPHABET — RUMI —</text>
<text x="30" y="122" text-anchor="middle" class="L" >A</text>
<text x="30" y="129" text-anchor="middle" class="Lx" >/a/</text>
<text x="30" y="135" text-anchor="middle" class="Lx" >a</text>
<text x="110" y="122" text-anchor="middle" class="L" >B</text>
<text x="110" y="129" text-anchor="middle" class="Lx" >b</text>
<text x="110" y="135" text-anchor="middle" class="Lx" >bi</text>
<text x="190" y="122" text-anchor="middle" class="L" >C</text>
<text x="190" y="129" text-anchor="middle" class="Lx" >tʃ/c</text>
<text x="190" y="135" text-anchor="middle" class="Lx" >si</text>
<text x="270" y="122" text-anchor="middle" class="L" >D</text>
<text x="270" y="129" text-anchor="middle" class="Lx" >d</text>
<text x="270" y="135" text-anchor="middle" class="Lx" >di</text>
<text x="350" y="122" text-anchor="middle" class="L" >E</text>
<text x="350" y="129" text-anchor="middle" class="Lx" >/e,ə/</text>
<text x="350" y="135" text-anchor="middle" class="Lx" >i</text>
<text x="430" y="122" text-anchor="middle" class="L" >F</text>
<text x="430" y="129" text-anchor="middle" class="Lx" >f</text>
<text x="430" y="135" text-anchor="middle" class="Lx" >ef</text>
<text x="30" y="140" text-anchor="middle" class="L" >G</text>
<text x="30" y="147" text-anchor="middle" class="Lx" >g/ɡ/</text>
<text x="30" y="153" text-anchor="middle" class="Lx" >ji</text>
<text x="110" y="140" text-anchor="middle" class="L" >H</text>
<text x="110" y="147" text-anchor="middle" class="Lx" >h</text>
<text x="110" y="153" text-anchor="middle" class="Lx" >éc</text>
<text x="190" y="140" text-anchor="middle" class="L" >I</text>
<text x="190" y="147" text-anchor="middle" class="Lx" >/i/</text>
<text x="190" y="153" text-anchor="middle" class="Lx" >ai</text>
<text x="270" y="140" text-anchor="middle" class="L" >J</text>
<text x="270" y="147" text-anchor="middle" class="Lx" >dʒ/j</text>
<text x="270" y="153" text-anchor="middle" class="Lx" >jei</text>
<text x="350" y="140" text-anchor="middle" class="L" >K</text>
<text x="350" y="147" text-anchor="middle" class="Lx" >k</text>
<text x="350" y="153" text-anchor="middle" class="Lx" >kei</text>
<text x="430" y="140" text-anchor="middle" class="L" >L</text>
<text x="430" y="147" text-anchor="middle" class="Lx" >l</text>
<text x="430" y="153" text-anchor="middle" class="Lx" >el</text>
<text x="30" y="158" text-anchor="middle" class="L" >M</text>
<text x="30" y="165" text-anchor="middle" class="Lx" >m</text>
<text x="30" y="171" text-anchor="middle" class="Lx" >em</text>
<text x="110" y="158" text-anchor="middle" class="L" >N</text>
<text x="110" y="165" text-anchor="middle" class="Lx" >n</text>
<text x="110" y="171" text-anchor="middle" class="Lx" >en</text>
<text x="190" y="158" text-anchor="middle" class="L" >O</text>
<text x="190" y="165" text-anchor="middle" class="Lx" >/o/</text>
<text x="190" y="171" text-anchor="middle" class="Lx" >o</text>
<text x="270" y="158" text-anchor="middle" class="L" >P</text>
<text x="270" y="165" text-anchor="middle" class="Lx" >p</text>
<text x="270" y="171" text-anchor="middle" class="Lx" >pi</text>
<text x="350" y="158" text-anchor="middle" class="L" >Q</text>
<text x="350" y="165" text-anchor="middle" class="Lx" >k/kw</text>
<text x="350" y="171" text-anchor="middle" class="Lx" >kiu</text>
<text x="430" y="158" text-anchor="middle" class="L" >R</text>
<text x="430" y="165" text-anchor="middle" class="Lx" >r</text>
<text x="430" y="171" text-anchor="middle" class="Lx" >ar</text>
