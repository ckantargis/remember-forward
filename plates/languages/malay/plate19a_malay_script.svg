<text x="110" y="183" text-anchor="middle" class="Lx" >t</text>
<text x="110" y="189" text-anchor="middle" class="Lx" >ti</text>
<text x="190" y="176" text-anchor="middle" class="L" >U</text>
<text x="190" y="183" text-anchor="middle" class="Lx" >/u/</text>
<text x="190" y="189" text-anchor="middle" class="Lx" >yu</text>
<text x="270" y="176" text-anchor="middle" class="L" >V</text>
