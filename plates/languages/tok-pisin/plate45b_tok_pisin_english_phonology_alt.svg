<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">TOK PISIN</text>
<text x="240" y="40" text-anchor="middle" class="S">PHONOLOGY</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">TOK PISIN CONSONANT SYSTEM</text>
<text x="240" y="68" text-anchor="middle" class="L">Reduced consonant inventory compared to English:</text>
<text x="240" y="79" text-anchor="middle" class="L">p b • t d • k g • f v • s • m n • r l • w j</text>
<text x="240" y="90" text-anchor="middle" class="L">No /θ/ (thin) or /ð/ (this) — replaced by t/d</text>
<text x="240" y="101" text-anchor="middle" class="L">No /ʒ/ (measure) or /ʃ/ (shoe) in many dialects</text>
<text x="240" y="112" text-anchor="middle" class="Ls">English "three" → "tri"  •  English "that" → "dat"</text>
<line x1="20" y1="120" x2="460" y2="120" stroke="#555" stroke-width="0.5"/>
<text x="240" y="128" text-anchor="middle" class="H">TOK PISIN VOWELS</text>
<text x="240" y="139" text-anchor="middle" class="L">Five vowels: a e i o u (simpler than English!)</text>
<text x="240" y="150" text-anchor="middle" class="L">No English schwa (/ə/) — each vowel fully pronounced</text>
<text x="240" y="161" text-anchor="middle" class="L">English "about" /əbaʊt/ → Tok Pisin "abaut" /a.ba.ut/</text>
<text x="240" y="172" text-anchor="middle" class="Ls">No diphthongs in core Tok Pisin (some in loanwords)</text>
<line x1="20" y1="180" x2="460" y2="180" stroke="#555" stroke-width="0.5"/>
<text x="240" y="188" text-anchor="middle" class="H">STRESS &amp; RHYTHM</text>
<text x="240" y="199" text-anchor="middle" class="L">Syllable-timed rhythm (unlike English stress-timed)</text>
<text x="240" y="210" text-anchor="middle" class="Ls">Each syllable given roughly equal duration</text>
<text x="240" y="221" text-anchor="middle" class="Ls">Stress on penultimate syllable generally</text>
<line x1="20" y1="229" x2="460" y2="229" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="236" width="460" height="13" fill="#111"/>
<text x="240" y="245.5" text-anchor="middle" class="Hb">ENGLISH PHONOLOGY  ·  SECONDARY LANGUAGE</text>
<text x="240" y="261" text-anchor="middle" class="H">ENGLISH VOWEL CHAOS</text>
<text x="240" y="272" text-anchor="middle" class="L">~20 vowel phonemes in RP English: 12 monophthongs + 8 diphthongs</text>
<text x="240" y="283" text-anchor="middle" class="L">bat/bet/bit/bot/boot/but — 6 near-identical short vowels</text>
<text x="240" y="294" text-anchor="middle" class="L">Schwa /ə/ in unstressed syllables: "the" "a" "of" "to"</text>
<text x="240" y="305" text-anchor="middle" class="Ls">Great Vowel Shift (1400-1700): explains spelling-sound mismatch</text>
<line x1="20" y1="313" x2="460" y2="313" stroke="#555" stroke-width="0.5"/>
<text x="240" y="321" text-anchor="middle" class="H">ENGLISH CONSONANTS</text>
<text x="240" y="332" text-anchor="middle" class="L">24 consonant phonemes; dental fricatives rare cross-linguistically</text>
<text x="240" y="343" text-anchor="middle" class="L">/θ/ thin  •  /ð/ this: absent from most world languages</text>
<text x="240" y="354" text-anchor="middle" class="Ls">/h/: word-initial (hat) but not word-final</text>
<line x1="20" y1="362" x2="460" y2="362" stroke="#555" stroke-width="0.5"/>
<text x="240" y="370" text-anchor="middle" class="H">CREOLE SIMPLIFICATION</text>
<text x="240" y="381" text-anchor="middle" class="L">Tok Pisin systematically simplified English phonology:</text>
<text x="240" y="392" text-anchor="middle" class="L">θ/ð → t/d  •  20 vowels → 5 vowels  •  stress-timed → syllable-timed</text>
<text x="240" y="403" text-anchor="middle" class="Ls">Simplified because learners lacked English native phonology</text>
<text x="240" y="414" text-anchor="middle" class="Ls">Tok Pisin phonology closer to Melanesian Austronesian substrate</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 45b ALT  ·  TOK PISIN / ENGLISH  ·  PHONOLOGY</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
