<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<defs><style>
text{font-family:Georgia,serif;}
.T{font-size:12px;font-weight:bold;letter-spacing:2px;}
.S{font-size:7px;letter-spacing:1.5px;}
.H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >TOK PISIN</text>
<text x="240" y="50" text-anchor="middle" class="S" >Phonology — Creole Sound System</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— CONSONANT INVENTORY —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Tok Pisin has a relatively simple consonant system (~18 phonemes).</text>
<text x="80" y="92" text-anchor="middle" class="Lx" >p /p/: bilabial stop</text>
<text x="280" y="92" text-anchor="middle" class="Lx" >b /b/: bilabial stop vd</text>
<text x="80" y="102" text-anchor="middle" class="Lx" >t /t/: alveolar stop</text>
<text x="280" y="102" text-anchor="middle" class="Lx" >d /d/: alveolar stop vd</text>
<text x="80" y="112" text-anchor="middle" class="Lx" >k /k/: velar stop</text>
<text x="280" y="112" text-anchor="middle" class="Lx" >g /ɡ/: velar stop vd</text>
<text x="80" y="122" text-anchor="middle" class="Lx" >f /f/: labiodental</text>
<text x="280" y="122" text-anchor="middle" class="Lx" >v /v/: labiodental vd</text>
<text x="80" y="132" text-anchor="middle" class="Lx" >s /s/: alveolar fricative</text>
<text x="280" y="132" text-anchor="middle" class="Lx" >h /h/: glottal fricative</text>
<text x="80" y="142" text-anchor="middle" class="Lx" >m /m/: bilabial nasal</text>
<text x="280" y="142" text-anchor="middle" class="Lx" >n /n/: alveolar nasal</text>
<text x="80" y="152" text-anchor="middle" class="Lx" >ng /ŋ/: velar nasal</text>
<text x="280" y="152" text-anchor="middle" class="Lx" >l /l/: lateral</text>
<text x="80" y="162" text-anchor="middle" class="Lx" >r /r/: trill or flap</text>
<text x="280" y="162" text-anchor="middle" class="Lx" >w /w/: labio-velar</text>
<text x="80" y="172" text-anchor="middle" class="Lx" >y /j/: palatal</text>
<line x1="20" y1="187" x2="460" y2="187" stroke="black" stroke-width="0.3"/>
<text x="240" y="196" text-anchor="middle" class="H" >— VOWEL SYSTEM — 5 VOWELS —</text>
<text x="80" y="206" text-anchor="middle" class="Ls" >a /a/</text>
<text x="300" y="206" text-anchor="middle" class="Lx" >open central: man (person)</text>
<text x="80" y="216" text-anchor="middle" class="Ls" >e /ɛ/</text>
<text x="300" y="216" text-anchor="middle" class="Lx" >mid-front: nem (name)</text>
<text x="80" y="226" text-anchor="middle" class="Ls" >i /i/</text>
<text x="300" y="226" text-anchor="middle" class="Lx" >high front: bikpela (big)</text>
<text x="80" y="236" text-anchor="middle" class="Ls" >o /ɔ/</text>
<text x="300" y="236" text-anchor="middle" class="Lx" >mid-back: tokples (local language)</text>
<text x="80" y="246" text-anchor="middle" class="Ls" >u /u/</text>
<text x="300" y="246" text-anchor="middle" class="Lx" >high back: gutpela (good)</text>
<line x1="20" y1="262" x2="460" y2="262" stroke="black" stroke-width="0.3"/>
<text x="240" y="271" text-anchor="middle" class="H" >— PHONOLOGICAL SIMPLIFICATION FROM ENGLISH —</text>
<text x="240" y="281" text-anchor="middle" class="Ls" >English consonant clusters reduced: "strength" &gt; stren, "scratch" &gt; skraes.</text>
<text x="240" y="291" text-anchor="middle" class="Ls" >"th" (/θð/) absent: think = tingting, the = de/dispela.</text>
<text x="240" y="301" text-anchor="middle" class="Ls" >"sh" (/ʃ/) absent: ship = sip, shoe = su, wash = was.</text>
<text x="240" y="311" text-anchor="middle" class="Ls" >Final consonant clusters simplified: "hand" &gt; han, "friend" &gt; pren.</text>
<line x1="20" y1="319" x2="460" y2="319" stroke="black" stroke-width="0.3"/>
<text x="240" y="328" text-anchor="middle" class="H" >— REDUPLICATION — PRODUCTIVE PROCESS —</text>
<text x="240" y="338" text-anchor="middle" class="Ls" >Reduplication marks plurality, repetition, or intensification:</text>
<text x="240" y="348" text-anchor="middle" class="Ls" >save (know) → savesave (know well/understand deeply).</text>
<text x="240" y="358" text-anchor="middle" class="Ls" >sing (sing) → singsing (music/traditional dance ceremony).</text>
<text x="240" y="368" text-anchor="middle" class="Ls" >gras (grass) → grasgras (weedy/overgrown).</text>
<text x="240" y="378" text-anchor="middle" class="Ls" >tok (speak) → toktok (conversation/talk/discuss).</text>
<line x1="20" y1="386" x2="460" y2="386" stroke="black" stroke-width="0.3"/>
<text x="240" y="395" text-anchor="middle" class="H" >— STRESS AND INTONATION —</text>
<text x="240" y="405" text-anchor="middle" class="Ls" >Stress: generally on the penultimate syllable (inherited from English pattern).</text>
<text x="240" y="415" text-anchor="middle" class="Ls" >No tonal distinctions. Intonation patterns from Austronesian substrate + English.</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 45B — TOK PISIN: PHONOLOGY — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
