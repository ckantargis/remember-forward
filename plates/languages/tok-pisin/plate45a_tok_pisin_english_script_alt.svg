<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">TOK PISIN</text>
<text x="240" y="40" text-anchor="middle" class="S">WRITING SYSTEM</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">TOK PISIN LATIN ALPHABET</text>
<text x="240" y="68" text-anchor="middle" class="L">Tok Pisin uses Latin alphabet; phonemic spelling system</text>
<text x="240" y="79" text-anchor="middle" class="L">"Tok Pisin" = Talk Pidgin (from English "Talk Pidgin")</text>
<text x="240" y="90" text-anchor="middle" class="Ls">High degree of spelling-pronunciation correspondence</text>
<text x="240" y="101" text-anchor="middle" class="Ls">No silent letters; c/x/q rare; phonetic respelling of English words</text>
<line x1="20" y1="109" x2="460" y2="109" stroke="#555" stroke-width="0.5"/>
<text x="240" y="117" text-anchor="middle" class="H">ENGLISH WORDS IN TOK PISIN SPELLING</text>
<text x="240" y="128" text-anchor="middle" class="H">English word  →  Tok Pisin respelling:</text>
<text x="240" y="139" text-anchor="middle" class="L">school → skul  •  hospital → hausik  •  church → sios</text>
<text x="240" y="150" text-anchor="middle" class="L">nothing → nating  •  garden • gaden  •  shirt → sât</text>
<text x="240" y="161" text-anchor="middle" class="L">belly → bel  •  bird → pisin  •  talk → tok</text>
<line x1="20" y1="169" x2="460" y2="169" stroke="#555" stroke-width="0.5"/>
<text x="240" y="177" text-anchor="middle" class="H">UNIQUE TOK PISIN WORDS</text>
<text x="240" y="188" text-anchor="middle" class="L">bilong = "of/belonging to" (from English "belong")</text>
<text x="240" y="199" text-anchor="middle" class="L">baimbai (bai) = future marker (from "by and by")</text>
<text x="240" y="210" text-anchor="middle" class="L">gras bilong fes = "grass of face" = beard</text>
<text x="240" y="221" text-anchor="middle" class="Ls">gras bilong lek = "grass of leg" = pubic hair</text>
<text x="240" y="232" text-anchor="middle" class="Ls">siosop = "church soap" = communion wafer</text>
<line x1="20" y1="240" x2="460" y2="240" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="247" width="460" height="13" fill="#111"/>
<text x="240" y="256.5" text-anchor="middle" class="Hb">ENGLISH  ·  LEXIFIER LANGUAGE  ·  SECONDARY LANGUAGE</text>
<text x="240" y="272" text-anchor="middle" class="H">ENGLISH WRITING SYSTEM</text>
<text x="240" y="283" text-anchor="middle" class="L">26 letters; notoriously non-phonemic spelling</text>
<text x="240" y="294" text-anchor="middle" class="L">through / though / thought / tough — all different pronunciations</text>
<text x="240" y="305" text-anchor="middle" class="L">gh = silent (night) / /f/ (enough) / /g/ (ghost)</text>
<text x="240" y="316" text-anchor="middle" class="Ls">Historical layers: Old English + Norman French + Latin/Greek</text>
<line x1="20" y1="324" x2="460" y2="324" stroke="#555" stroke-width="0.5"/>
<text x="240" y="332" text-anchor="middle" class="H">TOK PISIN vs. ENGLISH SPELLING</text>
<text x="240" y="343" text-anchor="middle" class="L">English "beautiful"  →  Tok Pisin: "biutiful" (phonetic)</text>
<text x="240" y="354" text-anchor="middle" class="L">English "church"  →  Tok Pisin: "sios" (from /tʃətʃ/ → /sios/)</text>
<text x="240" y="365" text-anchor="middle" class="L">English "work"  →  Tok Pisin: "wok" (phonetic respelling)</text>
<text x="240" y="376" text-anchor="middle" class="Ls">Tok Pisin: regular  •  English: historical spellings preserved</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 45a ALT  ·  TOK PISIN / ENGLISH  ·  SCRIPT</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
