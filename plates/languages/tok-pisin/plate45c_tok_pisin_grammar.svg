</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >TOK PISIN</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — SVO —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Tok Pisin is SVO. Very regular structure with few exceptions.</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >Mi kaikai rais. I eat rice. (mi=I kaikai=eat rais=rice)</text>
<line x1="20" y1="100" x2="460" y2="100" stroke="black" stroke-width="0.3"/>
<text x="240" y="109" text-anchor="middle" class="H" >— PRONOUNS —</text>
<text x="120" y="119" text-anchor="middle" class="L" >mi</text>
<text x="300" y="119" text-anchor="middle" class="Ls" >I</text>
<text x="120" y="129" text-anchor="middle" class="L" >yu</text>
<text x="300" y="129" text-anchor="middle" class="Ls" >you (sg)</text>
<text x="120" y="139" text-anchor="middle" class="L" >em</text>
<text x="300" y="139" text-anchor="middle" class="Ls" >he/she/it</text>
<text x="120" y="149" text-anchor="middle" class="L" >yumi (incl)</text>
<text x="300" y="149" text-anchor="middle" class="Ls" >we (you+me)</text>
<text x="120" y="159" text-anchor="middle" class="L" >mipela (excl)</text>
<text x="300" y="159" text-anchor="middle" class="Ls" >we (not you)</text>
<text x="120" y="169" text-anchor="middle" class="L" >yupela</text>
<text x="300" y="169" text-anchor="middle" class="Ls" >you (pl)</text>
<text x="120" y="179" text-anchor="middle" class="L" >ol</text>
<text x="300" y="179" text-anchor="middle" class="Ls" >they</text>
<line x1="20" y1="193" x2="460" y2="193" stroke="black" stroke-width="0.3"/>
<text x="240" y="202" text-anchor="middle" class="H" >— TRANSITIVE SUFFIX —im —</text>
<text x="240" y="212" text-anchor="middle" class="Ls" >Many verbs require -im suffix for transitive use (from Tolai substrate):</text>
<text x="240" y="222" text-anchor="middle" class="Ls" >Lukim (see-it): Mi lukim yu. I see you.</text>
<text x="240" y="232" text-anchor="middle" class="Ls" >Helpim (help-it): Helpim mi! Help me!</text>
<text x="240" y="242" text-anchor="middle" class="Ls" >Kisim (catch/take-it): Em kisim dispela. He took this.</text>
<text x="240" y="252" text-anchor="middle" class="Ls" >Kaikai (eat) stays as kaikai (already transitive from form).</text>
<line x1="20" y1="260" x2="460" y2="260" stroke="black" stroke-width="0.3"/>
<text x="240" y="269" text-anchor="middle" class="H" >— TENSE / ASPECT MARKERS —</text>
<text x="240" y="279" text-anchor="middle" class="Ls" >Bai (baimbai): future marker. Bai mi go = I will go.</text>
<text x="240" y="289" text-anchor="middle" class="Ls" >Pinis: completive aspect. Mi kaikai pinis = I have finished eating.</text>
<text x="240" y="299" text-anchor="middle" class="Ls" >Stap: progressive. Em stap slip = He is sleeping.</text>
<text x="240" y="309" text-anchor="middle" class="Ls" >Laik: want to / about to. Mi laik go = I want to go / I'm going to go.</text>
<line x1="20" y1="317" x2="460" y2="317" stroke="black" stroke-width="0.3"/>
<text x="240" y="326" text-anchor="middle" class="H" >— ADJECTIVE SUFFIX —pela —</text>
<text x="240" y="336" text-anchor="middle" class="Ls" >Adjectives use -pela suffix (from English "fellow"): gutpela (good), bikpela (big).</text>
<text x="240" y="346" text-anchor="middle" class="Ls" >Dropped before nouns in some contexts: gut man (a good person, informal).</text>
<line x1="20" y1="354" x2="460" y2="354" stroke="black" stroke-width="0.3"/>
<text x="240" y="363" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
<text x="50" y="373" text-anchor="middle" class="Ls" >gude</text>
<text x="175" y="373" text-anchor="middle" class="Lx" >hello/good day</text>
<text x="50" y="383" text-anchor="middle" class="Ls" >tenk yu</text>
<text x="175" y="383" text-anchor="middle" class="Lx" >thank you</text>
<text x="50" y="393" text-anchor="middle" class="Ls" >yes/ya</text>
<text x="175" y="393" text-anchor="middle" class="Lx" >yes</text>
<text x="50" y="403" text-anchor="middle" class="Ls" >nogat</text>
<text x="175" y="403" text-anchor="middle" class="Lx" >no/not</text>
<text x="50" y="413" text-anchor="middle" class="Ls" >sori</text>
<text x="175" y="413" text-anchor="middle" class="Lx" >sorry/excuse me</text>
<text x="50" y="423" text-anchor="middle" class="Ls" >yu orait?</text>
<text x="175" y="423" text-anchor="middle" class="Lx" >how are you?</text>
<text x="50" y="433" text-anchor="middle" class="Ls" >mi orait</text>
<text x="175" y="433" text-anchor="middle" class="Lx" >I am fine</text>
<text x="50" y="443" text-anchor="middle" class="Ls" >mi laikim yu</text>
<text x="175" y="443" text-anchor="middle" class="Lx" >I love you</text>
<text x="50" y="453" text-anchor="middle" class="Ls" >wara</text>
<text x="175" y="453" text-anchor="middle" class="Lx" >water</text>
<text x="50" y="463" text-anchor="middle" class="Ls" >paia</text>
<text x="175" y="463" text-anchor="middle" class="Lx" >fire</text>
<text x="50" y="473" text-anchor="middle" class="Ls" >graun</text>
<text x="175" y="473" text-anchor="middle" class="Lx" >earth/ground</text>
<text x="285" y="373" text-anchor="middle" class="Ls" >man/meri</text>
<text x="410" y="373" text-anchor="middle" class="Lx" >person (man/woman)</text>
<text x="285" y="383" text-anchor="middle" class="Ls" >taim</text>
<text x="410" y="383" text-anchor="middle" class="Lx" >time</text>
<text x="285" y="393" text-anchor="middle" class="Ls" >mun</text>
<text x="410" y="393" text-anchor="middle" class="Lx" >moon</text>
<text x="285" y="403" text-anchor="middle" class="Ls" >sta</text>
<text x="410" y="403" text-anchor="middle" class="Lx" >star</text>
<text x="285" y="413" text-anchor="middle" class="Ls" >bel</text>
<text x="410" y="413" text-anchor="middle" class="Lx" >stomach/feelings/heart</text>
<text x="285" y="423" text-anchor="middle" class="Ls" >lav</text>
<text x="410" y="423" text-anchor="middle" class="Lx" >love</text>
<text x="285" y="433" text-anchor="middle" class="Ls" >fri / fridom</text>
<text x="410" y="433" text-anchor="middle" class="Lx" >free / freedom</text>
<text x="285" y="443" text-anchor="middle" class="Ls" >tingting</text>
<text x="410" y="443" text-anchor="middle" class="Lx" >memory/thought/mind</text>
<text x="285" y="453" text-anchor="middle" class="Ls" >tumora</text>
<text x="410" y="453" text-anchor="middle" class="Lx" >tomorrow / future</text>
<text x="285" y="463" text-anchor="middle" class="Ls" >graun/wol</text>
<text x="410" y="463" text-anchor="middle" class="Lx" >world</text>
<text x="285" y="473" text-anchor="middle" class="Ls" >laip</text>
<text x="410" y="473" text-anchor="middle" class="Lx" >life</text>
