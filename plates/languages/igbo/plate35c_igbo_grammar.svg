<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >IGBO</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — SVO —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Igbo is Subject-Verb-Object (SVO): Emeka ri-ara ji (Emeka ate yam).</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >Verbs are central; they carry tense, aspect, and negation morphology.</text>
<text x="240" y="102" text-anchor="middle" class="Ls" >Subject pronouns are obligatory: m (I), i/ị (you), ọ (he/she/it), anyị (we), unu (y'all), ha (they).</text>
<line x1="20" y1="110" x2="460" y2="110" stroke="black" stroke-width="0.3"/>
<text x="240" y="119" text-anchor="middle" class="H" >— VERB SYSTEM —</text>
<text x="240" y="129" text-anchor="middle" class="Ls" >Igbo verbs use a root + tonal pattern to signal tense/aspect.</text>
<text x="90" y="139" text-anchor="middle" class="Lx" >root</text>
<text x="230" y="139" text-anchor="middle" class="Ls" >ri</text>
<text x="370" y="139" text-anchor="middle" class="Lx" >eat</text>
<text x="90" y="149" text-anchor="middle" class="Lx" >past imperfective</text>
<text x="230" y="149" text-anchor="middle" class="Ls" >na-arị</text>
<text x="370" y="149" text-anchor="middle" class="Lx" >was eating</text>
<text x="90" y="159" text-anchor="middle" class="Lx" >past perfective</text>
<text x="230" y="159" text-anchor="middle" class="Ls" >rirị</text>
<text x="370" y="159" text-anchor="middle" class="Lx" >ate (completed)</text>
<text x="90" y="169" text-anchor="middle" class="Lx" >present hab</text>
<text x="230" y="169" text-anchor="middle" class="Ls" >na-arị</text>
<text x="370" y="169" text-anchor="middle" class="Lx" >eats (habitually)</text>
<text x="90" y="179" text-anchor="middle" class="Lx" >future</text>
<text x="230" y="179" text-anchor="middle" class="Ls" >gị arị</text>
<text x="370" y="179" text-anchor="middle" class="Lx" >will eat</text>
<text x="90" y="189" text-anchor="middle" class="Lx" >stative</text>
<text x="230" y="189" text-anchor="middle" class="Ls" >er-iri</text>
<text x="370" y="189" text-anchor="middle" class="Lx" >have eaten</text>
<text x="90" y="199" text-anchor="middle" class="Lx" >negative</text>
<text x="230" y="199" text-anchor="middle" class="Ls" >anaghị arị</text>
<text x="370" y="199" text-anchor="middle" class="Lx" >does not eat</text>
<text x="90" y="209" text-anchor="middle" class="Lx" >imperative</text>
<text x="230" y="209" text-anchor="middle" class="Ls" >rị!</text>
<text x="370" y="209" text-anchor="middle" class="Lx" >eat!</text>
<line x1="20" y1="225" x2="460" y2="225" stroke="black" stroke-width="0.3"/>
<text x="240" y="234" text-anchor="middle" class="H" >— SUBJECT PRONOUNS —</text>
<text x="120" y="244" text-anchor="middle" class="L" >m / mụ</text>
<text x="310" y="244" text-anchor="middle" class="Ls" >I / me (emphatic: mụ)</text>
<text x="120" y="254" text-anchor="middle" class="L" >ị / gị</text>
<text x="310" y="254" text-anchor="middle" class="Ls" >you (subject / emphatic)</text>
<text x="120" y="264" text-anchor="middle" class="L" >ọ</text>
<text x="310" y="264" text-anchor="middle" class="Ls" >he/she/it (3rd sg)</text>
<text x="120" y="274" text-anchor="middle" class="L" >anyị</text>
<text x="310" y="274" text-anchor="middle" class="Ls" >we (inclusive)</text>
<text x="120" y="284" text-anchor="middle" class="L" >unu</text>
<text x="310" y="284" text-anchor="middle" class="Ls" >you (plural)</text>
<text x="120" y="294" text-anchor="middle" class="L" >ha</text>
<text x="310" y="294" text-anchor="middle" class="Ls" >they / them</text>
<line x1="20" y1="310" x2="460" y2="310" stroke="black" stroke-width="0.3"/>
<text x="240" y="319" text-anchor="middle" class="H" >— NOUN CLASSES — GENDER BY PREFIX —</text>
<text x="240" y="329" text-anchor="middle" class="Ls" >No grammatical gender; nouns modified by adjectives that follow: ọ jị ọ bọ (the white yam).</text>
<text x="240" y="339" text-anchor="middle" class="Ls" >Plurals often formed by tone change or N- prefix: ọ chệ → ọ chệ (tree → trees by context).</text>
<text x="240" y="349" text-anchor="middle" class="Ls" >Classifiers used with numerals: otu oche (one chair), ise oche (five chairs).</text>
<line x1="20" y1="357" x2="460" y2="357" stroke="black" stroke-width="0.3"/>
<text x="240" y="366" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
