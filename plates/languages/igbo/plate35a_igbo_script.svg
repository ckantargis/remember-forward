<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<defs><style>
text{font-family:Georgia,serif;}
.T{font-size:12px;font-weight:bold;letter-spacing:2px;}
.S{font-size:7px;letter-spacing:1.5px;}
.H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >IGBO</text>
<text x="240" y="50" text-anchor="middle" class="S" >Script &amp; Writing System</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— WRITING SYSTEM —</text>
<text x="240" y="84" text-anchor="middle" class="L" >Igbo uses the Latin alphabet, standardised in the 1961 Onwu orthography.</text>
<text x="240" y="94" text-anchor="middle" class="Ls" >28 letters (a b ch d e f g gb gh gw h i ị j k kp kw l m nị n o ọ p r s sh t u ụ w y z).</text>
<text x="240" y="104" text-anchor="middle" class="Ls" >Diacritics mark tone (acute = high, grave = low) and distinguish vowels with dot-below.</text>
<line x1="20" y1="112" x2="460" y2="112" stroke="black" stroke-width="0.3"/>
<text x="240" y="121" text-anchor="middle" class="H" >— VOWEL SYSTEM — 8 ORAL VOWELS —</text>
<text x="60" y="131" text-anchor="middle" class="L" >a</text>
<text x="130" y="131" text-anchor="middle" class="Ls" >/a/</text>
<text x="310" y="131" text-anchor="middle" class="Lx" >arm</text>
<text x="60" y="141" text-anchor="middle" class="L" >e</text>
<text x="130" y="141" text-anchor="middle" class="Ls" >/e/</text>
<text x="310" y="141" text-anchor="middle" class="Lx" >bed</text>
<text x="60" y="151" text-anchor="middle" class="L" >ị</text>
<text x="130" y="151" text-anchor="middle" class="Ls" >/ị/</text>
<text x="310" y="151" text-anchor="middle" class="Lx" >Igbo vowel, between e and i</text>
<text x="60" y="161" text-anchor="middle" class="L" >i</text>
<text x="130" y="161" text-anchor="middle" class="Ls" >/i/</text>
<text x="310" y="161" text-anchor="middle" class="Lx" >see</text>
<text x="60" y="171" text-anchor="middle" class="L" >o</text>
<text x="130" y="171" text-anchor="middle" class="Ls" >/o/</text>
<text x="310" y="171" text-anchor="middle" class="Lx" >ore</text>
<text x="60" y="181" text-anchor="middle" class="L" >ọ</text>
<text x="130" y="181" text-anchor="middle" class="Ls" >/ɔ/</text>
<text x="310" y="181" text-anchor="middle" class="Lx" >open-o, pot</text>
<text x="60" y="191" text-anchor="middle" class="L" >u</text>
<text x="130" y="191" text-anchor="middle" class="Ls" >/u/</text>
<text x="310" y="191" text-anchor="middle" class="Lx" >moon</text>
<text x="60" y="201" text-anchor="middle" class="L" >ụ</text>
<text x="130" y="201" text-anchor="middle" class="Ls" >/ụ/</text>
<text x="310" y="201" text-anchor="middle" class="Lx" >Igbo vowel, between u and o</text>
<line x1="20" y1="215" x2="460" y2="215" stroke="black" stroke-width="0.3"/>
<text x="240" y="224" text-anchor="middle" class="H" >— IGBO ALPHABET — ONWU ORTHOGRAPHY (1961) —</text>
<text x="60" y="234" text-anchor="middle" class="Ls" >A a</text>
<text x="160" y="234" text-anchor="middle" class="Ls" >B b</text>
<text x="260" y="234" text-anchor="middle" class="Ls" >CH ch</text>
<text x="360" y="234" text-anchor="middle" class="Ls" >D d</text>
<text x="60" y="244" text-anchor="middle" class="Ls" >E e</text>
<text x="160" y="244" text-anchor="middle" class="Ls" >F f</text>
<text x="260" y="244" text-anchor="middle" class="Ls" >G g</text>
<text x="360" y="244" text-anchor="middle" class="Ls" >GB gb</text>
<text x="60" y="254" text-anchor="middle" class="Ls" >GH gh</text>
<text x="160" y="254" text-anchor="middle" class="Ls" >GW gw</text>
<text x="260" y="254" text-anchor="middle" class="Ls" >H h</text>
<text x="360" y="254" text-anchor="middle" class="Ls" >I i</text>
<text x="60" y="264" text-anchor="middle" class="Ls" >Ị ị</text>
<text x="160" y="264" text-anchor="middle" class="Ls" >J j</text>
<text x="260" y="264" text-anchor="middle" class="Ls" >K k</text>
<text x="360" y="264" text-anchor="middle" class="Ls" >KP kp</text>
<text x="60" y="274" text-anchor="middle" class="Ls" >KW kw</text>
<text x="160" y="274" text-anchor="middle" class="Ls" >L l</text>
<text x="260" y="274" text-anchor="middle" class="Ls" >M m</text>
<text x="360" y="274" text-anchor="middle" class="Ls" >N n</text>
<text x="60" y="284" text-anchor="middle" class="Ls" >NỊ Nị</text>
<text x="160" y="284" text-anchor="middle" class="Ls" >O o</text>
<text x="260" y="284" text-anchor="middle" class="Ls" >Ọ ọ</text>
<text x="360" y="284" text-anchor="middle" class="Ls" >P p</text>
<text x="60" y="294" text-anchor="middle" class="Ls" >R r</text>
<text x="160" y="294" text-anchor="middle" class="Ls" >S s</text>
<text x="260" y="294" text-anchor="middle" class="Ls" >SH sh</text>
<text x="360" y="294" text-anchor="middle" class="Ls" >T t</text>
<text x="60" y="304" text-anchor="middle" class="Ls" >U u</text>
<text x="160" y="304" text-anchor="middle" class="Ls" >Ụ ụ</text>
<text x="260" y="304" text-anchor="middle" class="Ls" >W w</text>
<text x="360" y="304" text-anchor="middle" class="Ls" >Y y</text>
<text x="60" y="314" text-anchor="middle" class="Ls" >Z z</text>
<line x1="20" y1="330" x2="460" y2="330" stroke="black" stroke-width="0.3"/>
<text x="240" y="339" text-anchor="middle" class="H" >— DIGRAPHS AND SPECIAL FEATURES —</text>
<text x="240" y="349" text-anchor="middle" class="Ls" >GB /ɡb/ — simultaneous velar+bilabial: gbara (filled), gbe (hit).</text>
<text x="240" y="358" text-anchor="middle" class="Ls" >KP /kp/ — simultaneous velar+bilabial (voiceless): kpoo (knock), kpa (carry).</text>
<text x="240" y="367" text-anchor="middle" class="Ls" >GH /ɣ/ — voiced velar fricative: ghara (do not), ngha (grinding).</text>
<text x="240" y="376" text-anchor="middle" class="Ls" >SH /ʃ/ — as in English: shiri (bird), sha (share out).</text>
<text x="240" y="385" text-anchor="middle" class="Ls" >NỊ /ŋ/ — velar nasal (ng in song): nịa (eat), nịe (carry).</text>
<line x1="20" y1="393" x2="460" y2="393" stroke="black" stroke-width="0.3"/>
<text x="240" y="402" text-anchor="middle" class="H" >— TONE MARKING —</text>
<text x="240" y="412" text-anchor="middle" class="Ls" >High tone: acute accent — á é í ó ú (e.g., á = yes, óbi = heart).</text>
<text x="240" y="421" text-anchor="middle" class="Ls" >Low tone: grave accent — à è ì ò ù (e.g., à = then, that).</text>
<text x="240" y="430" text-anchor="middle" class="Ls" >Mid/unmarked: no diacritic in many texts (tone is predictable in context).</text>
<text x="240" y="439" text-anchor="middle" class="Ls" >Down-step (!) marks a high tone that is lower than the preceding high.</text>
<line x1="20" y1="447" x2="460" y2="447" stroke="black" stroke-width="0.3"/>
<text x="240" y="456" text-anchor="middle" class="H" >— HISTORICAL SCRIPT —</text>
<text x="240" y="466" text-anchor="middle" class="Ls" >Nsibidi: indigenous ideographic system used by Ekpe secret society.</text>
<text x="240" y="475" text-anchor="middle" class="Ls" >Nsibidi not standardised for everyday Igbo; used for ritual/legal texts.</text>
<text x="240" y="484" text-anchor="middle" class="Ls" >Modern Igbo literacy uses Latin-based Onwu orthography exclusively.</text>
<line x1="20" y1="492" x2="460" y2="492" stroke="black" stroke-width="0.3"/>
<text x="240" y="501" text-anchor="middle" class="H" >— IGBO NUMERALS —</text>
<text x="70" y="511" text-anchor="middle" class="Lx" >1 = otu</text>
<text x="150" y="511" text-anchor="middle" class="Lx" >2 = abuo</text>
<text x="230" y="511" text-anchor="middle" class="Lx" >3 = ato</text>
<text x="310" y="511" text-anchor="middle" class="Lx" >4 = ano</text>
<text x="390" y="511" text-anchor="middle" class="Lx" >5 = ise</text>
<text x="70" y="521" text-anchor="middle" class="Lx" >6 = isii</text>
<text x="150" y="521" text-anchor="middle" class="Lx" >7 = asaa</text>
<text x="230" y="521" text-anchor="middle" class="Lx" >8 = asato</text>
<text x="310" y="521" text-anchor="middle" class="Lx" >9 = toolu</text>
<text x="390" y="521" text-anchor="middle" class="Lx" >10 = iri</text>
<text x="240" y="531" text-anchor="middle" class="Ls" >20 = iri abuo · 100 = otu narị · 1000 = otu puku</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 35A — IGBO: SCRIPT — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
