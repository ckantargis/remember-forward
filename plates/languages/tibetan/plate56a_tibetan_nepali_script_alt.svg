<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">TIBETAN</text>
<text x="240" y="40" text-anchor="middle" class="S">TIBETAN SCRIPT</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">UCHEN SCRIPT — "HEAD LETTER"</text>
<text x="240" y="68" text-anchor="middle" class="L">Tibetan script created ~620 CE by Thonmi Sambhota</text>
<text x="240" y="79" text-anchor="middle" class="Ls">Commissioned by King Songtsen Gampo to translate Buddhist texts</text>
<text x="240" y="90" text-anchor="middle" class="Ls">Derived from Brahmi via Gupta script tradition</text>
<text x="240" y="101" text-anchor="middle" class="L">Abugida: 30 consonants + inherent /a/ vowel</text>
<line x1="20" y1="109" x2="460" y2="109" stroke="#555" stroke-width="0.5"/>
<text x="240" y="117" text-anchor="middle" class="H">TIBETAN CONSONANTS</text>
<text x="240" y="128" text-anchor="middle" class="L">ཀ k  ཁ kh  ག g  ང ng  ཅ c  ཆ ch  ཇ j  ཉ ny</text>
<text x="240" y="139" text-anchor="middle" class="L">ཏ t  ཐ th  ད d  ན n  པ p  ཕ ph  བ b  མ m</text>
<text x="240" y="150" text-anchor="middle" class="L">ཞ ts  ཟ tsh  འ dz  ཡ w  ར zh  ལ z  ལ '  ཤ y</text>
<text x="240" y="161" text-anchor="middle" class="L">ཥ r  ས l  ཧ sh  ཨ s  ཀྵ h  ཪ a</text>
<line x1="20" y1="169" x2="460" y2="169" stroke="#555" stroke-width="0.5"/>
<text x="240" y="177" text-anchor="middle" class="H">STACKED LETTERS</text>
<text x="240" y="188" text-anchor="middle" class="L">Tibetan uses vertical stacks for consonant clusters:</text>
<text x="240" y="199" text-anchor="middle" class="Ls">Superscripts and subscripts modify pronunciation</text>
<text x="240" y="210" text-anchor="middle" class="L">པྲ་ཀ = "Prak" (superscribed r)</text>
<text x="240" y="221" text-anchor="middle" class="Ls">Most stacks are now silent (archaic orthography)</text>
<line x1="20" y1="229" x2="460" y2="229" stroke="#555" stroke-width="0.5"/>
<text x="240" y="237" text-anchor="middle" class="H">SAMPLE</text>
<text x="240" y="249" text-anchor="middle" class="L">འགརོས འདེབས་ པོ་  "Tashi Delek" (Good Luck/Blessings)</text>
<line x1="20" y1="257" x2="460" y2="257" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="264" width="460" height="13" fill="#111"/>
<text x="240" y="273.5" text-anchor="middle" class="Hb">NEPALI  ·  नेपाली  ·  SECONDARY LANGUAGE</text>
<text x="240" y="289" text-anchor="middle" class="H">DEVANAGARI SCRIPT FOR NEPALI</text>
<text x="240" y="300" text-anchor="middle" class="L">Nepali written in Devanagari (same as Hindi, Marathi, Sanskrit)</text>
<text x="240" y="311" text-anchor="middle" class="Ls">Devanagari: "city of the gods" script; left-to-right abugida</text>
<text x="240" y="322" text-anchor="middle" class="Ls">36+ consonants; inherent /a/ vowel; vowel matras above/below/beside</text>
<line x1="20" y1="330" x2="460" y2="330" stroke="#555" stroke-width="0.5"/>
<text x="240" y="338" text-anchor="middle" class="H">NEPALI DEVANAGARI SAMPLE</text>
<text x="240" y="350" text-anchor="middle" class="L">नमस्ते  Namaste "Hello" (also: "I bow to you")</text>
<text x="240" y="361" text-anchor="middle" class="L">नेपाल  Nepal "Nepal"</text>
<text x="240" y="372" text-anchor="middle" class="L">धन्यवाद  Dhanyavaad "Thank you"</text>
<line x1="20" y1="380" x2="460" y2="380" stroke="#555" stroke-width="0.5"/>
<text x="240" y="388" text-anchor="middle" class="H">SCRIPT CONTRAST</text>
<text x="240" y="399" text-anchor="middle" class="L">Tibetan: Uchen (with serifs, angular base)</text>
<text x="240" y="410" text-anchor="middle" class="L">Nepali: Devanagari (horizontal headline bar connects letters)</text>
<text x="240" y="421" text-anchor="middle" class="L">Both: abugida (inherent vowel + vowel diacritics)</text>
<text x="240" y="432" text-anchor="middle" class="Ls">Both: Brahmi ancestry — same scriptural root, different branches</text>
<text x="240" y="443" text-anchor="middle" class="Ls">Tibetan script also used for writing Nepali by Tibetan communities</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 56a ALT  ·  TIBETAN / NEPALI  ·  SCRIPT</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
