<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680">
<rect x="8" y="8" width="464" height="664" rx="10" ry="10" fill="none" stroke="#1a1a2e" stroke-width="2"/>
<rect x="14" y="14" width="452" height="652" rx="8" ry="8" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
<style>
text { font-family: "Noto Serif Tibetan", "Noto Sans Tibetan", serif; }
.T { font-size: 13px; fill: #1a1a2e; }
.H { font-size: 11px; fill: #5a4a6b; font-style: italic; }
.L { font-size: 12px; fill: #1a1a2e; }
.S { font-size: 15px; fill: #1a1a2e; font-weight: bold; }
.X { font-size: 11px; fill: #3a3a5c; }
.F { font-size: 9px; fill: #7a7a9a; }
</style>
<text x="240" y="45" text-anchor="middle" class="S" >TIBETAN  GRAMMAR</text>
<text x="240" y="65" text-anchor="middle" class="T" >བརྜ་དག་  (brjod dgos)</text>
<line x1="20" y1="78" x2="460" y2="78" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="95" text-anchor="middle" class="H" >— Word Order  SOV —</text>
<text x="240" y="112" text-anchor="middle" class="L" >ང་སིས་ཆུ་གསིན་ཡོད་</text>
<text x="240" y="128" text-anchor="middle" class="X" >Nga si chu gyinyor yod — "I am drinking water"</text>
<line x1="20" y1="141" x2="460" y2="141" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="157" text-anchor="middle" class="H" >— Case Particles —</text>
<text x="50" y="174" text-anchor="middle" class="L" >གི</text>
<text x="130" y="174" text-anchor="middle" class="X" >gi / i</text>
<text x="295" y="174" text-anchor="start" class="X" >GENITIVE — possessive</text>
<text x="50" y="192" text-anchor="middle" class="L" >ལ་ / ར་</text>
<text x="130" y="192" text-anchor="middle" class="X" >la / ra</text>
<text x="295" y="192" text-anchor="start" class="X" >DATIVE/LOCATIVE — to, at, for</text>
<text x="50" y="210" text-anchor="middle" class="L" >ནས་</text>
<text x="130" y="210" text-anchor="middle" class="X" >nas</text>
<text x="295" y="210" text-anchor="start" class="X" >ABLATIVE — from, by</text>
<text x="50" y="228" text-anchor="middle" class="L" >ས་</text>
<text x="130" y="228" text-anchor="middle" class="X" >s</text>
<text x="295" y="228" text-anchor="start" class="X" >AGENTIVE (ergative) — marks agent</text>
<text x="50" y="246" text-anchor="middle" class="L" >དང་</text>
<text x="130" y="246" text-anchor="middle" class="X" >dang</text>
<text x="295" y="246" text-anchor="start" class="X" >COMITATIVE — with, and</text>
<line x1="20" y1="268" x2="460" y2="268" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="284" text-anchor="middle" class="H" >— Evidentiality —</text>
<text x="240" y="301" text-anchor="middle" class="X" >Tibetan marks HOW the speaker knows information:</text>
<text x="55" y="317" text-anchor="middle" class="L" >ཡོད</text>
<text x="120" y="317" text-anchor="middle" class="X" >yod</text>
<text x="270" y="317" text-anchor="start" class="X" >direct knowledge (I know from experience)</text>
<text x="55" y="335" text-anchor="middle" class="L" >རེད</text>
<text x="120" y="335" text-anchor="middle" class="X" >red</text>
<text x="270" y="335" text-anchor="start" class="X" >reported/general fact</text>
<text x="55" y="353" text-anchor="middle" class="L" >སེ་སྔ</text>
<text x="120" y="353" text-anchor="middle" class="X" >se song</text>
<text x="270" y="353" text-anchor="start" class="X" >inferential (I deduce)</text>
<line x1="20" y1="374" x2="460" y2="374" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="390" text-anchor="middle" class="H" >— Core Vocabulary —</text>
<text x="50" y="406" text-anchor="middle" class="L" >ཅུ</text>
<text x="115" y="406" text-anchor="middle" class="X" >chu</text>
<text x="180" y="406" text-anchor="middle" class="X" >water</text>
<text x="275" y="406" text-anchor="middle" class="L" >བགརྚ</text>
<text x="350" y="406" text-anchor="middle" class="X" >bagru</text>
<text x="430" y="406" text-anchor="middle" class="X" >bread</text>
<text x="50" y="424" text-anchor="middle" class="L" >ཁིམ</text>
<text x="115" y="424" text-anchor="middle" class="X" >khyim</text>
<text x="180" y="424" text-anchor="middle" class="X" >house</text>
<text x="275" y="424" text-anchor="middle" class="L" >ཨམ་ལགས</text>
<text x="350" y="424" text-anchor="middle" class="X" >a-ma</text>
<text x="430" y="424" text-anchor="middle" class="X" >mother</text>
<text x="50" y="442" text-anchor="middle" class="L" >༸ོད</text>
<text x="115" y="442" text-anchor="middle" class="X" >chos</text>
<text x="180" y="442" text-anchor="middle" class="X" >dharma/teaching</text>
<text x="275" y="442" text-anchor="middle" class="L" >ལགས</text>
<text x="350" y="442" text-anchor="middle" class="X" >lags</text>
<text x="430" y="442" text-anchor="middle" class="X" >yes (honorific)</text>
<text x="50" y="460" text-anchor="middle" class="L" >མིན</text>
<text x="115" y="460" text-anchor="middle" class="X" >min</text>
<text x="180" y="460" text-anchor="middle" class="X" >no/not</text>
<text x="275" y="460" text-anchor="middle" class="L" >མིང</text>
<text x="350" y="460" text-anchor="middle" class="X" >ming</text>
<text x="430" y="460" text-anchor="middle" class="X" >name</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="#1a1a2e" stroke-width="0.3"/>
<text x="240" y="625" text-anchor="middle" class="F" >PLATE 56C  ·  TIBETAN</text>
<text x="240" y="640" text-anchor="middle" class="F" >Grammar · Cases · Evidentiality</text>
<text x="240" y="655" text-anchor="middle" class="F" >REMEMBER FORWARD</text>
</svg>
