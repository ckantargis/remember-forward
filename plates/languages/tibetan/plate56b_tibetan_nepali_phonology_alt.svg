<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">TIBETAN</text>
<text x="240" y="40" text-anchor="middle" class="S">PHONOLOGY</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">TIBETAN TONAL SYSTEM</text>
<text x="240" y="68" text-anchor="middle" class="L">Central Tibetan (Lhasa dialect): 2 register tones</text>
<text x="240" y="79" text-anchor="middle" class="L">High register: voiceless onset + high or falling pitch</text>
<text x="240" y="90" text-anchor="middle" class="L">Low register: voiced onset (or historical voiced) + low or rising</text>
<text x="240" y="101" text-anchor="middle" class="Ls">Tones arose from historical voiced/voiceless consonant distinction</text>
<text x="240" y="112" text-anchor="middle" class="Ls">Classic Tibetan script does NOT mark tones (oral tradition)</text>
<line x1="20" y1="120" x2="460" y2="120" stroke="#555" stroke-width="0.5"/>
<text x="240" y="128" text-anchor="middle" class="H">SILENT CONSONANT STACKS</text>
<text x="240" y="139" text-anchor="middle" class="L">Classical spelling preserves many now-silent consonants:</text>
<text x="240" y="150" text-anchor="middle" class="L">brgya = written /b-r-g-y-a/ = spoken /gya/ "hundred"</text>
<text x="240" y="161" text-anchor="middle" class="Ls">mkhan = written /m-k-h-a-n/ = spoken /khen/ "master"</text>
<text x="240" y="172" text-anchor="middle" class="Ls">Script reflects classical pronunciation from ~700 CE</text>
<line x1="20" y1="180" x2="460" y2="180" stroke="#555" stroke-width="0.5"/>
<text x="240" y="188" text-anchor="middle" class="H">TIBETAN VOWELS</text>
<text x="240" y="199" text-anchor="middle" class="L">Four vowels: a i u e (+ long counterparts)</text>
<text x="240" y="210" text-anchor="middle" class="Ls">Vowel quality tied to register: high = tenser vowels</text>
<line x1="20" y1="218" x2="460" y2="218" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="225" width="460" height="13" fill="#111"/>
<text x="240" y="234.5" text-anchor="middle" class="Hb">NEPALI PHONOLOGY  ·  SECONDARY LANGUAGE</text>
<text x="240" y="250" text-anchor="middle" class="H">NEPALI CONSONANT SYSTEM</text>
<text x="240" y="261" text-anchor="middle" class="L">Full Indo-Aryan four-way stop contrast:</text>
<text x="240" y="272" text-anchor="middle" class="L">p ph b bh • t th d dh • k kh g gh</text>
<text x="240" y="283" text-anchor="middle" class="L">Retroflex series: ʈ ʈh ɖ ɖh ṇ (from Sanskrit)</text>
<text x="240" y="294" text-anchor="middle" class="L">No tones (unlike Tibetan)</text>
<line x1="20" y1="302" x2="460" y2="302" stroke="#555" stroke-width="0.5"/>
<text x="240" y="310" text-anchor="middle" class="H">NEPALI VOWELS</text>
<text x="240" y="321" text-anchor="middle" class="L">Six oral vowels: a ā i ī u ū e o</text>
<text x="240" y="332" text-anchor="middle" class="L">Nasalized vowels marked with chandrabindu: ā̃ ĩ õ</text>
<text x="240" y="343" text-anchor="middle" class="Ls">No long/short distinction in spoken modern Nepali</text>
<line x1="20" y1="351" x2="460" y2="351" stroke="#555" stroke-width="0.5"/>
<text x="240" y="359" text-anchor="middle" class="H">PHONOLOGICAL CONTRAST</text>
<text x="240" y="370" text-anchor="middle" class="L">Tibetan: tonal, few aspirates in modern spoken form</text>
<text x="240" y="381" text-anchor="middle" class="L">Nepali: non-tonal, four-way aspirate contrast</text>
<text x="240" y="392" text-anchor="middle" class="Ls">Both: aspiration as phonemic (but different systems)</text>
<text x="240" y="403" text-anchor="middle" class="Ls">Nepali: retroflex series  •  Tibetan: no retroflexes</text>
<text x="240" y="414" text-anchor="middle" class="Ls">Mountain altitude shaped both: minimal articulatory energy</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 56b ALT  ·  TIBETAN / NEPALI  ·  PHONOLOGY</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
