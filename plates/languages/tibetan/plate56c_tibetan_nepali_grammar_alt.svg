<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">TIBETAN</text>
<text x="240" y="40" text-anchor="middle" class="S">GRAMMAR &amp; STRUCTURE</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">TIBETAN WORD ORDER: SOV</text>
<text x="240" y="68" text-anchor="middle" class="L">Strictly verb-final: S + O + V</text>
<text x="240" y="79" text-anchor="middle" class="L">nga dpe-cha klog-pa-yin "I book read-do" = "I read a book"</text>
<text x="240" y="90" text-anchor="middle" class="L">Postpositions: la (to/at) • nas (from/since) • gi (gen.)</text>
<line x1="20" y1="98" x2="460" y2="98" stroke="#555" stroke-width="0.5"/>
<text x="240" y="106" text-anchor="middle" class="H">TIBETAN CASE SYSTEM (7 CASES)</text>
<text x="240" y="117" text-anchor="middle" class="L">Agentive (ergative marker): =gyis marks agent of transitive verb</text>
<text x="240" y="128" text-anchor="middle" class="L">Absolutive: unmarked; patient of transitive and subject of intransitive</text>
<text x="240" y="139" text-anchor="middle" class="L">Genitive • Dative • Ablative • Locative • Associative</text>
<text x="240" y="150" text-anchor="middle" class="L">Tibetan is ergative-absolutive! (uncommon alignment)</text>
<line x1="20" y1="158" x2="460" y2="158" stroke="#555" stroke-width="0.5"/>
<text x="240" y="166" text-anchor="middle" class="H">EVIDENTIALITY IN TIBETAN</text>
<text x="240" y="177" text-anchor="middle" class="L">Verbs mark how speaker knows the information:</text>
<text x="240" y="188" text-anchor="middle" class="L">Direct evidence: -song (I witnessed it)</text>
<text x="240" y="199" text-anchor="middle" class="L">Reported: -zer (someone told me)</text>
<text x="240" y="210" text-anchor="middle" class="Ls">Inference: -yod-pa-red (I deduce from evidence)</text>
<line x1="20" y1="218" x2="460" y2="218" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="225" width="460" height="13" fill="#111"/>
<text x="240" y="234.5" text-anchor="middle" class="Hb">NEPALI GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="250" text-anchor="middle" class="H">NEPALI WORD ORDER: SOV</text>
<text x="240" y="261" text-anchor="middle" class="L">Same SOV order as Tibetan: Subject + Object + Verb</text>
<text x="240" y="272" text-anchor="middle" class="L">Ma kitaab pardhchu. "I book read." = "I read a book."</text>
<text x="240" y="283" text-anchor="middle" class="L">Postpositions: maa (in) • le (ergative) • laai (dative) • bata (from)</text>
<line x1="20" y1="291" x2="460" y2="291" stroke="#555" stroke-width="0.5"/>
<text x="240" y="299" text-anchor="middle" class="H">NEPALI ERGATIVITY</text>
<text x="240" y="310" text-anchor="middle" class="L">Nepali is ALSO split ergative (like Tibetan)!</text>
<text x="240" y="321" text-anchor="middle" class="L">Past transitive: agent takes -le; verb agrees with object</text>
<text x="240" y="332" text-anchor="middle" class="Ls">Usle kitaab paryo. "He-ERG book read-3SG." (agent takes -le)</text>
<line x1="20" y1="340" x2="460" y2="340" stroke="#555" stroke-width="0.5"/>
<text x="240" y="348" text-anchor="middle" class="H">NEPALI VERB SYSTEM</text>
<text x="240" y="359" text-anchor="middle" class="L">Verbs agree with subject and object in person and number</text>
<text x="240" y="370" text-anchor="middle" class="L">Rich honorific system: three politeness levels in verb forms</text>
<text x="240" y="381" text-anchor="middle" class="Ls">Tapai (polite) / timi (familiar) / ta (intimate)</text>
<line x1="20" y1="389" x2="460" y2="389" stroke="#555" stroke-width="0.5"/>
<text x="240" y="397" text-anchor="middle" class="H">HIMALAYAN GRAMMATICAL PARALLELS</text>
<text x="240" y="408" text-anchor="middle" class="L">Both: SOV word order  •  postpositions  •  split ergativity</text>
<text x="240" y="419" text-anchor="middle" class="L">Both: honorific systems (social register in grammar)</text>
<text x="240" y="430" text-anchor="middle" class="Ls">Tibetan: evidentiality system  •  Nepali: simpler tense-aspect</text>
<text x="240" y="441" text-anchor="middle" class="Ls">Tibetan: ergative-absolutive  •  Nepali: split ergativity (simpler)</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 56c ALT  ·  TIBETAN / NEPALI  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
