<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">THAI</text>
<text x="240" y="40" text-anchor="middle" class="S">TONAL PHONOLOGY</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">FIVE TONES OF THAI</text>
<text x="240" y="68" text-anchor="middle" class="L">Mid (level): māa "come" (no mark)</text>
<text x="240" y="79" text-anchor="middle" class="L">Low (falling): màa "horse" (่ mark)</text>
<text x="240" y="90" text-anchor="middle" class="L">Falling: mâa "dog" (้ mark)</text>
<text x="240" y="101" text-anchor="middle" class="L">High (rising): máa "value" (high class consonant)</text>
<text x="240" y="112" text-anchor="middle" class="L">Rising: mǍa "not" (๋ mark)</text>
<text x="240" y="123" text-anchor="middle" class="Ls">Same syllable: 5 different meanings based on tone alone</text>
<line x1="20" y1="131" x2="460" y2="131" stroke="#555" stroke-width="0.5"/>
<text x="240" y="139" text-anchor="middle" class="H">CONSONANT SYSTEM</text>
<text x="240" y="150" text-anchor="middle" class="L">Stops: p ph b • t th d • k kh • glottal ʔ</text>
<text x="240" y="161" text-anchor="middle" class="L">Three-way contrast: plain / aspirated / voiced (for some)</text>
<text x="240" y="172" text-anchor="middle" class="L">Final position: only unreleased stops + nasals + /w j/</text>
<text x="240" y="183" text-anchor="middle" class="Ls">No final fricatives or affricates (unlike English)</text>
<line x1="20" y1="191" x2="460" y2="191" stroke="#555" stroke-width="0.5"/>
<text x="240" y="199" text-anchor="middle" class="H">VOWEL SYSTEM</text>
<text x="240" y="210" text-anchor="middle" class="L">9 short + 9 long + diphthongs: 21 total vowel contrasts</text>
<text x="240" y="221" text-anchor="middle" class="L">Central vowel /ɨ/ (no English equivalent)</text>
<text x="240" y="232" text-anchor="middle" class="Ls">Vowel length is phonemic: /māa/ vs /ma/ different words</text>
<line x1="20" y1="240" x2="460" y2="240" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="247" width="460" height="13" fill="#111"/>
<text x="240" y="256.5" text-anchor="middle" class="Hb">KAREN PHONOLOGY  ·  SECONDARY LANGUAGE</text>
<text x="240" y="272" text-anchor="middle" class="H">S'GAW KAREN TONES</text>
<text x="240" y="283" text-anchor="middle" class="L">S'gaw Karen: 6 tones (more than Thai!)</text>
<text x="240" y="294" text-anchor="middle" class="L">Tones interact with consonant class and vowel length</text>
<text x="240" y="305" text-anchor="middle" class="Ls">Karen tonal system similar to neighboring Tibeto-Burman languages</text>
<line x1="20" y1="313" x2="460" y2="313" stroke="#555" stroke-width="0.5"/>
<text x="240" y="321" text-anchor="middle" class="H">KAREN CONSONANT SYSTEM</text>
<text x="240" y="332" text-anchor="middle" class="L">Aspirated / unaspirated stop distinction (like Thai)</text>
<text x="240" y="343" text-anchor="middle" class="L">p ph • t th • k kh (parallel to Thai)</text>
<text x="240" y="354" text-anchor="middle" class="Ls">Uvular stop /q/ present in some Karen dialects</text>
<text x="240" y="365" text-anchor="middle" class="Ls">Rhotic /r/ absent (like Thai, unlike English)</text>
<line x1="20" y1="373" x2="460" y2="373" stroke="#555" stroke-width="0.5"/>
<text x="240" y="381" text-anchor="middle" class="H">SHARED SE ASIAN PHONOLOGICAL FEATURES</text>
<text x="240" y="392" text-anchor="middle" class="L">Both: tonal languages (Thai 5 tones, Karen 6 tones)</text>
<text x="240" y="403" text-anchor="middle" class="L">Both: aspirated vs. unaspirated stop contrast</text>
<text x="240" y="414" text-anchor="middle" class="L">Both: no consonant clusters at syllable onset</text>
<text x="240" y="425" text-anchor="middle" class="L">Both: monosyllabic roots (Mainland SE Asia areal feature)</text>
<text x="240" y="436" text-anchor="middle" class="Ls">Both: vowel length phonemically contrastive</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 39b ALT  ·  THAI / KAREN  ·  PHONOLOGY</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
