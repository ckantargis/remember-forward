<rect x="0" y="0" width="480" height="680" fill="white"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">PASHTO (پښتو) / SINDHI (سنڌي)</text>
<text x="240" y="44" text-anchor="middle" class="S">INDO-IRANIAN · GRAMMAR &amp; CORE VOCABULARY</text>
<line x1="20" y1="50" x2="460" y2="50" stroke="black" stroke-width="0.5"/>
<text x="240" y="60" text-anchor="middle" class="H">PLATE 55C ALT · GRAMMAR &amp; CORE VOCABULARY</text>
<line x1="20" y1="66" x2="460" y2="66" stroke="black" stroke-width="0.3"/>
<text x="240" y="77" text-anchor="middle" class="H">— PASHTO GRAMMAR —</text>
<text x="240" y="88" text-anchor="middle" class="Ls">SOV word order · split ergative (present: nominative; past transitive: ergative)</text>
<text x="240" y="99" text-anchor="middle" class="Ls">Two genders (masculine/feminine) · adjectives agree with nouns in gender and case</text>
<line x1="20" y1="105" x2="460" y2="105" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H">PASHTO CASE SYSTEM (4 CASES)</text>
<text x="100" y="126" text-anchor="middle" class="Lx">CASE</text>
<text x="240" y="126" text-anchor="middle" class="Lx">FUNCTION</text>
<text x="390" y="126" text-anchor="middle" class="Lx">EXAMPLE (soor = red, masc.)</text>
<line x1="20" y1="130" x2="460" y2="130" stroke="black" stroke-width="0.3"/>
<text x="100" y="139" text-anchor="middle" class="Ls">Nominative</text>
<text x="240" y="139" text-anchor="middle" class="Ls">Subject of present verb</text>
<text x="390" y="139" text-anchor="middle" class="Ls">soor (red)</text>
<text x="100" y="149" text-anchor="middle" class="Ls">Oblique</text>
<text x="240" y="149" text-anchor="middle" class="Ls">After postpositions + past agent</text>
<text x="390" y="149" text-anchor="middle" class="Ls">soori (red-OBL)</text>
<text x="100" y="159" text-anchor="middle" class="Ls">Vocative</text>
<text x="240" y="159" text-anchor="middle" class="Ls">Direct address</text>
<text x="390" y="159" text-anchor="middle" class="Ls">soora! (O red one!)</text>
<text x="100" y="169" text-anchor="middle" class="Ls">Feminine</text>
<text x="240" y="169" text-anchor="middle" class="Ls">Feminine agreement</text>
<text x="390" y="169" text-anchor="middle" class="Ls">soora (red, fem.)</text>
<line x1="20" y1="174" x2="460" y2="174" stroke="black" stroke-width="0.3"/>
<text x="240" y="184" text-anchor="middle" class="H">PASHTO CORE VOCABULARY</text>
<text x="100" y="195" text-anchor="middle" class="Lx">GLOSS</text>
<text x="240" y="195" text-anchor="middle" class="Lx">PASHTO</text>
<text x="390" y="195" text-anchor="middle" class="Lx">ROMANIZATION</text>
<line x1="20" y1="199" x2="460" y2="199" stroke="black" stroke-width="0.3"/>
<text x="100" y="208" text-anchor="middle" class="Ls">I</text>
<text x="240" y="208" text-anchor="middle" class="Ls">زه</text>
<text x="390" y="208" text-anchor="middle" class="Ls">za</text>
<text x="100" y="218" text-anchor="middle" class="Ls">you</text>
<text x="240" y="218" text-anchor="middle" class="Ls">ته</text>
<text x="390" y="218" text-anchor="middle" class="Ls">ta</text>
<text x="100" y="228" text-anchor="middle" class="Ls">water</text>
<text x="240" y="228" text-anchor="middle" class="Ls">اوبه</text>
<text x="390" y="228" text-anchor="middle" class="Ls">oba</text>
<text x="100" y="238" text-anchor="middle" class="Ls">eat</text>
<text x="240" y="238" text-anchor="middle" class="Ls">خورل</text>
<text x="390" y="238" text-anchor="middle" class="Ls">khorl</text>
<text x="100" y="248" text-anchor="middle" class="Ls">come</text>
<text x="240" y="248" text-anchor="middle" class="Ls">راتل</text>
<text x="390" y="248" text-anchor="middle" class="Ls">ratl</text>
<text x="100" y="258" text-anchor="middle" class="Ls">good</text>
<text x="240" y="258" text-anchor="middle" class="Ls">غور</text>
<text x="390" y="258" text-anchor="middle" class="Ls">ghor</text>
<line x1="20" y1="270" x2="460" y2="270" stroke="black" stroke-width="1.5"/>
<rect x="20" y="273" width="440" height="14" fill="black"/>
<text x="240" y="283" text-anchor="middle" class="Hb" fill="white">SINDHI (سنڌي) — GRAMMAR &amp; VOCABULARY</text>
<line x1="20" y1="287" x2="460" y2="287" stroke="black" stroke-width="0.3"/>
<text x="240" y="294" text-anchor="middle" class="H">— SINDHI GRAMMAR —</text>
<text x="240" y="305" text-anchor="middle" class="Ls">SOV word order · postpositions · 2 genders (masc/fem) · 3 cases</text>
<text x="240" y="316" text-anchor="middle" class="Ls">Verbs agree with subject in person, number, gender</text>
<line x1="20" y1="322" x2="460" y2="322" stroke="black" stroke-width="0.3"/>
<text x="240" y="332" text-anchor="middle" class="H">SINDHI CASE SYSTEM</text>
<text x="100" y="343" text-anchor="middle" class="Lx">CASE</text>
<text x="240" y="343" text-anchor="middle" class="Lx">USE</text>
<text x="390" y="343" text-anchor="middle" class="Lx">SUFFIX (MASC. SG.)</text>
<line x1="20" y1="347" x2="460" y2="347" stroke="black" stroke-width="0.3"/>
<text x="100" y="356" text-anchor="middle" class="Ls">Nominative</text>
<text x="240" y="356" text-anchor="middle" class="Ls">Subject (present)</text>
<text x="390" y="356" text-anchor="middle" class="Ls">(zero)</text>
<text x="100" y="366" text-anchor="middle" class="Ls">Oblique</text>
<text x="240" y="366" text-anchor="middle" class="Ls">After postpositions</text>
<text x="390" y="366" text-anchor="middle" class="Ls">-a</text>
<text x="100" y="376" text-anchor="middle" class="Ls">Vocative</text>
<text x="240" y="376" text-anchor="middle" class="Ls">Direct address</text>
<text x="390" y="376" text-anchor="middle" class="Ls">-a (same as oblique)</text>
<line x1="20" y1="381" x2="460" y2="381" stroke="black" stroke-width="0.3"/>
<text x="240" y="391" text-anchor="middle" class="H">SINDHI CORE VOCABULARY</text>
<text x="100" y="402" text-anchor="middle" class="Lx">GLOSS</text>
<text x="240" y="402" text-anchor="middle" class="Lx">SINDHI</text>
<text x="390" y="402" text-anchor="middle" class="Lx">PASHTO LINK?</text>
<line x1="20" y1="406" x2="460" y2="406" stroke="black" stroke-width="0.3"/>
<text x="100" y="415" text-anchor="middle" class="Ls">I</text>
<text x="240" y="415" text-anchor="middle" class="Ls">ماۍ / ھان (maa / hhaan)</text>
<text x="390" y="415" text-anchor="middle" class="Ls">cf. Pashto za</text>
<text x="100" y="425" text-anchor="middle" class="Ls">you</text>
<text x="240" y="425" text-anchor="middle" class="Ls">توھیں (tuhhin)</text>
<text x="390" y="425" text-anchor="middle" class="Ls">cf. Pashto ta</text>
<text x="100" y="435" text-anchor="middle" class="Ls">water</text>
<text x="240" y="435" text-anchor="middle" class="Ls">پاڤ (paun)</text>
<text x="390" y="435" text-anchor="middle" class="Ls">cf. Pashto oba (differ)</text>
<text x="100" y="445" text-anchor="middle" class="Ls">eat</text>
<text x="240" y="445" text-anchor="middle" class="Ls">کھائں (khaan)</text>
<text x="390" y="445" text-anchor="middle" class="Ls">both from PIIran *khaw-</text>
<text x="100" y="455" text-anchor="middle" class="Ls">good</text>
<text x="240" y="455" text-anchor="middle" class="Ls">سرھو (sarhu)</text>
<text x="390" y="455" text-anchor="middle" class="Ls">cf. Pashto ghor (differ)</text>
<line x1="20" y1="460" x2="460" y2="460" stroke="black" stroke-width="0.3"/>
<text x="240" y="470" text-anchor="middle" class="H">SURVIVAL PHRASES</text>
<text x="240" y="481" text-anchor="middle" class="Ls">Pa khair ose! = Farewell! (Pashto) · Khuda hafiz = God protect you (both)</text>
<text x="240" y="492" text-anchor="middle" class="Ls">Cha hal ahyan? = How are you? (Sindhi)</text>
<text x="240" y="503" text-anchor="middle" class="Ls">Pani kite ahe? = Where is the water? (Sindhi: pani=water kite=where ahe=is)</text>
<text x="240" y="514" text-anchor="middle" class="Ls">Ob charta dey? = Where is water? (Pashto: ob=water charta=where dey=is)</text>
<line x1="20" y1="520" x2="460" y2="520" stroke="black" stroke-width="0.3"/>
<text x="240" y="530" text-anchor="middle" class="H">GRAMMATICAL PARALLEL: POSTPOSITIONS</text>
<text x="240" y="541" text-anchor="middle" class="Ls">Both: SOV · postpositions follow noun · verb final in clause</text>
<text x="240" y="552" text-anchor="middle" class="Ls">Pashto: pa kor ke = in-house-LOC: "in the house" (pa...ke = locative frame)</text>
<text x="240" y="563" text-anchor="middle" class="Ls">Sindhi: ghar me = house in: "in the house" (me = locative postposition)</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.5"/>
<text x="240" y="620" text-anchor="middle" class="M">PLATE 55C ALT · PASHTO / SINDHI · GRAMMAR &amp;amp; CORE VOCABULARY · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.5"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
