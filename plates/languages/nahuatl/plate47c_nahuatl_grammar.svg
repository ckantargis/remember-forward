<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<defs><style>
text{font-family:Georgia,serif;}
.T{font-size:12px;font-weight:bold;letter-spacing:2px;}
.S{font-size:7px;letter-spacing:1.5px;}
.H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >NAHUATL</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — SOV, POLYSYNTHETIC —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Nahuatl is SOV and polysynthetic: entire sentences can be single words.</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >Nicmictia. I kill it. (ni=I c=it mictia=kill/make-die) One verb = full sentence.</text>
<text x="240" y="102" text-anchor="middle" class="Ls" >Nimitztlazohtla. I love you. (ni=I mitz=you tlazohtle=love)</text>
<line x1="20" y1="110" x2="460" y2="110" stroke="black" stroke-width="0.3"/>
<text x="240" y="119" text-anchor="middle" class="H" >— SUBJECT-OBJECT PREFIXES ON VERBS —</text>
<text x="240" y="129" text-anchor="middle" class="Ls" >Verb template: Subject prefix + Object prefix + Root + Tense/Aspect suffix.</text>
<text x="150" y="139" text-anchor="middle" class="Ls" >Subject prefixes:</text>
<text x="350" y="139" text-anchor="middle" class="Ls" >Object prefixes:</text>
<text x="100" y="149" text-anchor="middle" class="Lx" >ni- I (1sg)</text>
<text x="100" y="159" text-anchor="middle" class="Lx" >ti- you (2sg) / we (1pl)</text>
<text x="100" y="169" text-anchor="middle" class="Lx" >Ø- he/she/it (3sg)</text>
<text x="100" y="179" text-anchor="middle" class="Lx" >an- you all (2pl)</text>
<text x="100" y="189" text-anchor="middle" class="Lx" >Ø- they (3pl)</text>
<text x="330" y="149" text-anchor="middle" class="Lx" >nech- me</text>
<text x="330" y="159" text-anchor="middle" class="Lx" >mitz- you</text>
<text x="330" y="169" text-anchor="middle" class="Lx" >c-/qu- him/her/it</text>
<text x="330" y="179" text-anchor="middle" class="Lx" >tech- us</text>
<text x="330" y="189" text-anchor="middle" class="Lx" >amech- you all</text>
<text x="330" y="199" text-anchor="middle" class="Lx" >kin- them</text>
<line x1="20" y1="205" x2="460" y2="205" stroke="black" stroke-width="0.3"/>
<text x="240" y="214" text-anchor="middle" class="H" >— VERB MORPHOLOGY —</text>
<text x="130" y="224" text-anchor="middle" class="L" >ni-tla-cua</text>
<text x="330" y="224" text-anchor="middle" class="Ls" >I eat something (general)</text>
<text x="130" y="234" text-anchor="middle" class="L" >ni-tamalli-cua</text>
<text x="330" y="234" text-anchor="middle" class="Ls" >I eat tamales</text>
<text x="130" y="244" text-anchor="middle" class="L" >ni-tla-cua-ya</text>
<text x="330" y="244" text-anchor="middle" class="Ls" >I was eating (imperfect)</text>
<text x="130" y="254" text-anchor="middle" class="L" >o-ni-tla-cua</text>
<text x="330" y="254" text-anchor="middle" class="Ls" >I ate (past)</text>
<text x="130" y="264" text-anchor="middle" class="L" >ni-tla-cua-z</text>
<text x="330" y="264" text-anchor="middle" class="Ls" >I will eat</text>
<text x="130" y="274" text-anchor="middle" class="L" >ma ni-tla-cua</text>
<text x="330" y="274" text-anchor="middle" class="Ls" >let me eat (optative)</text>
<text x="130" y="284" text-anchor="middle" class="L" >aāmo ni-tla-cua</text>
<text x="330" y="284" text-anchor="middle" class="Ls" >I don't eat (neg: aāmo)</text>
<line x1="20" y1="310" x2="460" y2="310" stroke="black" stroke-width="0.3"/>
<text x="240" y="319" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
<text x="50" y="329" text-anchor="middle" class="Ls" >nāhuatl</text>
<text x="175" y="329" text-anchor="middle" class="Lx" >Nahuatl language (clear speech)</text>
<text x="50" y="339" text-anchor="middle" class="Ls" >tlazohcamati</text>
<text x="175" y="339" text-anchor="middle" class="Lx" >thank you</text>
<text x="50" y="349" text-anchor="middle" class="Ls" >quemah</text>
<text x="175" y="349" text-anchor="middle" class="Lx" >yes</text>
<text x="50" y="359" text-anchor="middle" class="Ls" >aāmo</text>
<text x="175" y="359" text-anchor="middle" class="Lx" >no/not</text>
<text x="50" y="369" text-anchor="middle" class="Ls" >mā timoyolcuiti</text>
<text x="175" y="369" text-anchor="middle" class="Lx" >excuse me</text>
<text x="50" y="379" text-anchor="middle" class="Ls" >quen timoyectia?</text>
<text x="175" y="379" text-anchor="middle" class="Lx" >how are you?</text>
<text x="50" y="389" text-anchor="middle" class="Ls" >cualli nimoyectia</text>
<text x="175" y="389" text-anchor="middle" class="Lx" >I am fine</text>
<text x="50" y="399" text-anchor="middle" class="Ls" >nimitztlazohtla</text>
<text x="175" y="399" text-anchor="middle" class="Lx" >I love you</text>
<text x="50" y="409" text-anchor="middle" class="Ls" >atl</text>
<text x="175" y="409" text-anchor="middle" class="Lx" >water</text>
<text x="50" y="419" text-anchor="middle" class="Ls" >tletl</text>
<text x="175" y="419" text-anchor="middle" class="Lx" >fire</text>
<text x="50" y="429" text-anchor="middle" class="Ls" >tlalli</text>
<text x="175" y="429" text-anchor="middle" class="Lx" >earth</text>
<text x="50" y="439" text-anchor="middle" class="Ls" >tlacatl</text>
<text x="175" y="439" text-anchor="middle" class="Lx" >person</text>
<text x="285" y="329" text-anchor="middle" class="Ls" >cahuitl</text>
<text x="410" y="329" text-anchor="middle" class="Lx" >time</text>
<text x="285" y="339" text-anchor="middle" class="Ls" >metztli</text>
<text x="410" y="339" text-anchor="middle" class="Lx" >moon</text>
<text x="285" y="349" text-anchor="middle" class="Ls" >citlalin</text>
<text x="410" y="349" text-anchor="middle" class="Lx" >star</text>
<text x="285" y="359" text-anchor="middle" class="Ls" >yollo-tl</text>
<text x="410" y="359" text-anchor="middle" class="Lx" >heart</text>
<text x="285" y="369" text-anchor="middle" class="Ls" >tlazohtlaliztli</text>
<text x="410" y="369" text-anchor="middle" class="Lx" >love</text>
<text x="285" y="379" text-anchor="middle" class="Ls" >ixtlamachiliztli</text>
<text x="410" y="379" text-anchor="middle" class="Lx" >freedom</text>
<text x="285" y="389" text-anchor="middle" class="Ls" >ilnamiqui</text>
<text x="410" y="389" text-anchor="middle" class="Lx" >to remember</text>
<text x="285" y="399" text-anchor="middle" class="Ls" >moztla</text>
<text x="410" y="399" text-anchor="middle" class="Lx" >tomorrow / future</text>
<text x="285" y="409" text-anchor="middle" class="Ls" >cemanahuac</text>
<text x="410" y="409" text-anchor="middle" class="Lx" >the world</text>
<text x="285" y="419" text-anchor="middle" class="Ls" >nemiliztli</text>
<text x="410" y="419" text-anchor="middle" class="Lx" >life</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 47C — NAHUATL: GRAMMAR — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
