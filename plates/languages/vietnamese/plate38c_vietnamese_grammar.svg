<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >VIETNAMESE</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — SVO, ISOLATING —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Vietnamese is an isolating (analytic) language: no inflection, no case, no gender.</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >Meaning conveyed by word order, particles, and context.</text>
<text x="240" y="102" text-anchor="middle" class="Ls" >Tôi ăn cơm. I eat rice. (Tôi=I ăn=eat cơm=cooked-rice)</text>
<line x1="20" y1="110" x2="460" y2="110" stroke="black" stroke-width="0.3"/>
<text x="240" y="119" text-anchor="middle" class="H" >— PRONOUNS — SOCIAL REGISTER SYSTEM —</text>
<text x="240" y="129" text-anchor="middle" class="Ls" >Vietnamese pronouns encode social relationship, age, and respect level.</text>
<text x="80" y="139" text-anchor="middle" class="Lx" >tôi = I (neutral/formal)</text>
<text x="280" y="139" text-anchor="middle" class="Lx" >mình = I/self (intimate)</text>
<text x="80" y="149" text-anchor="middle" class="Lx" >anh = I/you (older male to younger)</text>
<text x="280" y="149" text-anchor="middle" class="Lx" >chị = I/you (older female)</text>
<text x="80" y="159" text-anchor="middle" class="Lx" >em = I/you (younger to older)</text>
<text x="280" y="159" text-anchor="middle" class="Lx" >bạn = you (peer/friend)</text>
<text x="80" y="169" text-anchor="middle" class="Lx" >ông = he/you (elderly male)</text>
<text x="280" y="169" text-anchor="middle" class="Lx" >bà = she/you (elderly female)</text>
<text x="80" y="179" text-anchor="middle" class="Lx" >nó/hắn = he/she (3rd sg, informal)</text>
<text x="280" y="179" text-anchor="middle" class="Lx" >họ = they (3rd pl)</text>
<text x="80" y="189" text-anchor="middle" class="Lx" >chúng tôi = we (excl)</text>
<text x="280" y="189" text-anchor="middle" class="Lx" >chúng ta = we (incl)</text>
<line x1="20" y1="210" x2="460" y2="210" stroke="black" stroke-width="0.3"/>
<text x="240" y="219" text-anchor="middle" class="H" >— VERB SYSTEM — PARTICLES AND ASPECT —</text>
<text x="240" y="229" text-anchor="middle" class="Ls" >Verbs are uninflected. Tense/aspect marked by pre-verbal particles:</text>
<text x="80" y="239" text-anchor="middle" class="Lx" >đã = past (completed)</text>
<text x="280" y="239" text-anchor="middle" class="Lx" >sẽ = future</text>
<text x="80" y="249" text-anchor="middle" class="Lx" >đang = progressive/ongoing</text>
<text x="280" y="249" text-anchor="middle" class="Lx" >sắp = imminent future</text>
<text x="80" y="259" text-anchor="middle" class="Lx" >vừa = just completed</text>
<text x="280" y="259" text-anchor="middle" class="Lx" >được = ability/completion</text>
<text x="80" y="269" text-anchor="middle" class="Lx" >bị = passive (negative)</text>
<text x="280" y="269" text-anchor="middle" class="Lx" >được = passive (positive)</text>
<line x1="20" y1="305" x2="460" y2="305" stroke="black" stroke-width="0.3"/>
<text x="240" y="314" text-anchor="middle" class="H" >— CLASSIFIERS —</text>
<text x="240" y="324" text-anchor="middle" class="Ls" >Classifiers required between numeral and noun: một cái bàn (one CL.thing table).</text>
<text x="80" y="334" text-anchor="middle" class="Lx" >cái: inanimate things</text>
<text x="280" y="334" text-anchor="middle" class="Lx" >con: animals, rivers, roads</text>
<text x="80" y="344" text-anchor="middle" class="Lx" >cá: fish, some body parts</text>
<text x="280" y="344" text-anchor="middle" class="Lx" >cây: trees, sticks, pens</text>
<text x="80" y="354" text-anchor="middle" class="Lx" >bài: papers, lessons, songs</text>
<text x="280" y="354" text-anchor="middle" class="Lx" >quả: round things, fruits</text>
<text x="80" y="364" text-anchor="middle" class="Lx" >người: people</text>
<text x="280" y="364" text-anchor="middle" class="Lx" >cuốn: books, rolls</text>
<line x1="20" y1="400" x2="460" y2="400" stroke="black" stroke-width="0.3"/>
<text x="240" y="409" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
<text x="50" y="419" text-anchor="middle" class="Ls" >xin chào</text>
<text x="175" y="419" text-anchor="middle" class="Lx" >hello</text>
<text x="50" y="429" text-anchor="middle" class="Ls" >cảm ơn</text>
<text x="175" y="429" text-anchor="middle" class="Lx" >thank you</text>
<text x="50" y="439" text-anchor="middle" class="Ls" >có</text>
<text x="175" y="439" text-anchor="middle" class="Lx" >yes/have</text>
<text x="50" y="449" text-anchor="middle" class="Ls" >không</text>
<text x="175" y="449" text-anchor="middle" class="Lx" >no/not/zero</text>
<text x="50" y="459" text-anchor="middle" class="Ls" >xin lỗi</text>
<text x="175" y="459" text-anchor="middle" class="Lx" >sorry/excuse me</text>
<text x="50" y="469" text-anchor="middle" class="Ls" >bạn khỏe không?</text>
<text x="175" y="469" text-anchor="middle" class="Lx" >how are you?</text>
<text x="50" y="479" text-anchor="middle" class="Ls" >tôi khỏe</text>
<text x="175" y="479" text-anchor="middle" class="Lx" >I am well</text>
<text x="50" y="489" text-anchor="middle" class="Ls" >tôi yêu bạn</text>
<text x="175" y="489" text-anchor="middle" class="Lx" >I love you</text>
<text x="50" y="499" text-anchor="middle" class="Ls" >nước</text>
<text x="175" y="499" text-anchor="middle" class="Lx" >water</text>
<text x="50" y="509" text-anchor="middle" class="Ls" >lửa</text>
<text x="175" y="509" text-anchor="middle" class="Lx" >fire</text>
<text x="50" y="519" text-anchor="middle" class="Ls" >đất</text>
<text x="175" y="519" text-anchor="middle" class="Lx" >earth/land</text>
<text x="285" y="419" text-anchor="middle" class="Ls" >người</text>
<text x="410" y="419" text-anchor="middle" class="Lx" >person</text>
<text x="285" y="429" text-anchor="middle" class="Ls" >thời gian</text>
<text x="410" y="429" text-anchor="middle" class="Lx" >time</text>
<text x="285" y="439" text-anchor="middle" class="Ls" >mặt trăng</text>
<text x="410" y="439" text-anchor="middle" class="Lx" >moon</text>
<text x="285" y="449" text-anchor="middle" class="Ls" >ngôi sao</text>
<text x="410" y="449" text-anchor="middle" class="Lx" >star</text>
<text x="285" y="459" text-anchor="middle" class="Ls" >trái tim</text>
<text x="410" y="459" text-anchor="middle" class="Lx" >heart</text>
<text x="285" y="469" text-anchor="middle" class="Ls" >tình yêu</text>
<text x="410" y="469" text-anchor="middle" class="Lx" >love</text>
<text x="285" y="479" text-anchor="middle" class="Ls" >tự do</text>
<text x="410" y="479" text-anchor="middle" class="Lx" >freedom</text>
<text x="285" y="489" text-anchor="middle" class="Ls" >ký ức</text>
<text x="410" y="489" text-anchor="middle" class="Lx" >memory</text>
<text x="285" y="499" text-anchor="middle" class="Ls" >tương lai</text>
<text x="410" y="499" text-anchor="middle" class="Lx" >future</text>
<text x="285" y="509" text-anchor="middle" class="Ls" >thế giới</text>
<text x="410" y="509" text-anchor="middle" class="Lx" >world</text>
<text x="285" y="519" text-anchor="middle" class="Ls" >cuộc sống</text>
<text x="410" y="519" text-anchor="middle" class="Lx" >life</text>
