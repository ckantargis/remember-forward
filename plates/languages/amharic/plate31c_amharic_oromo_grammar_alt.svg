<text x="240" y="63" text-anchor="middle" class="H">— AMHARIC — SOV · VERB-FINAL · SEMITIC ROOTS —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Amharic is SOV (Subject-Object-Verb). Verb always last. Extensive prefix/suffix system.</text>
<text x="240" y="82" text-anchor="middle" class="Lx">Semitic 3-consonant root: s-b-r = "break" → səbbərə (he broke) / asəbbərə (he broke it, causative).</text>
<line x1="20" y1="90" x2="460" y2="90" stroke="black" stroke-width="0.3"/>
