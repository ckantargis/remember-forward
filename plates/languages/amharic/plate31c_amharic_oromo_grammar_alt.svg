<text x="240" y="337" text-anchor="middle" class="Hb" fill="white">OROMO (AFAAN OROMOO) · GRAMMAR · VOCABULARY</text>
<line x1="20" y1="341" x2="460" y2="341" stroke="black" stroke-width="0.3"/>
<text x="240" y="356" text-anchor="middle" class="Ls">Oromo is also SOV — verb-final. Both Amharic and Oromo share this word order despite being unrelated.</text>
<text x="240" y="365" text-anchor="middle" class="Lx">Example: Ani nyaata nyaadha = I food eat ("I eat food"). Verb nyaadha always comes last.</text>
<text x="240" y="374" text-anchor="middle" class="Lx">Agglutinative: suffixes stack onto verb root. Tense: -a (present), -e (past), -u (imperative).</text>
<line x1="20" y1="381" x2="460" y2="381" stroke="black" stroke-width="0.3"/>
