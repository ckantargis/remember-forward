<line x1="20" y1="226" x2="460" y2="226" stroke="black" stroke-width="0.3"/>
<text x="240" y="235" text-anchor="middle" class="H" >— DEFINITE ARTICLE AND CASE —</text>
<text x="240" y="246" text-anchor="middle" class="Ls" >Definite article: suffix -u (M) or -wa (F) added to noun: bət (house) → bət-u (the house).</text>
<text x="240" y="255" text-anchor="middle" class="Ls" >Accusative (object): suffix -ən: bət-ən (the house, as object).</text>
<text x="240" y="264" text-anchor="middle" class="Ls" >Genitive: yə- prefix: yə-bət bər (the door of the house).</text>
<line x1="20" y1="272" x2="460" y2="272" stroke="black" stroke-width="0.3"/>
<text x="240" y="281" text-anchor="middle" class="H" >— CORE VOCABULARY — 25 WORDS —</text>
