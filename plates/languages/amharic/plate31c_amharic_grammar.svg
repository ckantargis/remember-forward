<text x="240" y="32" text-anchor="middle" class="T" >AMHARIC — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 31C OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— SOV — VERB-FINAL — SEMITIC ROOTS —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Amharic is SOV (verb-final), like most Semitic languages. Extensive use of prefixes and suffixes.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >Semitic root system: 3-consonant roots carry core meaning; vowel patterns and affixes create related words.</text>
<text x="240" y="98" text-anchor="middle" class="Ls" >Root s-b-r = "break": səbbərə (he broke), təsəbbərə (it broke), asəbbərə (he broke it [causative]).</text>
<line x1="20" y1="106" x2="460" y2="106" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H" >— VERB CONJUGATION — nəggərə "spoke / said" —</text>
<text x="70" y="125" text-anchor="middle" class="Lx" >Form</text>
<text x="175" y="125" text-anchor="middle" class="Lx" >Person</text>
<text x="300" y="125" text-anchor="middle" class="Lx" >Gloss</text>
<text x="70" y="134" text-anchor="middle" class="Ls" >(̀nəggər-ku)</text>
<text x="175" y="134" text-anchor="middle" class="Lx" >1sg</text>
<text x="300" y="134" text-anchor="middle" class="Lx" >I spoke</text>
<text x="70" y="145" text-anchor="middle" class="Ls" >(̀nəggər-k)</text>
