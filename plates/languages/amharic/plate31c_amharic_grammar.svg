<line x1="20" y1="426" x2="460" y2="426" stroke="black" stroke-width="0.3"/>
<text x="240" y="435" text-anchor="middle" class="H" >— COMPOUND VERBS AND AUXILIARY —</text>
<text x="240" y="446" text-anchor="middle" class="Ls" >Amharic uses "light verb" constructions: noun + aələ (said/did) for complex meanings.</text>
<text x="240" y="455" text-anchor="middle" class="Ls" >təsəfa (hope) + aələ = "hoped" · fiqər (love) + aələ = "loved"</text>
