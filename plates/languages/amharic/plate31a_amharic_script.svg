<text x="240" y="257" text-anchor="middle" class="H" >— THE 7 VOWEL ORDERS —</text>
<text x="100" y="267" text-anchor="middle" class="Lx" >1st / ገዓይ</text>
<text x="200" y="267" text-anchor="middle" class="Lx" >ə</text>
<text x="350" y="267" text-anchor="middle" class="Lx" >like "about" — base form</text>
<text x="100" y="278" text-anchor="middle" class="Lx" >2nd / ካዓይ</text>
<text x="200" y="278" text-anchor="middle" class="Lx" >u</text>
<text x="350" y="278" text-anchor="middle" class="Lx" >like "boot"</text>
<text x="100" y="289" text-anchor="middle" class="Lx" >3rd / ሳልስዓይ</text>
<text x="200" y="289" text-anchor="middle" class="Lx" >i</text>
<text x="350" y="289" text-anchor="middle" class="Lx" >like "see"</text>
<text x="100" y="300" text-anchor="middle" class="Lx" >4th / ራዓይ</text>
<text x="200" y="300" text-anchor="middle" class="Lx" >a</text>
<text x="350" y="300" text-anchor="middle" class="Lx" >like "father"</text>
<text x="100" y="311" text-anchor="middle" class="Lx" >5th / ሓምስዓይ</text>
<text x="200" y="311" text-anchor="middle" class="Lx" >e</text>
<text x="350" y="311" text-anchor="middle" class="Lx" >like "bed"</text>
<text x="100" y="322" text-anchor="middle" class="Lx" >6th / ሳድስዓይ</text>
<text x="200" y="322" text-anchor="middle" class="Lx" >(none)</text>
<text x="350" y="322" text-anchor="middle" class="Lx" >consonant only / short ə</text>
<text x="100" y="333" text-anchor="middle" class="Lx" >7th / ሰዓይ</text>
<text x="200" y="333" text-anchor="middle" class="Lx" >o</text>
<text x="350" y="333" text-anchor="middle" class="Lx" >like "go"</text>
<line x1="20" y1="346" x2="460" y2="346" stroke="black" stroke-width="0.3"/>
<text x="240" y="355" text-anchor="middle" class="H" >— SCRIPT HISTORY —</text>
<text x="240" y="366" text-anchor="middle" class="Ls" >Ethiopic script descended from South Arabian (Sabaean) script via ancient Ge'ez (~4th c. CE).</text>
<text x="240" y="375" text-anchor="middle" class="Ls" >Ge'ez (Classical Ethiopic): liturgical language of the Ethiopian Orthodox Church; used in manuscripts.</text>
<text x="240" y="384" text-anchor="middle" class="Ls" >Amharic adopted Fidel from Ge'ez ~13th–14th c., adding new letters for Amharic-specific sounds.</text>
<text x="240" y="393" text-anchor="middle" class="Ls" >Ethiopia was never fully colonised — Ethiopic script was never replaced by Latin.</text>
<text x="240" y="402" text-anchor="middle" class="Ls" >Modern Amharic: official language of Ethiopia (~35M native speakers, ~100M L1+L2).</text>
<text x="240" y="411" text-anchor="middle" class="Ls" >Fidel is also used for Tigrinya, Ge'ez, and Tigre languages.</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M" >SERIES 31 · AMHARIC · PLATE A · SCRIPT · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
