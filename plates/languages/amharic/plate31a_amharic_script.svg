<text x="240" y="32" text-anchor="middle" class="T" >AMHARIC — SCRIPT · WRITING SYSTEM</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 31A OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— ETHIOPIC SCRIPT (FIDEL) — AN ABUGIDA —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Amharic is written in the Ethiopic script (Fidel ፈደል), an abugida: each symbol = consonant + vowel.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >Each consonant has 7 forms (orders), one for each vowel. Base form includes inherent /ə/ vowel.</text>
<text x="240" y="98" text-anchor="middle" class="Ls" >~234 syllable signs in full Amharic fidel. Left to right, top to bottom.</text>
<line x1="20" y1="106" x2="460" y2="106" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H" >— SAMPLE FIDEL — CONSONANT ha IN ALL 7 VOWEL ORDERS —</text>
<text x="240" y="126" text-anchor="middle" class="Lx" >Each row shows one consonant across all 7 vowels: ə u i a e (none) o</text>
