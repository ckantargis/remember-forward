<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SHONA</text>
<text x="240" y="40" text-anchor="middle" class="S">PHONOLOGY &amp; TONE</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SHONA TONE SYSTEM</text>
<text x="240" y="68" text-anchor="middle" class="L">Shona is a tonal language: High (H) and Low (L) tones</text>
<text x="240" y="79" text-anchor="middle" class="L">Tone distinguishes meaning: bveni "baboon" vs. bveni "watch"</text>
<text x="240" y="90" text-anchor="middle" class="Ls">Downstep: H tone after L is slightly lower than previous H</text>
<text x="240" y="101" text-anchor="middle" class="Ls">Tones not marked in standard orthography — context required</text>
<line x1="20" y1="109" x2="460" y2="109" stroke="#555" stroke-width="0.5"/>
<text x="240" y="117" text-anchor="middle" class="H">CONSONANT CLUSTERS</text>
<text x="240" y="128" text-anchor="middle" class="L">Shona allows complex onsets rare in other languages:</text>
<text x="240" y="139" text-anchor="middle" class="L">sv- • zv- • bv- • mb- • nd- • ng- • nzv-</text>
<text x="240" y="150" text-anchor="middle" class="L">Syllabic nasals: m̩ n̩ function as syllable peaks</text>
<line x1="20" y1="158" x2="460" y2="158" stroke="#555" stroke-width="0.5"/>
<text x="240" y="166" text-anchor="middle" class="H">VOWEL SYSTEM</text>
<text x="240" y="177" text-anchor="middle" class="L">Five vowels: a e i o u (pure, no diphthongs in standard)</text>
<text x="240" y="188" text-anchor="middle" class="Ls">Vowel length is not phonemic in standard Shona</text>
<text x="240" y="199" text-anchor="middle" class="Ls">Open syllable preference: most syllables end in vowel</text>
<line x1="20" y1="207" x2="460" y2="207" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="214" width="460" height="13" fill="#111"/>
<text x="240" y="223.5" text-anchor="middle" class="Hb">NYANJA PHONOLOGY  ·  SECONDARY LANGUAGE</text>
<text x="240" y="239" text-anchor="middle" class="H">NYANJA TONE SYSTEM</text>
<text x="240" y="250" text-anchor="middle" class="L">Nyanja also has lexical tone (High/Low distinction)</text>
<text x="240" y="261" text-anchor="middle" class="L">Tones grammatically significant: mark tense and focus</text>
<text x="240" y="272" text-anchor="middle" class="Ls">Tone affects verb tenses: H-stem vs. L-stem verbs</text>
<line x1="20" y1="280" x2="460" y2="280" stroke="#555" stroke-width="0.5"/>
<text x="240" y="288" text-anchor="middle" class="H">NYANJA CONSONANTS</text>
<text x="240" y="299" text-anchor="middle" class="L">Prenasalized stops: mb nd ng’ mj mv nzw (Bantu feature)</text>
<text x="240" y="310" text-anchor="middle" class="Ls">These count as SINGLE consonants (not clusters)</text>
<text x="240" y="321" text-anchor="middle" class="Ls">No labiodental fricative clusters (unlike Shona sv/zv/bv)</text>
<line x1="20" y1="329" x2="460" y2="329" stroke="#555" stroke-width="0.5"/>
<text x="240" y="337" text-anchor="middle" class="H">SHARED BANTU PHONOLOGICAL FEATURES</text>
<text x="240" y="348" text-anchor="middle" class="L">Both: 5 vowel system (a e i o u)</text>
<text x="240" y="359" text-anchor="middle" class="L">Both: lexical High/Low tone distinction</text>
<text x="240" y="370" text-anchor="middle" class="L">Both: open syllable preference (CV structure)</text>
<text x="240" y="381" text-anchor="middle" class="L">Both: prenasalized stops (mb nd ng)</text>
<text x="240" y="392" text-anchor="middle" class="L">Both: syllabic nasals as syllable peaks</text>
<line x1="20" y1="400" x2="460" y2="400" stroke="#555" stroke-width="0.5"/>
<text x="240" y="408" text-anchor="middle" class="H">KEY PHONOLOGICAL DIFFERENCES</text>
<text x="240" y="419" text-anchor="middle" class="Ls">Shona: labiodental clusters sv/zv/bv (unique in Bantu)</text>
<text x="240" y="430" text-anchor="middle" class="Ls">Nyanja: alveolar affricate /ʤ/ (ch sound) prominent</text>
<text x="240" y="441" text-anchor="middle" class="Ls">Shona: zh /ʒ/ phoneme  •  Nyanja: no /ʒ/ phoneme</text>
<text x="240" y="452" text-anchor="middle" class="Ls">Both: Proto-Bantu phonological system well-preserved</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 36b ALT  ·  SHONA / NYANJA  ·  PHONOLOGY</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
