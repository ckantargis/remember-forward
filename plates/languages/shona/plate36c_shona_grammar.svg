<text x="175" y="419" text-anchor="middle" class="Lx" >yes</text>
<text x="50" y="429" text-anchor="middle" class="Ls" >kwete</text>
<text x="175" y="429" text-anchor="middle" class="Lx" >no</text>
<text x="50" y="439" text-anchor="middle" class="Ls" >mwana</text>
<text x="175" y="439" text-anchor="middle" class="Lx" >child</text>
<text x="50" y="449" text-anchor="middle" class="Ls" >mai</text>
<text x="175" y="449" text-anchor="middle" class="Lx" >mother</text>
<text x="50" y="459" text-anchor="middle" class="Ls" >baba</text>
<text x="175" y="459" text-anchor="middle" class="Lx" >father</text>
<text x="50" y="469" text-anchor="middle" class="Ls" >imba</text>
<text x="175" y="469" text-anchor="middle" class="Lx" >house</text>
<text x="50" y="479" text-anchor="middle" class="Ls" >mvura</text>
<text x="175" y="479" text-anchor="middle" class="Lx" >water</text>
<text x="50" y="489" text-anchor="middle" class="Ls" >moto</text>
<text x="175" y="489" text-anchor="middle" class="Lx" >fire</text>
<text x="285" y="359" text-anchor="middle" class="Ls" >nyika</text>
<text x="410" y="359" text-anchor="middle" class="Lx" >country/earth</text>
<text x="285" y="369" text-anchor="middle" class="Ls" >munhu</text>
<text x="410" y="369" text-anchor="middle" class="Lx" >person</text>
<text x="285" y="379" text-anchor="middle" class="Ls" >nguva</text>
<text x="410" y="379" text-anchor="middle" class="Lx" >time</text>
<text x="285" y="389" text-anchor="middle" class="Ls" >mwedzi</text>
<text x="410" y="389" text-anchor="middle" class="Lx" >moon</text>
<text x="285" y="399" text-anchor="middle" class="Ls" >nyeredzi</text>
<text x="410" y="399" text-anchor="middle" class="Lx" >star</text>
<text x="285" y="409" text-anchor="middle" class="Ls" >moyo</text>
<text x="410" y="409" text-anchor="middle" class="Lx" >heart</text>
<text x="285" y="419" text-anchor="middle" class="Ls" >rudo</text>
<text x="410" y="419" text-anchor="middle" class="Lx" >love</text>
<text x="285" y="429" text-anchor="middle" class="Ls" >rusununguko</text>
<text x="410" y="429" text-anchor="middle" class="Lx" >freedom</text>
<text x="285" y="439" text-anchor="middle" class="Ls" >kuyeuka</text>
<text x="410" y="439" text-anchor="middle" class="Lx" >memory/remember</text>
<text x="285" y="449" text-anchor="middle" class="Ls" >mangwana</text>
<text x="410" y="449" text-anchor="middle" class="Lx" >tomorrow / future</text>
<text x="285" y="459" text-anchor="middle" class="Ls" >nyika yose</text>
<text x="410" y="459" text-anchor="middle" class="Lx" >the whole world</text>
