<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >SHONA</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — SVO —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Shona is Subject-Verb-Object. Verb agreement prefixes mirror noun class.</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >Mwana adya sadza. Child 3SG.eat porridge = "The child is eating sadza."</text>
<line x1="20" y1="100" x2="460" y2="100" stroke="black" stroke-width="0.3"/>
<text x="240" y="109" text-anchor="middle" class="H" >— NOUN CLASS SYSTEM (BANTU) —</text>
<text x="240" y="119" text-anchor="middle" class="Ls" >Shona has ~15 noun classes (chi-/zvi-, mu-/mi-, mu-/va-, etc.) like all Bantu languages.</text>
<text x="90" y="129" text-anchor="middle" class="Ls" >mu-/va-</text>
<text x="310" y="129" text-anchor="middle" class="Lx" >persons: mwana (child) / vana (children)</text>
<text x="90" y="140" text-anchor="middle" class="Ls" >mu-/mi-</text>
<text x="310" y="140" text-anchor="middle" class="Lx" >trees/plants: muti (tree) / miti (trees)</text>
<text x="90" y="151" text-anchor="middle" class="Ls" >chi-/zvi-</text>
<text x="310" y="151" text-anchor="middle" class="Lx" >things: chibage (maize) / zvibage (maizes)</text>
<text x="90" y="162" text-anchor="middle" class="Ls" >i-/ma-</text>
<text x="310" y="162" text-anchor="middle" class="Lx" >mass/abstract: imba (house) / dzimba (houses)</text>
<text x="90" y="173" text-anchor="middle" class="Ls" >ri-/ma-</text>
<text x="310" y="173" text-anchor="middle" class="Lx" >body parts: rino (tooth) / mano (teeth)</text>
<text x="90" y="184" text-anchor="middle" class="Ls" >ru-/n-</text>
<text x="310" y="184" text-anchor="middle" class="Lx" >abstract/augmentative: rudo (love) / n- forms</text>
<text x="90" y="195" text-anchor="middle" class="Ls" >u-/ma-</text>
<text x="310" y="195" text-anchor="middle" class="Lx" >abstract: utano (health) / n- forms</text>
<text x="90" y="206" text-anchor="middle" class="Ls" >pa-/ku-/mu-</text>
<text x="310" y="206" text-anchor="middle" class="Lx" >locative classes: pano (here), kuenda (going)</text>
<line x1="20" y1="225" x2="460" y2="225" stroke="black" stroke-width="0.3"/>
<text x="240" y="234" text-anchor="middle" class="H" >— VERB MORPHOLOGY —</text>
<text x="240" y="244" text-anchor="middle" class="Ls" >Verb template: Subject prefix + Tense marker + Object prefix + Root + Final vowel.</text>
<text x="130" y="254" text-anchor="middle" class="L" >ndinoda</text>
<text x="320" y="254" text-anchor="middle" class="Ls" >I love (ndi-no-da)</text>
<text x="130" y="264" text-anchor="middle" class="L" >ari-da</text>
<text x="320" y="264" text-anchor="middle" class="Ls" >he/she loves (a-ri-da)</text>
<text x="130" y="274" text-anchor="middle" class="L" >nda-ku-ya</text>
<text x="320" y="274" text-anchor="middle" class="Ls" >I came (H tone = perfect)</text>
<text x="130" y="284" text-anchor="middle" class="L" >ndichaenda</text>
<text x="320" y="284" text-anchor="middle" class="Ls" >I will go (ndi-cha-end-a)</text>
<text x="130" y="294" text-anchor="middle" class="L" >ndakauya</text>
<text x="320" y="294" text-anchor="middle" class="Ls" >I had come (pluperfect)</text>
<text x="130" y="304" text-anchor="middle" class="L" >enda!</text>
<text x="320" y="304" text-anchor="middle" class="Ls" >go! (imperative)</text>
<text x="130" y="314" text-anchor="middle" class="L" >handidi</text>
<text x="320" y="314" text-anchor="middle" class="Ls" >I don't want (ha-ndi-di)</text>
<text x="130" y="324" text-anchor="middle" class="L" >tinofarira</text>
<text x="320" y="324" text-anchor="middle" class="Ls" >we like (ti-no-far-ir-a)</text>
<line x1="20" y1="340" x2="460" y2="340" stroke="black" stroke-width="0.3"/>
<text x="240" y="349" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
<text x="50" y="359" text-anchor="middle" class="Ls" >mhoro</text>
<text x="175" y="359" text-anchor="middle" class="Lx" >hello</text>
<text x="50" y="369" text-anchor="middle" class="Ls" >waswera sei?</text>
<text x="175" y="369" text-anchor="middle" class="Lx" >how was your day?</text>
<text x="50" y="379" text-anchor="middle" class="Ls" >ndinofara</text>
<text x="175" y="379" text-anchor="middle" class="Lx" >I am happy</text>
