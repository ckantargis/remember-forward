<text x="410" y="469" text-anchor="middle" class="Lx" >good things / it is good</text>
<text x="285" y="479" text-anchor="middle" class="Ls" >hupenyu</text>
<text x="410" y="479" text-anchor="middle" class="Lx" >life</text>
