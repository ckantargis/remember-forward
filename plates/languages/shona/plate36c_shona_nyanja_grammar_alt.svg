<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SHONA</text>
<text x="240" y="40" text-anchor="middle" class="S">NOUN CLASS GRAMMAR</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SHONA NOUN CLASSES (15)</text>
<text x="240" y="68" text-anchor="middle" class="L">Bantu noun classes replace gender: prefix determines agreement</text>
<text x="240" y="79" text-anchor="middle" class="L">Class 1/2 (mu-/va-): people  •  muntu/vanhu "person/people"</text>
<text x="240" y="90" text-anchor="middle" class="L">Class 3/4 (mu-/mi-): trees, nature  •  muti/miti "tree/trees"</text>
<text x="240" y="101" text-anchor="middle" class="L">Class 5/6 (ri-/ma-): augmentatives  •  banga/mabanga "knife/knives"</text>
<text x="240" y="112" text-anchor="middle" class="L">Class 7/8 (chi-/zvi-): things  •  chibage/zvibage "mealie/mealies"</text>
<text x="240" y="123" text-anchor="middle" class="L">Class 9/10 (n-): animals  •  nzou/nzou "elephant/elephants"</text>
<line x1="20" y1="131" x2="460" y2="131" stroke="#555" stroke-width="0.5"/>
<text x="240" y="139" text-anchor="middle" class="H">AGREEMENT SYSTEM</text>
<text x="240" y="150" text-anchor="middle" class="L">Every modifier agrees with noun class prefix:</text>
<text x="240" y="161" text-anchor="middle" class="L">muntu musha "good person" (class 1)</text>
<text x="240" y="172" text-anchor="middle" class="L">vanhu vakanaka "good people" (class 2)</text>
<text x="240" y="183" text-anchor="middle" class="Ls">Adjective, verb, pronoun all carry the class prefix</text>
<line x1="20" y1="191" x2="460" y2="191" stroke="#555" stroke-width="0.5"/>
<text x="240" y="199" text-anchor="middle" class="H">VERB STRUCTURE</text>
<text x="240" y="210" text-anchor="middle" class="L">Subject prefix + Tense marker + Object prefix + Root + Final</text>
<text x="240" y="221" text-anchor="middle" class="L">a-no-bata = "he/she catches" (SP + PRES + root + FV)</text>
<text x="240" y="232" text-anchor="middle" class="L">va-ka-bata = "they caught" (SP + PAST + root + FV)</text>
<line x1="20" y1="240" x2="460" y2="240" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="247" width="460" height="13" fill="#111"/>
<text x="240" y="256.5" text-anchor="middle" class="Hb">NYANJA GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="272" text-anchor="middle" class="H">NYANJA NOUN CLASSES (16)</text>
<text x="240" y="283" text-anchor="middle" class="L">Class 1/2 (mu-/a-): people  •  munthu/anthu "person/people"</text>
<text x="240" y="294" text-anchor="middle" class="L">Class 3/4 (mu-/mi-): trees  •  mtengo/mitengo "tree/trees"</text>
<text x="240" y="305" text-anchor="middle" class="L">Class 5/6 (li-/ma-): paired/mass  •  bale/mabale "relative/s"</text>
<text x="240" y="316" text-anchor="middle" class="L">Class 7/8 (chi-/zi-): things  •  chinthu/zinthu "thing/things"</text>
<text x="240" y="327" text-anchor="middle" class="L">Class 9/10 (n-/n-): animals  •  njovu/njovu "elephant/s"</text>
<line x1="20" y1="335" x2="460" y2="335" stroke="#555" stroke-width="0.5"/>
<text x="240" y="343" text-anchor="middle" class="H">NYANJA VERB SYSTEM</text>
<text x="240" y="354" text-anchor="middle" class="L">Subject prefix + Tense + Object + Root + Final vowel</text>
<text x="240" y="365" text-anchor="middle" class="L">a-ku-samba = "he/she is washing" (SP + PROG + root + FV)</text>
<text x="240" y="376" text-anchor="middle" class="L">a-na-samba = "he/she washed" (SP + PAST + root + FV)</text>
<line x1="20" y1="384" x2="460" y2="384" stroke="#555" stroke-width="0.5"/>
<text x="240" y="392" text-anchor="middle" class="H">PARALLEL BANTU GRAMMAR</text>
<text x="240" y="403" text-anchor="middle" class="L">Both: noun class prefix system controlling all agreement</text>
<text x="240" y="414" text-anchor="middle" class="L">Both: verb template with SP-TNS-OP-ROOT-FV structure</text>
<text x="240" y="425" text-anchor="middle" class="L">Both: SOV tendency with flexible word order</text>
<text x="240" y="436" text-anchor="middle" class="Ls">Shona chi- class  ≈  Nyanja chi- class (same Proto-Bantu class 7)</text>
<text x="240" y="447" text-anchor="middle" class="Ls">Chirungu/Chingerezi both mean "English language" in both languages</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 36c ALT  ·  SHONA / NYANJA  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
