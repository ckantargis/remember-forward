<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SHONA</text>
<text x="240" y="40" text-anchor="middle" class="S">WRITING SYSTEM</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SHONA LATIN ALPHABET</text>
<text x="240" y="68" text-anchor="middle" class="L">Shona uses the Latin alphabet with digraphs for Bantu sounds</text>
<text x="240" y="79" text-anchor="middle" class="Ls">Standardized 1931 by Clement Doke (Union Shona orthography)</text>
<text x="240" y="90" text-anchor="middle" class="Ls">No pre-colonial writing system; oral tradition dominant</text>
<line x1="20" y1="98" x2="460" y2="98" stroke="#555" stroke-width="0.5"/>
<text x="240" y="106" text-anchor="middle" class="H">DISTINCTIVE SHONA LETTERS</text>
<text x="240" y="117" text-anchor="middle" class="L">zh /ʒ/ — like measure, vision (rare phoneme in African languages)</text>
<text x="240" y="128" text-anchor="middle" class="L">sv /sʋ/ — labiodental fricative cluster</text>
<text x="240" y="139" text-anchor="middle" class="L">zv /zʋ/ — voiced labiodental fricative cluster</text>
<text x="240" y="150" text-anchor="middle" class="L">bv /bʋ/ — bilabial+labiodental cluster</text>
<text x="240" y="161" text-anchor="middle" class="L">ng’ /ŋ/ — velar nasal (syllable-final or as syllable)</text>
<line x1="20" y1="169" x2="460" y2="169" stroke="#555" stroke-width="0.5"/>
<text x="240" y="177" text-anchor="middle" class="H">SHONA DIALECTS (UNION SHONA)</text>
<text x="240" y="188" text-anchor="middle" class="L">Five major dialect clusters combined in standardization:</text>
<text x="240" y="199" text-anchor="middle" class="L">Karanga • Zezuru • Korekore • Manyika • Ndau</text>
<text x="240" y="210" text-anchor="middle" class="Ls">Unified written standard; spoken dialects vary considerably</text>
<line x1="20" y1="218" x2="460" y2="218" stroke="#555" stroke-width="0.5"/>
<text x="240" y="226" text-anchor="middle" class="H">SAMPLE TEXT</text>
<text x="240" y="238" text-anchor="middle" class="L">Mhoro! Zita rangu ndi... "Hello! My name is..."</text>
<text x="240" y="249" text-anchor="middle" class="L">Unobva kupi? "Where do you come from?"</text>
<text x="240" y="260" text-anchor="middle" class="L">Maita basa. "Thank you." (lit. "You have done work")</text>
<line x1="20" y1="268" x2="460" y2="268" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="275" width="460" height="13" fill="#111"/>
<text x="240" y="284.5" text-anchor="middle" class="Hb">NYANJA / CHICHEWA  ·  SECONDARY LANGUAGE</text>
<text x="240" y="300" text-anchor="middle" class="H">NYANJA LATIN ALPHABET</text>
<text x="240" y="311" text-anchor="middle" class="L">Latin alphabet standardized during British colonial period</text>
<text x="240" y="322" text-anchor="middle" class="L">Nyanja = "lake" (people of the lake — Lake Malawi/Nyasa)</text>
<text x="240" y="333" text-anchor="middle" class="Ls">Chichewa = name used in Malawi; Nyanja = name used in Zambia</text>
<text x="240" y="344" text-anchor="middle" class="Ls">~15M speakers: Malawi, Zambia, Mozambique, Zimbabwe</text>
<line x1="20" y1="352" x2="460" y2="352" stroke="#555" stroke-width="0.5"/>
<text x="240" y="360" text-anchor="middle" class="H">DISTINCTIVE NYANJA LETTERS</text>
<text x="240" y="371" text-anchor="middle" class="L">nj /ɲ/ — palatal nasal (banja "family")</text>
<text x="240" y="382" text-anchor="middle" class="L">ny /ɲ/ — "nyumba" (house)</text>
<text x="240" y="393" text-anchor="middle" class="L">ng’ /ŋ/ — syllabic nasal (same as Shona)</text>
<text x="240" y="404" text-anchor="middle" class="L">mw /mʷ/ — labialized nasal cluster</text>
<line x1="20" y1="412" x2="460" y2="412" stroke="#555" stroke-width="0.5"/>
<text x="240" y="420" text-anchor="middle" class="H">SCRIPT COMPARISON</text>
<text x="240" y="431" text-anchor="middle" class="L">Shona:  mhoro (hello)  •  Nyanja:  moni (hello)</text>
<text x="240" y="442" text-anchor="middle" class="L">Shona:  nyika (country/world)  •  Nyanja:  dziko (country)</text>
<text x="240" y="453" text-anchor="middle" class="L">Shona:  muti (tree)  •  Nyanja:  mtengo (tree)</text>
<text x="240" y="464" text-anchor="middle" class="Ls">Both use Latin; different digraphs for similar Bantu phonemes</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 36a ALT  ·  SHONA / NYANJA  ·  SCRIPT</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
