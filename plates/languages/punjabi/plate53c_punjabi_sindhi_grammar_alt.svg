<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">PUNJABI</text>
<text x="240" y="40" text-anchor="middle" class="S">GRAMMAR &amp; STRUCTURE</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">WORD ORDER &amp; BASIC STRUCTURE</text>
<text x="240" y="68" text-anchor="middle" class="L">SOV: Subject  →  Object  →  Verb</text>
<text x="240" y="78" text-anchor="middle" class="L">Postpositions (not prepositions): ne/nu/de/to/vich</text>
<text x="240" y="89" text-anchor="middle" class="Ls">Main ਨੇ  ·  ਨੇ  →  ergative marker</text>
<line x1="20" y1="97" x2="460" y2="97" stroke="#555" stroke-width="0.5"/>
<text x="240" y="105" text-anchor="middle" class="H">GENDER &amp; AGREEMENT</text>
<text x="240" y="116" text-anchor="middle" class="L">Two genders: masculine / feminine (no neuter)</text>
<text x="240" y="126" text-anchor="middle" class="Ls">Adjectives and verbs agree with subject gender/number</text>
<text x="240" y="137" text-anchor="middle" class="L">Munda ਮੁੰਡਾ "boy"  •  Kuri ਕੁੜੀ "girl"</text>
<line x1="20" y1="145" x2="460" y2="145" stroke="#555" stroke-width="0.5"/>
<text x="240" y="153" text-anchor="middle" class="H">ERGATIVE ALIGNMENT</text>
<text x="240" y="164" text-anchor="middle" class="L">Punjabi is split ergative: past tense uses ergative case</text>
<text x="240" y="175" text-anchor="middle" class="Ls">Maī kitab padhi — I (ERG) book-FEM read-FEM</text>
<text x="240" y="185" text-anchor="middle" class="Ls">Subject of past transitive takes -ne; verb agrees with object</text>
<line x1="20" y1="193" x2="460" y2="193" stroke="#555" stroke-width="0.5"/>
<text x="240" y="201" text-anchor="middle" class="H">ASPECT &amp; TENSE</text>
<text x="240" y="212" text-anchor="middle" class="L">Three aspects: simple / continuous / perfective</text>
<text x="240" y="222" text-anchor="middle" class="Ls">Future: main verb + gaa/gee/ge (masculine/feminine/plural)</text>
<text x="240" y="233" text-anchor="middle" class="Ls">No passive voice — use intransitive or impersonal constructions</text>
<line x1="20" y1="241" x2="460" y2="241" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="248" width="460" height="13" fill="#111"/>
<text x="240" y="257.5" text-anchor="middle" class="Hb">SINDHI GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="273" text-anchor="middle" class="H">SINDHI WORD ORDER</text>
<text x="240" y="284" text-anchor="middle" class="L">SOV (same as Punjabi) with postpositions</text>
<text x="240" y="295" text-anchor="middle" class="L">Three genders: masculine / feminine / neuter (unlike Punjabi!)</text>
<text x="240" y="306" text-anchor="middle" class="Ls">Neuter gender for inanimates in many dialects</text>
<line x1="20" y1="314" x2="460" y2="314" stroke="#555" stroke-width="0.5"/>
<text x="240" y="322" text-anchor="middle" class="H">SINDHI CASE SYSTEM</text>
<text x="240" y="333" text-anchor="middle" class="L">Four cases: nominative / oblique / ablative / vocative</text>
<text x="240" y="344" text-anchor="middle" class="Ls">Agglutinative postpositions attach to oblique stem</text>
<text x="240" y="355" text-anchor="middle" class="Ls">Ergative split: past transitive uses oblique agent</text>
<line x1="20" y1="363" x2="460" y2="363" stroke="#555" stroke-width="0.5"/>
<text x="240" y="371" text-anchor="middle" class="H">SINDHI VERB SYSTEM</text>
<text x="240" y="382" text-anchor="middle" class="Ls">Rich verbal morphology: marks tense/aspect/mood/gender/number</text>
<text x="240" y="393" text-anchor="middle" class="L">Causative: aanu (come) → aayaraanu (cause to come)</text>
<text x="240" y="404" text-anchor="middle" class="Ls">Compound verbs common: karo "do" as vector verb</text>
<line x1="20" y1="412" x2="460" y2="412" stroke="#555" stroke-width="0.5"/>
<text x="240" y="420" text-anchor="middle" class="H">GRAMMATICAL PARALLELS</text>
<text x="240" y="431" text-anchor="middle" class="L">Both: SOV  •  postpositions  •  split ergativity</text>
<text x="240" y="442" text-anchor="middle" class="Ls">Both: rich aspect system inherited from Sanskrit</text>
<text x="240" y="453" text-anchor="middle" class="Ls">Punjabi: 2 genders  vs.  Sindhi: 3 genders (more archaic)</text>
<text x="240" y="464" text-anchor="middle" class="L">"House" patterning: Punjabi ghar  •  Sindhi ghar</text>
<text x="240" y="475" text-anchor="middle" class="L">"Water": Punjabi pani  •  Sindhi pani (identical!)</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 53c ALT  ·  PUNJABI / SINDHI  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
