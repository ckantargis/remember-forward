<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<defs><style>
text{font-family:Georgia,serif;}
.T{font-size:12px;font-weight:bold;letter-spacing:2px;}
.S{font-size:7px;letter-spacing:1.5px;}
.H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style></defs>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >JAVANESE</text>
<text x="240" y="50" text-anchor="middle" class="S" >Phonology — Sounds and Register Variation</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— CONSONANT INVENTORY —</text>
<text x="80" y="82" text-anchor="middle" class="Lx" >p /p/ bilabial stop vl</text>
<text x="280" y="82" text-anchor="middle" class="Lx" >b /b/ bilabial stop vd</text>
<text x="80" y="92" text-anchor="middle" class="Lx" >t /t/ alveolar stop</text>
<text x="280" y="92" text-anchor="middle" class="Lx" >d /d/ alveolar stop vd</text>
<text x="80" y="102" text-anchor="middle" class="Lx" >th /t̪/ apical dental stop</text>
<text x="280" y="102" text-anchor="middle" class="Lx" >dh /d̪/ apical dental vd</text>
<text x="80" y="112" text-anchor="middle" class="Lx" >k /k/ velar stop</text>
<text x="280" y="112" text-anchor="middle" class="Lx" >g /ɡ/ velar stop vd</text>
<text x="80" y="122" text-anchor="middle" class="Lx" >c /tɕ/ palatal affricate</text>
<text x="280" y="122" text-anchor="middle" class="Lx" >j /dʒ/ palatal affricate vd</text>
<text x="80" y="132" text-anchor="middle" class="Lx" >m /m/ bilabial nasal</text>
<text x="280" y="132" text-anchor="middle" class="Lx" >n /n/ alveolar nasal</text>
<text x="80" y="142" text-anchor="middle" class="Lx" >ny /ɲ/ palatal nasal</text>
<text x="280" y="142" text-anchor="middle" class="Lx" >ng /ŋ/ velar nasal</text>
<text x="80" y="152" text-anchor="middle" class="Lx" >l /l/ lateral</text>
<text x="280" y="152" text-anchor="middle" class="Lx" >r /r/ trill</text>
<text x="80" y="162" text-anchor="middle" class="Lx" >s /s/ alveolar fricative</text>
<text x="280" y="162" text-anchor="middle" class="Lx" >h /h/ glottal</text>
<text x="80" y="172" text-anchor="middle" class="Lx" >w /w/ labio-velar</text>
<text x="280" y="172" text-anchor="middle" class="Lx" >y /j/ palatal approx</text>
<line x1="20" y1="192" x2="460" y2="192" stroke="black" stroke-width="0.3"/>
<text x="240" y="201" text-anchor="middle" class="H" >— APICAL VS. LAMINAL DISTINCTION —</text>
<text x="240" y="211" text-anchor="middle" class="Ls" >Javanese (like Sanskrit-derived Indic languages) distinguishes:</text>
<text x="240" y="221" text-anchor="middle" class="Ls" >T/D (laminal dental): t (/t̪/), d (/d̪/) — tongue blade to upper teeth.</text>
<text x="240" y="231" text-anchor="middle" class="Ls" >TH/DH (retroflex-like): th (/ʈ/), dh (/ɖ/) — tongue tip curled back.</text>
<text x="240" y="241" text-anchor="middle" class="Ls" >In Latin spelling: t = dental, th = retroflex. Contrast: tahu (tofu) vs. thahu (know).</text>
<line x1="20" y1="249" x2="460" y2="249" stroke="black" stroke-width="0.3"/>
<text x="240" y="258" text-anchor="middle" class="H" >— VOWEL SYSTEM —</text>
<text x="240" y="268" text-anchor="middle" class="Ls" >6 vowels; /a/ (orthographic) = /ɔ/ (open-back) in many environments.</text>
<text x="240" y="278" text-anchor="middle" class="Ls" >Vowel /e/ = /ɛ/ in open syllables, /ə/ in closed syllables (context-conditioned).</text>
<text x="240" y="288" text-anchor="middle" class="Ls" >No tonal system; stress: generally penultimate syllable.</text>
<line x1="20" y1="296" x2="460" y2="296" stroke="black" stroke-width="0.3"/>
<text x="240" y="305" text-anchor="middle" class="H" >— PHONOLOGICAL REGISTER DIFFERENCES —</text>
<text x="240" y="315" text-anchor="middle" class="Ls" >Krama register uses entirely different roots (not just affixes):</text>
<text x="240" y="325" text-anchor="middle" class="Ls" >Ngoko mangan /mangɔŋ/ (eat) vs. Krama dhahar /dʰahar/ (eat honorific).</text>
<text x="240" y="335" text-anchor="middle" class="Ls" >Register shift requires knowing two distinct lexicons simultaneously.</text>
<line x1="20" y1="343" x2="460" y2="343" stroke="black" stroke-width="0.3"/>
<text x="240" y="352" text-anchor="middle" class="H" >— BORROWED PHONOLOGY —</text>
<text x="240" y="362" text-anchor="middle" class="Ls" >Sanskrit loanwords: guru, karma, dharma, yoga (via Old Javanese).</text>
<text x="240" y="372" text-anchor="middle" class="Ls" >Arabic/Islamic loanwords: salam, doa (prayer), kitab (book), waktu (time).</text>
<text x="240" y="382" text-anchor="middle" class="Ls" >Dutch and Malay loanwords significant in modern vocabulary.</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 43B — JAVANESE: PHONOLOGY — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
