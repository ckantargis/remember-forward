<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 43C · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— JAVANESE GRAMMAR — SVO · SPEECH LEVELS (UNGGAH-UNGGUH) —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">Javanese is famous for its elaborate speech level system: Ngoko (informal), Madya (middle), Kramà (formal).</text>
<text x="240" y="82" text-anchor="middle" class="Lx">Choosing the wrong level is a serious social error. Level depends on relative age, status, familiarity.</text>
