<text x="240" y="271" text-anchor="middle" class="Hb" fill="white">SECONDARY — SUNDANESE (BASA SUNDA) — GRAMMAR · VOCABULARY</text>
<line x1="20" y1="275" x2="460" y2="275" stroke="black" stroke-width="0.3"/>
<text x="240" y="284" text-anchor="middle" class="H">— SUNDANESE GRAMMAR — SVO · SPEECH LEVELS (UNDAK USUK BASA) —</text>
<text x="240" y="294" text-anchor="middle" class="Ls">Sundanese also has a speech level system: Loma (informal), Lemes (polite), Kasar (very informal/crude).</text>
<text x="240" y="303" text-anchor="middle" class="Lx">Lemes level used for respected persons and elders. Loma for equals/friends. Kasar to be avoided.</text>
<text x="240" y="312" text-anchor="middle" class="Lx">Both Javanese and Sundanese speech level systems reflect Hindu-Buddhist courtly culture of the Majapahit era.</text>
<line x1="20" y1="320" x2="460" y2="320" stroke="black" stroke-width="0.3"/>
