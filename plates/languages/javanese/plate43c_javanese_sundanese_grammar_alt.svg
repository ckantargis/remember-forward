<text x="240" y="473" text-anchor="middle" class="H">— GRAMMAR BRIDGE — SHARED SPEECH LEVEL CULTURE —</text>
<text x="240" y="483" text-anchor="middle" class="Ls">Both Javanese and Sundanese: SVO, Austronesian, agglutinative, elaborate speech levels.</text>
<text x="240" y="492" text-anchor="middle" class="Lx">Speech levels are not just politeness: they encode a whole world view about hierarchy and relation.</text>
<text x="240" y="501" text-anchor="middle" class="Lx">This is a shared legacy of Hindu-Buddhist Majapahit court culture, adapted independently in each language.</text>
