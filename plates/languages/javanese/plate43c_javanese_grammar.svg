<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >JAVANESE</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — SVO —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Javanese is SVO. Affixes (prefixes, suffixes, circumfixes) on verbs and nouns.</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >Aku mangan sega. I eat rice. (Ngoko register)</text>
<text x="240" y="102" text-anchor="middle" class="Ls" >Kula nedha sekul. I eat rice. (Krama register — same meaning, different words)</text>
<line x1="20" y1="110" x2="460" y2="110" stroke="black" stroke-width="0.3"/>
<text x="240" y="119" text-anchor="middle" class="H" >— VERB MORPHOLOGY —</text>
<text x="240" y="129" text-anchor="middle" class="Ls" >Active voice: N- prefix (nasal) + root: mangan (eat) &lt; N+pangan.</text>
<text x="240" y="139" text-anchor="middle" class="Ls" >Passive: di- prefix + root: dipangan (was eaten).</text>
<text x="240" y="149" text-anchor="middle" class="Ls" >Ke- + root: kepangan (accidentally eaten).</text>
<text x="240" y="159" text-anchor="middle" class="Ls" >Reduplication: turu-turu = keep sleeping / sleep repeatedly.</text>
<line x1="20" y1="167" x2="460" y2="167" stroke="black" stroke-width="0.3"/>
<text x="240" y="176" text-anchor="middle" class="H" >— AFFIXES —</text>
<text x="120" y="186" text-anchor="middle" class="Ls" >N- (active)</text>
<text x="320" y="186" text-anchor="middle" class="Lx" >nasal assimilation: nulis (write) &lt; N+tulis</text>
<text x="120" y="196" text-anchor="middle" class="Ls" >di- (passive)</text>
<text x="320" y="196" text-anchor="middle" class="Lx" >ditulis (was written)</text>
<text x="120" y="206" text-anchor="middle" class="Ls" >-ake (causative/benefactive)</text>
<text x="320" y="206" text-anchor="middle" class="Lx" >nulis-ake (write for someone)</text>
<text x="120" y="216" text-anchor="middle" class="Ls" >-i (local applicative)</text>
<text x="320" y="216" text-anchor="middle" class="Lx" >nulis-i (write on)</text>
<text x="120" y="226" text-anchor="middle" class="Ls" >ke- (accidental)</text>
<text x="320" y="226" text-anchor="middle" class="Lx" >kepangan (accidentally eaten)</text>
<text x="120" y="236" text-anchor="middle" class="Ls" >paN- (nominaliser)</text>
<text x="320" y="236" text-anchor="middle" class="Lx" >panulisan (writing, act of)</text>
<line x1="20" y1="252" x2="460" y2="252" stroke="black" stroke-width="0.3"/>
<text x="240" y="261" text-anchor="middle" class="H" >— CORE VOCABULARY (NGOKO / KRAMA) —</text>
