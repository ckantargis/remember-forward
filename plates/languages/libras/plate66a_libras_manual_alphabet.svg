<text x="240" y="219" text-anchor="middle" class="H">— LIBRAS vs ASL ALPHABET DIFFERENCES —</text>
<line x1="362" y1="215" x2="450" y2="215" stroke="#111" stroke-width="0.3"/>
<text x="36" y="225" text-anchor="start" class="Ls">CH:</text>
<text x="65" y="225" text-anchor="start" class="Lx">Libras has a separate sign for CH (no equivalent in ASL 26-letter set)</text>
<text x="36" y="234" text-anchor="start" class="Ls">NH:</text>
<text x="65" y="234" text-anchor="start" class="Lx">Libras has a NH handshape (Portuguese digraph not in English/ASL)</text>
<text x="36" y="243" text-anchor="start" class="Ls">LH:</text>
<text x="65" y="243" text-anchor="start" class="Lx">Libras has a LH handshape (Portuguese palatal lateral)</text>
<text x="36" y="252" text-anchor="start" class="Ls">H:</text>
<text x="65" y="252" text-anchor="start" class="Lx">Libras H differs slightly from ASL H in palm orientation</text>
<text x="36" y="261" text-anchor="start" class="Ls">J:</text>
<text x="65" y="261" text-anchor="start" class="Lx">Both are motion letters; Libras traces J with index</text>
<text x="36" y="270" text-anchor="start" class="Ls">Z:</text>
<text x="65" y="270" text-anchor="start" class="Lx">Both trace Z; Libras uses same basic shape</text>
<line x1="24" y1="281" x2="456" y2="281" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="287" x2="118" y2="287" stroke="#111" stroke-width="0.3"/>
<text x="240" y="291" text-anchor="middle" class="H">— LIBRAS HANDSHAPE INVENTORY —</text>
<line x1="362" y1="287" x2="450" y2="287" stroke="#111" stroke-width="0.3"/>
<text x="240" y="297" text-anchor="middle" class="Lx">Libras has 111 distinct handshapes documented (vs ~50 in ASL) — the most of any sign language</text>
<text x="240" y="306" text-anchor="middle" class="Lx">studied. This larger inventory reflects the richness of Libras’ phonological system.</text>
<text x="36" y="315" text-anchor="start" class="H">Flat/open:</text>
<text x="105" y="315" text-anchor="start" class="Lx">B, B-bent, 5-spread, open-A</text>
<text x="36" y="324" text-anchor="start" class="H">Curved:</text>
<text x="105" y="324" text-anchor="start" class="Lx">C, O, baby-O, bent-5</text>
<text x="36" y="333" text-anchor="start" class="H">Extended:</text>
<text x="105" y="333" text-anchor="start" class="Lx">D, G, H, I, K, L, U, V, W, Y</text>
<text x="36" y="342" text-anchor="start" class="H">Closed:</text>
<text x="105" y="342" text-anchor="start" class="Lx">A, E, S, T, N, M, X</text>
<text x="36" y="351" text-anchor="start" class="H">Compound:</text>
<text x="105" y="351" text-anchor="start" class="Lx">F, P, Q, R, unique Libras forms</text>
<line x1="24" y1="607" x2="456" y2="607" stroke="#111" stroke-width="0.3"/>
