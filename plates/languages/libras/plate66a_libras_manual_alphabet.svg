<text x="240" y="32" text-anchor="middle" class="T">BRAZILIAN SIGN LANGUAGE (LIBRAS)</text>
<text x="240" y="47" text-anchor="middle" class="S">LÍNGUA BRASILEIRA DE SINAIS · MANUAL ALPHABET · SERIES 66A</text>
<line x1="24" y1="55" x2="456" y2="55" stroke="#111" stroke-width="0.3"/>
<text x="240" y="65" text-anchor="middle" class="Lx">Libras (Língua Brasileira de Sinais) is the sign language of Deaf communities in Brazil.</text>
<text x="240" y="74" text-anchor="middle" class="Lx">3–10 million signers estimated. Libras was officially recognised by Brazilian federal law</text>
<text x="240" y="83" text-anchor="middle" class="Lx">(Law 10.436, 2002) as "a means of communication and expression" of the Brazilian Deaf community.</text>
<line x1="24" y1="91" x2="456" y2="91" stroke="#111" stroke-width="0.3"/>
<line x1="30" y1="98" x2="118" y2="98" stroke="#111" stroke-width="0.3"/>
<text x="240" y="102" text-anchor="middle" class="H">— LIBRAS ONE-HANDED MANUAL ALPHABET —</text>
<line x1="362" y1="98" x2="450" y2="98" stroke="#111" stroke-width="0.3"/>
<text x="240" y="108" text-anchor="middle" class="Lx">Libras uses a one-handed fingerspelling alphabet. Largely similar to ASL/LSF, with some differences.</text>
