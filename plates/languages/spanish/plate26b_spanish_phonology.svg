<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<style>
  text { font-family: Georgia, serif; }
  .T  { font-size:12px; font-weight:bold; letter-spacing:2px; }
  .S  { font-size:7px; letter-spacing:1.5px; }
  .H  { font-size:6.5px; font-weight:bold; letter-spacing:2.5px; }
  .L  { font-size:7px; }
  .Ls { font-size:6px; }
  .Lx { font-size:5.5px; }
  .M  { font-size:6px; letter-spacing:1px; }
  .F  { font-size:7px; font-style:italic; }
  .Fb { font-size:7.5px; font-weight:bold; }
</style>
<rect x="0" y="0" width="480" height="680" fill="white"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >SPANISH — PHONOLOGY · SOUND SYSTEM</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 26B OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— VOWEL SYSTEM — 5 PURE VOWELS —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Spanish has 5 vowel phonemes — one of the simplest vowel systems among major world languages.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >All vowels are short and pure (no diphthongisation). Consistent across most dialects.</text>
<text x="50" y="99" text-anchor="middle" class="Ls" >/a/</text>
<text x="95" y="99" text-anchor="middle" class="Ls" >a</text>
<text x="180" y="99" text-anchor="middle" class="Lx" >low central</text>
<text x="360" y="99" text-anchor="middle" class="Lx" >padre, mar, casa</text>
<text x="50" y="111" text-anchor="middle" class="Ls" >/e/</text>
<text x="95" y="111" text-anchor="middle" class="Ls" >e</text>
<text x="180" y="111" text-anchor="middle" class="Lx" >mid front</text>
<text x="360" y="111" text-anchor="middle" class="Lx" >mesa, tres, leche</text>
<text x="50" y="123" text-anchor="middle" class="Ls" >/i/</text>
<text x="95" y="123" text-anchor="middle" class="Ls" >i</text>
<text x="180" y="123" text-anchor="middle" class="Lx" >high front</text>
<text x="360" y="123" text-anchor="middle" class="Lx" >vida, mi, hijo</text>
<text x="50" y="135" text-anchor="middle" class="Ls" >/o/</text>
<text x="95" y="135" text-anchor="middle" class="Ls" >o</text>
<text x="180" y="135" text-anchor="middle" class="Lx" >mid back</text>
<text x="360" y="135" text-anchor="middle" class="Lx" >noche, voz, como</text>
<text x="50" y="147" text-anchor="middle" class="Ls" >/u/</text>
<text x="95" y="147" text-anchor="middle" class="Ls" >u</text>
<text x="180" y="147" text-anchor="middle" class="Lx" >high back</text>
<text x="360" y="147" text-anchor="middle" class="Lx" >luna, luz, uno</text>
<text x="240" y="162" text-anchor="middle" class="Ls" >Diphthongs: rising (ia,ie,io,iu,ua,ue,ui,uo) and falling (ai,ei,oi,au,eu,ou) — two vowels in one syllable.</text>
<line x1="20" y1="170" x2="460" y2="170" stroke="black" stroke-width="0.3"/>
<text x="240" y="179" text-anchor="middle" class="H" >— CONSONANT INVENTORY —</text>
<text x="40" y="189" text-anchor="middle" class="Ls" >p b</text>
<text x="88" y="189" text-anchor="middle" class="Lx" >/p b/</text>
<text x="165" y="189" text-anchor="middle" class="Lx" >bilabial stops</text>
<text x="355" y="189" text-anchor="middle" class="Lx" >B/V identical: both /b/ – [v] between vowels</text>
<text x="40" y="201" text-anchor="middle" class="Ls" >t d</text>
<text x="88" y="201" text-anchor="middle" class="Lx" >/t d/</text>
<text x="165" y="201" text-anchor="middle" class="Lx" >dental stops</text>
<text x="355" y="201" text-anchor="middle" class="Lx" >D = [ð] between vowels: nada [naða]</text>
<text x="40" y="213" text-anchor="middle" class="Ls" >k g</text>
<text x="88" y="213" text-anchor="middle" class="Lx" >/k ɡ/</text>
<text x="165" y="213" text-anchor="middle" class="Lx" >velar stops</text>
<text x="355" y="213" text-anchor="middle" class="Lx" >G = [ɣ] between vowels: lago [laɣo]</text>
<text x="40" y="225" text-anchor="middle" class="Ls" >f</text>
<text x="88" y="225" text-anchor="middle" class="Lx" >/f/</text>
<text x="165" y="225" text-anchor="middle" class="Lx" >labiodental</text>
<text x="355" y="225" text-anchor="middle" class="Lx" >fuerza, fácil</text>
<text x="40" y="237" text-anchor="middle" class="Ls" >s</text>
<text x="88" y="237" text-anchor="middle" class="Lx" >/s/</text>
<text x="165" y="237" text-anchor="middle" class="Lx" >alveolar frict.</text>
<text x="355" y="237" text-anchor="middle" class="Lx" >always voiceless in most dialects</text>
<text x="40" y="249" text-anchor="middle" class="Ls" >x</text>
<text x="88" y="249" text-anchor="middle" class="Lx" >/x/</text>
<text x="165" y="249" text-anchor="middle" class="Lx" >velar frict.</text>
<text x="355" y="249" text-anchor="middle" class="Lx" >j always = /x/: joven, ojo, rojo</text>
<text x="40" y="261" text-anchor="middle" class="Ls" >θ</text>
<text x="88" y="261" text-anchor="middle" class="Lx" >/θ/</text>
<text x="165" y="261" text-anchor="middle" class="Lx" >dental frict.</text>
<text x="355" y="261" text-anchor="middle" class="Lx" >Castilian c/z: cena, zapato (NOT in Latin Am.)</text>
<text x="40" y="273" text-anchor="middle" class="Ls" >tʃ</text>
<text x="88" y="273" text-anchor="middle" class="Lx" >/tʃ/</text>
<text x="165" y="273" text-anchor="middle" class="Lx" >affricate</text>
<text x="355" y="273" text-anchor="middle" class="Lx" >ch: noche, muchacho</text>
<text x="40" y="285" text-anchor="middle" class="Ls" >m n</text>
<text x="88" y="285" text-anchor="middle" class="Lx" >/m n/</text>
<text x="165" y="285" text-anchor="middle" class="Lx" >nasals</text>
<text x="355" y="285" text-anchor="middle" class="Lx" >n = [ŋ] before velars: banco [baŋko]</text>
<text x="40" y="297" text-anchor="middle" class="Ls" >ɲ</text>
<text x="88" y="297" text-anchor="middle" class="Lx" >/ɲ/</text>
<text x="165" y="297" text-anchor="middle" class="Lx" >palatal nasal</text>
<text x="355" y="297" text-anchor="middle" class="Lx" >ñ: mañana, español</text>
<text x="40" y="309" text-anchor="middle" class="Ls" >l</text>
<text x="88" y="309" text-anchor="middle" class="Lx" >/l/</text>
<text x="165" y="309" text-anchor="middle" class="Lx" >lateral</text>
<text x="355" y="309" text-anchor="middle" class="Lx" >leche, sol</text>
<text x="40" y="321" text-anchor="middle" class="Ls" >ʎ</text>
<text x="88" y="321" text-anchor="middle" class="Lx" >/ʎ/</text>
<text x="165" y="321" text-anchor="middle" class="Lx" >palatal lateral</text>
<text x="355" y="321" text-anchor="middle" class="Lx" >ll (Castilian): llave, calle — merged with /j/ elsewhere</text>
<text x="40" y="333" text-anchor="middle" class="Ls" >r</text>
<text x="88" y="333" text-anchor="middle" class="Lx" >/ɹ/</text>
<text x="165" y="333" text-anchor="middle" class="Lx" >tap</text>
<text x="355" y="333" text-anchor="middle" class="Lx" >single r between vowels: caro, pero</text>
<text x="40" y="345" text-anchor="middle" class="Ls" >rr</text>
<text x="88" y="345" text-anchor="middle" class="Lx" >/r/</text>
<text x="165" y="345" text-anchor="middle" class="Lx" >trill</text>
<text x="355" y="345" text-anchor="middle" class="Lx" >double r / initial r: perro, rosa</text>
<text x="40" y="357" text-anchor="middle" class="Ls" >j</text>
<text x="88" y="357" text-anchor="middle" class="Lx" >/j/</text>
<text x="165" y="357" text-anchor="middle" class="Lx" >palatal glide</text>
<text x="355" y="357" text-anchor="middle" class="Lx" >ya, yo, hierba</text>
<line x1="20" y1="380" x2="460" y2="380" stroke="black" stroke-width="0.3"/>
<text x="240" y="389" text-anchor="middle" class="H" >— STRESS RULES —</text>
<text x="240" y="400" text-anchor="middle" class="Ls" >1. Words ending in vowel, -n, or -s: stress falls on PENULTIMATE syllable: ca-SA, jo-VEN, ca-SAS.</text>
<text x="240" y="409" text-anchor="middle" class="Ls" >2. Words ending in any other consonant: stress falls on FINAL syllable: ciu-DAD, ha-BLAR, es-PAÑOL.</text>
<text x="240" y="418" text-anchor="middle" class="Ls" >3. Written accent overrides both rules: música (stress 1st), café (stress last despite -e).</text>
<text x="240" y="427" text-anchor="middle" class="Ls" >4. Monosyllables: no accent unless disambiguation needed: sí (yes) vs si (if); él (he) vs el (the).</text>
<line x1="20" y1="435" x2="460" y2="435" stroke="black" stroke-width="0.3"/>
<text x="240" y="444" text-anchor="middle" class="H" >— KEY PHONOLOGICAL PROCESSES —</text>
<text x="240" y="455" text-anchor="middle" class="L" >Lenition: voiced stops /b d g/ weaken to fricatives [β ð ɣ] between vowels — a defining Spanish feature.</text>
<text x="240" y="465" text-anchor="middle" class="Ls" >Seseo/ceceo/distincón: the s/θ variation divides Spain from the Americas and reflects 15th-c. colonial settlement.</text>
<text x="240" y="474" text-anchor="middle" class="Ls" >Yeismo: merger of /ʎ/ (ll) and /j/ (y) — dominant in Latin America and most of Spain today.</text>
<text x="240" y="483" text-anchor="middle" class="Ls" >Coda weakening: final and pre-consonantal /s/ aspirated [h] or deleted in Caribbean, Andalusian, and coastal dialects.</text>
<text x="240" y="492" text-anchor="middle" class="Ls" >Vibrantes: tap /ɹ/ vs trill /r/ distinction is phonemic: pero (but) vs perro (dog).</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M" >SERIES 26 · SPANISH · PLATE B · PHONOLOGY · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
