<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SPANISH</text>
<text x="240" y="40" text-anchor="middle" class="S">PHONOLOGY</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SPANISH VOWEL SYSTEM</text>
<text x="240" y="68" text-anchor="middle" class="L">Five pure vowels: a e i o u — no diphthongs, no long/short</text>
<text x="240" y="79" text-anchor="middle" class="L">Pure vowels never reduce (unlike English schwa tendency)</text>
<text x="240" y="90" text-anchor="middle" class="L">Diphthongs: ie (bien) • ue (puedo) • ei (ley) • ou (bou)</text>
<line x1="20" y1="98" x2="460" y2="98" stroke="#555" stroke-width="0.5"/>
<text x="240" y="106" text-anchor="middle" class="H">SPANISH CONSONANTS</text>
<text x="240" y="117" text-anchor="middle" class="L">Distinction: Castilian vs. Latin American “ceceo/seseo”:</text>
<text x="240" y="128" text-anchor="middle" class="L">Castilian: c (before e/i) and z = /θ/ (like English "thin")</text>
<text x="240" y="139" text-anchor="middle" class="L">Latin American: c and z both = /s/ (no dental fricative)</text>
<text x="240" y="150" text-anchor="middle" class="L">Trill /r/: perro "dog" vs. flap /ɾ/: pero "but"</text>
<text x="240" y="161" text-anchor="middle" class="L">Velar /x/: jota sound in hijo, gente, reloj</text>
<line x1="20" y1="169" x2="460" y2="169" stroke="#555" stroke-width="0.5"/>
<text x="240" y="177" text-anchor="middle" class="H">STRESS RULES</text>
<text x="240" y="188" text-anchor="middle" class="L">Default: penultimate stress if word ends in vowel, n, or s</text>
<text x="240" y="199" text-anchor="middle" class="L">Default: final stress if word ends in consonant (except n/s)</text>
<text x="240" y="210" text-anchor="middle" class="Ls">Accent mark: any deviation from default rule</text>
<line x1="20" y1="218" x2="460" y2="218" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="225" width="460" height="13" fill="#111"/>
<text x="240" y="234.5" text-anchor="middle" class="Hb">CATALAN PHONOLOGY  ·  SECONDARY LANGUAGE</text>
<text x="240" y="250" text-anchor="middle" class="H">CATALAN VOWEL SYSTEM (EASTERN DIALECT)</text>
<text x="240" y="261" text-anchor="middle" class="L">Seven stressed vowels: a ɛ e i ɔ o u</text>
<text x="240" y="272" text-anchor="middle" class="L">But unstressed: a/e → /ə/ (schwa!), o/u → /u/</text>
<text x="240" y="283" text-anchor="middle" class="L">Catalan reduces unstressed vowels — MORE like French than Spanish</text>
<text x="240" y="294" text-anchor="middle" class="Ls">pa "bread" /pa/ but pans /pəns/ (a becomes schwa)</text>
<line x1="20" y1="302" x2="460" y2="302" stroke="#555" stroke-width="0.5"/>
<text x="240" y="310" text-anchor="middle" class="H">CATALAN CONSONANTS</text>
<text x="240" y="321" text-anchor="middle" class="L">Final devoicing: b/d/g → p/t/k at word end (like German!)</text>
<text x="240" y="332" text-anchor="middle" class="L">l·l /l:/ geminate lateral: difference from French/Spanish</text>
<text x="240" y="343" text-anchor="middle" class="Ls">No /x/ (jota) — Catalan lacks this Spanish sound</text>
<text x="240" y="354" text-anchor="middle" class="Ls">Affricate /tʃ/ • /dʒ/: txíxer "woodpecker"</text>
<line x1="20" y1="362" x2="460" y2="362" stroke="#555" stroke-width="0.5"/>
<text x="240" y="370" text-anchor="middle" class="H">PHONOLOGICAL COMPARISON</text>
<text x="240" y="381" text-anchor="middle" class="L">Spanish: no schwa • Catalan: schwa in unstressed position</text>
<text x="240" y="392" text-anchor="middle" class="L">Spanish: no final devoicing • Catalan: b→p d→t g→k</text>
<text x="240" y="403" text-anchor="middle" class="L">Spanish: /θ/ in Castilian • Catalan: no /θ/</text>
<text x="240" y="414" text-anchor="middle" class="Ls">Both: 5 core vowels • trill vs. flap /r/ • /ɲ/ phoneme</text>
<text x="240" y="425" text-anchor="middle" class="Ls">Catalan phonology: between Spanish and French</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 26b ALT  ·  SPANISH / CATALAN  ·  PHONOLOGY</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
