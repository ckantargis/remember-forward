<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SPANISH</text>
<text x="240" y="40" text-anchor="middle" class="S">WRITING SYSTEM</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SPANISH LATIN ALPHABET (27 LETTERS)</text>
<text x="240" y="68" text-anchor="middle" class="L">Same as English plus: ñ (enye) and ch/ll as traditional digraphs</text>
<text x="240" y="79" text-anchor="middle" class="L">ñ: unique Spanish letter — "ny" sound /ɲ/</text>
<text x="240" y="90" text-anchor="middle" class="L">cañon • mañana • niño • español</text>
<text x="240" y="101" text-anchor="middle" class="L">Acute accent marks stress when irregular: café, música, eléctrico</text>
<text x="240" y="112" text-anchor="middle" class="L">Interrogative/exclamatory: inverted ¿ and ¡ at start of phrase</text>
<line x1="20" y1="120" x2="460" y2="120" stroke="#555" stroke-width="0.5"/>
<text x="240" y="128" text-anchor="middle" class="H">SPANISH SPELLING REGULARITY</text>
<text x="240" y="139" text-anchor="middle" class="L">Spanish spelling is highly phonemic — words spelled as pronounced</text>
<text x="240" y="150" text-anchor="middle" class="Ls">One-to-one correspondence (mostly): cada letra, un sonido</text>
<text x="240" y="161" text-anchor="middle" class="Ls">Exception: h is always silent (hola, hablar, historia)</text>
<text x="240" y="172" text-anchor="middle" class="Ls">Exception: g before e/i = /x/ (gente, girasol)</text>
<line x1="20" y1="180" x2="460" y2="180" stroke="#555" stroke-width="0.5"/>
<text x="240" y="188" text-anchor="middle" class="H">REAL ACADEMIA ESPAÑOLA (RAE)</text>
<text x="240" y="199" text-anchor="middle" class="L">Founded 1713: standardizes Spanish spelling and grammar</text>
<text x="240" y="210" text-anchor="middle" class="Ls">1994: ch and ll removed from alphabet (now letter pairs)</text>
<text x="240" y="221" text-anchor="middle" class="Ls">Unifies spelling across 20+ Spanish-speaking countries</text>
<line x1="20" y1="229" x2="460" y2="229" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="236" width="460" height="13" fill="#111"/>
<text x="240" y="245.5" text-anchor="middle" class="Hb">CATALAN  ·  CATALÀ  ·  SECONDARY LANGUAGE</text>
<text x="240" y="261" text-anchor="middle" class="H">CATALAN LATIN ALPHABET (26 LETTERS)</text>
<text x="240" y="272" text-anchor="middle" class="L">Latin alphabet with key additions and digraphs:</text>
<text x="240" y="283" text-anchor="middle" class="L">à è é ó ò ú ü ï: accented vowels mark quality and stress</text>
<text x="240" y="294" text-anchor="middle" class="L">ç (ce-trencada): /s/ before a/o/u • força "strength"</text>
<text x="240" y="305" text-anchor="middle" class="L">·l (ela geminada): doubled L • intel·ligència "intelligence"</text>
<text x="240" y="316" text-anchor="middle" class="L">ny = /ɲ/ (same as Spanish ñ) • ny in "Catalunya"</text>
<line x1="20" y1="324" x2="460" y2="324" stroke="#555" stroke-width="0.5"/>
<text x="240" y="332" text-anchor="middle" class="H">CATALAN DISTINCTIVE SPELLINGS</text>
<text x="240" y="343" text-anchor="middle" class="L">tg/tj = /dʒ/ (affricate): viatge "journey", jutge "judge"</text>
<text x="240" y="354" text-anchor="middle" class="L">ig at word end = /tʃ/: mig "half", boig "crazy"</text>
<text x="240" y="365" text-anchor="middle" class="Ls">Final devoicing: not in spelling but in pronunciation</text>
<line x1="20" y1="373" x2="460" y2="373" stroke="#555" stroke-width="0.5"/>
<text x="240" y="381" text-anchor="middle" class="H">PARALLEL &amp; DIVERGENT SPELLINGS</text>
<text x="240" y="392" text-anchor="middle" class="L">Spanish: mañana  •  Catalan: demà (different word, same meaning)</text>
<text x="240" y="403" text-anchor="middle" class="L">Spanish: agua  •  Catalan: aigua (preserved Latin diphthong)</text>
<text x="240" y="414" text-anchor="middle" class="L">Spanish: cañon  •  Catalan: cañó (same ñ letter!)</text>
<text x="240" y="425" text-anchor="middle" class="Ls">Shared Latin base; divergent Romance evolution visible in text</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 26a ALT  ·  SPANISH / CATALAN  ·  SCRIPT</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
