<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SPANISH</text>
<text x="240" y="40" text-anchor="middle" class="S">GRAMMAR &amp; VERB SYSTEM</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SPANISH VERB SYSTEM</text>
<text x="240" y="68" text-anchor="middle" class="L">Three conjugation classes: -ar • -er • -ir</text>
<text x="240" y="79" text-anchor="middle" class="L">hablar (speak): hablo • hablas • habla • hablamos • hablan</text>
<text x="240" y="90" text-anchor="middle" class="L">14 tenses/moods: indicative (6) • subjunctive (4) • imperative...</text>
<text x="240" y="101" text-anchor="middle" class="L">Subjunctive: quiero que vengas "I want you to come"</text>
<line x1="20" y1="109" x2="460" y2="109" stroke="#555" stroke-width="0.5"/>
<text x="240" y="117" text-anchor="middle" class="H">SER vs. ESTAR</text>
<text x="240" y="128" text-anchor="middle" class="L">Two "to be" verbs (unique in Romance family):</text>
<text x="240" y="139" text-anchor="middle" class="L">SER: permanent qualities, identity, origin, time</text>
<text x="240" y="150" text-anchor="middle" class="L">ESTAR: temporary states, location, feelings, ongoing actions</text>
<text x="240" y="161" text-anchor="middle" class="Ls">Ella es guapa "She is beautiful" (general quality)</text>
<text x="240" y="172" text-anchor="middle" class="Ls">Ella está guapa "She looks beautiful" (right now)</text>
<line x1="20" y1="180" x2="460" y2="180" stroke="#555" stroke-width="0.5"/>
<text x="240" y="188" text-anchor="middle" class="H">SPANISH NOUN SYSTEM</text>
<text x="240" y="199" text-anchor="middle" class="L">Two genders: masculine / feminine (no neuter)</text>
<text x="240" y="210" text-anchor="middle" class="L">el libro (masc.) • la mesa (fem.) • los libros • las mesas</text>
<text x="240" y="221" text-anchor="middle" class="Ls">Articles and adjectives agree: un libro rojo • una mesa roja</text>
<line x1="20" y1="229" x2="460" y2="229" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="236" width="460" height="13" fill="#111"/>
<text x="240" y="245.5" text-anchor="middle" class="Hb">CATALAN GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="261" text-anchor="middle" class="H">CATALAN VERB SYSTEM</text>
<text x="240" y="272" text-anchor="middle" class="L">Three conjugation classes: -ar • -er • -re / -ir</text>
<text x="240" y="283" text-anchor="middle" class="L">parlar (speak): parlo • parles • parla • parlem • parlen</text>
<text x="240" y="294" text-anchor="middle" class="L">Periphrastic past: vaig parlar "I spoke" (vaig + infinitive)</text>
<text x="240" y="305" text-anchor="middle" class="Ls">Catalan uses periphrastic past in speech (not simple past)</text>
<line x1="20" y1="313" x2="460" y2="313" stroke="#555" stroke-width="0.5"/>
<text x="240" y="321" text-anchor="middle" class="H">CATALAN SER vs. ESTAR</text>
<text x="240" y="332" text-anchor="middle" class="L">Catalan ALSO has ser/estar distinction (like Spanish)!</text>
<text x="240" y="343" text-anchor="middle" class="L">és (ser, permanent) • està (estar, temporary)</text>
<text x="240" y="354" text-anchor="middle" class="Ls">French lacks this; Catalan shares it with Spanish and Portuguese</text>
<line x1="20" y1="362" x2="460" y2="362" stroke="#555" stroke-width="0.5"/>
<text x="240" y="370" text-anchor="middle" class="H">CATALAN NOUN SYSTEM</text>
<text x="240" y="381" text-anchor="middle" class="L">Two genders: masculine / feminine</text>
<text x="240" y="392" text-anchor="middle" class="L">el (masc.) • la (fem.) • els / les (plurals)</text>
<text x="240" y="403" text-anchor="middle" class="L">Partitive article: del/de la (not in Spanish standard)</text>
<line x1="20" y1="411" x2="460" y2="411" stroke="#555" stroke-width="0.5"/>
<text x="240" y="419" text-anchor="middle" class="H">GRAMMATICAL PARALLELS</text>
<text x="240" y="430" text-anchor="middle" class="L">Both: two genders • noun-adjective agreement • articles</text>
<text x="240" y="441" text-anchor="middle" class="L">Both: ser/estar distinction • subjunctive mood</text>
<text x="240" y="452" text-anchor="middle" class="L">Both: pro-drop (subject pronouns optional)</text>
<text x="240" y="463" text-anchor="middle" class="Ls">Catalan: periphrastic past dominant • Spanish: simple past common</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 26c ALT  ·  SPANISH / CATALAN  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
