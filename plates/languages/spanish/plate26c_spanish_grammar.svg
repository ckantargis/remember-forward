<line x1="20" y1="430" x2="460" y2="430" stroke="black" stroke-width="0.3"/>
<text x="240" y="439" text-anchor="middle" class="H" >— THE TWO "TO BE" VERBS — SER AND ESTAR —</text>
<text x="100" y="449" text-anchor="middle" class="Lx" >SER (permanent / identity)</text>
<text x="360" y="449" text-anchor="middle" class="Lx" >ESTAR (state / position)</text>
<text x="40" y="458" text-anchor="start" class="Ls" >Mi madre es médica</text>
<text x="40" y="465" text-anchor="start" class="Lx" >My mother is a doctor (identity)</text>
<text x="255" y="458" text-anchor="start" class="Ls" >Estoy cansado</text>
<text x="255" y="465" text-anchor="start" class="Lx" >I am tired (state)</text>
<text x="40" y="472" text-anchor="start" class="Ls" >El cielo es azul</text>
<text x="40" y="479" text-anchor="start" class="Lx" >The sky is blue (inherent)</text>
<text x="255" y="472" text-anchor="start" class="Ls" >El libro está en la mesa</text>
<text x="255" y="479" text-anchor="start" class="Lx" >The book is on the table (position)</text>
<text x="40" y="486" text-anchor="start" class="Ls" >La fiesta es en Madrid</text>
<text x="40" y="493" text-anchor="start" class="Lx" >The party is in Madrid (event location)</text>
<text x="255" y="486" text-anchor="start" class="Ls" >Está muerto</text>
<text x="255" y="493" text-anchor="start" class="Lx" >He is dead (resulting state)</text>
<line x1="20" y1="508" x2="460" y2="508" stroke="black" stroke-width="0.3"/>
<text x="240" y="517" text-anchor="middle" class="H" >— TENSE SYSTEM OVERVIEW —</text>
<text x="240" y="528" text-anchor="middle" class="Ls" >Spanish has 14 indicative tenses/moods + 6 subjunctive forms + imperative.</text>
<text x="240" y="537" text-anchor="middle" class="Ls" >Key distinction: pretérito indefinido (completed) vs imperfecto (ongoing/habitual in past).</text>
<text x="240" y="546" text-anchor="middle" class="Ls" >Hablé (I spoke once, done) vs hablaba (I was speaking / I used to speak).</text>
<text x="240" y="555" text-anchor="middle" class="Ls" >Future can be expressed with ir a + infinitive: voy a hablar "I am going to speak".</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
