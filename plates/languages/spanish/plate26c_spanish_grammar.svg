<text x="115" y="178" text-anchor="middle" class="Ls" >habláis</text>
<text x="200" y="178" text-anchor="middle" class="Lx" >you pl. (Spain)</text>
<text x="280" y="178" text-anchor="middle" class="Lx" >vosotros</text>
<text x="355" y="178" text-anchor="middle" class="Ls" >hablasteis</text>
<text x="440" y="178" text-anchor="start" class="Lx" >you pl.</text>
<text x="45" y="189" text-anchor="middle" class="Lx" >ellos</text>
<text x="115" y="189" text-anchor="middle" class="Ls" >hablan</text>
<text x="200" y="189" text-anchor="middle" class="Lx" >they speak</text>
<text x="280" y="189" text-anchor="middle" class="Lx" >ellos</text>
<text x="355" y="189" text-anchor="middle" class="Ls" >hablaron</text>
<text x="440" y="189" text-anchor="start" class="Lx" >they spoke</text>
<text x="240" y="208" text-anchor="middle" class="Ls" >Subjunctive: hable, hables, hable... — used for doubt, wishes, emotions, hypotheticals.</text>
<text x="240" y="217" text-anchor="middle" class="Ls" >Ser vs Estar: both mean "to be" — ser = permanent identity; estar = state/location/condition.</text>
<line x1="20" y1="225" x2="460" y2="225" stroke="black" stroke-width="0.3"/>
<text x="240" y="234" text-anchor="middle" class="H" >— OBJECT PRONOUNS AND REFLEXIVES —</text>
<text x="240" y="245" text-anchor="middle" class="Ls" >Direct: me, te, lo/la, nos, os, los/las — Lo veo "I see him/it"</text>
<text x="240" y="254" text-anchor="middle" class="Ls" >Indirect: me, te, le, nos, os, les — Le doy el libro "I give him the book"</text>
<text x="240" y="263" text-anchor="middle" class="Ls" >Reflexive: me, te, se, nos, os, se — Se lava "he/she washes (him/herself)"</text>
<text x="240" y="272" text-anchor="middle" class="Ls" >Clitic climbing: with infinitives — Quiero verlo OR Lo quiero ver (both = "I want to see it")</text>
<line x1="20" y1="280" x2="460" y2="280" stroke="black" stroke-width="0.3"/>
<text x="240" y="289" text-anchor="middle" class="H" >— CORE VOCABULARY — 25 WORDS —</text>
