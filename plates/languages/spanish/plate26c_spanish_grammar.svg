<text x="240" y="32" text-anchor="middle" class="T" >SPANISH — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 26C OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— SVO LANGUAGE — FLEXIBLE ORDER, NULL SUBJECT —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Spanish is SVO but highly flexible — any constituent can front for emphasis or topic.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >NULL SUBJECT: subject pronouns optional — verb ending marks person/number: (yo) hablo = "I speak".</text>
<text x="240" y="98" text-anchor="middle" class="Ls" >Two genders: masculine (-o) and feminine (-a). Adjectives agree: libro rojo / mesa roja.</text>
<line x1="20" y1="106" x2="460" y2="106" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H" >— VERB CONJUGATION — hablar "to speak" (regular -ar) —</text>
<text x="105" y="125" text-anchor="middle" class="Lx" >Present Indicative</text>
<text x="355" y="125" text-anchor="middle" class="Lx" >Preterite (simple past)</text>
<text x="45" y="134" text-anchor="middle" class="Lx" >yo</text>
<text x="115" y="134" text-anchor="middle" class="Ls" >hablo</text>
<text x="200" y="134" text-anchor="middle" class="Lx" >I speak</text>
