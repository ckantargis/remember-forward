<text x="240" y="32" text-anchor="middle" class="T" >PORTUGUESE — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 27C OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— SVO — NULL SUBJECT — TWO GENDERS —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Portuguese is SVO, null-subject, two genders (M/F). Very similar structure to Spanish.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >Key differences from Spanish: nasal vowels, personal infinitive, future subjunctive, mesoclisis.</text>
<line x1="20" y1="97" x2="460" y2="97" stroke="black" stroke-width="0.3"/>
