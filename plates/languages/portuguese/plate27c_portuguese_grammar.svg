<line x1="20" y1="199" x2="460" y2="199" stroke="black" stroke-width="0.3"/>
<text x="240" y="208" text-anchor="middle" class="H" >— PERSONAL INFINITIVE — UNIQUE FEATURE —</text>
<text x="240" y="219" text-anchor="middle" class="L" >Portuguese is rare in having an INFLECTED infinitive — it takes subject endings even in the infinitive.</text>
<text x="240" y="229" text-anchor="middle" class="Ls" >Standard: "É importante trabalhar" (It is important to work — impersonal)</text>
<text x="240" y="238" text-anchor="middle" class="Ls" >Personal: "É importante trabalharmos" (It is important for us to work — specified subject)</text>
<text x="240" y="247" text-anchor="middle" class="Lx" >Forms: trabalhar / trabalhares / trabalhar / trabalharmos / trabalhardes / trabalharem</text>
<line x1="20" y1="255" x2="460" y2="255" stroke="black" stroke-width="0.3"/>
<text x="240" y="264" text-anchor="middle" class="H" >— FUTURE SUBJUNCTIVE — ANOTHER UNIQUE FEATURE —</text>
<text x="240" y="275" text-anchor="middle" class="Ls" >Portuguese retains the future subjunctive, lost in Spanish: used in temporal/conditional clauses.</text>
<text x="240" y="284" text-anchor="middle" class="Ls" >"Quando chegar" = "When (he/she) arrives" (future sub.) — Spanish uses present sub. here.</text>
<text x="240" y="293" text-anchor="middle" class="Ls" >"Se você quiser" = "If you want" — future sub.; Spanish: "Si quieres" (present indicative).</text>
<line x1="20" y1="301" x2="460" y2="301" stroke="black" stroke-width="0.3"/>
