<text x="240" y="462" text-anchor="middle" class="H" >— SER VS ESTAR AND FICAR —</text>
<text x="240" y="473" text-anchor="middle" class="L" >Portuguese has three "to be" verbs: ser (identity), estar (state/position), ficar (become/stay).</text>
<text x="240" y="483" text-anchor="middle" class="Ls" >Ela é professora (She IS a teacher — ser, identity).</text>
<text x="240" y="492" text-anchor="middle" class="Ls" >Ela está cansada (She IS tired — estar, state).</text>
<text x="240" y="501" text-anchor="middle" class="Ls" >Ela ficou triste (She BECAME sad / She STAYED sad — ficar, change or continuation of state).</text>
<text x="240" y="510" text-anchor="middle" class="Ls" >Ficar distinguishes Portuguese from Spanish, which uses quedarse or ponerse for similar meanings.</text>
