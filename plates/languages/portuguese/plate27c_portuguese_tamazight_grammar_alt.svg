<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<style>
  text { font-family: Georgia, serif; }
  .T{font-size:11px;font-weight:bold;letter-spacing:1.5px}
  .S{font-size:6.5px;letter-spacing:1.5px}
  .H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px}
  .Hb{font-size:7px;font-weight:bold;letter-spacing:2px}
  .L{font-size:7px} .Ls{font-size:6px} .Lx{font-size:5.5px}
  .M{font-size:6px;letter-spacing:1px}
  .F{font-size:7px;font-style:italic}
  .Fb{font-size:7.5px;font-weight:bold}
</style>
<rect x="0" y="0" width="480" height="680" fill="white"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">PORTUGUESE (PORTUGUÊS) / TAMAZIGHT (ⵜⴰⵎⴰⵣⵉⵖⵜ)</text>
<text x="240" y="44" text-anchor="middle" class="S">INDO-EUROPEAN / AFROASIATIC · GRAMMAR &amp; VOCABULARY</text>
<line x1="20" y1="50" x2="460" y2="50" stroke="black" stroke-width="0.5"/>
<text x="240" y="60" text-anchor="middle" class="H">PLATE 27C ALT · GRAMMAR &amp; CORE VOCABULARY</text>
<line x1="20" y1="66" x2="460" y2="66" stroke="black" stroke-width="0.3"/>
<text x="240" y="77" text-anchor="middle" class="H">— PORTUGUESE GRAMMAR —</text>
<text x="240" y="88" text-anchor="middle" class="Ls">SVO word order · 2 genders (masc/fem) · verb conjugation rich in person and tense</text>
<text x="240" y="99" text-anchor="middle" class="Ls">Personal infinitive: unique to Portuguese — the infinitive inflects for person</text>
<line x1="20" y1="105" x2="460" y2="105" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H">PERSONAL INFINITIVE (UNIQUE TO PORTUGUESE)</text>
<text x="240" y="126" text-anchor="middle" class="Ls">Most languages: infinitive does not inflect — in Portuguese it does:</text>
<text x="240" y="137" text-anchor="middle" class="Ls">para eu falar = for I-to-speak (1sg) · para tu falares = for you-to-speak (2sg)</text>
<text x="240" y="148" text-anchor="middle" class="Ls">para ele falar = for him-to-speak (3sg) · para nós falarmos = for us-to-speak (1pl)</text>
<text x="240" y="159" text-anchor="middle" class="Ls">This allows unambiguous reference in purpose clauses without a conjunction</text>
<line x1="20" y1="165" x2="460" y2="165" stroke="black" stroke-width="0.3"/>
<text x="240" y="175" text-anchor="middle" class="H">PORTUGUESE VERB TENSES</text>
<text x="240" y="186" text-anchor="middle" class="Ls">Indicative: present · imperfect · perfect · pluperfect · future · conditional</text>
<text x="240" y="197" text-anchor="middle" class="Ls">Subjunctive: present · imperfect · future — yes, FUTURE SUBJUNCTIVE!</text>
<text x="240" y="208" text-anchor="middle" class="Ls">Future subjunctive: "If I am [in the future] there..." — unique in Romance</text>
<line x1="20" y1="214" x2="460" y2="214" stroke="black" stroke-width="0.3"/>
<text x="240" y="224" text-anchor="middle" class="H">CORE VOCABULARY</text>
<text x="100" y="235" text-anchor="middle" class="Lx">GLOSS</text>
<text x="240" y="235" text-anchor="middle" class="Lx">PORTUGUESE</text>
<text x="390" y="235" text-anchor="middle" class="Lx">NOTES</text>
<line x1="20" y1="239" x2="460" y2="239" stroke="black" stroke-width="0.3"/>
<text x="100" y="248" text-anchor="middle" class="Ls">I</text>
<text x="240" y="248" text-anchor="middle" class="Ls">eu</text>
<text x="390" y="248" text-anchor="middle" class="Ls">from Latin ego</text>
<text x="100" y="258" text-anchor="middle" class="Ls">you</text>
<text x="240" y="258" text-anchor="middle" class="Ls">tu / você</text>
<text x="390" y="258" text-anchor="middle" class="Ls">tu=intimate, você=polite</text>
<text x="100" y="268" text-anchor="middle" class="Ls">water</text>
<text x="240" y="268" text-anchor="middle" class="Ls">água</text>
<text x="390" y="268" text-anchor="middle" class="Ls">Latin aqua</text>
<text x="100" y="278" text-anchor="middle" class="Ls">eat</text>
<text x="240" y="278" text-anchor="middle" class="Ls">comer</text>
<text x="390" y="278" text-anchor="middle" class="Ls">Latin comedere</text>
<text x="100" y="288" text-anchor="middle" class="Ls">go</text>
<text x="240" y="288" text-anchor="middle" class="Ls">ir</text>
<text x="390" y="288" text-anchor="middle" class="Ls">suppletive: vou/vai (pres)</text>
<text x="100" y="298" text-anchor="middle" class="Ls">love</text>
<text x="240" y="298" text-anchor="middle" class="Ls">amor</text>
<text x="390" y="298" text-anchor="middle" class="Ls">amar = verb form</text>
<line x1="20" y1="310" x2="460" y2="310" stroke="black" stroke-width="1.5"/>
<rect x="20" y="313" width="440" height="14" fill="black"/>
<text x="240" y="323" text-anchor="middle" class="Hb" fill="white">TAMAZIGHT — GRAMMAR: STATE, GENDER &amp; ROOT SYSTEM</text>
<line x1="20" y1="327" x2="460" y2="327" stroke="black" stroke-width="0.3"/>
<text x="240" y="334" text-anchor="middle" class="H">— TAMAZIGHT GRAMMAR —</text>
<text x="240" y="345" text-anchor="middle" class="Ls">VSO or SVO word order (debated; varies by variety)</text>
<text x="240" y="356" text-anchor="middle" class="Ls">TWO STATES: free (absolute) vs annexed (construct) — noun changes based on syntax</text>
<line x1="20" y1="362" x2="460" y2="362" stroke="black" stroke-width="0.3"/>
<text x="240" y="372" text-anchor="middle" class="H">THE TWO STATES OF NOUNS</text>
<text x="240" y="383" text-anchor="middle" class="Ls">FREE (absolute) state: used when noun is predicate, after "and", at start of sentence</text>
<text x="240" y="394" text-anchor="middle" class="Ls">ANNEXED (construct) state: after verb (subject), after numbers, after prepositions</text>
<text x="100" y="405" text-anchor="middle" class="Lx">GLOSS</text>
<text x="240" y="405" text-anchor="middle" class="Lx">FREE STATE</text>
<text x="390" y="405" text-anchor="middle" class="Lx">ANNEXED STATE</text>
<line x1="20" y1="409" x2="460" y2="409" stroke="black" stroke-width="0.3"/>
<text x="100" y="418" text-anchor="middle" class="Ls">man</text>
<text x="240" y="418" text-anchor="middle" class="Ls">argaz</text>
<text x="390" y="418" text-anchor="middle" class="Ls">urgaz (after verb/prep)</text>
<text x="100" y="428" text-anchor="middle" class="Ls">house</text>
<text x="240" y="428" text-anchor="middle" class="Ls">axxam</text>
<text x="390" y="428" text-anchor="middle" class="Ls">uxxam (after verb/prep)</text>
<text x="100" y="438" text-anchor="middle" class="Ls">woman</text>
<text x="240" y="438" text-anchor="middle" class="Ls">tamghart</text>
<text x="390" y="438" text-anchor="middle" class="Ls">temghart (annexed)</text>
<line x1="20" y1="443" x2="460" y2="443" stroke="black" stroke-width="0.3"/>
<text x="240" y="453" text-anchor="middle" class="H">GENDER: t- CIRCUMFIX FOR FEMININE</text>
<text x="240" y="464" text-anchor="middle" class="Ls">Masculine: a- prefix · Feminine: t-...-t circumfix</text>
<text x="240" y="475" text-anchor="middle" class="Ls">argaz (man, masc.) · tamghart (woman, fem.) — same root, different shape</text>
<text x="240" y="486" text-anchor="middle" class="Ls">Amzigh (free man) · Tamazight (free woman = the language name)</text>
<line x1="20" y1="492" x2="460" y2="492" stroke="black" stroke-width="0.3"/>
<text x="240" y="502" text-anchor="middle" class="H">CORE VOCABULARY (TACHELHIT)</text>
<text x="100" y="513" text-anchor="middle" class="Lx">GLOSS</text>
<text x="240" y="513" text-anchor="middle" class="Lx">TACHELHIT</text>
<text x="390" y="513" text-anchor="middle" class="Lx">KABYLE (N. ALGERIA)</text>
<line x1="20" y1="517" x2="460" y2="517" stroke="black" stroke-width="0.3"/>
<text x="100" y="526" text-anchor="middle" class="Ls">water</text>
<text x="240" y="526" text-anchor="middle" class="Ls">aman</text>
<text x="390" y="526" text-anchor="middle" class="Ls">aman (same!)</text>
<text x="100" y="536" text-anchor="middle" class="Ls">eat</text>
<text x="240" y="536" text-anchor="middle" class="Ls">ttcha / etch</text>
<text x="390" y="536" text-anchor="middle" class="Ls">etch</text>
<text x="100" y="546" text-anchor="middle" class="Ls">I</text>
<text x="240" y="546" text-anchor="middle" class="Ls">nkk / nek</text>
<text x="390" y="546" text-anchor="middle" class="Ls">nec</text>
<text x="100" y="556" text-anchor="middle" class="Ls">house</text>
<text x="240" y="556" text-anchor="middle" class="Ls">axxam</text>
<text x="390" y="556" text-anchor="middle" class="Ls">axxam (same!)</text>
<text x="100" y="566" text-anchor="middle" class="Ls">good</text>
<text x="240" y="566" text-anchor="middle" class="Ls">ifulki / iyzdi</text>
<text x="390" y="566" text-anchor="middle" class="Ls">yelha / ifrir</text>
<line x1="20" y1="571" x2="460" y2="571" stroke="black" stroke-width="0.3"/>
<text x="240" y="581" text-anchor="middle" class="H">SURVIVAL PHRASES</text>
<text x="240" y="592" text-anchor="middle" class="Ls">Azul! / Marhba! = Hello! (Kabyle / Tachelhit)</text>
<text x="240" y="603" text-anchor="middle" class="Ls">Tanemmirt = Thank you (Tachelhit) · Tanmirt = Thank you (Kabyle)</text>
<text x="240" y="614" text-anchor="middle" class="Ls">Aman lla? = Where is water? (Kabyle: aman=water, lla=where)</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.5"/>
<text x="240" y="620" text-anchor="middle" class="M">PLATE 27C ALT · PORTUGUESE / TAMAZIGHT · GRAMMAR &amp;amp; CORE VOCABULARY · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.5"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>
