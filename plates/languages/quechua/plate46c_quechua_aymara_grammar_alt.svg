<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">QUECHUA</text>
<text x="240" y="40" text-anchor="middle" class="S">AGGLUTINATIVE GRAMMAR</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">AGGLUTINATION — SUFFIX STACKING</text>
<text x="240" y="68" text-anchor="middle" class="L">Quechua adds multiple suffixes to a single root:</text>
<text x="240" y="79" text-anchor="middle" class="L">wasi = house</text>
<text x="240" y="90" text-anchor="middle" class="L">wasiy = my house</text>
<text x="240" y="101" text-anchor="middle" class="L">wasiykipi = in your house</text>
<text x="240" y="112" text-anchor="middle" class="L">wasiykipichu = not in your house (question/negative)</text>
<text x="240" y="123" text-anchor="middle" class="Ls">wasiykipichum = and not in your house (evidential!)</text>
<line x1="20" y1="131" x2="460" y2="131" stroke="#555" stroke-width="0.5"/>
<text x="240" y="139" text-anchor="middle" class="H">EVIDENTIALITY — UNIQUE FEATURE</text>
<text x="240" y="150" text-anchor="middle" class="L">Quechua requires marking HOW you know information:</text>
<text x="240" y="161" text-anchor="middle" class="L">-m/-mi: direct evidence (I saw it myself)</text>
<text x="240" y="172" text-anchor="middle" class="L">-s/-si: reported/hearsay (I heard it from someone)</text>
<text x="240" y="183" text-anchor="middle" class="L">-chʼ/-chi: inference (I deduce it from clues)</text>
<text x="240" y="194" text-anchor="middle" class="Ls">Para-m paran  "It is raining" (I can see it)</text>
<text x="240" y="204" text-anchor="middle" class="Ls">Para-s paran  "They say it is raining" (hearsay)</text>
<line x1="20" y1="212" x2="460" y2="212" stroke="#555" stroke-width="0.5"/>
<text x="240" y="220" text-anchor="middle" class="H">PERSONAL SUFFIXES ON VERBS</text>
<text x="240" y="231" text-anchor="middle" class="Ls">Verbs mark person of subject and object simultaneously:</text>
<text x="240" y="242" text-anchor="middle" class="Ls">riku-ni = I see  •  riku-nki = you see  •  riku-n = s/he sees</text>
<text x="240" y="253" text-anchor="middle" class="Ls">riku-wa-nki = you see me  (object -wa- inserted)</text>
<line x1="20" y1="261" x2="460" y2="261" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="268" width="460" height="13" fill="#111"/>
<text x="240" y="277.5" text-anchor="middle" class="Hb">AYMARA GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="293" text-anchor="middle" class="H">AYMARA AGGLUTINATION</text>
<text x="240" y="304" text-anchor="middle" class="L">Same agglutinative structure as Quechua:</text>
<text x="240" y="315" text-anchor="middle" class="L">uta = house  •  utaja = my house  •  utajana = in my house</text>
<line x1="20" y1="323" x2="460" y2="323" stroke="#555" stroke-width="0.5"/>
<text x="240" y="331" text-anchor="middle" class="H">AYMARA EVIDENTIALITY</text>
<text x="240" y="342" text-anchor="middle" class="L">Aymara also has grammaticalized evidentiality!</text>
<text x="240" y="353" text-anchor="middle" class="L">-wa: personal knowledge  •  -tayna: historical/inferred</text>
<text x="240" y="364" text-anchor="middle" class="Ls">Para-wa "It is raining" (I know directly)</text>
<text x="240" y="375" text-anchor="middle" class="Ls">Same evidentiality system as Quechua — areal feature!</text>
<line x1="20" y1="383" x2="460" y2="383" stroke="#555" stroke-width="0.5"/>
<text x="240" y="391" text-anchor="middle" class="H">UNIQUE AYMARA FEATURE: SPATIAL TENSE</text>
<text x="240" y="402" text-anchor="middle" class="L">Aymara encodes future as BEHIND, past as AHEAD:</text>
<text x="240" y="413" text-anchor="middle" class="Ls">Future = what you cannot see (behind you)</text>
<text x="240" y="424" text-anchor="middle" class="Ls">Past = what you have already seen (in front of you)</text>
<text x="240" y="435" text-anchor="middle" class="Ls">Opposite of English spatial metaphor for time</text>
<line x1="20" y1="443" x2="460" y2="443" stroke="#555" stroke-width="0.5"/>
<text x="240" y="451" text-anchor="middle" class="H">SHARED GRAMMATICAL FEATURES</text>
<text x="240" y="462" text-anchor="middle" class="L">Both: SOV  •  agglutinative  •  postpositions  •  evidentiality</text>
<text x="240" y="473" text-anchor="middle" class="L">Both: no grammatical gender  •  no articles</text>
<text x="240" y="484" text-anchor="middle" class="Ls">Both: verbs agree with subject and object person/number</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 46c ALT  ·  QUECHUA / AYMARA  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
