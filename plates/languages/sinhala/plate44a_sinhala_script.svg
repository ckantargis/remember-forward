<text x="240" y="32" text-anchor="middle" class="T" >SINHALA</text>
<text x="240" y="50" text-anchor="middle" class="S" >සිංහල — Script (Abugida)</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— WRITING SYSTEM — ABUGIDA —</text>
<text x="240" y="84" text-anchor="middle" class="Ls" >Sinhala script: abugida derived from Brahmi via Old Sinhala (3rd century BCE).</text>
<text x="240" y="94" text-anchor="middle" class="Ls" >Distinctive rounded letters. Written left to right. 54 letters total.</text>
<text x="240" y="104" text-anchor="middle" class="Ls" >Consonants carry inherent vowel /a/. Diacritics modify or cancel the vowel.</text>
<line x1="20" y1="112" x2="460" y2="112" stroke="black" stroke-width="0.3"/>
<text x="240" y="121" text-anchor="middle" class="H" >— INDEPENDENT VOWEL LETTERS —</text>
<text x="45" y="131" text-anchor="middle" class="Lsi" >අ</text>
<text x="45" y="140" text-anchor="middle" class="Lx" >a</text>
<text x="113" y="131" text-anchor="middle" class="Lsi" >ආ</text>
<text x="113" y="140" text-anchor="middle" class="Lx" >aa</text>
<text x="181" y="131" text-anchor="middle" class="Lsi" >ඇ</text>
<text x="181" y="140" text-anchor="middle" class="Lx" >ae</text>
<text x="249" y="131" text-anchor="middle" class="Lsi" >ඈ</text>
<text x="249" y="140" text-anchor="middle" class="Lx" >aae</text>
<text x="317" y="131" text-anchor="middle" class="Lsi" >ඉ</text>
<text x="317" y="140" text-anchor="middle" class="Lx" >i</text>
<text x="385" y="131" text-anchor="middle" class="Lsi" >ඊ</text>
<text x="385" y="140" text-anchor="middle" class="Lx" >ii</text>
<text x="45" y="145" text-anchor="middle" class="Lsi" >උ</text>
<text x="45" y="154" text-anchor="middle" class="Lx" >u</text>
