<line x1="20" y1="255" x2="460" y2="255" stroke="black" stroke-width="0.3"/>
<text x="240" y="264" text-anchor="middle" class="H" >— VOWEL DIACRITICS —</text>
<text x="240" y="274" text-anchor="middle" class="Ls" >Vowel diacritics (pilla) are written around the base consonant:</text>
<text x="65" y="284" text-anchor="middle" class="Lsis" >කා = ka + aa = kaa</text>
<text x="195" y="284" text-anchor="middle" class="Lsis" >කි = ka + i = ki</text>
<text x="325" y="284" text-anchor="middle" class="Lsis" >කු = ka + u = ku</text>
<text x="65" y="295" text-anchor="middle" class="Lsis" >කේ = ka + ee = kee</text>
<text x="195" y="295" text-anchor="middle" class="Lsis" >කේ = ka + oo variant</text>
<text x="325" y="295" text-anchor="middle" class="Lsis" >කෟ = ka + o = ko</text>
<line x1="20" y1="322" x2="460" y2="322" stroke="black" stroke-width="0.3"/>
<text x="240" y="331" text-anchor="middle" class="H" >— SINHALA NUMERALS —</text>
<text x="240" y="341" text-anchor="middle" class="Lsi" >෦෧෨෩෪෫෬෭෮෯  (0–9)</text>
<text x="240" y="355" text-anchor="middle" class="Ls" >Sinhala numerals used in traditional contexts; Arabic numerals in modern use.</text>
<line x1="20" y1="363" x2="460" y2="363" stroke="black" stroke-width="0.3"/>
<text x="240" y="372" text-anchor="middle" class="H" >— SCRIPT HISTORY —</text>
<text x="240" y="382" text-anchor="middle" class="Ls" >Sinhala script: descended from Brahmi (Ashokan inscriptions ~3rd c BCE).</text>
<text x="240" y="392" text-anchor="middle" class="Ls" >Oldest surviving Sinhala inscriptions: ~3rd century BCE, in caves of Sri Lanka.</text>
<text x="240" y="402" text-anchor="middle" class="Ls" >Rounded letterforms developed through palm-leaf manuscripts (avoid leaf tearing).</text>
<text x="240" y="412" text-anchor="middle" class="Ls" >Sinhala script used for both Sinhala and Pali (Buddhist canonical language).</text>
<line x1="20" y1="420" x2="460" y2="420" stroke="black" stroke-width="0.3"/>
<text x="240" y="429" text-anchor="middle" class="H" >— DIGLOSSIC REGISTERS —</text>
<text x="240" y="439" text-anchor="middle" class="Ls" >Written (Literary) Sinhala vs. Spoken (Colloquial) Sinhala differ significantly.</text>
<text x="240" y="449" text-anchor="middle" class="Ls" >Literary: මැමා ගයා (mama gaya = I went). Spoken: මම ගියා (mama giya).</text>
<text x="240" y="459" text-anchor="middle" class="Ls" >Grammar, pronouns, and verb forms all differ between registers.</text>
<line x1="20" y1="610" x2="460" y2="610" stroke="black" stroke-width="0.3"/>
<text x="240" y="622" text-anchor="middle" class="M" >REMEMBER FORWARD — PLATE 44A — SINHALA: SCRIPT — rememberforward.org — CC BY-SA 4.0</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
