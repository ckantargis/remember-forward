<text x="113" y="154" text-anchor="middle" class="Lx" >uu</text>
<text x="181" y="145" text-anchor="middle" class="Lsi" >ඏ</text>
<text x="181" y="154" text-anchor="middle" class="Lx" >e</text>
<text x="249" y="145" text-anchor="middle" class="Lsi" >එ</text>
<text x="249" y="154" text-anchor="middle" class="Lx" >ee</text>
<text x="317" y="145" text-anchor="middle" class="Lsi" >ඔ</text>
<text x="317" y="154" text-anchor="middle" class="Lx" >o</text>
<text x="385" y="145" text-anchor="middle" class="Lsi" >ඖ</text>
<text x="385" y="154" text-anchor="middle" class="Lx" >oo</text>
<line x1="20" y1="167" x2="460" y2="167" stroke="black" stroke-width="0.3"/>
<text x="240" y="176" text-anchor="middle" class="H" >— SELECTED CONSONANTS —</text>
<text x="45" y="186" text-anchor="middle" class="Lsi" >ක</text>
<text x="45" y="195" text-anchor="middle" class="Lx" >ka</text>
<text x="113" y="186" text-anchor="middle" class="Lsi" >ග</text>
<text x="113" y="195" text-anchor="middle" class="Lx" >ga</text>
<text x="181" y="186" text-anchor="middle" class="Lsi" >ච</text>
<text x="181" y="195" text-anchor="middle" class="Lx" >ca</text>
<text x="249" y="186" text-anchor="middle" class="Lsi" >ජ</text>
<text x="249" y="195" text-anchor="middle" class="Lx" >ja</text>
<text x="317" y="186" text-anchor="middle" class="Lsi" >ට</text>
<text x="317" y="195" text-anchor="middle" class="Lx" >ta</text>
<text x="385" y="186" text-anchor="middle" class="Lsi" >ඩ</text>
<text x="385" y="195" text-anchor="middle" class="Lx" >da</text>
<text x="45" y="200" text-anchor="middle" class="Lsi" >ද</text>
<text x="45" y="209" text-anchor="middle" class="Lx" >na</text>
<text x="113" y="200" text-anchor="middle" class="Lsi" >ප</text>
<text x="113" y="209" text-anchor="middle" class="Lx" >pa</text>
<text x="181" y="200" text-anchor="middle" class="Lsi" >බ</text>
<text x="181" y="209" text-anchor="middle" class="Lx" >ba</text>
<text x="249" y="200" text-anchor="middle" class="Lsi" >ම</text>
<text x="249" y="209" text-anchor="middle" class="Lx" >ma</text>
<text x="317" y="200" text-anchor="middle" class="Lsi" >ය</text>
<text x="317" y="209" text-anchor="middle" class="Lx" >ya</text>
<text x="385" y="200" text-anchor="middle" class="Lsi" >ර</text>
