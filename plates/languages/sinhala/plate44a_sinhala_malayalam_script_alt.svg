<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SINHALA</text>
<text x="240" y="40" text-anchor="middle" class="S">SINHALA SCRIPT</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SINHALA SCRIPT — AN ABUGIDA</text>
<text x="240" y="68" text-anchor="middle" class="Ls">Derived from Brahmi via Grantha and Pallava scripts (~3rd c. BCE)</text>
<text x="240" y="79" text-anchor="middle" class="Ls">Rounded letterforms (written on palm leaves — curves avoid splits)</text>
<text x="240" y="90" text-anchor="middle" class="Ls">Consonants: inherent /a/ vowel, cancelled by diacritics</text>
<line x1="20" y1="98" x2="460" y2="98" stroke="#555" stroke-width="0.5"/>
<text x="240" y="106" text-anchor="middle" class="H">SINHALA CONSONANTS</text>
<text x="240" y="117" text-anchor="middle" class="L">ක /k/  ග /g/  ජ /j/  ට /ʈ/  ත /t/  ප /p/  බ /b/</text>
<text x="240" y="128" text-anchor="middle" class="L">ල /l/  ර /r/  ව /v/  ස /s/  හ /h/  ම /m/  න /n/</text>
<text x="240" y="139" text-anchor="middle" class="Ls">Sinhala has prenasalized stops: ඹ්ය ණ්ඩ (rare cross-linguistically)</text>
<line x1="20" y1="147" x2="460" y2="147" stroke="#555" stroke-width="0.5"/>
<text x="240" y="155" text-anchor="middle" class="H">SINHALA VOWELS</text>
<text x="240" y="166" text-anchor="middle" class="L">අ a  ආ ā  ඇ æ  ඈ æː  ඉ i  ඊ ī  උ u  ඌ ū</text>
<text x="240" y="177" text-anchor="middle" class="L">එ e  ඒ ē  ඔ o  ඕ ō  ඖ au</text>
<text x="240" y="188" text-anchor="middle" class="Ls">Sinhala uniquely preserves Old Sinhala vowels /æ/ and /æː/</text>
<line x1="20" y1="196" x2="460" y2="196" stroke="#555" stroke-width="0.5"/>
<text x="240" y="204" text-anchor="middle" class="H">SAMPLE TEXT</text>
<text x="240" y="216" text-anchor="middle" class="Fb">ආයුබෝගන්න</text>
<text x="240" y="227" text-anchor="middle" class="Ls">Ayubowan — "May you live long" (Sinhala greeting)</text>
<line x1="20" y1="235" x2="460" y2="235" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="242" width="460" height="13" fill="#111"/>
<text x="240" y="251.5" text-anchor="middle" class="Hb">MALAYALAM  ·  മലയാളം  ·  SECONDARY LANGUAGE</text>
<text x="240" y="267" text-anchor="middle" class="H">MALAYALAM SCRIPT</text>
<text x="240" y="278" text-anchor="middle" class="Ls">Also from Brahmi via Grantha; closely related to Sinhala script</text>
<text x="240" y="289" text-anchor="middle" class="Ls">Rounded letterforms — same palm leaf scribing tradition</text>
<text x="240" y="300" text-anchor="middle" class="L">~500 distinct characters including conjuncts</text>
<text x="240" y="311" text-anchor="middle" class="Ls">Reformed orthography 1971: reduced conjunct forms</text>
<line x1="20" y1="319" x2="460" y2="319" stroke="#555" stroke-width="0.5"/>
<text x="240" y="327" text-anchor="middle" class="H">MALAYALAM SAMPLE</text>
<text x="240" y="339" text-anchor="middle" class="Fb">നമസ്കാരം</text>
<text x="240" y="350" text-anchor="middle" class="Ls">Namaskaram — "Greetings" (formal greeting)</text>
<text x="240" y="361" text-anchor="middle" class="Ls">മലയാളം = mountain + valley language (mala + alam)</text>
<line x1="20" y1="369" x2="460" y2="369" stroke="#555" stroke-width="0.5"/>
<text x="240" y="377" text-anchor="middle" class="H">SCRIPT COMPARISON</text>
<text x="240" y="388" text-anchor="middle" class="L">Both: rounded Brahmi-derived abugidas</text>
<text x="240" y="399" text-anchor="middle" class="L">Both: inherent /a/ with vowel diacritics</text>
<text x="240" y="410" text-anchor="middle" class="L">Both: left-to-right direction</text>
<text x="240" y="421" text-anchor="middle" class="L">Sinhala: 54 consonants  •  Malayalam: 53 consonants</text>
<text x="240" y="432" text-anchor="middle" class="Ls">Both share Grantha heritage — visible in letterform shapes</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 44a ALT  ·  SINHALA / MALAYALAM  ·  SCRIPT</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
