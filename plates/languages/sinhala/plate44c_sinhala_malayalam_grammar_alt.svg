<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SINHALA</text>
<text x="240" y="40" text-anchor="middle" class="S">GRAMMAR &amp; STRUCTURE</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SINHALA WORD ORDER &amp; CASES</text>
<text x="240" y="68" text-anchor="middle" class="L">SOV with postpositions; 4 cases (nom/gen/dat/acc)</text>
<text x="240" y="79" text-anchor="middle" class="L">Nominative: maama "uncle"  •  Genitive: maamine "of uncle"</text>
<text x="240" y="90" text-anchor="middle" class="L">Dative: maama-ta "to uncle"  •  Accusative: maama-wa "uncle" (obj)</text>
<line x1="20" y1="98" x2="460" y2="98" stroke="#555" stroke-width="0.5"/>
<text x="240" y="106" text-anchor="middle" class="H">ANIMACY DISTINCTION</text>
<text x="240" y="117" text-anchor="middle" class="L">Sinhala distinguishes animate vs. inanimate in agreement:</text>
<text x="240" y="128" text-anchor="middle" class="L">Animate (people, animals): maama-la "uncles" (plural -la)</text>
<text x="240" y="139" text-anchor="middle" class="L">Inanimate (things): pota "books" (collective/unmarked)</text>
<text x="240" y="150" text-anchor="middle" class="Ls">Verbs also distinguish animate/inanimate subject</text>
<line x1="20" y1="158" x2="460" y2="158" stroke="#555" stroke-width="0.5"/>
<text x="240" y="166" text-anchor="middle" class="H">SINHALA VERB SYSTEM</text>
<text x="240" y="177" text-anchor="middle" class="L">Verbs mark tense (past/non-past), aspect, and voice</text>
<text x="240" y="188" text-anchor="middle" class="Ls">Non-past: present and future share same form (context determines)</text>
<text x="240" y="199" text-anchor="middle" class="L">Involuntary verbs: separate class for actions beyond control</text>
<text x="240" y="210" text-anchor="middle" class="Ls">"I fell" uses involuntary form — action happened to subject</text>
<line x1="20" y1="218" x2="460" y2="218" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="225" width="460" height="13" fill="#111"/>
<text x="240" y="234.5" text-anchor="middle" class="Hb">MALAYALAM GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="250" text-anchor="middle" class="H">MALAYALAM CASE SYSTEM (8 CASES)</text>
<text x="240" y="261" text-anchor="middle" class="L">More elaborate case system than Sinhala:</text>
<text x="240" y="272" text-anchor="middle" class="L">Nominative • Accusative • Dative • Sociative • Instrumental</text>
<text x="240" y="283" text-anchor="middle" class="L">Genitive • Locative • Vocative</text>
<text x="240" y="294" text-anchor="middle" class="Ls">Case suffixes agglutinate to noun stems</text>
<line x1="20" y1="302" x2="460" y2="302" stroke="#555" stroke-width="0.5"/>
<text x="240" y="310" text-anchor="middle" class="H">MALAYALAM GENDER SYSTEM</text>
<text x="240" y="321" text-anchor="middle" class="L">Three genders: masculine / feminine / neuter</text>
<text x="240" y="332" text-anchor="middle" class="Ls">Based on animacy and sex: rational (human) vs. irrational</text>
<text x="240" y="343" text-anchor="middle" class="Ls">Plants, animals (mostly): neuter • Humans: masc/fem</text>
<line x1="20" y1="351" x2="460" y2="351" stroke="#555" stroke-width="0.5"/>
<text x="240" y="359" text-anchor="middle" class="H">MALAYALAM VERB AGREEMENT</text>
<text x="240" y="370" text-anchor="middle" class="L">Verbs agree with subject in person, number, and gender</text>
<text x="240" y="381" text-anchor="middle" class="L">Rich tense system: past / present / future + aspects</text>
<text x="240" y="392" text-anchor="middle" class="Ls">Subjunctive and conditional moods well-developed</text>
<line x1="20" y1="400" x2="460" y2="400" stroke="#555" stroke-width="0.5"/>
<text x="240" y="408" text-anchor="middle" class="H">GRAMMATICAL PARALLELS</text>
<text x="240" y="419" text-anchor="middle" class="L">Both: SOV word order  •  postpositions  •  agglutinative</text>
<text x="240" y="430" text-anchor="middle" class="L">Both: animacy distinction in grammar</text>
<text x="240" y="441" text-anchor="middle" class="L">Both: Sanskrit loanword layer in vocabulary</text>
<text x="240" y="452" text-anchor="middle" class="Ls">Sinhala: Indo-Aryan with Dravidian substrate from Malayalam/Tamil</text>
<text x="240" y="463" text-anchor="middle" class="Ls">Malayalam: Dravidian with Sanskrit/Prakrit superstrate</text>
<text x="240" y="474" text-anchor="middle" class="Ls">Languages shaped each other across the Palk Strait</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 44c ALT  ·  SINHALA / MALAYALAM  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
