<text x="240" y="30" text-anchor="middle" class="T">GERMAN + POLISH — GRAMMAR · VOCABULARY</text>
<text x="240" y="46" text-anchor="middle" class="S">ALT DRAFT · SERIES 52C · REMEMBER FORWARD</text>
<line x1="20" y1="54" x2="460" y2="54" stroke="black" stroke-width="0.3"/>
<text x="240" y="63" text-anchor="middle" class="H">— GERMAN GRAMMAR — 4 CASES · 3 GENDERS · SOV SUBORDINATE —</text>
<text x="240" y="73" text-anchor="middle" class="Ls">German has 4 cases: Nominative (subject), Accusative (direct object), Dative (indirect object), Genitive (possession).</text>
<text x="240" y="82" text-anchor="middle" class="Lx">3 genders: masculine (der), feminine (die), neuter (das). Gender is grammatical, not natural.</text>
<text x="240" y="91" text-anchor="middle" class="Lx">Main clause: SVO — Ich lese das Buch. Subordinate clause: SOV — …weil ich das Buch lese.</text>
<line x1="20" y1="99" x2="460" y2="99" stroke="black" stroke-width="0.3"/>
<text x="240" y="107" text-anchor="middle" class="H">— GERMAN CASE SYSTEM — DER/DIE/DAS TABLE —</text>
<text x="55" y="117" text-anchor="middle" class="Lx">Case</text>
<text x="160" y="117" text-anchor="middle" class="Lx">Masc.</text>
<text x="255" y="117" text-anchor="middle" class="Lx">Fem.</text>
