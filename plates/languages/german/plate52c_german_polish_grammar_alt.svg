<text x="240" y="251" text-anchor="middle" class="Hb" fill="white">SECONDARY — POLISH (JĘZYK POLSKI) — GRAMMAR · VOCABULARY</text>
<line x1="20" y1="255" x2="460" y2="255" stroke="black" stroke-width="0.3"/>
<text x="240" y="264" text-anchor="middle" class="H">— POLISH GRAMMAR — 7 CASES · 3 GENDERS · FREE WORD ORDER —</text>
<text x="240" y="274" text-anchor="middle" class="Ls">Polish has 7 grammatical cases: Nominative, Genitive, Dative, Accusative, Instrumental, Locative, Vocative.</text>
<text x="240" y="283" text-anchor="middle" class="Lx">3 genders: masculine (animate/inanimate), feminine, neuter. Animacy affects accusative form.</text>
<text x="240" y="292" text-anchor="middle" class="Lx">Free word order: case endings mark grammar, so subject-verb order is flexible (SOV, SVO, OVS all possible).</text>
<line x1="20" y1="300" x2="460" y2="300" stroke="black" stroke-width="0.3"/>
<text x="240" y="308" text-anchor="middle" class="H">— POLISH CASE ENDINGS — woda (water, fem.) —</text>
<text x="80" y="318" text-anchor="middle" class="Lx">Nominative</text>
<text x="185" y="318" text-anchor="middle" class="Ls">woda</text>
<text x="360" y="318" text-anchor="middle" class="Lx">subject: Woda jest zimna (Water is cold)</text>
<text x="80" y="328" text-anchor="middle" class="Lx">Genitive</text>
<text x="185" y="328" text-anchor="middle" class="Ls">wody</text>
<text x="360" y="328" text-anchor="middle" class="Lx">possession/negation: szklanka wody (glass of water)</text>
<text x="80" y="338" text-anchor="middle" class="Lx">Dative</text>
<text x="185" y="338" text-anchor="middle" class="Ls">wodzie</text>
<text x="360" y="338" text-anchor="middle" class="Lx">indirect object: daj mi wodę (give me water)</text>
<text x="80" y="348" text-anchor="middle" class="Lx">Accusative</text>
<text x="185" y="348" text-anchor="middle" class="Ls">wodę</text>
<text x="360" y="348" text-anchor="middle" class="Lx">direct object: piję wodę (I drink water)</text>
<text x="80" y="358" text-anchor="middle" class="Lx">Instrumental</text>
<text x="185" y="358" text-anchor="middle" class="Ls">wodą</text>
<text x="360" y="358" text-anchor="middle" class="Lx">with/by: myję wodą (I wash with water)</text>
<text x="80" y="368" text-anchor="middle" class="Lx">Locative</text>
<text x="185" y="368" text-anchor="middle" class="Ls">wodzie</text>
<text x="360" y="368" text-anchor="middle" class="Lx">location: mówić o wodzie (to talk about water)</text>
<text x="80" y="378" text-anchor="middle" class="Lx">Vocative</text>
<text x="185" y="378" text-anchor="middle" class="Ls">wodo!</text>
<text x="360" y="378" text-anchor="middle" class="Lx">address: direct address, poetry</text>
<line x1="20" y1="393" x2="460" y2="393" stroke="black" stroke-width="0.3"/>
