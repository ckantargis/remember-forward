<line x1="20" y1="455" x2="460" y2="455" stroke="black" stroke-width="0.3"/>
<text x="240" y="463" text-anchor="middle" class="H">— GRAMMAR BRIDGE — CASE SYSTEMS COMPARED —</text>
<text x="240" y="473" text-anchor="middle" class="Ls">German: 4 cases, marked on articles and adjectives (not always noun endings).</text>
<text x="240" y="482" text-anchor="middle" class="Ls">Polish: 7 cases, marked directly on noun endings (and adjectives). No articles at all.</text>
<text x="240" y="491" text-anchor="middle" class="Lx">Both descended from Proto-Indo-European — German cases simplified from PIE; Polish preserved more.</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
