<rect x="6" y="6" width="468" height="668" fill="none" stroke="black" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" fill="none" stroke="black" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T" >GERMAN</text>
<text x="240" y="50" text-anchor="middle" class="S" >Grammar &amp; Core Vocabulary</text>
<line x1="20" y1="60" x2="460" y2="60" stroke="black" stroke-width="0.3"/>
<text x="240" y="72" text-anchor="middle" class="H" >— SENTENCE STRUCTURE — V2 AND SOV IN SUBORDINATE CLAUSES —</text>
<text x="240" y="82" text-anchor="middle" class="Ls" >Main clause: V2 (finite verb in 2nd position). Subordinate: verb final (SOV).</text>
<text x="240" y="92" text-anchor="middle" class="Ls" >Ich lese das Buch. / Das Buch lese ich. (V2: verb always 2nd)</text>
<text x="240" y="102" text-anchor="middle" class="Ls" >Ich weiß, dass er das Buch liest. (subordinate: verb final)</text>
<line x1="20" y1="110" x2="460" y2="110" stroke="black" stroke-width="0.3"/>
<text x="240" y="119" text-anchor="middle" class="H" >— THREE GENDERS AND FOUR CASES —</text>
<text x="240" y="129" text-anchor="middle" class="Ls" >Three grammatical genders: masculine (der), feminine (die), neuter (das).</text>
<text x="240" y="139" text-anchor="middle" class="Ls" >Four cases: Nominative (subject), Accusative (direct object), Dative (indirect object), Genitive (of).</text>
<text x="240" y="149" text-anchor="middle" class="Ls" >Articles change by case: der (nom) → den (acc) → dem (dat) → des (gen).</text>
<line x1="20" y1="157" x2="460" y2="157" stroke="black" stroke-width="0.3"/>
<text x="240" y="166" text-anchor="middle" class="H" >— STRONG VERBS — ABLAUT —</text>
<text x="240" y="176" text-anchor="middle" class="Lx" >Infinitive / 3sg present / simple past / past participle:</text>
<text x="60" y="186" text-anchor="middle" class="Lx" >fahren (drive)</text>
<text x="160" y="186" text-anchor="middle" class="Lx" >fährt</text>
<text x="240" y="186" text-anchor="middle" class="Lx" >fuhr</text>
<text x="340" y="186" text-anchor="middle" class="Lx" >gefahren</text>
<text x="60" y="196" text-anchor="middle" class="Lx" >sehen (see)</text>
<text x="160" y="196" text-anchor="middle" class="Lx" >sieht</text>
<text x="240" y="196" text-anchor="middle" class="Lx" >sah</text>
<text x="340" y="196" text-anchor="middle" class="Lx" >gesehen</text>
<text x="60" y="206" text-anchor="middle" class="Lx" >geben (give)</text>
<text x="160" y="206" text-anchor="middle" class="Lx" >gibt</text>
<text x="240" y="206" text-anchor="middle" class="Lx" >gab</text>
<text x="340" y="206" text-anchor="middle" class="Lx" >gegeben</text>
<text x="60" y="216" text-anchor="middle" class="Lx" >kommen (come)</text>
<text x="160" y="216" text-anchor="middle" class="Lx" >kommt</text>
<text x="240" y="216" text-anchor="middle" class="Lx" >kam</text>
<text x="340" y="216" text-anchor="middle" class="Lx" >gekommen</text>
<text x="60" y="226" text-anchor="middle" class="Lx" >trinken (drink)</text>
<text x="160" y="226" text-anchor="middle" class="Lx" >trinkt</text>
<text x="240" y="226" text-anchor="middle" class="Lx" >trank</text>
<text x="340" y="226" text-anchor="middle" class="Lx" >getrunken</text>
<line x1="20" y1="242" x2="460" y2="242" stroke="black" stroke-width="0.3"/>
<text x="240" y="251" text-anchor="middle" class="H" >— SEPARABLE VERBS AND PREFIXES —</text>
<text x="240" y="261" text-anchor="middle" class="Ls" >Like Dutch, German has separable verbs: prefix moves to end in main clauses.</text>
<text x="240" y="271" text-anchor="middle" class="Ls" >aufmachen (open): Ich mache das Fenster auf. (I open the window.)</text>
<text x="240" y="281" text-anchor="middle" class="Ls" >Inseparable prefixes (be-, ver-, zer-, ge-) never separate.</text>
<line x1="20" y1="289" x2="460" y2="289" stroke="black" stroke-width="0.3"/>
<text x="240" y="298" text-anchor="middle" class="H" >— CORE VOCABULARY —</text>
<text x="50" y="308" text-anchor="middle" class="Ls" >hallo / guten Tag</text>
<text x="175" y="308" text-anchor="middle" class="Lx" >hello</text>
<text x="50" y="318" text-anchor="middle" class="Ls" >danke</text>
<text x="175" y="318" text-anchor="middle" class="Lx" >thank you</text>
<text x="50" y="328" text-anchor="middle" class="Ls" >ja</text>
<text x="175" y="328" text-anchor="middle" class="Lx" >yes</text>
<text x="50" y="338" text-anchor="middle" class="Ls" >nein</text>
<text x="175" y="338" text-anchor="middle" class="Lx" >no</text>
<text x="50" y="348" text-anchor="middle" class="Ls" >entschuldigung</text>
<text x="175" y="348" text-anchor="middle" class="Lx" >excuse me</text>
<text x="50" y="358" text-anchor="middle" class="Ls" >wie geht es Ihnen?</text>
<text x="175" y="358" text-anchor="middle" class="Lx" >how are you?</text>
<text x="50" y="368" text-anchor="middle" class="Ls" >gut, danke</text>
<text x="175" y="368" text-anchor="middle" class="Lx" >fine, thanks</text>
<text x="50" y="378" text-anchor="middle" class="Ls" >ich liebe dich</text>
<text x="175" y="378" text-anchor="middle" class="Lx" >I love you</text>
<text x="50" y="388" text-anchor="middle" class="Ls" >Wasser</text>
<text x="175" y="388" text-anchor="middle" class="Lx" >water</text>
<text x="50" y="398" text-anchor="middle" class="Ls" >Feuer</text>
<text x="175" y="398" text-anchor="middle" class="Lx" >fire</text>
<text x="50" y="408" text-anchor="middle" class="Ls" >Erde</text>
<text x="175" y="408" text-anchor="middle" class="Lx" >earth</text>
<text x="50" y="418" text-anchor="middle" class="Ls" >Mensch</text>
<text x="175" y="418" text-anchor="middle" class="Lx" >person</text>
<text x="285" y="308" text-anchor="middle" class="Ls" >Zeit</text>
<text x="410" y="308" text-anchor="middle" class="Lx" >time</text>
<text x="285" y="318" text-anchor="middle" class="Ls" >Mond</text>
<text x="410" y="318" text-anchor="middle" class="Lx" >moon</text>
<text x="285" y="328" text-anchor="middle" class="Ls" >Stern</text>
<text x="410" y="328" text-anchor="middle" class="Lx" >star</text>
<text x="285" y="338" text-anchor="middle" class="Ls" >Herz</text>
<text x="410" y="338" text-anchor="middle" class="Lx" >heart</text>
<text x="285" y="348" text-anchor="middle" class="Ls" >Liebe</text>
<text x="410" y="348" text-anchor="middle" class="Lx" >love</text>
<text x="285" y="358" text-anchor="middle" class="Ls" >Freiheit</text>
<text x="410" y="358" text-anchor="middle" class="Lx" >freedom</text>
<text x="285" y="368" text-anchor="middle" class="Ls" >Erinnerung</text>
<text x="410" y="368" text-anchor="middle" class="Lx" >memory</text>
<text x="285" y="378" text-anchor="middle" class="Ls" >Zukunft</text>
<text x="410" y="378" text-anchor="middle" class="Lx" >future</text>
<text x="285" y="388" text-anchor="middle" class="Ls" >Welt</text>
<text x="410" y="388" text-anchor="middle" class="Lx" >world</text>
<text x="285" y="398" text-anchor="middle" class="Ls" >Leben</text>
<text x="410" y="398" text-anchor="middle" class="Lx" >life</text>
