<text x="240" y="32" text-anchor="middle" class="T" >YORUBA — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 30C OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— SVO — ISOLATING LANGUAGE — NO INFLECTION —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Yoruba is an ISOLATING language: no inflectional suffixes. Grammatical meaning conveyed by particles and order.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >No case endings, no verb conjugation for agreement. Tense/aspect marked by pre-verbal particles.</text>
<text x="240" y="98" text-anchor="middle" class="Ls" >Mo fe lati lo. (I want to go.) — Mo=I, fe=want, lati=to, lo=go. No inflection at all.</text>
<line x1="20" y1="106" x2="460" y2="106" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H" >— TENSE-ASPECT-MOOD PARTICLES —</text>
<text x="55" y="125" text-anchor="middle" class="Ls" >(none)</text>
<text x="165" y="125" text-anchor="middle" class="Lx" >Simple present / habitual</text>
<text x="360" y="125" text-anchor="middle" class="Lx" >Mo joko. (I sit / I sit habitually.)</text>
<text x="55" y="139" text-anchor="middle" class="Ls" >́n</text>
<text x="165" y="139" text-anchor="middle" class="Lx" >Progressive (present cont.)</text>
<text x="360" y="139" text-anchor="middle" class="Lx" >Mo ́n joko. (I am sitting.)</text>
<text x="55" y="153" text-anchor="middle" class="Ls" >ti</text>
<text x="165" y="153" text-anchor="middle" class="Lx" >Perfect (completed)</text>
<text x="360" y="153" text-anchor="middle" class="Lx" >Mo ti joko. (I have sat.)</text>
<text x="55" y="167" text-anchor="middle" class="Ls" >yoo / maá</text>
<text x="165" y="167" text-anchor="middle" class="Lx" >Future / habitual future</text>
<text x="360" y="167" text-anchor="middle" class="Lx" >Mo yoo joko. (I will sit.)</text>
<text x="55" y="181" text-anchor="middle" class="Ls" >́fā</text>
<text x="165" y="181" text-anchor="middle" class="Lx" >Past habitual</text>
<text x="360" y="181" text-anchor="middle" class="Lx" >Mo ́fā joko. (I used to sit.)</text>
<line x1="20" y1="198" x2="460" y2="198" stroke="black" stroke-width="0.3"/>
<text x="240" y="207" text-anchor="middle" class="H" >— SERIAL VERB CONSTRUCTIONS —</text>
<text x="240" y="218" text-anchor="middle" class="L" >Yoruba uses SERIAL VERBS: multiple verbs in sequence share one subject with no conjunction.</text>
<text x="240" y="228" text-anchor="middle" class="Ls" >Mo mú omi mu. (I took water drank.) = "I drank water."</text>
<text x="240" y="237" text-anchor="middle" class="Ls" >O wà wọ. (He came saw.) = "He came and looked / He came to see."</text>
<text x="240" y="246" text-anchor="middle" class="Ls" >This is a defining feature of Niger-Congo languages — absent from Indo-European.</text>
<line x1="20" y1="254" x2="460" y2="254" stroke="black" stroke-width="0.3"/>
<text x="240" y="263" text-anchor="middle" class="H" >— CORE VOCABULARY — 25 WORDS —</text>
