<line x1="20" y1="408" x2="460" y2="408" stroke="black" stroke-width="0.3"/>
<text x="240" y="417" text-anchor="middle" class="H" >— NOUNS AND PRONOUNS —</text>
<text x="240" y="428" text-anchor="middle" class="Ls" >No grammatical gender. No articles. Definiteness marked by context or demonstratives.</text>
<text x="240" y="437" text-anchor="middle" class="Ls" >Pronouns: mo/mi (I/me), o/́ (you sg), ó (he/she/it), a (we), yin (you pl), wọn (they).</text>
<text x="240" y="446" text-anchor="middle" class="Ls" >Possessives: noun + pronoun: ilé mi (my house), ilé rẹ (your house), ilé rẹ̀ (his house).</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M" >SERIES 30 · YORUBA · PLATE C · GRAMMAR · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
