<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SOMALI</text>
<text x="240" y="40" text-anchor="middle" class="S">GRAMMAR &amp; CUSHITIC STRUCTURE</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SOMALI WORD ORDER: SOV</text>
<text x="240" y="68" text-anchor="middle" class="L">SOV: Ninkii baaquli wuu soo qaatay.</text>
<text x="240" y="79" text-anchor="middle" class="Ls">"The man the bucket brought." (S + O + V)</text>
<text x="240" y="90" text-anchor="middle" class="Ls">Focus system: moved element takes verb agreement</text>
<line x1="20" y1="98" x2="460" y2="98" stroke="#555" stroke-width="0.5"/>
<text x="240" y="106" text-anchor="middle" class="H">GENDER SYSTEM</text>
<text x="240" y="117" text-anchor="middle" class="L">Two genders: masculine and feminine</text>
<text x="240" y="128" text-anchor="middle" class="L">Definite article: -ka (masc.) / -ta (fem.) / -ga / -da</text>
<text x="240" y="139" text-anchor="middle" class="Ls">Gender shift: some words change gender in plural</text>
<text x="240" y="150" text-anchor="middle" class="L">naag (woman, FEM) → naago (women, MASC!) — gender switch</text>
<line x1="20" y1="158" x2="460" y2="158" stroke="#555" stroke-width="0.5"/>
<text x="240" y="166" text-anchor="middle" class="H">SOMALI CASE &amp; FOCUS</text>
<text x="240" y="177" text-anchor="middle" class="L">Absolutive: unmarked citation form</text>
<text x="240" y="188" text-anchor="middle" class="L">Nominative: subject of sentence (with focus marker)</text>
<text x="240" y="199" text-anchor="middle" class="L">Genitive: possession • Oblique: indirect object/postpositions</text>
<text x="240" y="210" text-anchor="middle" class="Ls">Somali focus particles: waa (declarative) • baa/ayaa (focus)</text>
<line x1="20" y1="218" x2="460" y2="218" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="225" width="460" height="13" fill="#111"/>
<text x="240" y="234.5" text-anchor="middle" class="Hb">OROMO GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="250" text-anchor="middle" class="H">OROMO WORD ORDER: SOV</text>
<text x="240" y="261" text-anchor="middle" class="L">Abbaan manaa dhufan. "Father home came."</text>
<text x="240" y="272" text-anchor="middle" class="L">Same SOV order as Somali — shared Cushitic feature</text>
<text x="240" y="283" text-anchor="middle" class="L">Postpositions: irratti "on" • keessatti "in" • irraa "from"</text>
<line x1="20" y1="291" x2="460" y2="291" stroke="#555" stroke-width="0.5"/>
<text x="240" y="299" text-anchor="middle" class="H">OROMO GENDER &amp; NUMBER</text>
<text x="240" y="310" text-anchor="middle" class="L">Two genders: masculine (-a final) / feminine (-tuu/-too final)</text>
<text x="240" y="321" text-anchor="middle" class="L">hiriyaa "friend" (masc.) • hiriyyoo "friend" (fem.)</text>
<text x="240" y="332" text-anchor="middle" class="Ls">Plural: -oota / -ooli / -lee suffixes (varying by dialect)</text>
<line x1="20" y1="340" x2="460" y2="340" stroke="#555" stroke-width="0.5"/>
<text x="240" y="348" text-anchor="middle" class="H">OROMO VERB AGREEMENT</text>
<text x="240" y="359" text-anchor="middle" class="L">Verbs agree with subject in person, number, and gender</text>
<text x="240" y="370" text-anchor="middle" class="L">Dhufan = "he came" • Dhufte = "she came" • Dhufan = "they came"</text>
<text x="240" y="381" text-anchor="middle" class="Ls">Converbs: subordinate verb forms for chaining clauses</text>
<line x1="20" y1="389" x2="460" y2="389" stroke="#555" stroke-width="0.5"/>
<text x="240" y="397" text-anchor="middle" class="H">SHARED CUSHITIC GRAMMAR</text>
<text x="240" y="408" text-anchor="middle" class="L">Both: SOV word order  •  postpositions  •  two genders</text>
<text x="240" y="419" text-anchor="middle" class="L">Both: definite articles suffixed to nouns (not prefixed)</text>
<text x="240" y="430" text-anchor="middle" class="L">Both: complex focus/information structure systems</text>
<text x="240" y="441" text-anchor="middle" class="Ls">Both: verb-final position maintained across clause types</text>
<text x="240" y="452" text-anchor="middle" class="Ls">Parallel structure from Proto-Cushitic ancestor</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 32c ALT  ·  SOMALI / OROMO  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
