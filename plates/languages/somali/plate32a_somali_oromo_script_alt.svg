<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SOMALI</text>
<text x="240" y="40" text-anchor="middle" class="S">WRITING SYSTEMS</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SOMALI SCRIPT HISTORY</text>
<text x="240" y="68" text-anchor="middle" class="L">Somali had NO official writing system until 1972!</text>
<text x="240" y="79" text-anchor="middle" class="Ls">For centuries: Arabic script used for religious texts</text>
<text x="240" y="90" text-anchor="middle" class="L">1922: Osmaniya script invented by Osman Yusuf Keenadiid</text>
<text x="240" y="101" text-anchor="middle" class="Ls">Osmaniya: unique script designed specifically for Somali sounds</text>
<text x="240" y="112" text-anchor="middle" class="L">1972: Latin alphabet officially adopted by Somali government</text>
<line x1="20" y1="120" x2="460" y2="120" stroke="#555" stroke-width="0.5"/>
<text x="240" y="128" text-anchor="middle" class="H">MODERN SOMALI LATIN ALPHABET</text>
<text x="240" y="139" text-anchor="middle" class="L">26 letters; no Q, P, V, Z from English (added x, dh, kh, sh)</text>
<text x="240" y="150" text-anchor="middle" class="L">x = /ħ/ (pharyngeal fricative — like Hebrew chet)</text>
<text x="240" y="161" text-anchor="middle" class="L">dh = /ð/ (dental fricative) or retroflex /ɖ/</text>
<text x="240" y="172" text-anchor="middle" class="L">sh = /ʃ/ • kh = /x/ (velar fricative)</text>
<text x="240" y="183" text-anchor="middle" class="L">c = /ʕ/ (voiced pharyngeal fricative — Arabic ayin)</text>
<line x1="20" y1="191" x2="460" y2="191" stroke="#555" stroke-width="0.5"/>
<text x="240" y="199" text-anchor="middle" class="H">SAMPLE TEXT</text>
<text x="240" y="211" text-anchor="middle" class="L">Nabad gelyo!  "Peace upon you!" (Somali greeting)</text>
<text x="240" y="222" text-anchor="middle" class="L">Magacaygu waa...  "My name is..."</text>
<text x="240" y="233" text-anchor="middle" class="L">Af Soomaali ayaan ku hadlaa.  "I speak Somali."</text>
<line x1="20" y1="241" x2="460" y2="241" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="248" width="460" height="13" fill="#111"/>
<text x="240" y="257.5" text-anchor="middle" class="Hb">OROMO  ·  AFAAN OROMOO  ·  SECONDARY LANGUAGE</text>
<text x="240" y="273" text-anchor="middle" class="H">OROMO WRITING HISTORY</text>
<text x="240" y="284" text-anchor="middle" class="Ls">Oromo was suppressed during Amhara-dominated Ethiopian empire</text>
<text x="240" y="295" text-anchor="middle" class="Ls">Ethiopic (Ge'ez) script: never adopted for Oromo</text>
<text x="240" y="306" text-anchor="middle" class="L">1970s-1991: Oromo Liberation Front develops Qubee (Latin)</text>
<text x="240" y="317" text-anchor="middle" class="L">1991: Qubee Latin alphabet officially adopted after Derg falls</text>
<line x1="20" y1="325" x2="460" y2="325" stroke="#555" stroke-width="0.5"/>
<text x="240" y="333" text-anchor="middle" class="H">QUBEE — OROMO LATIN ALPHABET</text>
<text x="240" y="344" text-anchor="middle" class="L">26 basic letters + diacritics for long vowels and pharyngeals</text>
<text x="240" y="355" text-anchor="middle" class="L">aa ii uu ee oo: double letters = long vowels</text>
<text x="240" y="366" text-anchor="middle" class="L">ph = /ʔ/ (glottal stop)  •  x = /ħ/ (pharyngeal)</text>
<text x="240" y="377" text-anchor="middle" class="Ls">'a = /'a/ (glottalized)  •  'i 'u 'e 'o (ejective vowels)</text>
<line x1="20" y1="385" x2="460" y2="385" stroke="#555" stroke-width="0.5"/>
<text x="240" y="393" text-anchor="middle" class="H">SCRIPT PARALLEL</text>
<text x="240" y="404" text-anchor="middle" class="L">Both Somali and Oromo: Latin alphabets adopted after 1970</text>
<text x="240" y="415" text-anchor="middle" class="L">Both: represent Cushitic pharyngeal consonants in Latin</text>
<text x="240" y="426" text-anchor="middle" class="L">Both: long vowel distinction written with double letters</text>
<text x="240" y="437" text-anchor="middle" class="Ls">Both: previously used Arabic script for religious purposes</text>
<text x="240" y="448" text-anchor="middle" class="Ls">Shared challenge: writing pharyngeals /ħ/ /ʕ/ in Latin</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 32a ALT  ·  SOMALI / OROMO  ·  SCRIPT</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
