<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">SOMALI</text>
<text x="240" y="40" text-anchor="middle" class="S">CUSHITIC PHONOLOGY</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">SOMALI CONSONANT SYSTEM</text>
<text x="240" y="68" text-anchor="middle" class="L">Pharyngeal consonants (from Proto-Semitic/Cushitic):</text>
<text x="240" y="79" text-anchor="middle" class="L">/ħ/ voiceless pharyngeal fricative (x in Somali)</text>
<text x="240" y="90" text-anchor="middle" class="L">/ʕ/ voiced pharyngeal fricative (c in Somali)</text>
<text x="240" y="101" text-anchor="middle" class="Ls">These sounds exist in Arabic, Hebrew, Amharic — not in Indo-European</text>
<line x1="20" y1="109" x2="460" y2="109" stroke="#555" stroke-width="0.5"/>
<text x="240" y="117" text-anchor="middle" class="H">SOMALI EJECTIVES</text>
<text x="240" y="128" text-anchor="middle" class="L">Ejective stops: consonants released with upward larynx push</text>
<text x="240" y="139" text-anchor="middle" class="L">q = /qʼ/ uvular ejective  •  dh = retroflex ejective</text>
<text x="240" y="150" text-anchor="middle" class="Ls">Ejectives shared with Amharic, Tigrinya, Oromo (areal feature)</text>
<line x1="20" y1="158" x2="460" y2="158" stroke="#555" stroke-width="0.5"/>
<text x="240" y="166" text-anchor="middle" class="H">SOMALI TONE/PITCH ACCENT</text>
<text x="240" y="177" text-anchor="middle" class="L">Somali uses pitch accent (high vs. low tone on syllable)</text>
<text x="240" y="188" text-anchor="middle" class="L">Tone distinguishes gender: naag "woman" vs. naagí "the woman"</text>
<text x="240" y="199" text-anchor="middle" class="Ls">High tone marks definite article in some environments</text>
<line x1="20" y1="207" x2="460" y2="207" stroke="#555" stroke-width="0.5"/>
<text x="240" y="215" text-anchor="middle" class="H">SOMALI VOWELS</text>
<text x="240" y="226" text-anchor="middle" class="L">Five short + five long vowels: a aa • i ii • u uu • e ee • o oo</text>
<text x="240" y="237" text-anchor="middle" class="Ls">Length distinction is phonemic: war vs. waar (different meanings)</text>
<line x1="20" y1="245" x2="460" y2="245" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="252" width="460" height="13" fill="#111"/>
<text x="240" y="261.5" text-anchor="middle" class="Hb">OROMO PHONOLOGY  ·  SECONDARY LANGUAGE</text>
<text x="240" y="277" text-anchor="middle" class="H">OROMO CONSONANT SYSTEM</text>
<text x="240" y="288" text-anchor="middle" class="L">Pharyngeal consonants same as Somali:</text>
<text x="240" y="299" text-anchor="middle" class="L">/ħ/ (x) and /ʕ/ (voiced pharyngeal) both present</text>
<text x="240" y="310" text-anchor="middle" class="L">Ejective consonants: tʼ chʼ kʼ (glottalized releases)</text>
<text x="240" y="321" text-anchor="middle" class="L">Geminate consonants: tt kk pp mm (doubled = long)</text>
<line x1="20" y1="329" x2="460" y2="329" stroke="#555" stroke-width="0.5"/>
<text x="240" y="337" text-anchor="middle" class="H">OROMO VOWELS</text>
<text x="240" y="348" text-anchor="middle" class="L">Five short + five long: a aa • i ii • u uu • e ee • o oo</text>
<text x="240" y="359" text-anchor="middle" class="L">IDENTICAL vowel system to Somali (shared Cushitic heritage)</text>
<text x="240" y="370" text-anchor="middle" class="L">Oromo has NO lexical tone (unlike Somali)</text>
<line x1="20" y1="378" x2="460" y2="378" stroke="#555" stroke-width="0.5"/>
<text x="240" y="386" text-anchor="middle" class="H">SHARED CUSHITIC FEATURES</text>
<text x="240" y="397" text-anchor="middle" class="L">Both: pharyngeal fricatives /ħ/ and /ʕ/</text>
<text x="240" y="408" text-anchor="middle" class="L">Both: ejective consonants (glottalized stops)</text>
<text x="240" y="419" text-anchor="middle" class="L">Both: 5+5 short/long vowel system</text>
<text x="240" y="430" text-anchor="middle" class="L">Both: geminate consonant phonemic contrast</text>
<text x="240" y="441" text-anchor="middle" class="Ls">Somali adds: pitch accent • Oromo adds: more ejective series</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 32b ALT  ·  SOMALI / OROMO  ·  PHONOLOGY</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
