<line x1="20" y1="468" x2="460" y2="468" stroke="black" stroke-width="0.3"/>
<text x="240" y="477" text-anchor="middle" class="H" >— FOCUS SYSTEM —</text>
<text x="240" y="488" text-anchor="middle" class="Ls" >Somali distinguishes SUBJECT FOCUS (waa), OBJECT/VERB FOCUS (baa/ayaa), and NON-VERBAL sentences.</text>
<text x="240" y="497" text-anchor="middle" class="Ls" >Ninku wuu tegay (the man went — neutral) vs Ninku buu tegay (the MAN went — subject focus).</text>
<text x="240" y="506" text-anchor="middle" class="Ls" >This is one of the most complex focus systems in any language.</text>
