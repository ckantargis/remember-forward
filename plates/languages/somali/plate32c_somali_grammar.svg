<text x="240" y="32" text-anchor="middle" class="T" >SOMALI — GRAMMAR · VOCABULARY</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 32C OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— SOV — CASE SYSTEM — FOCUS MARKING —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Somali is SOV with a complex system of case, gender, focus, and definiteness.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >Two genders: masculine and feminine. Definiteness marked by suffixes: -ka (M def), -ta (F def).</text>
<text x="240" y="98" text-anchor="middle" class="Ls" >FOCUS: a critical feature — subject and object can be marked with focus particles changing emphasis.</text>
<line x1="20" y1="106" x2="460" y2="106" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H" >— CASES AND DEFINITENESS —</text>
<text x="85" y="125" text-anchor="middle" class="Lx" >Absolute (indef.)</text>
<text x="215" y="125" text-anchor="middle" class="Lx" >No suffix</text>
<text x="375" y="125" text-anchor="middle" class="Lx" >nin (a man), naag (a woman)</text>
<text x="85" y="139" text-anchor="middle" class="Lx" >Nominative (def.)</text>
<text x="215" y="139" text-anchor="middle" class="Lx" >M: -ku / -ka   F: -tu / -ta</text>
<text x="375" y="139" text-anchor="middle" class="Lx" >ninku (the man [subj]), naagtu (the woman)</text>
<text x="85" y="153" text-anchor="middle" class="Lx" >Genitive</text>
<text x="215" y="153" text-anchor="middle" class="Lx" >M: -ka   F: -ta</text>
<text x="375" y="153" text-anchor="middle" class="Lx" >guriga ninka (the man's house)</text>
<text x="85" y="167" text-anchor="middle" class="Lx" >Dative</text>
<text x="215" y="167" text-anchor="middle" class="Lx" >M: -ka   F: -ta + -nimo</text>
<text x="375" y="167" text-anchor="middle" class="Lx" >give TO the man</text>
<text x="85" y="181" text-anchor="middle" class="Lx" >Locative</text>
<text x="215" y="181" text-anchor="middle" class="Lx" >-ka / -ta</text>
<text x="375" y="181" text-anchor="middle" class="Lx" >in the house: guriga (the house + loc)</text>
<line x1="20" y1="198" x2="460" y2="198" stroke="black" stroke-width="0.3"/>
<text x="240" y="207" text-anchor="middle" class="H" >— VERB CONJUGATION — yiri "said" —</text>
<text x="240" y="218" text-anchor="middle" class="Ls" >Somali verbs are highly complex — they inflect for tense, aspect, mood, person, number, gender, and focus.</text>
<text x="55" y="228" text-anchor="middle" class="Lx" >Subject</text>
<text x="130" y="228" text-anchor="middle" class="Lx" >Pronoun</text>
<text x="240" y="228" text-anchor="middle" class="Lx" >Focus+aux (present)</text>
<text x="55" y="237" text-anchor="middle" class="Ls" >Aniga</text>
<text x="130" y="237" text-anchor="middle" class="Lx" >I</text>
<text x="240" y="237" text-anchor="middle" class="Ls" >waxaan</text>
