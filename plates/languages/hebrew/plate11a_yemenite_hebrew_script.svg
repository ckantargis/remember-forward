<svg viewBox="0 0 480 680" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  text{font-family:Georgia,serif;fill:#000;}
  .T{font-size:12px;font-weight:bold;letter-spacing:2px;}
  .S{font-size:7px;letter-spacing:1.5px;}
  .H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
  .L{font-size:7px;}
  .Ls{font-size:6px;}
  .Lx{font-size:5.5px;}
  .Lh{font-size:13px;}
  .Lhm{font-size:10px;}
  .M{font-size:6px;letter-spacing:1px;}
  .F{font-size:7px;font-style:italic;}
  .Fb{font-size:7.5px;font-weight:bold;}
</style></defs><rect x="6" y="6" width="468" height="668" rx="4" fill="none" stroke="#000" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" rx="2" fill="none" stroke="#000" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">PLATE 11A  ·  YEMENITE HEBREW  ·  SCRIPT</text>
<line x1="18" y1="39" x2="462" y2="39" stroke="#000" stroke-width="0.75"/>
<text x="240" y="50" text-anchor="middle" class="S">Temani Hebrew · square script · Babylonian vocalization · geographically isolated tradition</text>
<line x1="18" y1="56" x2="462" y2="56" stroke="#000" stroke-width="0.5"/>
<text x="240" y="67" text-anchor="middle" class="H">— · —  THE YEMENITE TRADITION  ·  THE SOUND TIME FORGOT  — · —</text>
<line x1="22" y1="71" x2="458" y2="71" stroke="#000" stroke-width="0.3"/>
<text x="240" y="80" text-anchor="middle" class="Lx">Yemenite Jews lived in isolation for ~2,000 years  ·  preserved ancient pronunciation intact</text>
<text x="240" y="89" text-anchor="middle" class="Lx">when they arrived in Israel 1949-50, linguists recorded them immediately</text>
<text x="240" y="98" text-anchor="middle" class="Lx">their speech answered pronunciation debates stretching back 800 years</text>
<line x1="22" y1="103" x2="458" y2="103" stroke="#000" stroke-width="0.5"/>
<text x="240" y="109" text-anchor="middle" class="H">— · —  TWO VOCALIZATION SYSTEMS  ·  TIBERIAN vs BABYLONIAN  — · —</text>
<line x1="22" y1="113" x2="458" y2="113" stroke="#000" stroke-width="0.3"/>
<text x="240" y="121" text-anchor="middle" class="Lx">both encode the same vowels  ·  different graphic placement</text>
<rect x="22" y="125" width="210" height="120" fill="none" stroke="#000" stroke-width="1.0"/>
<rect x="22" y="125" width="210" height="14" fill="none" stroke="#000" stroke-width="0.5"/>
<text x="127" y="136" text-anchor="middle" class="Ls">TIBERIAN (sublinear)</text>
<text x="127" y="152" text-anchor="middle" class="Lx">dots and lines BELOW consonants</text>
<text x="127" y="162" text-anchor="middle" class="Lx">developed by Masoretes of Tiberias</text>
<text x="127" y="172" text-anchor="middle" class="Lx">c.600-950 CE  ·  standard today</text>
<text x="127" y="192" text-anchor="middle" class="Lh">שָׁלוֹם</text>
<text x="127" y="207" text-anchor="middle" class="Lx">sha-LOM  (shalom)</text>
<text x="127" y="217" text-anchor="middle" class="Lx">vowels sit below letters</text>
<text x="127" y="236" text-anchor="middle" class="Lx">(standard nikkud system)</text>
<rect x="248" y="125" width="210" height="120" fill="none" stroke="#000" stroke-width="1.0"/>
<rect x="248" y="125" width="210" height="14" fill="none" stroke="#000" stroke-width="0.5"/>
<text x="353" y="136" text-anchor="middle" class="Ls">BABYLONIAN (supralinear)</text>
<text x="353" y="152" text-anchor="middle" class="Lx">dots and lines ABOVE consonants</text>
<text x="353" y="162" text-anchor="middle" class="Lx">oldest Yemenite manuscripts use this</text>
<text x="353" y="172" text-anchor="middle" class="Lx">reflects Babylonian Jewish tradition</text>
<text x="353" y="192" text-anchor="middle" class="Lh">שלום</text>
<text x="353" y="207" text-anchor="middle" class="Lx">same word  ·  unpointed base</text>
<text x="353" y="217" text-anchor="middle" class="Lx">Babylonian vowels written above</text>
<text x="353" y="229" text-anchor="middle" class="Lx">( supralinear marks not in Unicode )</text>
<text x="353" y="238" text-anchor="middle" class="Lx">tradition preserved orally</text>
<line x1="22" y1="252" x2="458" y2="252" stroke="#000" stroke-width="0.5"/>
<text x="240" y="258" text-anchor="middle" class="H">— · —  THE 22 LETTERS  ·  SAME SQUARE SCRIPT AS MISHNAIC/MODERN  — · —</text>
<line x1="22" y1="262" x2="458" y2="262" stroke="#000" stroke-width="0.3"/>
<text x="240" y="270" text-anchor="middle" class="Lx">Yemenite script is identical to standard square Hebrew  ·  the difference is pronunciation, not writing</text>
<text x="43" y="289" text-anchor="middle" class="Lh">א</text>
<text x="43" y="299" text-anchor="middle" class="Lx">Aleph</text>
<text x="43" y="307" text-anchor="middle" class="Lx">1</text>
<text x="82" y="289" text-anchor="middle" class="Lh">ב</text>
<text x="82" y="299" text-anchor="middle" class="Lx">Beth</text>
<text x="82" y="307" text-anchor="middle" class="Lx">2</text>
<text x="121" y="289" text-anchor="middle" class="Lh">ג</text>
<text x="121" y="299" text-anchor="middle" class="Lx">Gimel</text>
<text x="121" y="307" text-anchor="middle" class="Lx">3</text>
<text x="160" y="289" text-anchor="middle" class="Lh">ד</text>
<text x="160" y="299" text-anchor="middle" class="Lx">Daleth</text>
<text x="160" y="307" text-anchor="middle" class="Lx">4</text>
<text x="199" y="289" text-anchor="middle" class="Lh">ה</text>
<text x="199" y="299" text-anchor="middle" class="Lx">He</text>
<text x="199" y="307" text-anchor="middle" class="Lx">5</text>
<text x="238" y="289" text-anchor="middle" class="Lh">ו</text>
<text x="238" y="299" text-anchor="middle" class="Lx">Vav</text>
<text x="238" y="307" text-anchor="middle" class="Lx">6</text>
<text x="277" y="289" text-anchor="middle" class="Lh">ז</text>
<text x="277" y="299" text-anchor="middle" class="Lx">Zayin</text>
<text x="277" y="307" text-anchor="middle" class="Lx">7</text>
<text x="316" y="289" text-anchor="middle" class="Lh">ח</text>
<text x="316" y="299" text-anchor="middle" class="Lx">Chet</text>
<text x="316" y="307" text-anchor="middle" class="Lx">8</text>
<text x="355" y="289" text-anchor="middle" class="Lh">ט</text>
<text x="355" y="299" text-anchor="middle" class="Lx">Tet</text>
<text x="355" y="307" text-anchor="middle" class="Lx">9</text>
<text x="394" y="289" text-anchor="middle" class="Lh">י</text>
<text x="394" y="299" text-anchor="middle" class="Lx">Yod</text>
<text x="394" y="307" text-anchor="middle" class="Lx">10</text>
<text x="433" y="289" text-anchor="middle" class="Lh">כ</text>
<text x="433" y="299" text-anchor="middle" class="Lx">Kaph</text>
<text x="433" y="307" text-anchor="middle" class="Lx">20</text>
<text x="43" y="335" text-anchor="middle" class="Lh">ל</text>
<text x="43" y="345" text-anchor="middle" class="Lx">Lamed</text>
<text x="43" y="353" text-anchor="middle" class="Lx">30</text>
<text x="82" y="335" text-anchor="middle" class="Lh">מ</text>
<text x="82" y="345" text-anchor="middle" class="Lx">Mem</text>
<text x="82" y="353" text-anchor="middle" class="Lx">40</text>
<text x="121" y="335" text-anchor="middle" class="Lh">נ</text>
<text x="121" y="345" text-anchor="middle" class="Lx">Nun</text>
<text x="121" y="353" text-anchor="middle" class="Lx">50</text>
<text x="160" y="335" text-anchor="middle" class="Lh">ס</text>
<text x="160" y="345" text-anchor="middle" class="Lx">Samekh</text>
<text x="160" y="353" text-anchor="middle" class="Lx">60</text>
<text x="199" y="335" text-anchor="middle" class="Lh">ע</text>
<text x="199" y="345" text-anchor="middle" class="Lx">Ayin</text>
<text x="199" y="353" text-anchor="middle" class="Lx">70</text>
<text x="238" y="335" text-anchor="middle" class="Lh">פ</text>
<text x="238" y="345" text-anchor="middle" class="Lx">Pe</text>
<text x="238" y="353" text-anchor="middle" class="Lx">80</text>
<text x="277" y="335" text-anchor="middle" class="Lh">צ</text>
<text x="277" y="345" text-anchor="middle" class="Lx">Tsade</text>
<text x="277" y="353" text-anchor="middle" class="Lx">90</text>
<text x="316" y="335" text-anchor="middle" class="Lh">ק</text>
<text x="316" y="345" text-anchor="middle" class="Lx">Qoph</text>
<text x="316" y="353" text-anchor="middle" class="Lx">100</text>
<text x="355" y="335" text-anchor="middle" class="Lh">ר</text>
<text x="355" y="345" text-anchor="middle" class="Lx">Resh</text>
<text x="355" y="353" text-anchor="middle" class="Lx">200</text>
<text x="394" y="335" text-anchor="middle" class="Lh">ש</text>
<text x="394" y="345" text-anchor="middle" class="Lx">Shin</text>
<text x="394" y="353" text-anchor="middle" class="Lx">300</text>
<text x="433" y="335" text-anchor="middle" class="Lh">ת</text>
<text x="433" y="345" text-anchor="middle" class="Lx">Tav</text>
<text x="433" y="353" text-anchor="middle" class="Lx">400</text>
<line x1="22" y1="375" x2="458" y2="375" stroke="#000" stroke-width="0.5"/>
<text x="240" y="381" text-anchor="middle" class="H">— · —  WHAT IS UNIQUE  ·  HOW TO RECOGNIZE YEMENITE TEXTS  — · —</text>
<line x1="22" y1="385" x2="458" y2="385" stroke="#000" stroke-width="0.3"/>
<rect x="22" y="382" width="436" height="14" fill="none" stroke="#000" stroke-width="0.5"/>
<text x="80" y="392" text-anchor="middle" class="Lx">Script</text>
<line x1="130" y1="382" x2="130" y2="396" stroke="#000" stroke-width="0.3"/>
<text x="290" y="392" text-anchor="middle" class="Lx">Same square Hebrew as standard</text>
<line x1="440" y1="382" x2="440" y2="396" stroke="#000" stroke-width="0.3"/>
<rect x="22" y="398" width="436" height="14" fill="none" stroke="#000" stroke-width="0.5"/>
<text x="80" y="408" text-anchor="middle" class="Lx">Vowels</text>
<line x1="130" y1="398" x2="130" y2="412" stroke="#000" stroke-width="0.3"/>
<text x="290" y="408" text-anchor="middle" class="Lx">Standard Tiberian nikkud in printed texts</text>
<line x1="440" y1="398" x2="440" y2="412" stroke="#000" stroke-width="0.3"/>
<rect x="22" y="414" width="436" height="14" fill="none" stroke="#000" stroke-width="0.5"/>
<text x="80" y="424" text-anchor="middle" class="Lx">Cantillation</text>
<line x1="130" y1="414" x2="130" y2="428" stroke="#000" stroke-width="0.3"/>
<text x="290" y="424" text-anchor="middle" class="Lx">Full Tiberian trope marks preserved</text>
<line x1="440" y1="414" x2="440" y2="428" stroke="#000" stroke-width="0.3"/>
<rect x="22" y="430" width="436" height="14" fill="none" stroke="#000" stroke-width="0.5"/>
<text x="80" y="440" text-anchor="middle" class="Lx">Key marker</text>
<line x1="130" y1="430" x2="130" y2="444" stroke="#000" stroke-width="0.3"/>
<text x="290" y="440" text-anchor="middle" class="Lx">Tav without dagesh written ת (looks same)</text>
<line x1="440" y1="430" x2="440" y2="444" stroke="#000" stroke-width="0.3"/>
<rect x="22" y="446" width="436" height="14" fill="none" stroke="#000" stroke-width="0.5"/>
<text x="80" y="456" text-anchor="middle" class="Lx">Key marker</text>
<line x1="130" y1="446" x2="130" y2="460" stroke="#000" stroke-width="0.3"/>
<text x="290" y="456" text-anchor="middle" class="Lx">Gimel without dagesh ג</text>
<line x1="440" y1="446" x2="440" y2="460" stroke="#000" stroke-width="0.3"/>
<rect x="22" y="462" width="436" height="14" fill="none" stroke="#000" stroke-width="0.5"/>
<text x="80" y="472" text-anchor="middle" class="Lx">Key marker</text>
<line x1="130" y1="462" x2="130" y2="476" stroke="#000" stroke-width="0.3"/>
<text x="290" y="472" text-anchor="middle" class="Lx">Vav ו written same way</text>
<line x1="440" y1="462" x2="440" y2="476" stroke="#000" stroke-width="0.3"/>
<text x="240" y="492" text-anchor="middle" class="Lx">Yemenite Hebrew is the bridge between Biblical phonology and all later traditions</text>
<text x="240" y="501" text-anchor="middle" class="Lx">it is the living proof that the sounds documented in the grammar books were real</text>
<line x1="18" y1="615" x2="462" y2="615" stroke="#000" stroke-width="0.5"/>
<text x="240" y="624" text-anchor="middle" class="M">REMEMBER FORWARD · THE PATIENT MESSAGE · CC BY-SA 4.0 · rememberforward.org</text>
<line x1="18" y1="630" x2="462" y2="630" stroke="#000" stroke-width="1"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>