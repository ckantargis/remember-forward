<svg viewBox="0 0 480 680" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  text{font-family:Georgia,serif;fill:#000;}
  .T{font-size:12px;font-weight:bold;letter-spacing:2px;}
  .S{font-size:7px;letter-spacing:1.5px;}
  .H{font-size:6.5px;font-weight:bold;letter-spacing:2.5px;}
  .L{font-size:7px;}
  .Ls{font-size:6px;}
  .Lx{font-size:5.5px;}
  .Lh{font-size:13px;}
  .Lhm{font-size:10px;}
  .Lhs{font-size:8px;}
  .M{font-size:6px;letter-spacing:1px;}
  .F{font-size:7px;font-style:italic;}
  .Fb{font-size:7.5px;font-weight:bold;}
</style></defs><rect x="6" y="6" width="468" height="668" rx="4" fill="none" stroke="#000" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" rx="2" fill="none" stroke="#000" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">PLATE 10B  ·  MISHNAIC HEBREW  ·  PHONOLOGY</text>
<line x1="18" y1="39" x2="462" y2="39" stroke="#000" stroke-width="0.75"/>
<text x="240" y="50" text-anchor="middle" class="S">sound changes from Biblical Hebrew · Aramaic influence · new loanword sounds</text>
<line x1="18" y1="56" x2="462" y2="56" stroke="#000" stroke-width="0.5"/>
<text x="240" y="67" text-anchor="middle" class="H">— · —  WHAT CHANGED FROM BIBLICAL HEBREW  — · —</text>
<line x1="22" y1="71" x2="458" y2="71" stroke="#000" stroke-width="0.3"/>
<text x="240" y="79" text-anchor="middle" class="Lx">Mishnaic Hebrew phonology reflects 500+ years of change  ·  Aramaic was the daily spoken language</text>
<rect x="22" y="83" width="218" height="60" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="131" y="93" text-anchor="middle" class="Ls">GUTTURALS</text>
<text x="131" y="102" text-anchor="middle" class="Ls">WEAKENING</text>
<line x1="22" y1="107" x2="458" y2="107" stroke="#000" stroke-width="0.3"/>
<text x="131" y="115" text-anchor="middle" class="Lx">Biblical ח /ḥ/ and כ /x/ distinct</text>
<text x="131" y="124" text-anchor="middle" class="Lx">Mishnaic: merging in Galilee</text>
<text x="131" y="133" text-anchor="middle" class="Lx">Ayin ע weakening toward vowel</text>
<text x="131" y="142" text-anchor="middle" class="Lx">He ה often silent finally</text>
<rect x="244" y="83" width="218" height="60" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="353" y="93" text-anchor="middle" class="Ls">BEGADKEFAT</text>
<text x="353" y="102" text-anchor="middle" class="Ls">FULLY DEVELOPED</text>
<line x1="22" y1="107" x2="458" y2="107" stroke="#000" stroke-width="0.3"/>
<text x="353" y="115" text-anchor="middle" class="Lx">Biblical: b/v p/f only early</text>
<text x="353" y="124" text-anchor="middle" class="Lx">Mishnaic: all 6 pairs active</text>
<text x="353" y="133" text-anchor="middle" class="Lx">After vowel = fricative</text>
<text x="353" y="142" text-anchor="middle" class="Lx">After consonant = stop</text>
<rect x="22" y="147" width="218" height="60" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="131" y="157" text-anchor="middle" class="Ls">RESH SHIFTS</text>
<line x1="22" y1="171" x2="458" y2="171" stroke="#000" stroke-width="0.3"/>
<text x="131" y="179" text-anchor="middle" class="Lx">Biblical: trilled /r/ or uvular</text>
<text x="131" y="188" text-anchor="middle" class="Lx">Mishnaic: uvular /ʁ/ dominant</text>
<text x="131" y="197" text-anchor="middle" class="Lx">Aramaic influence on resh</text>
<text x="131" y="206" text-anchor="middle" class="Lx">No longer guttural in most dialects</text>
<rect x="244" y="147" width="218" height="60" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="353" y="157" text-anchor="middle" class="Ls">NEW PHONEMES</text>
<text x="353" y="166" text-anchor="middle" class="Ls">FROM LOANWORDS</text>
<line x1="22" y1="171" x2="458" y2="171" stroke="#000" stroke-width="0.3"/>
<text x="353" y="179" text-anchor="middle" class="Lx">Greek: /dz/ gimel with apostrophe ג'</text>
<text x="353" y="188" text-anchor="middle" class="Lx">Latin: /ts/ in some contexts</text>
<text x="353" y="197" text-anchor="middle" class="Lx">Aramaic: reinforces some stops</text>
<text x="353" y="206" text-anchor="middle" class="Lx">Persian words via Aramaic</text>
<line x1="22" y1="214" x2="458" y2="214" stroke="#000" stroke-width="0.5"/>
<text x="240" y="220" text-anchor="middle" class="H">— · —  ARAMAIC INFLUENCE  ·  THE DOMINANT CONTACT LANGUAGE  — · —</text>
<line x1="22" y1="224" x2="458" y2="224" stroke="#000" stroke-width="0.3"/>
<text x="240" y="232" text-anchor="middle" class="Lx">Aramaic was the spoken vernacular of Judea from 500 BCE to 700 CE</text>
<text x="240" y="241" text-anchor="middle" class="Lx">Mishnaic Hebrew borrowed vocabulary, grammar patterns, and phonological habits from Aramaic</text>
<rect x="22" y="247" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="44" y="260" text-anchor="middle" class="Lhm">אֲבַר</text>
<text x="72" y="256" text-anchor="start" class="Lx">avar = Aramaic</text>
<text x="72" y="265" text-anchor="start" class="Lx">BH used qatal only</text>
<rect x="174" y="247" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="196" y="260" text-anchor="middle" class="Lhm">דְבָר</text>
<text x="224" y="256" text-anchor="start" class="Lx">d'var = of / that</text>
<text x="224" y="265" text-anchor="start" class="Lx">replaces vav in some contexts</text>
<rect x="326" y="275" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="348" y="288" text-anchor="middle" class="Lhm">הֵיכִי</text>
<text x="376" y="284" text-anchor="start" class="Lx">heikhi = how/because</text>
<text x="376" y="293" text-anchor="start" class="Lx">Aramaic origin</text>
<rect x="22" y="275" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="44" y="288" text-anchor="middle" class="Lhm">כּבָר</text>
<text x="72" y="284" text-anchor="start" class="Lx">k'var = already</text>
<text x="72" y="293" text-anchor="start" class="Lx">Aramaic loanword</text>
<rect x="174" y="303" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="196" y="316" text-anchor="middle" class="Lhm">שֶׁל</text>
<text x="224" y="312" text-anchor="start" class="Lx">shel = of/belonging</text>
<text x="224" y="321" text-anchor="start" class="Lx">replaced construct</text>
<rect x="326" y="303" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="348" y="316" text-anchor="middle" class="Lhm">אִמָּא</text>
<text x="376" y="312" text-anchor="start" class="Lx">ima = mother</text>
<text x="376" y="321" text-anchor="start" class="Lx">Aramaic form alongside em</text>
<line x1="22" y1="308" x2="458" y2="308" stroke="#000" stroke-width="0.5"/>
<text x="240" y="314" text-anchor="middle" class="H">— · —  GREEK AND LATIN LOANWORDS  ·  ROMAN PERIOD  — · —</text>
<line x1="22" y1="318" x2="458" y2="318" stroke="#000" stroke-width="0.3"/>
<text x="240" y="326" text-anchor="middle" class="Lx">Roman conquest (63 BCE onward) brought Greek and Latin into daily Judean life</text>
<rect x="22" y="330" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="44" y="340" text-anchor="middle" class="Lhm">סִנְדׁוֹק</text>
<text x="72" y="338" text-anchor="start" class="Lx">Sanhedrin = council/court</text>
<text x="72" y="346" text-anchor="start" class="Lx">Greek synedrion</text>
<rect x="174" y="330" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="196" y="340" text-anchor="middle" class="Lhm">אִסְטְרְטֵגְיָה</text>
<text x="224" y="338" text-anchor="start" class="Lx">istrategia = strategy/army district</text>
<text x="224" y="346" text-anchor="start" class="Lx">Greek strategia</text>
<rect x="326" y="330" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="348" y="340" text-anchor="middle" class="Lhm">פְּרוֶנְדִיס</text>
<text x="376" y="338" text-anchor="start" class="Lx">provandis = provisions/rations</text>
<text x="376" y="346" text-anchor="start" class="Lx">Latin praebenda</text>
<rect x="22" y="358" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="44" y="368" text-anchor="middle" class="Lhm">אִגְרוֹת</text>
<text x="72" y="366" text-anchor="start" class="Lx">igerot = letters (pl.)</text>
<text x="72" y="374" text-anchor="start" class="Lx">Greek agora</text>
<rect x="174" y="358" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="196" y="368" text-anchor="middle" class="Lhm">קוּפָּה</text>
<text x="224" y="366" text-anchor="start" class="Lx">kuppa = box/chest/fund</text>
<text x="224" y="374" text-anchor="start" class="Lx">Greek kupha</text>
<rect x="326" y="358" width="148" height="24" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="348" y="368" text-anchor="middle" class="Lhm">סַנְדַל</text>
<text x="376" y="366" text-anchor="start" class="Lx">sandal = sandal</text>
<text x="376" y="374" text-anchor="start" class="Lx">Greek sandalion</text>
<line x1="22" y1="390" x2="458" y2="390" stroke="#000" stroke-width="0.5"/>
<text x="240" y="396" text-anchor="middle" class="H">— · —  STRESS AND SYLLABLE CHANGES  — · —</text>
<line x1="22" y1="400" x2="458" y2="400" stroke="#000" stroke-width="0.3"/>
<text x="22" y="408" text-anchor="start" class="Lx">·  Final stress (milra) still dominant</text>
<text x="460" y="408" text-anchor="end" class="Lx">(same as Biblical Hebrew)</text>
<text x="22" y="424" text-anchor="start" class="Lx">·  Penultimate stress (mil'el) in some forms</text>
<text x="460" y="424" text-anchor="end" class="Lx">(participles and imperatives)</text>
<text x="22" y="440" text-anchor="start" class="Lx">·  Sheva rules simplified under Aramaic influence</text>
<text x="460" y="440" text-anchor="end" class="Lx">(mobile sheva more common)</text>
<text x="22" y="456" text-anchor="start" class="Lx">·  Vowel reduction in unstressed syllables</text>
<text x="460" y="456" text-anchor="end" class="Lx">(tsere and qamats shorten)</text>
<line x1="22" y1="476" x2="458" y2="476" stroke="#000" stroke-width="0.5"/>
<text x="240" y="484" text-anchor="middle" class="Lx">despite changes, Mishnaic Hebrew is largely intelligible to Biblical Hebrew readers</text>
<text x="240" y="493" text-anchor="middle" class="Lx">the core phonological system  — 22 consonants, 7 vowel qualities  — remains stable</text>
<line x1="18" y1="615" x2="462" y2="615" stroke="#000" stroke-width="0.5"/>
<text x="240" y="624" text-anchor="middle" class="M">REMEMBER FORWARD · THE PATIENT MESSAGE · CC BY-SA 4.0 · rememberforward.org</text>
<line x1="18" y1="630" x2="462" y2="630" stroke="#000" stroke-width="1"/>
<text x="240" y="648" text-anchor="middle" class="Fb">THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F">BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
</svg>