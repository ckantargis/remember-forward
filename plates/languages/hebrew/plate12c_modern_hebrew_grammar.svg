</style></defs><rect x="6" y="6" width="468" height="668" rx="4" fill="none" stroke="#000" stroke-width="3"/>
<rect x="12" y="12" width="456" height="656" rx="2" fill="none" stroke="#000" stroke-width="0.75"/>
<text x="240" y="32" text-anchor="middle" class="T">PLATE 12C  ·  MODERN HEBREW  ·  GRAMMAR AND VOCABULARY</text>
<line x1="18" y1="39" x2="462" y2="39" stroke="#000" stroke-width="0.75"/>
<text x="240" y="50" text-anchor="middle" class="S">SVO order · 7 verb stems · tense system · modern coinages · loanwords</text>
<line x1="18" y1="56" x2="462" y2="56" stroke="#000" stroke-width="0.5"/>
<text x="240" y="67" text-anchor="middle" class="H">— · —  THE MODERN HEBREW SENTENCE  ·  SVO ORDER  — · —</text>
<line x1="22" y1="71" x2="458" y2="71" stroke="#000" stroke-width="0.3"/>
<text x="240" y="79" text-anchor="middle" class="Lx">Modern Hebrew uses Subject-Verb-Object order  ·  more like English than Biblical Hebrew</text>
<rect x="22" y="83" width="130" height="24" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="87" y="95" text-anchor="middle" class="Ls">SUBJECT</text>
<text x="87" y="104" text-anchor="middle" class="Lx">the speaker/actor</text>
<line x1="154" y1="95" x2="177" y2="95" stroke="#000" stroke-width="0.7"/><polygon points="177,93 182,95 177,97" fill="#000"/>
<rect x="184" y="83" width="130" height="24" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="249" y="95" text-anchor="middle" class="Ls">VERB</text>
<text x="249" y="104" text-anchor="middle" class="Lx">the action</text>
<line x1="316" y1="95" x2="339" y2="95" stroke="#000" stroke-width="0.7"/><polygon points="339,93 344,95 339,97" fill="#000"/>
<rect x="346" y="83" width="112" height="24" fill="none" stroke="#000" stroke-width="1.0"/>
<text x="402" y="95" text-anchor="middle" class="Ls">OBJECT</text>
<text x="402" y="104" text-anchor="middle" class="Lx">what is acted on</text>
<text x="240" y="115" text-anchor="middle" class="Lhm">הילד קורא ספר  ·  ha-yeled qore sefer  ·  the-boy reads book</text>
<line x1="22" y1="122" x2="458" y2="122" stroke="#000" stroke-width="0.5"/>
<text x="240" y="128" text-anchor="middle" class="H">— · —  THE THREE-TENSE SYSTEM  — · —</text>
<line x1="22" y1="132" x2="458" y2="132" stroke="#000" stroke-width="0.3"/>
<text x="240" y="140" text-anchor="middle" class="Lx">Modern Hebrew has three main tenses  ·  expressed by verb form</text>
<rect x="22" y="144" width="136" height="44" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="90" y="155" text-anchor="middle" class="Ls">PAST</text>
<text x="90" y="164" text-anchor="middle" class="Lx">perfect form</text>
<text x="90" y="176" text-anchor="middle" class="Lh">כָּתַב</text>
<text x="90" y="184" text-anchor="middle" class="Lx">katav = he wrote</text>
<rect x="163" y="144" width="136" height="44" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="231" y="155" text-anchor="middle" class="Ls">PRESENT</text>
<text x="231" y="164" text-anchor="middle" class="Lx">active participle</text>
<text x="231" y="176" text-anchor="middle" class="Lh">כּוֹתֵב</text>
<text x="231" y="184" text-anchor="middle" class="Lx">kotev = he writes / is writing</text>
<rect x="304" y="144" width="136" height="44" fill="none" stroke="#000" stroke-width="0.9"/>
<text x="372" y="155" text-anchor="middle" class="Ls">FUTURE</text>
<text x="372" y="164" text-anchor="middle" class="Lx">imperfect form</text>
<text x="372" y="176" text-anchor="middle" class="Lh">יִכְתֹּב</text>
<text x="372" y="184" text-anchor="middle" class="Lx">yichtov = he will write</text>
<text x="22" y="194" text-anchor="start" class="Lx">all from root K-T-V (כ-ת-ב writing)  ·  same root, pattern changes the tense</text>
<line x1="22" y1="199" x2="458" y2="199" stroke="#000" stroke-width="0.5"/>
<text x="240" y="205" text-anchor="middle" class="H">— · —  THE SEVEN VERB STEMS  ·  BINYANIM  — · —</text>
<line x1="22" y1="209" x2="458" y2="209" stroke="#000" stroke-width="0.3"/>
<text x="240" y="217" text-anchor="middle" class="Lx">same 3-letter root + 7 patterns = different shades of meaning from the same idea</text>
<rect x="22" y="221" width="214" height="22" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="77" y="230" text-anchor="middle" class="Ls">PA'AL (Qal)</text>
<text x="77" y="238" text-anchor="middle" class="Lx">basic action</text>
<text x="232" y="234" text-anchor="end" class="Lx">katav = wrote</text>
<rect x="240" y="221" width="214" height="22" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="295" y="230" text-anchor="middle" class="Ls">NIF'AL</text>
<text x="295" y="238" text-anchor="middle" class="Lx">passive / reflexive</text>
<text x="450" y="234" text-anchor="end" class="Lx">nichtav = was written</text>
<rect x="22" y="246" width="214" height="22" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="77" y="255" text-anchor="middle" class="Ls">PI'EL</text>
<text x="77" y="263" text-anchor="middle" class="Lx">intensive / causative</text>
<text x="232" y="259" text-anchor="end" class="Lx">kitev = wrote (a lot)</text>
<rect x="240" y="246" width="214" height="22" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="295" y="255" text-anchor="middle" class="Ls">PU'AL</text>
<text x="295" y="263" text-anchor="middle" class="Lx">passive of pi'el</text>
<text x="450" y="259" text-anchor="end" class="Lx">kutav = was written (intensively)</text>
<rect x="22" y="271" width="214" height="22" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="77" y="280" text-anchor="middle" class="Ls">HIF'IL</text>
<text x="77" y="288" text-anchor="middle" class="Lx">causative</text>
<text x="232" y="284" text-anchor="end" class="Lx">hichtiv = caused to write / dictated</text>
<rect x="240" y="271" width="214" height="22" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="295" y="280" text-anchor="middle" class="Ls">HOF'AL</text>
<text x="295" y="288" text-anchor="middle" class="Lx">passive of hif'il</text>
<text x="450" y="284" text-anchor="end" class="Lx">huchtav = was dictated</text>
<rect x="22" y="296" width="214" height="22" fill="none" stroke="#000" stroke-width="0.7"/>
<text x="77" y="305" text-anchor="middle" class="Ls">HITPA'EL</text>
<text x="77" y="313" text-anchor="middle" class="Lx">reflexive</text>
<text x="232" y="309" text-anchor="end" class="Lx">hitkatev = corresponded (wrote to each other)</text>
<line x1="22" y1="334" x2="458" y2="334" stroke="#000" stroke-width="0.5"/>
<text x="240" y="340" text-anchor="middle" class="H">— · —  MODERN COINAGES  ·  BEN-YEHUDA AND THE ACADEMY  — · —</text>
