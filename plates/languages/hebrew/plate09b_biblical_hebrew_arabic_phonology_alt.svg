<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">BIBLICAL HEBREW</text>
<text x="240" y="40" text-anchor="middle" class="S">PHONOLOGY — SEMITIC SOUNDS</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">BIBLICAL HEBREW CONSONANTS</text>
<text x="240" y="68" text-anchor="middle" class="L">22 phonemes; includes sounds rare in European languages</text>
<text x="240" y="79" text-anchor="middle" class="L">Pharyngeals: aleph /ʾ/ (glottal) • ayin /ʿ/ (voiced pharyngeal)</text>
<text x="240" y="90" text-anchor="middle" class="L">Emphatics: tsadi /sˀ/ • qof /q/ (uvular stop)</text>
<text x="240" y="101" text-anchor="middle" class="Ls">Fricatives: shin /ʃ/ • sin /s/ • het /x/ or /ħ/ • khaf /x/</text>
<line x1="20" y1="109" x2="460" y2="109" stroke="#555" stroke-width="0.5"/>
<text x="240" y="117" text-anchor="middle" class="H">BEGADKEFAT RULE</text>
<text x="240" y="128" text-anchor="middle" class="L">6 consonants shift between stop and fricative by position:</text>
<text x="240" y="139" text-anchor="middle" class="L">bet /b/ → /v/  •  gimel /g/ → /ɣ/  •  dalet /d/ → /ð/</text>
<text x="240" y="150" text-anchor="middle" class="L">kaf /k/ → /x/  •  pe /p/ → /f/  •  tav /t/ → /θ/</text>
<text x="240" y="161" text-anchor="middle" class="Ls">After vowel: fricative  •  After pause/consonant: stop (dagesh rule)</text>
<line x1="20" y1="169" x2="460" y2="169" stroke="#555" stroke-width="0.5"/>
<text x="240" y="177" text-anchor="middle" class="H">BIBLICAL HEBREW VOWELS</text>
<text x="240" y="188" text-anchor="middle" class="L">Short: a, e, i, o, u  •  Long: a, e, i, o, u (phonemically distinct)</text>
<text x="240" y="199" text-anchor="middle" class="L">Shewa: reduced vowel /ə/ (half-vowel) or zero (silent)</text>
<text x="240" y="210" text-anchor="middle" class="Ls">Stress: usually penultimate; some words final-stressed</text>
<line x1="20" y1="218" x2="460" y2="218" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="225" width="460" height="13" fill="#111"/>
<text x="240" y="234.5" text-anchor="middle" class="Hb">ARABIC PHONOLOGY  ·  SECONDARY LANGUAGE</text>
<text x="240" y="250" text-anchor="middle" class="H">ARABIC CONSONANTS</text>
<text x="240" y="261" text-anchor="middle" class="L">28 consonants; richer than Hebrew in pharyngeals and emphatics</text>
<text x="240" y="272" text-anchor="middle" class="L">Shared with Hebrew: aleph /ʾ/, ayin /ʿ/, het /ħ/, qaf /q/</text>
<text x="240" y="283" text-anchor="middle" class="L">Arabic extras: ghayn /ɣ/ • kha /x/ • dad /dˀ/ • zha /ðˀ/</text>
<text x="240" y="294" text-anchor="middle" class="Ls">Emphatic consonants: sˀ dˀ tˀ zˀ (pharyngealized) darken vowels</text>
<line x1="20" y1="302" x2="460" y2="302" stroke="#555" stroke-width="0.5"/>
<text x="240" y="310" text-anchor="middle" class="H">ARABIC VOWELS</text>
<text x="240" y="321" text-anchor="middle" class="L">Classical: 3 short (a, i, u) and 3 long (a, i, u) vowels only</text>
<text x="240" y="332" text-anchor="middle" class="L">Simpler than Hebrew 5-quality system; quantity (length) is phonemic</text>
<text x="240" y="343" text-anchor="middle" class="Ls">Case endings: nominative -u, accusative -a, genitive -i</text>
<line x1="20" y1="351" x2="460" y2="351" stroke="#555" stroke-width="0.5"/>
<text x="240" y="359" text-anchor="middle" class="H">SHARED SEMITIC PHONOLOGY</text>
<text x="240" y="370" text-anchor="middle" class="L">Both: pharyngeal consonants (aleph, ayin)</text>
<text x="240" y="381" text-anchor="middle" class="L">Both: uvular qof /q/  •  both: emphatic sibilants</text>
<text x="240" y="392" text-anchor="middle" class="L">Both: consonantal roots carry meaning; vowels indicate function</text>
<text x="240" y="403" text-anchor="middle" class="Ls">Same proto-Semitic ancestor ~3000 BCE; diverged by ~1000 BCE</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 09b ALT  ·  BIBLICAL HEBREW / ARABIC  ·  PHONOLOGY</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
