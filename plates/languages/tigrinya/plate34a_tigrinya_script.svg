<line x1="20" y1="250" x2="460" y2="250" stroke="black" stroke-width="0.3"/>
<text x="240" y="259" text-anchor="middle" class="H" >— ADDITIONAL TIGRINYA CONSONANTS vs AMHARIC —</text>
<text x="240" y="270" text-anchor="middle" class="Ls" >Tigrinya preserves some Semitic sounds reduced or absent in Amharic.</text>
<text x="80" y="280" text-anchor="middle" class="La" >ነንን</text>
<text x="310" y="280" text-anchor="middle" class="Lx" >nn — geminate nasal common in verb morphology</text>
<text x="80" y="293" text-anchor="middle" class="La" >ኰኵሊ</text>
<text x="310" y="293" text-anchor="middle" class="Lx" >ŵəlɨ — labialised consonants: tʷ, dʷ, kʷ (rounded)</text>
<text x="80" y="306" text-anchor="middle" class="La" >ዐዕዘ</text>
<text x="310" y="306" text-anchor="middle" class="Lx" >/ʿʾ/ — pharyngeal consonants preserved in Tigrinya</text>
<text x="80" y="319" text-anchor="middle" class="La" >ፅፀፋ</text>
<text x="310" y="319" text-anchor="middle" class="Lx" >/tsʼ qʼ fʼ/ — ejective series</text>
<line x1="20" y1="338" x2="460" y2="338" stroke="black" stroke-width="0.3"/>
<text x="240" y="347" text-anchor="middle" class="H" >— SCRIPT HISTORY AND STATUS —</text>
<text x="240" y="358" text-anchor="middle" class="Ls" >Ethiopic script: ~4th century CE, derived from South Arabian (Sabaean) script via ancient Ge'ez.</text>
<text x="240" y="367" text-anchor="middle" class="Ls" >Tigrinya uses the same script as Amharic but is a distinct language with distinct grammar.</text>
<text x="240" y="376" text-anchor="middle" class="Ls" >Tigrinya became official language of Eritrea at independence (1993). Equal with Arabic in Eritrean constitution.</text>
<text x="240" y="385" text-anchor="middle" class="Ls" >In Ethiopia, Tigrinya is the dominant language of the Tigray regional state.</text>
<line x1="20" y1="625" x2="460" y2="625" stroke="black" stroke-width="0.3"/>
<text x="240" y="620" text-anchor="middle" class="M" >SERIES 34 · TIGRINYA · PLATE A · SCRIPT · CC BY-SA 4.0 · REMEMBERFORWARD.ORG</text>
<line x1="20" y1="633" x2="460" y2="633" stroke="black" stroke-width="0.3"/>
<text x="240" y="648" text-anchor="middle" class="Fb" >THIS IS A PATIENT MESSAGE. IT WAS MADE FOR YOU, FREELY, BY PEOPLE WHO REMEMBERED FORWARD.</text>
<text x="240" y="663" text-anchor="middle" class="F" >BUY IT · BUILD IT · BURY IT · FOR SOMEONE YOU WILL NEVER MEET</text>
