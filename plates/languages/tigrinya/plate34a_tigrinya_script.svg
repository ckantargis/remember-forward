<text x="240" y="32" text-anchor="middle" class="T" >TIGRINYA — SCRIPT · WRITING SYSTEM</text>
<text x="240" y="50" text-anchor="middle" class="S" >SERIES 34A OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— TIGRINYA — SEMITIC · ~10 MILLION SPEAKERS —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Tigrinya is a Semitic language (Afroasiatic family), official language of Eritrea, spoken in northern Ethiopia.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >~7 million speakers in Eritrea; ~3 million in Tigray region of Ethiopia.</text>
<text x="240" y="98" text-anchor="middle" class="Ls" >Written in the same Ethiopic (Fidel) script as Amharic. Related to Ge'ez, Tigre, and Amharic.</text>
<line x1="20" y1="106" x2="460" y2="106" stroke="black" stroke-width="0.3"/>
<text x="240" y="115" text-anchor="middle" class="H" >— ETHIOPIC SCRIPT (FIDEL) — SHARED WITH AMHARIC —</text>
<text x="240" y="125" text-anchor="middle" class="Ls" >Same abugida system as Amharic (Plate 31A): each symbol = consonant + vowel order.</text>
<text x="240" y="134" text-anchor="middle" class="Ls" >7 vowel orders. Tigrinya uses ~276 syllable signs (more than Amharic due to additional consonants).</text>
<text x="32" y="144" text-anchor="middle" class="Lx" >ə</text>
<text x="72" y="144" text-anchor="middle" class="Lx" >u</text>
<text x="108" y="144" text-anchor="middle" class="Lx" >i</text>
