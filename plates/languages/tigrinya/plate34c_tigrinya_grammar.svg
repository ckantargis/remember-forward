<text x="240" y="50" text-anchor="middle" class="S" >SERIES 34C OF 60 · REMEMBER FORWARD</text>
<line x1="20" y1="58" x2="460" y2="58" stroke="black" stroke-width="0.3"/>
<text x="240" y="68" text-anchor="middle" class="H" >— SOV — SEMITIC ROOTS — TWO GENDERS —</text>
<text x="240" y="79" text-anchor="middle" class="L" >Tigrinya is SOV (verb-final). Two genders: masculine and feminine. Verb-final, like Amharic.</text>
<text x="240" y="89" text-anchor="middle" class="Ls" >Semitic 3-consonant root system: same root k-t-b gives kətabə (he wrote), kətib (written), məktab (office).</text>
<line x1="20" y1="97" x2="460" y2="97" stroke="black" stroke-width="0.3"/>
<text x="240" y="106" text-anchor="middle" class="H" >— VERB CONJUGATION — təhazə "to take/hold" —</text>
<text x="80" y="116" text-anchor="middle" class="Lx" >Subject</text>
<text x="170" y="116" text-anchor="middle" class="Lx" >Person</text>
<text x="270" y="116" text-anchor="middle" class="Lx" >Past form</text>
<text x="400" y="116" text-anchor="middle" class="Lx" >Gloss</text>
<text x="80" y="125" text-anchor="middle" class="Lx" >Ani (I)</text>
<text x="170" y="125" text-anchor="middle" class="Lx" >1sg</text>
<text x="270" y="125" text-anchor="middle" class="Las" >(̀təhaz-ku)</text>
<text x="400" y="125" text-anchor="middle" class="Lx" >I took</text>
