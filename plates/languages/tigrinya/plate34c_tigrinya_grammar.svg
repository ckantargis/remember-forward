<text x="400" y="202" text-anchor="middle" class="Lx" >they took</text>
<line x1="20" y1="215" x2="460" y2="215" stroke="black" stroke-width="0.3"/>
<text x="240" y="224" text-anchor="middle" class="H" >— DEFINITE ARTICLE AND CASE —</text>
<text x="240" y="235" text-anchor="middle" class="Ls" >Definite article: suffix -u (M sg) / -a (F sg) / -om (M pl) / -en (F pl).</text>
<text x="240" y="244" text-anchor="middle" class="Ls" >nəbr (tiger, indef.) → nəbru (the tiger, M def.)</text>
<text x="240" y="253" text-anchor="middle" class="Ls" >Accusative/object: not morphologically marked, conveyed by SOV word order.</text>
<line x1="20" y1="261" x2="460" y2="261" stroke="black" stroke-width="0.3"/>
