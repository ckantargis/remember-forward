<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">TIGRINYA</text>
<text x="240" y="40" text-anchor="middle" class="S">SEMITIC PHONOLOGY</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">TIGRINYA PHARYNGEAL CONSONANTS</text>
<text x="240" y="68" text-anchor="middle" class="L">/ħ/ voiceless pharyngeal fricative (ሐ in Ge'ez)</text>
<text x="240" y="79" text-anchor="middle" class="L">/ʕ/ voiced pharyngeal fricative (ዐ in Ge'ez)</text>
<text x="240" y="90" text-anchor="middle" class="Ls">Both from ancient Semitic root (shared with Arabic, Hebrew)</text>
<text x="240" y="101" text-anchor="middle" class="Ls">Pharyngeals produced deep in throat — difficult for non-Semitic speakers</text>
<line x1="20" y1="109" x2="460" y2="109" stroke="#555" stroke-width="0.5"/>
<text x="240" y="117" text-anchor="middle" class="H">EJECTIVE CONSONANTS</text>
<text x="240" y="128" text-anchor="middle" class="L">Six ejective stops: pʼ tʼ kʼ sʼ tsʼ tʃʼ</text>
<text x="240" y="139" text-anchor="middle" class="L">Ejectives: simultaneous glottal + oral closure, then explosive release</text>
<text x="240" y="150" text-anchor="middle" class="Ls">Feature shared with Oromo, Amharic, Somali — areal Horn of Africa</text>
<line x1="20" y1="158" x2="460" y2="158" stroke="#555" stroke-width="0.5"/>
<text x="240" y="166" text-anchor="middle" class="H">TIGRINYA VOWELS</text>
<text x="240" y="177" text-anchor="middle" class="L">Seven vowels: ə u i a e o ɪ (the seven Ge'ez vowel orders)</text>
<text x="240" y="188" text-anchor="middle" class="L">Geminate consonants phonemic: sala "peace" • salla "he prayed"</text>
<text x="240" y="199" text-anchor="middle" class="Ls">No tones; stress generally penultimate</text>
<line x1="20" y1="207" x2="460" y2="207" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="214" width="460" height="13" fill="#111"/>
<text x="240" y="223.5" text-anchor="middle" class="Hb">OROMO PHONOLOGY  ·  SECONDARY LANGUAGE</text>
<text x="240" y="239" text-anchor="middle" class="H">OROMO CUSHITIC PHONOLOGY</text>
<text x="240" y="250" text-anchor="middle" class="L">Pharyngeal consonants also present in Oromo:</text>
<text x="240" y="261" text-anchor="middle" class="L">/ħ/ (x in Qubee) and voiced pharyngeal — same as Tigrinya!</text>
<text x="240" y="272" text-anchor="middle" class="L">Ejective consonants: kʼ tʼ chʼ (shared Horn of Africa feature)</text>
<line x1="20" y1="280" x2="460" y2="280" stroke="#555" stroke-width="0.5"/>
<text x="240" y="288" text-anchor="middle" class="H">SHARED AREAL FEATURES</text>
<text x="240" y="299" text-anchor="middle" class="L">Both: pharyngeal fricatives /ħ/ /ʕ/ (uncommon globally)</text>
<text x="240" y="310" text-anchor="middle" class="L">Both: ejective consonants (glottalized stops)</text>
<text x="240" y="321" text-anchor="middle" class="L">Both: 5+ vowel system with long/short distinction</text>
<text x="240" y="332" text-anchor="middle" class="L">Both: geminate consonants phonemically significant</text>
<text x="240" y="343" text-anchor="middle" class="Ls">Different families: Tigrinya (Semitic) vs. Oromo (Cushitic)</text>
<text x="240" y="354" text-anchor="middle" class="Ls">Same phonological features: convergence across millennia of contact</text>
<line x1="20" y1="362" x2="460" y2="362" stroke="#555" stroke-width="0.5"/>
<text x="240" y="370" text-anchor="middle" class="H">PHONOLOGICAL DIVERGENCE</text>
<text x="240" y="381" text-anchor="middle" class="Ls">Tigrinya: no tones  •  Oromo: no tones (both unlike SE Asian Cushitic)</text>
<text x="240" y="392" text-anchor="middle" class="Ls">Tigrinya: Semitic root system (trilateral roots)</text>
<text x="240" y="403" text-anchor="middle" class="Ls">Oromo: Cushitic longer roots (typically 2-3 consonants, not trilateral)</text>
<text x="240" y="414" text-anchor="middle" class="Ls">Ethiopian highlands: shared phonological space across language families</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 34b ALT  ·  TIGRINYA / OROMO  ·  PHONOLOGY</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
