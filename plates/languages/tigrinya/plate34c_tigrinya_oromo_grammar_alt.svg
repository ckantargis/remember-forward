<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 680" width="480" height="680">
<rect x="0" y="0" width="480" height="680" fill="#fffff8"/>
<rect x="6" y="6" width="468" height="668" fill="none" stroke="#222" stroke-width="1.5"/>
<rect x="10" y="10" width="460" height="660" fill="none" stroke="#222" stroke-width="0.5"/>
<style>
text{font-family:Georgia,serif;fill:#111;}
.T{font-size:11px;font-weight:bold;}
.S{font-size:6.5px;}
.H{font-size:6.5px;font-weight:bold;}
.Hb{font-size:7px;font-weight:bold;fill:#fff;}
.L{font-size:7px;}
.Ls{font-size:6px;}
.Lx{font-size:5.5px;}
.M{font-size:6px;}
.F{font-size:7px;font-style:italic;}
.Fb{font-size:7.5px;font-weight:bold;}
</style>
<text x="240" y="28" text-anchor="middle" class="T">TIGRINYA</text>
<text x="240" y="40" text-anchor="middle" class="S">GRAMMAR</text>
<line x1="20" y1="47" x2="460" y2="47" stroke="#555" stroke-width="0.5"/>
<text x="240" y="57" text-anchor="middle" class="H">TIGRINYA WORD ORDER: SOV</text>
<text x="240" y="68" text-anchor="middle" class="L">Verb-final: Subject + Object + Verb</text>
<text x="240" y="79" text-anchor="middle" class="L">Tigrinya shares SOV order with Amharic (unusual for Semitic)</text>
<text x="240" y="90" text-anchor="middle" class="Ls">Arabic and Hebrew are VSO; Tigrinya SOV from contact with Cushitic</text>
<line x1="20" y1="98" x2="460" y2="98" stroke="#555" stroke-width="0.5"/>
<text x="240" y="106" text-anchor="middle" class="H">SEMITIC ROOT SYSTEM</text>
<text x="240" y="117" text-anchor="middle" class="L">Trilateral roots: three consonants carry basic meaning</text>
<text x="240" y="128" text-anchor="middle" class="Ls">sbʼ = root for "Saturday" / "Sabbath" concept</text>
<text x="240" y="139" text-anchor="middle" class="Ls">Vowel patterns inserted into roots to derive forms:</text>
<text x="240" y="150" text-anchor="middle" class="L">ktb = write-root: kataba "he wrote" • kaatib "writer"</text>
<line x1="20" y1="158" x2="460" y2="158" stroke="#555" stroke-width="0.5"/>
<text x="240" y="166" text-anchor="middle" class="H">GENDER IN TIGRINYA</text>
<text x="240" y="177" text-anchor="middle" class="L">Two genders: masculine and feminine</text>
<text x="240" y="188" text-anchor="middle" class="L">Feminine marked with -ti suffix: neger "thing" (M) • negerti (F)</text>
<text x="240" y="199" text-anchor="middle" class="Ls">Verbs agree in gender: masculine vs. feminine 3rd person forms</text>
<line x1="20" y1="207" x2="460" y2="207" stroke="#555" stroke-width="0.5"/>
<text x="240" y="215" text-anchor="middle" class="H">TIGRINYA DEFINITENESS</text>
<text x="240" y="226" text-anchor="middle" class="L">Definite article: -ti (F) / -u (M) suffixed to noun</text>
<text x="240" y="237" text-anchor="middle" class="Ls">Indefinite: no article (like Semitic languages generally)</text>
<line x1="20" y1="245" x2="460" y2="245" stroke="#555" stroke-width="0.5"/>
<rect x="10" y="252" width="460" height="13" fill="#111"/>
<text x="240" y="261.5" text-anchor="middle" class="Hb">OROMO GRAMMAR  ·  SECONDARY LANGUAGE</text>
<text x="240" y="277" text-anchor="middle" class="H">OROMO WORD ORDER: SOV</text>
<text x="240" y="288" text-anchor="middle" class="L">Oromo is also SOV (same as Tigrinya!)</text>
<text x="240" y="299" text-anchor="middle" class="L">Abbaan mana dhufan. "Father house came." = "Father came home."</text>
<text x="240" y="310" text-anchor="middle" class="L">Postpositions: irratti "on" • keessa "in" • irraa "from"</text>
<line x1="20" y1="318" x2="460" y2="318" stroke="#555" stroke-width="0.5"/>
<text x="240" y="326" text-anchor="middle" class="H">OROMO GENDER</text>
<text x="240" y="337" text-anchor="middle" class="L">Two genders: masculine and feminine (same as Tigrinya)</text>
<text x="240" y="348" text-anchor="middle" class="L">Masculine: -a final  •  Feminine: -tuu / -oo final</text>
<text x="240" y="359" text-anchor="middle" class="Ls">Oromo gender not based on Semitic root (different system, same concept)</text>
<line x1="20" y1="367" x2="460" y2="367" stroke="#555" stroke-width="0.5"/>
<text x="240" y="375" text-anchor="middle" class="H">OROMO DEFINITENESS</text>
<text x="240" y="386" text-anchor="middle" class="Ls">Definite: suffixed -icha (M) / -ittii (F): mana "house" → manicha "the house"</text>
<text x="240" y="397" text-anchor="middle" class="Ls">Parallel to Tigrinya: both suffix definiteness (not prefix)</text>
<line x1="20" y1="405" x2="460" y2="405" stroke="#555" stroke-width="0.5"/>
<text x="240" y="413" text-anchor="middle" class="H">ETHIOPIAN LINGUISTIC AREA</text>
<text x="240" y="424" text-anchor="middle" class="L">SOV word order shared by Tigrinya + Oromo + Amharic + Somali</text>
<text x="240" y="435" text-anchor="middle" class="Ls">Unusual for Semitic (Tigrinya); typical for Cushitic (Oromo)</text>
<text x="240" y="446" text-anchor="middle" class="Ls">Suffixed definiteness: shared across Ethiopian language families</text>
<text x="240" y="457" text-anchor="middle" class="Ls">Ethiopian Linguistic Area: convergence across Semitic+Cushitic boundary</text>
<line x1="20" y1="634" x2="460" y2="634" stroke="#555" stroke-width="0.5"/>
<text x="240" y="643" text-anchor="middle" class="M">PLATE 34c ALT  ·  TIGRINYA / OROMO  ·  GRAMMAR</text>
<text x="240" y="652" text-anchor="middle" class="M">CC BY-SA 4.0  ·  REMEMBERFORWARD.ORG</text>
</svg>
