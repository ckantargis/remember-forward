<!-- HOW TO FIND NORTH panel -->
<rect x="295" y="268" width="164" height="220" rx="3" fill="none" stroke="black" stroke-width="1"/>
<text x="377" y="282" font-family="Georgia,serif" font-size="8" font-weight="bold" text-anchor="middle" fill="black">HOW TO FIND NORTH</text>
<text x="377" y="294" font-family="Georgia,serif" font-size="7" text-anchor="middle" fill="black">(no tools needed)</text>
<line x1="295" y1="297" x2="459" y2="297" stroke="black" stroke-width="0.5"/>
<text x="302" y="310" font-family="Georgia,serif" font-size="7" fill="black">1. NIGHT: find Big Dipper</text>
<text x="302" y="321" font-family="Georgia,serif" font-size="7" fill="black">(7 stars, ladle shape). The two</text>
<text x="302" y="332" font-family="Georgia,serif" font-size="7" fill="black">cup-edge stars point to Polaris.</text>
<text x="302" y="346" font-family="Georgia,serif" font-size="7" fill="black">2. DAY: a shadow stick points</text>
<text x="302" y="357" font-family="Georgia,serif" font-size="7" fill="black">W at sunrise, E at sunset,</text>
<text x="302" y="368" font-family="Georgia,serif" font-size="7" fill="black">shortest shadow = South.</text>
<text x="302" y="382" font-family="Georgia,serif" font-size="7" fill="black">3. Polaris height above horizon</text>
<text x="302" y="393" font-family="Georgia,serif" font-size="7" fill="black">in degrees = your N latitude.</text>
<line x1="295" y1="400" x2="459" y2="400" stroke="black" stroke-width="0.5"/>
