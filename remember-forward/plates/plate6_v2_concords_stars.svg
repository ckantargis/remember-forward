<text x="240" y="34" font-family="Georgia,serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="black" letter-spacing="3">PLATE 6 OF [N] — THE CONCORDS &amp; THE STARS</text>
<line x1="18" y1="40" x2="462" y2="40" stroke="black" stroke-width="1"/>
<text x="240" y="52" font-family="Georgia,serif" font-size="7.5" text-anchor="middle" fill="black" letter-spacing="1.5">TIER 6 — TEN PRINCIPLES · STAR NAVIGATION · FINAL PLATE</text>
<line x1="18" y1="57" x2="462" y2="57" stroke="black" stroke-width="0.5"/>
<!-- CONTENT -->
<text x="240" y="70" font-family="Georgia,serif" font-size="9.5" font-weight="bold" text-anchor="middle" fill="black" letter-spacing="3">SECTION 1 — THE TEN CONCORDS</text>
<line x1="18" y1="75" x2="462" y2="75" stroke="black" stroke-width="0.5"/>

<text x="240" y="82" font-family="Georgia,serif" font-size="8" text-anchor="middle" fill="black" letter-spacing="0.5">Principles, not rules. Understand them. They are the foundation of a worthy civilization.</text>
<text x="28" y="96" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="black">I.</text>
<text x="46" y="96" font-family="Georgia,serif" font-size="7.5" fill="black">Every person has inherent worth — before and independent of all utility or belief.</text>
<text x="28" y="110" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="black">II.</text>
<text x="46" y="110" font-family="Georgia,serif" font-size="7.5" fill="black">Measure civilization by its most vulnerable: children, elderly, sick, different, stranger.</text>
<text x="28" y="124" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="black">III.</text>
<text x="46" y="124" font-family="Georgia,serif" font-size="7.5" fill="black">The living world is not a resource. It is a community. You are a member, not owner.</text>
<text x="28" y="138" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="black">IV.</text>
<text x="46" y="138" font-family="Georgia,serif" font-size="7.5" fill="black">Knowledge is a commons. Receive it. Add to it. Pass it forward freely.</text>
<text x="28" y="152" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="black">V.</text>
<text x="46" y="152" font-family="Georgia,serif" font-size="7.5" fill="black">Power must be held lightly. It is borrowed from community. Never owned.</text>
<text x="28" y="166" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="black">VI.</text>
<text x="46" y="166" font-family="Georgia,serif" font-size="7.5" fill="black">Cooperation is stronger than competition. This is ecological fact, not preference.</text>
<text x="28" y="180" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="black">VII.</text>
<text x="46" y="180" font-family="Georgia,serif" font-size="7.5" fill="black">The future has no voice in the present. Someone must speak for it. That is you.</text>
<text x="28" y="194" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="black">VIII.</text>
<text x="46" y="194" font-family="Georgia,serif" font-size="7.5" fill="black">Beauty is not decoration. It signals something is right — proportioned, true.</text>
<text x="28" y="208" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="black">IX.</text>
<text x="46" y="208" font-family="Georgia,serif" font-size="7.5" fill="black">Grief is the price of love, and it must be paid. Communities that cannot grieve cannot heal.</text>
<text x="28" y="222" font-family="Georgia,serif" font-size="8" font-weight="bold" fill="black">X.</text>
<text x="46" y="222" font-family="Georgia,serif" font-size="7.5" fill="black">You are not the first. You will not be the last. You exist in a chain. This is enough.</text>
<line x1="18" y1="240" x2="462" y2="240" stroke="black" stroke-width="0.5"/>
<text x="240" y="254" font-family="Georgia,serif" font-size="9.5" font-weight="bold" text-anchor="middle" fill="black" letter-spacing="3">SECTION 2 — STAR MAP AND NAVIGATION</text>
